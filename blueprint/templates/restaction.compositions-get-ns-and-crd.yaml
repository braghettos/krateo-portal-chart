apiVersion: templates.krateo.io/v1
kind: RESTAction
metadata:
  name: compositions-get-ns-and-crd
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  api:
  - name: crds
    path: "/apis/apiextensions.k8s.io/v1/customresourcedefinitions"
    filter: "[.crds.items[] | select(.spec.group == \"composition.krateo.io\") | {storedVersions: .status.storedVersions[0], plural: .status.acceptedNames.plural} ]"
    continueOnError: true
  - name: namespaces
    path: "/api/v1/namespaces"
    filter: "[.namespaces.items[] | .metadata.name]"
    continueOnError: true
    # dependsOn:{name:crds} is a PURE ORDERING EDGE (no iterator): it
    # only forces the `crds` stage to resolve BEFORE this one, so
    # dict["crds"] is populated when this stage's cross-product filter is
    # evaluated. It emits no extra request — createRequestOptions treats
    # an empty iterator as a single ordinary call.
    dependsOn:
      name: crds
    # Mirror the page's compositions-panels namespace-LIST UAF exactly:
    # the namespace LIST is dispatched via snowplow's elevated SA, then
    # per-user RBAC prunes it to ONLY the namespaces the requesting user
    # can `list panels` in. namespaceFrom:"." uses each returned namespace
    # name as the RBAC namespace. This makes the dashboard's per-user
    # namespace gate identical to the page's, so a dev gains scoped
    # dashboard access via a namespaced RoleBinding granting `list panels`
    # (plus `list/get` on the composition CRD, exercised by the downstream
    # compositions-list allCompositions iterator) — NO ClusterRole needed.
    userAccessFilter:
      verb: list
      group: widgets.templates.krateo.io
      resource: panels
      namespaceFrom: "."
  # Q-RBAC-DECOUPLE C(d) v5 — D2 fix (audit 2026-05-05).
  # The (.crds // [])[] / (.namespaces // [])[] form short-circuits when
  # either api[] entry's err-write branch fires (any failure in resolve.go
  # leaves dict[call.ErrorKey] set and dict["crds"]/dict["namespaces"]
  # absent). Without the // [] default, jq evaluates .crds[] → null[] →
  # "cannot iterate over: null" → 500. With it, the cross-product is
  # len(crds) × len(namespaces) (zero when either is empty), so partial
  # / total upstream failure degrades to 200 with body [].
  filter: >
    [
      (.crds // [])[] as $crd |
      (.namespaces // [])[] as $ns |
      {
        plural: $crd.plural,
        version: $crd.storedVersions,
        namespace: $ns
      }
    ]