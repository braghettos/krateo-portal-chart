apiVersion: templates.krateo.io/v1
kind: RESTAction
metadata:
  name: compositions-get-ns-and-crd
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  api:
  - name: crds
    path: "/apis/apiextensions.k8s.io/v1/customresourcedefinitions"
    filter: "[.crds.items[] | select(.spec.group == \"composition.krateo.io\") | {storedVersions: .status.storedVersions[0], plural: .status.acceptedNames.plural} ]"
    continueOnError: true
  # Phase 3' / portal-chart 0.30.177 — namespace cross-product REMOVED.
  #
  # PRIOR SHAPE (portal-chart 0.30.176): emitted K×N items (CRDs × user-visible
  # namespaces) so compositions-list could iterate per-(CRD,namespace). The
  # per-(CRD,ns) LIST was then runtime-collapsed by snowplow 0.30.218 into
  # a single cluster-LIST per CRD.
  #
  # NEW SHAPE: emit just the K CRD entries. compositions-list now iterates
  # K times (one cluster-scope LIST per CRD) with a per-item UAF gating by
  # .metadata.namespace. Functionally equivalent to today's runtime-collapsed
  # path (snowplow 0.30.218) but architecturally explicit.
  #
  # Name kept (compositions-get-ns-and-crd) for backward compatibility with
  # the /call URL embedded in compositions-list — even though it no longer
  # returns namespaces, renaming would require a coordinated edit and the
  # name's "ns" suffix is now historical.
  filter: >
    [
      (.crds // [])[] as $crd |
      {
        plural: $crd.plural,
        version: $crd.storedVersions
      }
    ]
