apiVersion: templates.krateo.io/v1
kind: RESTAction
metadata:
  name: compositions-panels
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  api:
  # Phase 3' / portal-chart 0.30.177 — single cluster-scope LIST with inline UAF.
  #
  # PRIOR SHAPE (portal-chart 0.30.176, runtime-collapsed by snowplow 0.30.218):
  #   Stage 1: /api/v1/namespaces  + UAF(panels:list, namespaceFrom: ".")  → list of namespaces
  #   Stage 2: iterator over .namespaces → per-ns LIST /apis/widgets.../namespaces/<ns>/panels
  #            (snowplow collapse-decision per /call replaced the fan-out with one cluster-LIST)
  #
  # NEW SHAPE (this RA): a SINGLE cluster-scope LIST directly, with the UAF
  # gating per-item by .metadata.namespace. This is the SAME runtime path that
  # cluster_list collapse produced on snowplow 0.30.218 — the YAML is now
  # architecturally explicit rather than relying on a runtime collapse.
  #
  # WIRE SHAPE & ENVELOPE: identical to 0.30.176 + 0.30.218 — same tight
  # SPA-minimal projection, ~11.1 MiB envelope after projection.
  #
  # RBAC GATING: cluster-scope LIST is dispatched via snowplow's elevated SA;
  # per-user RBAC drops items whose .metadata.namespace the requesting user
  # cannot `list panels` in. This is byte-equivalent to today's runtime
  # collapse-then-refilter result (same items kept/dropped per user).
  #
  # PROJECTION rationale unchanged from 0.30.176 (see git blame for details):
  # DataGrid consumer reads only metadata.{name,namespace,uid,labels,creationTimestamp}
  # + apiVersion + kind at LIST time. spec.* dropped entirely.
  - name: compositionspanels
    path: /apis/widgets.templates.krateo.io/v1beta1/panels
    continueOnError: true
    userAccessFilter:
      verb: list
      group: widgets.templates.krateo.io
      resource: panels
      namespaceFrom: .metadata.namespace
    filter: >
      [.compositionspanels.items[]?
       | select((.metadata.labels // {})["krateo.io/portal-page"] == "compositions")
       | {
           apiVersion,
           kind,
           metadata: {
             name: .metadata.name,
             namespace: .metadata.namespace,
             uid: .metadata.uid,
             creationTimestamp: .metadata.creationTimestamp,
             labels: .metadata.labels
           }
         }]
  filter: >
    {
      compositionspanels: (
        (.compositionspanels // []) as $items
        | ($items | sort_by(.metadata.creationTimestamp // "") | reverse) as $sorted
        | (.slice.offset  // 0)                 as $offset
        | (.slice.perPage // ($sorted | length)) as $perPage
        | [
            $sorted
            | length as $len
            | range($offset; $offset + $perPage)
            | select(. < $len)         # avoid out-of-bounds
            | $sorted[.]
          ]
      )
    }
