apiVersion: templates.krateo.io/v1
kind: RESTAction
metadata:
  name: blueprints-panels
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  api:
  # Phase 3' / portal-chart 0.30.177 — single cluster-scope LIST with inline UAF.
  # Symmetric to compositions-panels (see that file for full rationale).
  #
  # PRIOR SHAPE (portal-chart 0.30.176): namespace-iterator → per-ns LIST,
  # runtime-collapsed by snowplow 0.30.218 to one cluster-LIST.
  # NEW SHAPE: single cluster-scope LIST directly, UAF gates per-item via
  # .metadata.namespace. Same envelope, same RBAC outcome.
  - name: blueprintspanels
    path: /apis/widgets.templates.krateo.io/v1beta1/panels
    continueOnError: true
    userAccessFilter:
      verb: list
      group: widgets.templates.krateo.io
      resource: panels
      namespaceFrom: .metadata.namespace
    filter: >
      [.blueprintspanels.items[]?
       | select((.metadata.labels // {})["krateo.io/portal-page"] == "blueprints")
       | {
           apiVersion,
           kind,
           metadata: {
             name: .metadata.name,
             namespace: .metadata.namespace,
             uid: .metadata.uid,
             creationTimestamp: .metadata.creationTimestamp,
             labels: .metadata.labels
           }
         }]
  filter: >
    {
      blueprintspanels: (
        (.blueprintspanels // []) as $items
        | ($items | sort_by(.metadata.creationTimestamp // "") | reverse) as $sorted
        | (.slice.offset  // 0)                 as $offset
        | (.slice.perPage // ($sorted | length)) as $perPage
        | [
            $sorted
            | length as $len
            | range($offset; $offset + $perPage)
            | select(. < $len)         # avoid out-of-bounds
            | $sorted[.]
          ]
      )
    }
