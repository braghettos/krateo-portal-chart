apiVersion: templates.krateo.io/v1
kind: RESTAction
metadata:
  name: blueprints-panels
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  api:
  - name: namespaces
    path: "/api/v1/namespaces"
    # Q-RBAC-DECOUPLE C(d): the namespace LIST is dispatched via
    # snowplow's elevated SA, then per-user RBAC drops it to the
    # namespaces the request user can `list panels` in. namespaceFrom:"."
    # uses each returned namespace name as the RBAC namespace.
    userAccessFilter:
      verb: list
      group: widgets.templates.krateo.io
      resource: panels
      namespaceFrom: "."
    filter: "[.namespaces.items[] | .metadata.name]"
  - name: blueprintspanels
    dependsOn:
      name: namespaces
      iterator: .namespaces
    path: ${ "/apis/widgets.templates.krateo.io/v1beta1/namespaces/" + (.) + "/panels" }
    continueOnError: true
    # Path 3 / portal-chart 0.30.176 — tight SPA-minimal projection.
    # Symmetric to compositions-panels per Path 3 design §3.3. The DataGrid
    # consumer reads only metadata.{name,namespace} + apiVersion at LIST
    # time, so spec.* is dropped entirely (Phase 0 §C8 trace + empirical
    # 10.9 MiB target — see compositions-panels.yaml for full rationale).
    # On bench cluster the blueprints label match returns 0 items (the
    # label only sets after a blueprint manifest activates) — empty-result
    # handled by RAFullList empty-cell guard. Symmetric projection keeps
    # the populate path uniform across both panel RAs.
    filter: >
      [.blueprintspanels.items[]?
       | select((.metadata.labels // {})["krateo.io/portal-page"] == "blueprints")
       | {
           apiVersion,
           kind,
           metadata: {
             name: .metadata.name,
             namespace: .metadata.namespace,
             uid: .metadata.uid,
             creationTimestamp: .metadata.creationTimestamp,
             labels: .metadata.labels
           }
         }]
  filter: >
    {
      blueprintspanels: (
        (.blueprintspanels // []) as $items
        | ($items | sort_by(.metadata.creationTimestamp // "") | reverse) as $sorted
        | (.slice.offset  // 0)                 as $offset
        | (.slice.perPage // ($sorted | length)) as $perPage
        | [
            $sorted
            | length as $len
            | range($offset; $offset + $perPage)
            | select(. < $len)         # avoid out-of-bounds
            | $sorted[.]
          ]
      )
    }
