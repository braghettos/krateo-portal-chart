apiVersion: templates.krateo.io/v1
kind: RESTAction
metadata:
  name: sidebar-nav-menu-items
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  api:
  # Ship A.0 — collapse the (namespaces LIST + per-namespace iterator)
  # into ONE cluster-scoped LIST dispatched under snowplow's elevated SA,
  # then prune per-user via userAccessFilter: each returned item is kept
  # iff the request user can `list navmenuitems` in that item's own
  # namespace (namespaceFrom: .metadata.namespace). Small GVR
  # (cluster-wide count ~3) so raw item-level refilter is cheap.
  - name: navmenuitems
    continueOnError: true
    path: "/apis/widgets.templates.krateo.io/v1beta1/navmenuitems"
    userAccessFilter:
      verb: list
      group: widgets.templates.krateo.io
      resource: navmenuitems
      namespaceFrom: ".metadata.namespace"
  filter: >
    {
      navmenuitems: (
        if (.navmenuitems | type) == "object" then
          [.navmenuitems.items[]?]
        else
          []
        end | sort_by(.spec.widgetData.order)
      )
    }
