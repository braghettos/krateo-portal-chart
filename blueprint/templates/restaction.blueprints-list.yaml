apiVersion: templates.krateo.io/v1
kind: RESTAction
metadata:
  name: blueprints-list
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  api:
  # Ship A.0 — collapse the (namespaces LIST + per-namespace iterator)
  # into ONE cluster-scoped LIST dispatched under snowplow's elevated SA,
  # then prune per-user via userAccessFilter: each returned item is kept
  # iff the request user can `list compositiondefinitions` in that item's
  # own namespace (namespaceFrom: .metadata.namespace). Small GVR
  # (cluster-wide count ~1) so raw item-level refilter is cheap.
  - name: allCompositionDefinitions
    continueOnError: true
    path: /apis/core.krateo.io/v1alpha1/compositiondefinitions
    userAccessFilter:
      verb: list
      group: core.krateo.io
      resource: compositiondefinitions
      namespaceFrom: ".metadata.namespace"
  filter: >
    {
      list: (
        if (.allCompositionDefinitions | type) == "object" then
          [.allCompositionDefinitions.items[]? | del(.metadata.managedFields, .metadata.annotations["kubectl.kubernetes.io/last-applied-configuration"])]
        else
          []
        end
      )
    }
