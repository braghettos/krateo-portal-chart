apiVersion: templates.krateo.io/v1
kind: RESTAction
metadata:
  name: all-routes
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  api:
  # Ship A.0 — collapse the (namespaces LIST + per-namespace iterator)
  # into ONE cluster-scoped LIST dispatched under snowplow's elevated SA,
  # then prune per-user via userAccessFilter: each returned item is kept
  # iff the request user can `list routes` in that item's own namespace
  # (namespaceFrom: .metadata.namespace). Small GVR (cluster-wide count
  # ~2) so raw item-level refilter is cheap.
  - name: routes
    continueOnError: true
    path: "/apis/widgets.templates.krateo.io/v1beta1/routes"
    userAccessFilter:
      verb: list
      group: widgets.templates.krateo.io
      resource: routes
      namespaceFrom: ".metadata.namespace"
  filter: >
    {
      routes: (
        if (.routes | type) == "object" then
          [.routes.items[]?]
        else
          []
        end
      )
    }
