# Registers the portal-starter blueprint with Krateo: core-provider generates a
# Portal CRD + controller from the published OCI chart's values.schema.json. Apply
# this (or let the installer umbrella emit it) before creating a Portal Composition.
apiVersion: core.krateo.io/v1alpha1
kind: CompositionDefinition
metadata:
  name: portal
  namespace: krateo-system
spec:
  chart:
    url: oci://ghcr.io/braghettos/krateo/portal
    version: "1.2.2"
