# Dashboard "Recent blueprints" — real, no hardcoded data. Fed from the SAME
# blueprints-cards RA the marketplace uses (self-registered blueprint Cards), so
# the dashboard and the marketplace agree on the blueprint set + categories.
# Honest-data: there is no backable per-blueprint "installs" metric, so the
# mockup's install counts are dropped; we show the 5 most-recently-registered
# blueprints with their real tags as the category line.
kind: Listy
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: blueprints-list
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [q]
  apiRef:
    name: blueprints-cards
    namespace: {{ .Release.Namespace }}
  widgetData:
    itemLayout: horizontal
    split: false
    dataSource: []
    itemTemplate:
      icon: fa-cube
      primaryText: '{name}'
      # version badge (mono pill) + category as a colour tag — mirrors the Blueprints-page
      # tile elements; row click → the blueprint detail page (like the Blueprints grid).
      subPrimaryText: 'v{version}'
      subPrimaryTextMono: true
      secondaryText: '{category}'
      secondaryTextAsTag: true
      # #2: surface the real registration age (creationTimestamp, already carried as `created`
      # for the sort) as a subtle relative-time chip on the right of the row, next to the
      # category tag. The List `relative` format reformats the WHOLE slot at render time
      # (live, not fetch-stale), so the slot must be the bare ISO timestamp — no "registered"
      # literal prefix (it would break Date parsing and fall through as raw text). Empty when a
      # blueprint has no creationTimestamp (interpolate → "" → the slot renders nothing).
      subSecondaryText: '{created}'
      formats:
        subSecondaryText: relative
      navigateTo: '/blueprints/{namespace}/{name}'
  # D3: sort by creationTimestamp DESC → the genuinely most-recently-registered 5 (honest
  # "Recent blueprints"), not the alphabetical first-5 that blueprints-cards' name-sort gave.
  # `created` rides along only for the sort; the itemTemplate renders name + version + category
  # tag. version (.spec.chart.version) + namespace ride along for the badge + row navigateTo.
  widgetDataTemplate:
    - forPath: dataSource
      expression: '${ [ .cards[]? | { name: .metadata.name, namespace: .metadata.namespace, version: (.version // ""), category: (if ((.tags // []) | length) > 0 then (.tags | join(" · ")) else "blueprint" end), created: (.metadata.creationTimestamp // "") } ] | sort_by(.created) | reverse | .[0:5] }'
  resourcesRefs:
    items: []
