# Convention page root for /incidents/{namespace}/{name} — the investigation anatomy
# (mockup §C), strict top-to-bottom: header → EVIDENCE → MISSING CONTEXT/ASSUMPTIONS →
# REASONING trace → ROOT CAUSE → REMEDIATION plan → SIMILAR incidents → the v1 prose fallback.
#
# UX-20 (unified section language): every major section is now ONE antd Card of the same family
# (titleVariant: eyebrow + variant: outlined + a one-line headerLeft desc). Evidence, Reasoning
# trace and Remediation are the section-CARD widgets (incident-sec-*-card, defined in
# paragraphs.incident-section-labels) that WRAP their content (the analyzed Table + evidence
# Markdown, the Steps, the gated rem rows); Root cause and Missing context are their own Cards.
# The page now stacks these cards directly — the old "strong-label Paragraph + secondary-desc
# Paragraph + loose widget" triples are gone, so the detail reads as one visual language (incident
# first, RCA second) instead of a stack of different UIs.
#
# `items` are templated SERVER-SIDE off incident-detail's `sections` flags: every section
# renders ONLY when its structured data exists — a v1 prose-only report degrades to
# header + prose, and nothing ever renders as fabricated empty structure (exception-only,
# honest data). resourcesRefs stay static (the full pool); unreferenced children are
# simply never fetched.
kind: Flex
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: page-incident-detail
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [name, namespace]
  apiRef:
    name: incident-detail
    namespace: {{ .Release.Namespace }}
  widgetData:
    allowedResources:
    - flexes
    - paragraphs
    - tables
    - markdowns
    - cards
    - steps
    - listies
    vertical: true
    gap: middle
    items:
    - resourceRefId: incident-detail-header-block
  widgetDataTemplate:
    # Each section is one unified Card (or the header/similar/prose primitives). Included ONLY when
    # its structured data exists (sections flags); the Cards fetch their own content children, so the
    # page stacks section CARDS, not loose widgets — the old label/desc/widget triples are gone.
    - forPath: items
      expression: >-
        ${ (.sections // {}) as $s
        | [ { resourceRefId: "incident-detail-header-block" } ]
        + (if ($s.evidence // false) then [ { resourceRefId: "incident-sec-evidence-card" } ] else [] end)
        + (if ($s.gaps // false) then [ { resourceRefId: "incident-gaps-card" } ] else [] end)
        + (if ($s.trace // false) then [ { resourceRefId: "incident-sec-trace-card" } ] else [] end)
        + (if ($s.rootcause // false) then [ { resourceRefId: "incident-rootcause" } ] else [] end)
        + (if ($s.remediation // false) then [ { resourceRefId: "incident-sec-remediation-card" } ] else [] end)
        + (if ($s.similar // false) then [ { resourceRefId: "incident-sec-similar-label" }, { resourceRefId: "incident-similar" } ] else [] end)
        + (if ($s.prose == true) or ($s == {}) then [ { resourceRefId: "incident-prose" } ] else [] end) }
  resourcesRefs:
    items:
    - id: incident-detail-header-block
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: incident-detail-header-block
      namespace: {{ .Release.Namespace }}
      resource: flexes
      verb: GET
    # Unified section cards (Evidence / Reasoning trace / Remediation) — each wraps its own content
    # widgets (the analyzed Table + evidence Markdown, the Steps, the gated rem rows) in its own
    # resourcesRefs, so the keyExtras walk still reaches every leaf transitively.
    - id: incident-sec-evidence-card
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: incident-sec-evidence-card
      namespace: {{ .Release.Namespace }}
      resource: cards
      verb: GET
    - id: incident-sec-trace-card
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: incident-sec-trace-card
      namespace: {{ .Release.Namespace }}
      resource: cards
      verb: GET
    - id: incident-sec-remediation-card
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: incident-sec-remediation-card
      namespace: {{ .Release.Namespace }}
      resource: cards
      verb: GET
    - id: incident-sec-similar-label
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: incident-sec-similar-label
      namespace: {{ .Release.Namespace }}
      resource: paragraphs
      verb: GET
    - id: incident-gaps-card
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: incident-gaps-card
      namespace: {{ .Release.Namespace }}
      resource: cards
      verb: GET
    - id: incident-rootcause
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: incident-rootcause
      namespace: {{ .Release.Namespace }}
      resource: cards
      verb: GET
    - id: incident-similar
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: incident-similar
      namespace: {{ .Release.Namespace }}
      resource: listies
      verb: GET
    - id: incident-prose
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: incident-prose
      namespace: {{ .Release.Namespace }}
      resource: markdowns
      verb: GET
