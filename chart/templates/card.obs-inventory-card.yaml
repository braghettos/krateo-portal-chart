# Platform inventory — installed blueprints (blueprints-cards), distinct composition
# kinds and active projects (compositions-list). Three small Statistics stacked, all real.
kind: Card
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: obs-inventory-card
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    title: Platform inventory
    titleVariant: eyebrow
    variant: outlined
    items:
    - resourceRefId: obs-stat-blueprints
    - resourceRefId: obs-stat-kinds
    - resourceRefId: obs-stat-projects
  resourcesRefs:
    items:
    - id: obs-stat-blueprints
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-stat-blueprints
      namespace: {{ .Release.Namespace }}
      resource: statistics
      verb: GET
    - id: obs-stat-kinds
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-stat-kinds
      namespace: {{ .Release.Namespace }}
      resource: statistics
      verb: GET
    - id: obs-stat-projects
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-stat-projects
      namespace: {{ .Release.Namespace }}
      resource: statistics
      verb: GET
