# #72 §0.7: panel-level "Investigate with Autopilot" CTA — replaces the former per-row
# "select an alert to continue in Autopilot →" model. Opens the Autopilot rail seeded to triage the
# open incidents (the ?ask= deep-link the rail consumes on /incidents). middle size (Brand v2 density).
kind: Button
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: obs-troubleshooting-investigate
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    label: Investigate with Autopilot
    icon: fa-robot
    type: primary
    size: middle
    clickActionId: obs-investigate
    actions:
      navigate:
        - id: obs-investigate
          type: navigate
          path: /incidents?ask=Review%20the%20recent%20Autopilot%20investigations%20and%20help%20me%20triage%20the%20open%20incidents.
          loading:
            display: true
  resourcesRefs:
    items: []
