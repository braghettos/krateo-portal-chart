# Rail-state breakdown — converged / drift / pending / failed counts as one bar each,
# percent = share of total, colour per state. Off compositions-list's server-derived
# .railState (same 4-state grammar as the reconciliation rail + compositions table).
# Only states with at least one composition are shown. Bar fields (color.value+map,
# label, variant) match the proven rail-list itemTemplate. Each row drills into the
# compositions list pre-filtered to its state (/compositions?status=… — served by
# compositions-list's server-side ?status filter, incl. the railState-backed drift).
kind: Listy
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: obs-reconcile-breakdown
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [projects, q, status]
  apiRef:
    name: compositions-list
    namespace: {{ .Release.Namespace }}
  widgetData:
    itemLayout: horizontal
    split: false
    itemTemplate:
      navigateTo: '{route}'
      primaryText: '{label}'
      bar:
        percent: '{percent}'
        label: '{count}'
        color:
          value: '{state}'
          map:
            healthy: green
            drift: violet
            pending: orange
            failed: red
        variant: line
    dataSource: []
  widgetDataTemplate:
    - forPath: dataSource
      expression: '${ (.list // []) as $l | ($l | length) as $n | [ {state:"healthy",label:"Converged"}, {state:"drift",label:"Drift"}, {state:"pending",label:"Pending"}, {state:"failed",label:"Failed"} ] | map(. as $s | ([ $l[] | select(.railState == $s.state) ] | length) as $c | { state: $s.state, label: $s.label, count: ($c | tostring), percent: (if $n > 0 then ($c * 100 / $n | floor) else 0 end), route: ("/compositions?status=" + $s.state) }) | map(select((.count | tonumber) > 0)) }'
  resourcesRefs:
    items: []
