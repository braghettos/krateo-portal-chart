# /resources page H1 — "Kind · name" (data-driven from resource-detail).
kind: Paragraph
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: resource-detail-title
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  keyExtras: [namespace, group, version, plural, name]
  apiRef:
    name: resource-detail
    namespace: {{ .Release.Namespace }}
  widgetData:
    text: ""
    strong: true
  widgetDataTemplate:
    - forPath: text
      expression: '${ .kindName // "" }'
  resourcesRefs:
    items: []
