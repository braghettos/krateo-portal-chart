# "Events" card → recent k8s Events for this component (Deployment + its
# ReplicaSets + its live pods), newest-first, capped at 20 by the RA.
kind: Card
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: card-component-detail-events
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    title: Events
    titleVariant: eyebrow
    variant: outlined
    extra: 'deployment · replicasets · pods · newest first'
    items:
      - resourceRefId: list-component-detail-events
  resourcesRefs:
    items:
      - id: list-component-detail-events
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: list-component-detail-events
        namespace: {{ .Release.Namespace }}
        resource: listies
        verb: GET
