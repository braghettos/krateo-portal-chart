# Full-width strip hosting the ERROR-log digest card (ClickHouse otel_logs). Closes the
# live-telemetry section: throughput trend → per-composition latency → what's erroring now.
kind: Row
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: obs-errors-row
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    allowedResources:
    - cards
    items:
    - resourceRefId: obs-errors-card
      size: 24
  resourcesRefs:
    items:
    - id: obs-errors-card
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-errors-card
      namespace: {{ .Release.Namespace }}
      resource: cards
      verb: GET
