# Revoke row under the existing-grants table (W3-2) — INERT-ON-EMPTY: the items
# are computed server-side from access-grants and include the gated Revoke
# button ONLY when a managed grant exists in the ACTIVE ?ns scope (click a grant
# row or pick a namespace to arm it). No grant in scope → empty Flex, nothing
# renders — exception-only UI, no dead danger button.
kind: Flex
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: access-grants-actions
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [username, ns]
  apiRef:
    name: access-grants
    namespace: {{ .Release.Namespace }}
  widgetData:
    allowedResources:
    - buttons
    gap: middle
    align: center
    items: []
  widgetDataTemplate:
    - forPath: items
      expression: '${ if (.hasGrantInNs // false) then [ { resourceRefId: "access-revoke" } ] else [] end }'
  resourcesRefs:
    items:
    - id: access-revoke
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: access-revoke
      namespace: {{ .Release.Namespace }}
      resource: buttons
      verb: GET
