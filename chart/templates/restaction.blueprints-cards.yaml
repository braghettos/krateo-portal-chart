# Marketplace aggregator — lists every blueprint's antd Card cluster-wide by the
# `krateo.io/portal-page: blueprints` label (the per-blueprint self-registration
# contract). Supersedes blueprints-panels (which listed the legacy `panels`).
#
# Generic-RA: returns only metadata; each tile's data is resolved by its own Card
# (apiRef → per-blueprint RESTAction). UAF prunes to cards the user may list.
apiVersion: templates.krateo.io/v1
kind: RESTAction
metadata:
  name: blueprints-cards
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  api:
    - name: cards
      path: /apis/widgets.templates.krateo.io/v1beta1/cards
      continueOnError: true
      userAccessFilter:
        verb: list
        group: widgets.templates.krateo.io
        resource: cards
        namespaceFrom: .metadata.namespace
      filter: >
        [.cards.items[]?
         | select((.metadata.labels // {})["krateo.io/portal-page"] == "blueprints")
         | {
             apiVersion,
             kind,
             metadata: {
               name: .metadata.name,
               namespace: .metadata.namespace,
               uid: .metadata.uid,
               creationTimestamp: .metadata.creationTimestamp,
               labels: .metadata.labels
             }
           }]
  filter: >
    {
      cards: ((.cards // []) | sort_by(.metadata.creationTimestamp // "") | reverse)
    }
