# Blueprint catalog — lists the cluster's CompositionDefinitions (core.krateo.io),
# the canonical blueprint set, one entry per blueprint. Replaces the retired
# per-blueprint self-registered Card pattern (krateo.io/portal-page=blueprints
# label) — the platform no longer ships one widget CR per blueprint; ONE templated
# tile is iterated over this list. Honest fields straight off each Composition
# Definition: name/namespace, chart version (spec.chart.version), category (the
# krateo.io/tier label: platform/observability), chart url. Feeds BOTH the
# marketplace grid and the dashboard "Top blueprints" (same `.cards` contract).
# UAF gates to compositiondefinitions the user may list; continueOnError so a
# missing grant degrades to an empty catalog, not a broken page.
apiVersion: templates.krateo.io/v1
kind: RESTAction
metadata:
  name: blueprints-cards
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  api:
    - name: compdefs
      path: /apis/core.krateo.io/v1alpha1/compositiondefinitions
      verb: GET
      continueOnError: true
      errorKey: compdefsError
      userAccessFilter:
        verb: list
        group: core.krateo.io
        resource: compositiondefinitions
        namespaceFrom: .metadata.namespace
      filter: >
        [.compdefs.items[]?
         | ((.metadata.labels // {})["krateo.io/tier"] // "blueprint") as $cat
         | {
             apiVersion,
             kind,
             metadata: {
               name: .metadata.name,
               namespace: .metadata.namespace,
               uid: .metadata.uid,
               creationTimestamp: .metadata.creationTimestamp,
               labels: .metadata.labels
             },
             version: (.spec.chart.version // ""),
             chart: (.spec.chart.url // ""),
             provisions: (.status.kind // .status.managed.kind // ""),
             category: $cat,
             tags: [ $cat ]
           }]
  # `category` arrives via ?extras (the /blueprints?category=<k> chip navigation). Echo it as
  # selectedCategory (the active-chip read-back) and filter the cards by the blueprint tier
  # (platform/observability/blueprint). "all" / no param shows every blueprint. The dashboard
  # "Top blueprints" reuse passes no ?category, so $sel defaults to "all" → unfiltered.
  filter: >
    ((.category) // "all") as $sel
    | ((.q // "") | ascii_downcase) as $q
    | ((.projects // "") | split(",") | map(select(. != ""))) as $projects
    | {
        selectedCategory: $sel,
        cards: ((.compdefs // [])
          | sort_by(.metadata.name // "")
          | map(select(($sel == "all" or .category == $sel)
              and ($q == "" or ((.metadata.name // "") | ascii_downcase | contains($q)) or ((.provisions // "") | ascii_downcase | contains($q)))
              and (($projects | length) == 0 or (([.metadata.namespace] - $projects) | length == 0)))))
      }
