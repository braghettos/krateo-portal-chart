# Blueprint create-form drafts (Tier C #11) — ONE shared, Helm-created ConfigMap whose
# data keys are per-user-per-blueprint: sanitize(username)__sanitize(ns)__sanitize(name).
# Each value is the JSON of an in-progress create form. Why shared + pre-created (not a
# per-user-NAMED CM): the only write path is the rest-action engine through snowplow /call,
# which has NO server-side-apply (it builds the apiserver path fresh and forwards no
# fieldManager), so a per-user-named CM could never be created on first save. A merge-patch
# into THIS pre-existing CM is the proven write (same mechanic as dashboard-range #10) and
# only touches one user's key, leaving the others intact. blueprint-formdef reads a user's
# key back into the form's initialValues (resume); the create Form's save-draft action
# merge-patches it. Default empty; runtime-added keys survive `helm upgrade` (Helm 3's
# 3-way merge sees no change to the empty manifest `data` and leaves live keys alone).
apiVersion: v1
kind: ConfigMap
metadata:
  name: blueprint-drafts
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/portal": "blueprint-drafts"
data: {}
