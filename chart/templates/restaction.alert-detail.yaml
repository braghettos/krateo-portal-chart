# Data source for ONE Alert CR — /alerts/{namespace}/{name} (route params ride in as
# ?extras .name/.namespace, same mechanism as composition-detail / incident-detail).
# Two reads, both continueOnError so a missing/RBAC-blocked read degrades honestly:
#   alert   : the per-name Alert CR (observability.krateo.io) — its rule config lives in
#             .spec (displayName / where / threshold+thresholdType / interval / message)
#             and its live HyperDX-mirrored state in .status (state / phase / lastSyncedAt
#             / hyperdxAlertId / hyperdxDashboardId), reconciled by krateo-alert-troubleshooter.
#   reports : the release-namespace TroubleshootingReports — used ONLY to find the incident
#             whose spec.alertName NORMALIZED-matches this alert's displayName (the alert→
#             incident back-link, item 22 alert-side; same normalization the incidents-list
#             awaiting-strip uses: lowercased, alphanumerics only — a report keys its alert by
#             the DISPLAY name which may carry an emoji, so a literal == never matched).
# Everything is derived server-side (nothing-hardcoded):
#   the State tag label+colour (ALERT→red/PENDING→gold/OK→green — palette: green=health, so
#   the healthy quiet state OK reads green), the "above N" threshold prose, the compact
#   relative lastSynced age (Descriptions has no format:relative → derived via `now`), the
#   Autopilot seed sentence (the "Investigate with Autopilot" button on the detail page), and
#   the HyperDX console deep-links (built only when the deployer set .Values.observabilityConsoleUrl
#   AND the reconciler recorded the id — no default URL is invented, so the link is simply
#   absent otherwise; same honesty as button.obs-console-link).
apiVersion: templates.krateo.io/v1
kind: RESTAction
metadata:
  name: alert-detail
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  api:
    - name: alert
      path: /apis/observability.krateo.io/v1alpha1/namespaces/{{ .Release.Namespace }}/alerts/{name}
      verb: GET
      continueOnError: true
      errorKey: alertError
    - name: reports
      path: /apis/observability.krateo.io/v1alpha1/namespaces/{{ .Release.Namespace }}/troubleshootingreports
      verb: GET
      continueOnError: true
      errorKey: reportsError
  filter: >
    def rel: (fromdateiso8601? // null) as $t | if $t == null then . else (now - $t) as $dt | (if $dt < 60 then "just now" elif $dt < 3600 then ((($dt/60)|floor|tostring) + "m ago") elif $dt < 86400 then ((($dt/3600)|floor|tostring) + "h ago") elif $dt < 5184000 then ((($dt/86400)|floor|tostring) + "d ago") else .[0:10] end) end;
    ({{ .Values.observabilityConsoleUrl | default "" | quote }} | rtrimstr("/")) as $console
    | (.name // "") as $n
    | (.namespace // "{{ .Release.Namespace }}") as $ns
    | (.alert.spec // {}) as $sp
    | (.alert.status // {}) as $st
    | ($sp.displayName // .alert.metadata.name // $n) as $dn
    | ($st.state // "PENDING") as $state
    | ($st.hyperdxAlertId // "") as $haid
    | ($st.hyperdxDashboardId // "") as $hdid
    | ($dn | ascii_downcase | gsub("[^a-z0-9]"; "")) as $dnorm
      # Find any TroubleshootingReport keyed to THIS alert (normalized displayName match).
    | (if $dnorm == "" then null else ([ ((.reports.items) // [])[]
         | (((.spec.alertName // "") | ascii_downcase | gsub("[^a-z0-9]"; ""))) as $rnorm
         | select($rnorm != "" and $rnorm == $dnorm)
         | { name: (.metadata.name // ""), namespace: (.metadata.namespace // "{{ .Release.Namespace }}"),
             title: (if (.status.rootCause.statement // "") != "" then .status.rootCause.statement elif (.spec.alertName // "") != "" then ("Investigation — " + .spec.alertName) else (.metadata.name // "") end),
             lifecycle: (.status.lifecycle // "open") } ] | first) end) as $rep
    | {
        displayName: $dn,
        where: ($sp.where // "all logs"),
        # "above 1" — thresholdType + threshold, empty-safe (never a bare " " or leading space).
        thresholdText: ((($sp.thresholdType // "") + " " + (($sp.threshold // 0) | tostring)) | ltrimstr(" ")),
        interval: ($sp.interval // ""),
        message: ($sp.message // ""),
        state: $state,
        phase: ($st.phase // "Pending"),
        # State tag — same map as the /alerts table, but OK→green (palette: green=health only,
        # and a quiet-OK alert IS the healthy default), ALERT→red (failure), PENDING→gold
        # (transitional). "OK" kept verbatim — the literal HyperDX state word.
        stateLabel: ($state | if . == "ALERT" then "Alert" elif . == "PENDING" then "Pending" else . end),
        stateColor: ($state | if . == "ALERT" then "red" elif . == "PENDING" then "gold" elif . == "OK" then "green" else "gray" end),
        lastSyncedRel: (($st.lastSyncedAt // "") | if . == "" then "" else rel end),
        hyperdxAlertId: $haid,
        hyperdxDashboardId: $hdid,
        # HyperDX console deep-links — absent unless BOTH the deployer configured a console URL
        # AND the reconciler recorded the id (no default URL invented; nothing-hardcoded).
        alertLink: (if ($console != "" and $haid != "") then ($console + "/alerts/" + $haid) else "" end),
        dashboardLink: (if ($console != "" and $hdid != "") then ($console + "/dashboards/" + $hdid) else "" end),
        hasConsole: (($console != "") and (($haid != "") or ($hdid != ""))),
        # Autopilot seed for the detail-page "Investigate with Autopilot" button (the ask flow
        # the OLD /alerts row-click used, preserved here now the row deep-links to this page).
        # The button navigates to a LITERAL server-built /incidents?ask= href (the seed @uri-
        # encoded once, here — same pattern as composition-detail's diagnoseHref; a Button
        # navigate path is used verbatim, NOT re-encoded like a Table cell, so it must be
        # pre-encoded exactly once). The raw `ask` is also emitted for any raw consumer.
        ask: ("Investigate the \"" + $dn + "\" observability alert — it is currently " + $state + "; explain what it watches, why it is in this state, and give me the concrete next steps."),
        askHref: ("/incidents?ask=" + (("Investigate the \"" + $dn + "\" observability alert — it is currently " + $state + "; explain what it watches, why it is in this state, and give me the concrete next steps.") | @uri)),
        # Back-link to the matched incident (alert→incident, item 22 alert-side). Empty when none.
        linkedReport: $rep,
        linkedRoute: (if $rep then ("/incidents/" + ($rep.namespace // "{{ .Release.Namespace }}") + "/" + ($rep.name // "")) else "" end),
        hasIncident: ($rep != null),
        sections: {
          incident: ($rep != null),
          console: (($console != "") and (($haid != "") or ($hdid != "")))
        }
      }
