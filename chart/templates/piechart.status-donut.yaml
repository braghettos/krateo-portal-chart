kind: PieChart
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: status-donut
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    data:
    - status: Healthy
      count: 0
    - status: Pending
      count: 0
    - status: Failed
      count: 0
    angleField: count
    colorField: status
    innerRadius: 65
    legend: true
    height: 220
  widgetDataTemplate:
  - forPath: data[0].count
    expression: ${ [.list[] | select((.conditions // []) | any(.type=="Ready" and .status=="True"))] | length }
  - forPath: data[1].count
    expression: ${ [.list[] | select((.conditions // []) | (any(.type=="Ready" and (.status=="True" or .status=="False")) | not))] | length }
  - forPath: data[2].count
    expression: ${ [.list[] | select((.conditions // []) | any(.type=="Ready" and .status=="False"))] | length }
  apiRef:
    name: compositions-list
    namespace: {{ .Release.Namespace }}
  resourcesRefs:
    items: []
