kind: PieChart
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: status-donut
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    data:
    - status: Healthy
      count: 0
    - status: Pending
      count: 0
    - status: Failed
      count: 0
    angleField: count
    colorField: status
    innerRadius: 65
    legend: true
    # Mockup status-breakdown: legend stacked to the RIGHT of the donut (not below).
    legendPosition: right
    height: 150
    # Semantic slice colors (matches the stat-card status tags).
    colorMap:
      Healthy: green
      Pending: orange
      Failed: red
    # Count inside each slice.
    label:
      text: count
      position: inside
      style:
        fontSize: 13
        fontWeight: 600
        fill: "#ffffff"
    # Donut-center HEALTH GAUGE: the big number is the healthy % (actual-matches-
    # desired), not the raw total — the flight-deck "X% OK" reading. annotations[0]
    # .style.text is templated to the live healthy-fraction below; G2 positions text
    # at 50%/50% of the donut coordinate, so it stays centered regardless of the
    # (bottom) legend. fill is a LITERAL hex (canvas/G2 can't read CSS vars): cyan
    # for the % (health=cyan, visible on both Petrol-dark and Paper-light) and a
    # neutral gray for the "OK" caption. The old #1f2937 was invisible on dark.
    annotations:
    - type: text
      style:
        # NB: quote the "x"/"y" keys — bare `y:` is parsed as the YAML 1.1 boolean
        # `true`, which would drop the vertical position.
        "x": "50%"
        "y": "44%"
        text: "0%"
        textAlign: center
        textBaseline: middle
        fontSize: 30
        fontWeight: bold
        fill: "#34D6C8"
    - type: text
      style:
        "x": "50%"
        "y": "60%"
        text: OK
        textAlign: center
        textBaseline: middle
        fontSize: 13
        fill: "#8A97A6"
    # live-refresh: watch the composition kinds in the data (computed, not hardcoded)
    watch: []
  widgetDataTemplate:
  - forPath: watch
    expression: '${ [ .list[] | { apiVersion: .av, kind: .kind } ] | unique }'
  - forPath: data[0].count
    expression: ${ [.list[] | select((.conditions // []) | any(.type=="Ready" and .status=="True"))] | length }
  - forPath: data[1].count
    expression: ${ [.list[] | select((.conditions // []) | (any(.type=="Ready" and (.status=="True" or .status=="False")) | not))] | length }
  - forPath: data[2].count
    expression: ${ [.list[] | select((.conditions // []) | any(.type=="Ready" and .status=="False"))] | length }
  - forPath: annotations[0].style.text
    expression: '${ (if (.list|length)>0 then ((([.list[]|select((.conditions//[])|any(.type=="Ready" and .status=="True"))]|length)*100/(.list|length))|floor) else 0 end | tostring) + "%" }'
  apiRef:
    name: compositions-list
    namespace: {{ .Release.Namespace }}
  resourcesRefs:
    items: []
