kind: PieChart
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: status-donut
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    data:
    - status: Healthy
      count: 0
    - status: Pending
      count: 0
    - status: Failed
      count: 0
    angleField: count
    colorField: status
    innerRadius: 65
    legend: true
    height: 220
    # Semantic slice colors (matches the stat-card status tags).
    colorMap:
      Healthy: green
      Pending: orange
      Failed: red
    # Count inside each slice.
    label:
      text: count
      position: inside
      style:
        fontSize: 13
        fontWeight: 600
        fill: "#ffffff"
    # Donut-center total + label. annotations[0].style.text is templated to the
    # live total below; G2 positions text at 50%/50% of the donut coordinate, so
    # it stays centered regardless of the (bottom) legend.
    annotations:
    - type: text
      style:
        # NB: quote the "x"/"y" keys — bare `y:` is parsed as the YAML 1.1 boolean
        # `true`, which would drop the vertical position.
        "x": "50%"
        "y": "44%"
        text: "0"
        textAlign: center
        textBaseline: middle
        fontSize: 30
        fontWeight: bold
        fill: "#1f2937"
    - type: text
      style:
        "x": "50%"
        "y": "60%"
        text: Compositions
        textAlign: center
        textBaseline: middle
        fontSize: 13
        fill: "#8c8c8c"
    # live-refresh: watch the composition kinds in the data (computed, not hardcoded)
    watch: []
  widgetDataTemplate:
  - forPath: watch
    expression: '${ [ .list[] | { apiVersion: .av, kind: .kind } ] | unique }'
  - forPath: data[0].count
    expression: ${ [.list[] | select((.conditions // []) | any(.type=="Ready" and .status=="True"))] | length }
  - forPath: data[1].count
    expression: ${ [.list[] | select((.conditions // []) | (any(.type=="Ready" and (.status=="True" or .status=="False")) | not))] | length }
  - forPath: data[2].count
    expression: ${ [.list[] | select((.conditions // []) | any(.type=="Ready" and .status=="False"))] | length }
  - forPath: annotations[0].style.text
    expression: ${ (.list | length) | tostring }
  apiRef:
    name: compositions-list
    namespace: {{ .Release.Namespace }}
  resourcesRefs:
    items: []
