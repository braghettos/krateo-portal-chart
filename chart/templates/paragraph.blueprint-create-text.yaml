# Proof widget for the create route's convention. On /marketplace/{namespace}/{name}/new
# the blueprint's {namespace}/{name} reach this widget via ?extras (useWidgetQuery folds
# useParams() in; snowplow >= 1.1.0 Fix-2 merges extras into widgetDataTemplate). A no-apiRef
# Paragraph computes its text server-side from extras.namespace / extras.name — the same
# channel as the detail route. Placeholder for the schema-driven Create Form (P0 acceptance).
kind: Paragraph
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: blueprint-create-text
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    text: New composition
    strong: true
  widgetDataTemplate:
    - forPath: text
      expression: '${ "New composition from blueprint " + (.name // "?") + " (namespace " + (.namespace // "?") + ")" }'
  resourcesRefs:
    items: []
