# Full-width strip hosting the obs-alerts-card.
kind: Row
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: obs-alerts-row
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    allowedResources:
    - cards
    items:
    - resourceRefId: obs-alerts-card
      size: 24
  resourcesRefs:
    items:
    - id: obs-alerts-card
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-alerts-card
      namespace: {{ .Release.Namespace }}
      resource: cards
      verb: GET
