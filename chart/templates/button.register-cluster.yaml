kind: Button
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: register-cluster
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    label: Register cluster
    type: primary
    icon: fa-plus
    # Registering a spoke = create a KubernetesTarget → navigate to the register form page
    # (/clusters/register, a hidden route in the sidebar-nav → page-clusters-register).
    clickActionId: register-cluster-nav
    actions:
      navigate:
        - id: register-cluster-nav
          path: /clusters/register
          type: navigate
  resourcesRefs:
    items: []
