# Fleet-rollout form schema source (W3-1) — builds, SERVER-SIDE, the schema for the
# "Deploy to fleet" Form on the blueprint detail page: pick N registered spoke clusters and
# fan the blueprint out as ONE CompositionDefinition per selected cluster (the Form's rest
# action sets fanOutPath: clusters — frontend >= 1.3.17).
#   - stage `compdef` : the installed blueprint (?extras .namespace/.name, same read as
#     blueprint-detail) — its spec.chart {url,repo,version} is the chart context each
#     fanned-out CompositionDefinition must carry (nothing hardcoded client-side).
#   - stage `targets` : LIST of registered KubernetesTargets → the `clusters` multi-select
#     enum, LIVE names only (mirrors blueprint-install-formdef's targets step: list-UAF +
#     continueOnError so no grant / no spokes degrades instead of failing the widget).
# The filter emits { schemaSpec, initialValues }: `name` (the per-op name prefix) +
# `clusters` (array of enum strings → fixed-options multi-select; "local" is a computed
# sentinel meaning "this hub, no targetRef") + `chart` (the blueprint context as pre-filled
# form fields, the same way blueprint-install carries chart.{url,repo,version} through the
# form values so payloadToOverride can read them from .json).
apiVersion: templates.krateo.io/v1
kind: RESTAction
metadata:
  name: fleet-rollout-formdef
  namespace: {{ .Release.Namespace }}
  annotations:
    krateo.io/verbose: "true"
spec:
  api:
    # The installed blueprint = its CompositionDefinition (identity from extras — the detail
    # route /blueprints/{namespace}/{name}). Source of the chart context.
    - name: compdef
      path: ${ "/apis/core.krateo.io/v1alpha1/namespaces/" + .namespace + "/compositiondefinitions/" + .name }
      verb: GET
      headers:
        - 'Accept: application/json'
    # Registered spokes: their names become the `clusters` enum (LIVE list — never hardcoded).
    # KubernetesTarget is namespaced; the cluster-scope collection endpoint returns targets across
    # all namespaces the caller may see. UAF gates each row by the user's per-namespace list grant on
    # kubernetestargets; continueOnError so a narrow-RBAC user still gets the form (hub-only rollout
    # via the "local" sentinel).
    - name: targets
      path: /apis/core.krateo.io/v1alpha1/kubernetestargets
      verb: GET
      headers:
        - 'Accept: application/json'
      continueOnError: true
      errorKey: targetsError
      userAccessFilter:
        verb: list
        group: core.krateo.io
        resource: kubernetestargets
        namespaceFrom: .metadata.namespace
      filter: "[.targets.items[]? | .metadata.name]"
  filter: |
    .name as $n
    | ((.compdef // {}).spec.chart // {}) as $chart
    | ((.targets // []) | map(select(. != null and . != ""))) as $targetNames
    # "local" is a SENTINEL (deploy on this hub -> the Form omits spec.deploy.targetRef for
    # that element), computed here — the real cluster names stay strictly the live list.
    | (["local"] + $targetNames) as $clusterEnum
    | {
        schemaSpec: {
          type: "object",
          required: ["name", "clusters"],
          properties: {
            name: {
              type: "string",
              title: "Name",
              description: "Name prefix for the rollout — each CompositionDefinition is named <name>-<cluster>"
            },
            clusters: {
              type: "array",
              title: "Target clusters",
              description: "One CompositionDefinition is created per selected cluster, each deploying this blueprint on that cluster (spec.deploy.targetRef). Pick \"local\" to deploy on this (hub) cluster with no targetRef.",
              items: { type: "string", enum: $clusterEnum }
            },
            chart: {
              type: "object",
              title: "Chart",
              description: "The blueprint chart — pre-filled from this blueprint, carried into every created CompositionDefinition",
              properties: {
                url:     { type: "string", title: "Chart URL" },
                repo:    { type: "string", title: "Chart repo" },
                version: { type: "string", title: "Chart version" }
              }
            }
          }
        },
        initialValues: {
          name: $n,
          chart: {
            url: ($chart.url // ""),
            repo: ($chart.repo // ""),
            version: ($chart.version // "")
          }
        }
      }
