# Titled panel around the top-pods resource table. The `extra` shows the live cluster totals
# (pod CPU cores + memory GiB + pod count) from the RA's totals step — e.g.
# "13.3 cores · 14.5 GiB · 91 pods".
kind: Card
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: obs-resource-card
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    title: Resource usage
    titleVariant: eyebrow
    variant: outlined
    extra: 'top pods · live'
    items:
    - resourceRefId: obs-resource-table
  widgetDataTemplate:
  - forPath: extra
    expression: '${ ((.cpu // 0)|tostring) + " cores · " + ((.mem // 0)|tostring) + " GiB · " + ((.pods // 0)|tostring) + " pods" }'
  apiRef:
    name: obs-resource-usage
    namespace: {{ .Release.Namespace }}
  resourcesRefs:
    items:
    - id: obs-resource-table
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-resource-table
      namespace: {{ .Release.Namespace }}
      resource: tables
      verb: GET
