# Upgrade-impact EXPLAIN data source — what a blueprint version update CHANGES, before the
# user runs it. Given the blueprint identity from ?extras (.namespace/.name, the detail-page
# route params) and a TARGET version (?to=, written by the blueprint-impact-target Select),
# it asks the helm-render-service to render BOTH chart versions and diff the resulting
# manifests in ONE call (POST /diff — base = installed spec.chart.version, head = ?to).
#
# HONESTY — this is a diff of CHART DEFAULTS: both versions render with the chart's default
# values under a synthetic release named after the blueprint. The values of REAL composition
# instances are NOT recoverable here and are NOT applied; the rendered `note` says so and the
# consuming card shows it. v2: recover per-composition values and diff those.
#
# Error model: the render service answers 200 + {error} for a chart that fails to fetch or
# render (data, not a step error), and continueOnError catches transport-level failures —
# either way the filter emits ONE honest error row + an error summary instead of widget data
# silently vanishing. When ?to= is absent the head falls back to the installed version
# (self-diff → empty; the impact widgets are only mounted when a differing ?to= is set, so
# this is just a safety net). Endpoint: the helm-render-endpoint Secret (server-url =
# http://helm-render-service.krateo-system.svc:8080), shipped by the helm-render-service
# chart with snowplowEndpoint.enabled=true — same-namespace convention as blueprints-endpoint.
apiVersion: templates.krateo.io/v1
kind: RESTAction
metadata:
  name: upgrade-impact
  namespace: {{ .Release.Namespace }}
  annotations:
    krateo.io/verbose: "true"
spec:
  api:
    # The installed blueprint = its CompositionDefinition; spec.chart carries the source
    # (url [+ repo for classic helm repos] + installed version) the diff bases on.
    - name: compdef
      path: ${ "/apis/core.krateo.io/v1alpha1/namespaces/" + .namespace + "/compositiondefinitions/" + .name }
      verb: GET
      headers:
        - 'Accept: application/json'
    # ONE /diff call renders installed-vs-target and diffs object-by-object (keyed by
    # apiVersion/kind/namespace/name; summaries name the changed top-level fields).
    # The payload is jq-built from the compdef — both chart-source spellings supported:
    # OCI (url+version) and classic helm repo (url+repo+version); `repo` is only sent
    # when the compdef has one (an empty repo would break the repo-base-URL path).
    - name: impact
      dependsOn:
        name: compdef
      endpointRef:
        name: helm-render-endpoint
        namespace: {{ .Release.Namespace }}
      path: /diff
      verb: POST
      headers:
        - 'Content-Type: application/json'
      continueOnError: true
      errorKey: impactError
      payload: |-
        ${ (.compdef.spec.chart // {}) as $c
           | ({ url: ($c.url // "") } + (if ($c.repo // "") != "" then { repo: $c.repo } else {} end)) as $src
           | { base: ($src + { version: ($c.version // "") }),
               head: ($src + { version: ((.to // "") | if . == "" then ($c.version // "") else . end) }),
               values: {},
               releaseName: (.name // "preview"),
               namespace: (.namespace // "default") }
           | tojson }
  # Shape the raw /diff result into the compact widget contract:
  #   rows    : per-object { kind, name, namespace, change: added|removed|modified|error,
  #             color (antd Tag color, server-side value→presentation), detail }
  #   counts  : { added, removed, modified, total }
  #   summary : one human line (counts, or the no-changes / render-failed statement)
  #   note    : the chart-defaults honesty header (always shown by the card)
  #   from/to : the compared versions; error: "" when healthy
  filter: |
    (.compdef.spec.chart // {}) as $c
    | ($c.version // "") as $from
    | ((.to // "") | if . == "" then $from else . end) as $to
    | (.impact // {}) as $d
    | ((($d.error // "") | tostring) as $svc
       | if $svc != "" then $svc
         elif (.impactError != null) then (.impactError | tostring)
         else "" end) as $err
    | ([ ($d.added // [])[]   | { kind: (.kind // ""), name: (.name // ""), namespace: (.namespace // ""), change: "added",    color: "green", detail: ("new object in " + $to) } ]
       + [ ($d.removed // [])[] | { kind: (.kind // ""), name: (.name // ""), namespace: (.namespace // ""), change: "removed",  color: "red",   detail: ("no longer rendered by " + $to) } ]
       + [ ($d.changed // [])[] | { kind: (.ref.kind // ""), name: (.ref.name // ""), namespace: (.ref.namespace // ""), change: "modified", color: "gold", detail: ((.summary // "") | sub("^changed top-level fields: "; "changed: ")) } ]) as $objRows
    | (if $err != "" then [ { kind: "—", name: "render failed", namespace: "", change: "error", color: "red", detail: $err } ] else $objRows end) as $rows
    | { added: ([ $objRows[] | select(.change == "added") ] | length),
        removed: ([ $objRows[] | select(.change == "removed") ] | length),
        modified: ([ $objRows[] | select(.change == "modified") ] | length) } as $n
    | ($n + { total: ($n.added + $n.removed + $n.modified) }) as $counts
    | ($d.valuesSchemaChanged // false) as $schemaChanged
    | {
        from: $from,
        to: $to,
        error: $err,
        rows: $rows,
        counts: $counts,
        summary: (if $err != "" then "Preview failed — the render service reported an error (see below); the update itself is unaffected."
                  elif $counts.total == 0 then "No manifest changes between " + $from + " and " + $to + " (chart defaults)." + (if $schemaChanged then " The values schema DID change." else "" end)
                  else (($counts.added | tostring) + " added · " + ($counts.removed | tostring) + " removed · " + ($counts.modified | tostring) + " modified"
                        + (if $schemaChanged then " · values schema changed" else "" end)) end),
        note: ("Diff of CHART DEFAULTS: both versions rendered with the chart's default values as release \"" + (.name // "") + "\" — the values of real composition instances are not applied, so their objects may differ."),
        valuesSchemaChanged: $schemaChanged
      }
