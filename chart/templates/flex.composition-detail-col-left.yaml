# Left column (wider): Specification, Events, Manifest.
kind: Flex
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: composition-detail-col-left
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    vertical: true
    gap: middle
    allowedResources:
      - cards
    items:
      - resourceRefId: card-composition-detail-spec
      - resourceRefId: card-composition-detail-events
      - resourceRefId: card-composition-detail-manifest
  resourcesRefs:
    items:
      - id: card-composition-detail-spec
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: card-composition-detail-spec
        namespace: {{ .Release.Namespace }}
        resource: cards
        verb: GET
      - id: card-composition-detail-events
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: card-composition-detail-events
        namespace: {{ .Release.Namespace }}
        resource: cards
        verb: GET
      - id: card-composition-detail-manifest
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: card-composition-detail-manifest
        namespace: {{ .Release.Namespace }}
        resource: cards
        verb: GET
