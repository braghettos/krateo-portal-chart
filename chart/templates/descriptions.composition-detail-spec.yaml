# The composition's spec as label/value rows. Generic: whatever fields the
# blueprint's claim carries (e.g. a DemoClaim shows `blueprint`). Shaped
# server-side by the composition-detail RA (.specItems); nothing hardcoded.
kind: Descriptions
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: descriptions-composition-detail-spec
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  apiRef:
    name: composition-detail
    namespace: {{ .Release.Namespace }}
  widgetData:
    column: 1
    bordered: true
    size: small
    items: []
  widgetDataTemplate:
    - forPath: items
      expression: '${ .specItems }'
  resourcesRefs:
    items: []
