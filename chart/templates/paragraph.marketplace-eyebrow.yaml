# Mockup `.greet .eyebrow` — the mono uppercase context caption above the Marketplace H1.
# Honest text (UX-audit #9): the catalog is an unfiltered mirror of the blueprint+operator
# helm indexes (397 charts, ~98 with name-restating descriptions), so neither "curated" nor
# the mockup's "policy-approved" is accurate — both were dropped. If real curation ever
# ships (a vetted-chart annotation + facet), reintroduce the word there, not here. Renders
# via the Paragraph `variant: eyebrow` treatment (IBM Plex Mono, letter-spaced, muted,
# uppercased).
kind: Paragraph
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: marketplace-eyebrow
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    text: 'Catalog · self-service'
    variant: eyebrow
  resourcesRefs:
    items: []
