kind: Card
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: stat-card-healthy
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    variant: outlined
    # D4: whole-card CTA → compositions filtered to the healthy ones (?status=healthy).
    clickActionId: view-healthy
    widgetActions:
      navigate:
        - id: view-healthy
          type: navigate
          path: /compositions?status=healthy
    items:
    - resourceRefId: stat-healthy
    - resourceRefId: delta-healthy
  resourcesRefs:
    items:
    - id: stat-healthy
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: stat-healthy
      namespace: {{ .Release.Namespace }}
      resource: statistics
      verb: GET
    - id: delta-healthy
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: delta-healthy
      namespace: {{ .Release.Namespace }}
      resource: flexes
      verb: GET
