# "Running compositions" card → the instances created from THIS blueprint, as a Listy
# shaped by blueprint-detail. Closes the blueprint→composition correlation (IA followup
# F1): from an installed blueprint you can now reach every composition running from it,
# and each row drills into that composition's detail.
kind: Card
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: card-blueprint-detail-compositions
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [name, namespace]
  widgetData:
    title: Running compositions
    titleVariant: eyebrow
    variant: outlined
    items:
      - resourceRefId: blueprint-detail-compositions
  resourcesRefs:
    items:
      - id: blueprint-detail-compositions
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: blueprint-detail-compositions
        namespace: {{ .Release.Namespace }}
        resource: listies
        verb: GET
