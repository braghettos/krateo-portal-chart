# Clusters head row — title+subtitle stack on the left, the primary "Register cluster" CTA
# right-aligned (mirrors compositions-header). Uses the SAME Row/Col grid as the dashboard
# header-row (title col size 16 + actions col size 8, button `alignment: right`) so the CTA
# pins to the far edge reliably — a bare Flex `justify: space-between` only right-aligns when
# the header stretches full-width, which was inconsistent here.
kind: Row
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: clusters-header
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    allowedResources:
    - flexes
    - buttons
    alignment: middle
    items:
    - resourceRefId: clusters-title-stack
      size: 16
    - resourceRefId: register-cluster
      size: 8
      alignment: right
  resourcesRefs:
    items:
    - id: clusters-title-stack
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: clusters-title-stack
      namespace: {{ .Release.Namespace }}
      resource: flexes
      verb: GET
    - id: register-cluster
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: register-cluster
      namespace: {{ .Release.Namespace }}
      resource: buttons
      verb: GET
