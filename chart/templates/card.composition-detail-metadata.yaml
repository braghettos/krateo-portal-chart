# "Metadata" card → namespace/uid/created + labels, as a Descriptions list.
kind: Card
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: card-composition-detail-metadata
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    title: Metadata
    items:
      - resourceRefId: descriptions-composition-detail-metadata
  resourcesRefs:
    items:
      - id: descriptions-composition-detail-metadata
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: descriptions-composition-detail-metadata
        namespace: {{ .Release.Namespace }}
        resource: descriptions
        verb: GET
