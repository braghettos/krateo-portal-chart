# "What this update changes" card — the upgrade-impact EXPLAIN result, full-width under the
# detail grid. Mounted by page-blueprint-detail ONLY while ?to= names a version different
# from the installed one (set by the Preview update impact Select; ✕ clears it away).
# Content: summary line + chart-defaults honesty note + the per-object change table (the
# table itself is included only when there are rows — a no-change diff renders just the two
# honest lines, no empty table chrome). Title/extra are server-templated: the compared
# versions ride in the header. READ-ONLY throughout — applying the update stays in the
# Update version form.
kind: Card
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: card-blueprint-detail-impact
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [name, namespace, to]
  apiRef:
    name: upgrade-impact
    namespace: {{ .Release.Namespace }}
  widgetData:
    title: What this update changes
    extra: ''
    items:
      - resourceRefId: blueprint-impact-summary
      - resourceRefId: blueprint-impact-note
  widgetDataTemplate:
    - forPath: extra
      expression: '${ (.from // "?") + " → " + (.to // "?") }'
    - forPath: items
      expression: >-
        ${ [ { resourceRefId: "blueprint-impact-summary" }, { resourceRefId: "blueprint-impact-note" } ]
        + (if ((.rows // []) | length) > 0 then [ { resourceRefId: "blueprint-impact-table" } ] else [] end) }
  resourcesRefs:
    items:
      - id: blueprint-impact-summary
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: blueprint-impact-summary
        namespace: {{ .Release.Namespace }}
        resource: paragraphs
        verb: GET
      - id: blueprint-impact-note
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: blueprint-impact-note
        namespace: {{ .Release.Namespace }}
        resource: paragraphs
        verb: GET
      - id: blueprint-impact-table
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: blueprint-impact-table
        namespace: {{ .Release.Namespace }}
        resource: tables
        verb: GET
