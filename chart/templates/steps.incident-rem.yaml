# REMEDIATION STEPS navigator — antd Steps (vertical, small) showing ALL plan steps with
# sequential status computed server-side:
#   · finish  — already applied; resourceRefId → Flex with markdown receipt (no button)
#   · process — the current step; resourceRefId → Flex with markdown + "Review & apply" button
#   · wait    — future steps (locked); no resourceRefId — only title/status shows inline
# The Steps widget renders each step's referenced Flex widget inside the step itself, so the
# action button lives within the step rather than below the entire navigator.
kind: Steps
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: incident-rem-widget
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  keyExtras: [name, namespace]
  apiRef:
    name: incident-detail
    namespace: {{ .Release.Namespace }}
  widgetData:
    orientation: vertical
    size: small
    current: 0
    items: []
  widgetDataTemplate:
    - forPath: current
      expression: '${ .remCurrentStep // 0 }'
    # resourceRefId added to applied steps (receipt) and the current step (button).
    # Future steps (index > remCurrentStep) show only title+status — no inline widget.
    - forPath: items
      expression: >-
        ${ (.remCurrentStep // 0) as $cur
        | (.remStepsForWidget // [])
        | to_entries
        | map(.value + (if .key <= $cur then { resourceRefId: ("incident-rem-step-" + (.key | tostring)) } else {} end))
        }
  resourcesRefs:
    items:
    {{- range $i := until 6 }}
    - id: incident-rem-step-{{ $i }}
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: incident-rem-step-{{ $i }}
      namespace: {{ $.Release.Namespace }}
      resource: flexes
      verb: GET
    {{- end }}
