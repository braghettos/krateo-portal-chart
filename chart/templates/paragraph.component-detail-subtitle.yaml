# Sub-line under the component title: "Deployment · <namespace> · created <age>".
# Assembled HERE (widget representation) from the raw facts the RA supplies; the
# created age is computed server-side and emitted as a string. When the Deployment
# does not exist the subtitle says so instead of inventing an age.
kind: Paragraph
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: component-detail-subtitle
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [name]
  apiRef:
    name: component-detail
    namespace: {{ .Release.Namespace }}
  widgetData:
    text: ""
    type: secondary
  widgetDataTemplate:
    - forPath: text
      expression: '${ if (.found // false) then ("Deployment · " + "{{ .Release.Namespace }}" + " · created " + ((.dep.created // "") as $ts | if ($ts | length) == 0 then "?" else ((now - ($ts | fromdateiso8601)) as $sec | if $sec < 60 then "just now" elif $sec < 3600 then ((($sec/60)|floor)|tostring) + "m ago" elif $sec < 86400 then ((($sec/3600)|floor)|tostring) + "h ago" else ((($sec/86400)|floor)|tostring) + "d ago" end) end)) else ("Deployment · " + "{{ .Release.Namespace }}" + " · not found") end }'
  resourcesRefs:
    items: []
