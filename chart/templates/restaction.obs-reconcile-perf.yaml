# Reconcile performance from ClickHouse — two complementary sources, each used where it's
# most accurate:
#   * step `pctl` (otel_traces): EXACT p50/p95/p99/avg of the reconcile span Duration. The
#     OTel histograms exist but their buckets are coarse ([0,5,10,25,50...] SECONDS, ~94%
#     of reconciles fall in the single 0-5s bucket) so trace-derived percentiles (per-span
#     Duration) are far more precise than histogram interpolation would be.
#   * step `phases` (otel_metrics_histogram): the per-PHASE mean latency (queue-wait / get /
#     RBAC generate / RBAC apply). Sum/Count deltas are exact regardless of bucket coarseness,
#     and traces can't sub-time the phases — so the histogram is the right source here.
#     Windowed via per-series (instance+composition-gvr) max-min deltas, summed across series.
# Exposes {p50,p95,p99,avg,n, phases[]}. External-fetch endpointRef, ClickHouse FORMAT JSON.
apiVersion: templates.krateo.io/v1
kind: RESTAction
metadata:
  name: obs-reconcile-perf
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  api:
    - name: pctl
      endpointRef:
        name: clickhouse-endpoint
        namespace: {{ .Release.Namespace }}
      path: /?query=SELECT%20round%28quantile%280.5%29%28Duration%29%2F1e6%2C0%29%20AS%20p50_ms%2C%20round%28quantile%280.95%29%28Duration%29%2F1e6%2C0%29%20AS%20p95_ms%2C%20round%28quantile%280.99%29%28Duration%29%2F1e6%2C0%29%20AS%20p99_ms%2C%20round%28avg%28Duration%29%2F1e6%2C0%29%20AS%20avg_ms%2C%20count%28%29%20AS%20n%20FROM%20otel_traces%20WHERE%20ServiceName%3D%27composition-dynamic-controller%27%20AND%20SpanName%3D%27reconcile%27%20AND%20Timestamp%20%3E%20now%28%29%20-%20INTERVAL%206%20HOUR%20FORMAT%20JSON
      verb: GET
      headers:
        - 'Accept: application/json'
      continueOnError: true
      errorKey: pctlError
    - name: phases
      endpointRef:
        name: clickhouse-endpoint
        namespace: {{ .Release.Namespace }}
      path: /?query=SELECT%20metric%2C%20round%28sum%28dsum%29%2Fnullif%28sum%28dcount%29%2C0%29%2A1000%2C%200%29%20AS%20mean_ms%2C%20sum%28dcount%29%20AS%20samples%20FROM%20%28%20SELECT%20MetricName%20AS%20metric%2C%20ResourceAttributes%5B%27service.instance.id%27%5D%20AS%20sid%2C%20ResourceAttributes%5B%27krateo.io%2Fcomposition-gvr%27%5D%20AS%20gvr%2C%20max%28Sum%29-min%28Sum%29%20AS%20dsum%2C%20max%28Count%29-min%28Count%29%20AS%20dcount%20FROM%20otel_metrics_histogram%20WHERE%20MetricName%20IN%20%28%27unstructured_runtime.reconcile.queue.wait.duration_seconds%27%2C%27unstructured_runtime.reconcile.get.duration_seconds%27%2C%27composition_rbac_generation_duration_seconds%27%2C%27composition_rbac_apply_duration_seconds%27%29%20AND%20TimeUnix%20%3E%20now%28%29%20-%20INTERVAL%206%20HOUR%20GROUP%20BY%20metric%2C%20sid%2C%20gvr%20%29%20GROUP%20BY%20metric%20FORMAT%20JSON
      verb: GET
      headers:
        - 'Accept: application/json'
      continueOnError: true
      errorKey: phasesError
  # pctl => {data:[{p50_ms,p95_ms,p99_ms,avg_ms,n}]}; phases => {data:[{metric,mean_ms,samples}]}.
  filter: >
    { p50: (((.pctl.data) // [])[0].p50_ms // 0),
      p95: (((.pctl.data) // [])[0].p95_ms // 0),
      p99: (((.pctl.data) // [])[0].p99_ms // 0),
      avg: (((.pctl.data) // [])[0].avg_ms // 0),
      n:   (((.pctl.data) // [])[0].n // 0),
      phases: ((.phases.data) // []) }
