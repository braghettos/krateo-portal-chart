# Mono uppercase context caption above the /blueprint-builder H1 (mockup .eyebrow).
# Tenant from deployer config (.Values.tenant) — same source as the sider tenant-chip.
kind: Paragraph
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: blueprint-builder-eyebrow
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    text: 'Builders · tenant {{ .Values.tenant | default "krateo-enterprise" }}'
    variant: eyebrow
  resourcesRefs:
    items: []
