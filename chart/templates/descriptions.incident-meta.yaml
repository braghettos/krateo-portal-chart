# UX-19: the incident meta (started / updated / phase) as an antd Descriptions list rather than a
# bare ISO run-on Paragraph — so it reads as the same "form" visual language as the rest of the
# detail (mirrors descriptions.composition-detail-metadata). Timestamps are RELATIVE, derived
# server-side by incident-detail (.metaItems — a Descriptions value has no format:relative), and
# empty parts are OMITTED (never a dash for data we don't have; same honesty as the old meta line).
kind: Descriptions
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: incident-meta-desc
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [name, namespace]
  apiRef:
    name: incident-detail
    namespace: {{ .Release.Namespace }}
  widgetData:
    # Compact single ROW (Started · Updated · Phase side by side, column: 3) — a light pagehead meta
    # strip, not a heavy stacked table. Plain definition-list style (variant: default), borderless,
    # small: the label/value pairs read cleanly inline under the title/chips.
    column: 3
    variant: default
    bordered: false
    size: small
    items: []
  widgetDataTemplate:
    - forPath: items
      expression: '${ .metaItems // [] }'
  resourcesRefs:
    items: []
