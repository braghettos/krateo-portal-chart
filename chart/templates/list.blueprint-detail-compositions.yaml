# The compositions CREATED FROM this blueprint — one row per running instance of the
# CD's generated kind (JOINed server-side by blueprint-detail via status.apiVersion +
# status.resource). Each row = a health dot (the instance's OWN Ready condition) + name
# + namespace (mono) + a Ready/Failed/Pending Tag. Rows navigate to the composition's
# detail page (/compositions/{namespace}/{name}) — the correlation the IA assessment
# flagged as missing (blueprint → its running compositions). An empty set (a blueprint
# nobody has instantiated yet) renders the honest antd empty state.
kind: Listy
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: blueprint-detail-compositions
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [name, namespace]
  apiRef:
    name: blueprint-detail
    namespace: {{ .Release.Namespace }}
  widgetData:
    dataSource: []
    itemLayout: horizontal
    split: false
    itemTemplate:
      navigateTo: '{navHref}'
      iconVariant: dot
      color:
        value: '{readyColor}'
        map:
          Healthy: green
          Down: red
          Pending: gold
        default: gray
      primaryText: '{name}'
      subPrimaryText: '{namespace}'
      subPrimaryTextMono: true
      secondaryText: '{readyLabel}'
      secondaryTextAsTag: true
  widgetDataTemplate:
    - forPath: dataSource
      expression: '${ .compositions // [] }'
  resourcesRefs:
    items: []
