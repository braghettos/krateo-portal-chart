# Marketplace sort control — a data-driven chip row that reorders the grid. Bound to the
# blueprints-catalog RA's `.sorts` (Name A–Z | Recently updated); each chip's `route` carries
# ?sort= and preserves the active source/category/q filter so sort composes with the facets.
# The active sort renders solid amber (same treatment as the source/category chips). Only the
# TWO orders the helm index data supports are offered — the index has no downloads/popularity
# field, so no "trending"/"popular" sort exists (would be fabricated).
kind: Listy
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: marketplace-sort-toggle
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [category, q, source, sort]
  apiRef:
    name: blueprints-catalog
    namespace: {{ .Release.Namespace }}
  widgetData:
    itemTemplate:
      rowVariant: chip
      primaryText: '{label}'
      navigateTo: '{route}'
    dataSource: []
  widgetDataTemplate:
    - forPath: dataSource
      expression: '${ .sorts }'
  resourcesRefs:
    items: []
