# The alert RULE config as label/value rows — Watching (spec.where, the log query),
# Threshold ("above 1"), Every (spec.interval), and the human Message blurb (spec.message).
# All shaped server-side by alert-detail. Empty facts are OMITTED (never a fabricated "—" row):
# a rule with no message simply has no Message row. Hosted inside card-alert-detail-config
# (the Flex allowedResources enum has no `descriptions`, so it must be nested in a Card —
# same as descriptions-blueprint-detail-info).
kind: Descriptions
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: descriptions-alert-detail-config
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [name, namespace]
  apiRef:
    name: alert-detail
    namespace: {{ .Release.Namespace }}
  widgetData:
    column: 1
    bordered: false
    size: small
    items: []
  widgetDataTemplate:
    - forPath: items
      expression: '${ [ { label: "Watching", value: (.where // "all logs") }, { label: "Threshold", value: (.thresholdText // "") } ] + (if (.interval // "") != "" then [ { label: "Every", value: .interval } ] else [] end) + (if (.message // "") != "" then [ { label: "Message", value: .message } ] else [] end) }'
  resourcesRefs:
    items: []
