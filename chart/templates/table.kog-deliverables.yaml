# The published-API-mappings registry — ONE row per Autopilot-authored KOG deliverable, off
# kog-deliverables. Mirrors the blueprint-builder deliverables table. Columns: RestDefinition
# (name) / Pull request title / Generated kind (GVK) / Ready chip (Ready=green, Failed=red,
# Pending/In review=gold) / PR # / Published age. Rows are INERT — no rowNavigateTo: a
# RestDefinition's GENERATED kind has no single instance to land on, and no per-kind resources
# LIST route exists (only /resources/{ns}/{group}/{version}/{plural}/{name} for one object), so
# a clean row action isn't expressible; the raw restdef-registry table below carries the same
# Ready info, and the PR is openable on /portal-builder (its Listy passes a full html_url).
#
# WHY the PR is a plain "#N" TEXT cell (issue #30, same as the blueprint deliverables): a Table
# has NO per-cell href, and its whole-row rowNavigateTo runs encodeURIComponent (Table.tsx),
# which mangles a full https:// URL. The url rides as a hidden cell (page context / agent
# grounding), just not clickable here.
kind: Table
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: kog-deliverables
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    allowedResources: []
    bordered: false
    size: small
    pagination:
      defaultPageSize: 15
    columns:
    - valueKey: restdef
      title: RestDefinition
    - valueKey: title
      title: Pull request
    - valueKey: gvk
      title: Generated kind
    - valueKey: ready
      title: Ready
    - valueKey: pr
      title: PR
    - valueKey: age
      title: Published
    dataSource: []
  widgetDataTemplate:
  - forPath: dataSource
    expression: '${ [ (.rows // [])[] | [ {valueKey:"restdef",kind:"jsonSchemaType",type:"string",stringValue:(.restdef // "")}, {valueKey:"title",kind:"jsonSchemaType",type:"string",stringValue:(.title // "")}, {valueKey:"gvk",kind:"jsonSchemaType",type:"string",stringValue:(.gvk // "—")}, {valueKey:"ready",kind:"tag",stringValue:(.ready // "In review"),color:(.readyColor // "gold")}, {valueKey:"pr",kind:"jsonSchemaType",type:"string",stringValue:(.pr // ""),color:"#8c8c8c"}, {valueKey:"age",kind:"jsonSchemaType",type:"string",stringValue:(.age // ""),format:"relative"}, {valueKey:"url",kind:"jsonSchemaType",type:"string",stringValue:(.url // "")} ] ] }'
  apiRef:
    name: kog-deliverables
    namespace: {{ .Release.Namespace }}
  resourcesRefs:
    items: []
