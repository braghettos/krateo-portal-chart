# Live reconcile metrics from ClickHouse (clickstack otel_traces + otel_metrics_sum). The
# composition-dynamic-controller emits a 'reconcile' span per reconciliation; step `recon`
# GETs a 10-min-bucketed throughput + p95/avg latency series over the last 6h. Span
# StatusCode is ALWAYS Unset, so success/failure can't come from traces — step `fail`
# instead reads the platform's own reconcile counters (provider_runtime.reconcile.{failure,
# success}) as a max-min delta over the same 6h → a REAL failure count + error rate.
# Exposes {series[], current, failures, successes}. External-fetch endpointRef, FORMAT JSON.
apiVersion: templates.krateo.io/v1
kind: RESTAction
metadata:
  name: obs-reconcile-metrics
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  api:
    - name: recon
      endpointRef:
        name: clickhouse-endpoint
        namespace: {{ .Release.Namespace }}
      path: /?query=SELECT%20toUnixTimestamp%28toStartOfInterval%28Timestamp%2C%20INTERVAL%2010%20MINUTE%29%29%20AS%20ts%2C%20count%28%29%20AS%20reconciles%2C%20round%28quantile%280.95%29%28Duration%29%2F1e6%2C1%29%20AS%20p95_ms%2C%20round%28avg%28Duration%29%2F1e6%2C1%29%20AS%20avg_ms%20FROM%20otel_traces%20WHERE%20ServiceName%3D%27composition-dynamic-controller%27%20AND%20SpanName%3D%27reconcile%27%20AND%20Timestamp%20%3E%20now%28%29%20-%20INTERVAL%206%20HOUR%20GROUP%20BY%20ts%20ORDER%20BY%20ts%20FORMAT%20JSON
      verb: GET
      headers:
        - 'Accept: application/json'
      continueOnError: true
      errorKey: reconError
    - name: fail
      endpointRef:
        name: clickhouse-endpoint
        namespace: {{ .Release.Namespace }}
      path: /?query=SELECT%20MetricName%20AS%20m%2C%20round%28max%28Value%29-min%28Value%29%29%20AS%20v%20FROM%20otel_metrics_sum%20WHERE%20MetricName%20IN%20%28%27provider_runtime.reconcile.failure%27%2C%27provider_runtime.reconcile.success%27%29%20AND%20TimeUnix%20%3E%20now%28%29%20-%20INTERVAL%206%20HOUR%20GROUP%20BY%20m%20FORMAT%20JSON
      verb: GET
      headers:
        - 'Accept: application/json'
      continueOnError: true
      errorKey: failError
  # recon => {data:[{ts,reconciles,p95_ms,avg_ms}]}; fail => {data:[{m,v}]} with m the
  # counter name. failures/successes are the max-min deltas (reset-safe: single series).
  filter: >
    { series: ((.recon.data) // []),
      current: (((.recon.data) // []) | last // {}),
      failures: ( [ (.fail.data // [])[] | select(.m | endswith("failure")) | (.v|tonumber) ] | add // 0 ),
      successes: ( [ (.fail.data // [])[] | select(.m | endswith("success")) | (.v|tonumber) ] | add // 0 ) }
