# Reconciliation rail — per-composition desired-vs-actual bars. Real data, no
# hardcoding: fed by the compositions-list RA, each row a composed antd Progress
# line whose percent (.healthPercent) + colour (.railState → cyan/magenta/amber/
# crimson) are derived server-side from the composition's Ready×Synced conditions.
# Non-healthy compositions sort first (a paused/drifting composition surfaces at
# the top). Per-composition (cheap, composition-level Ready×Synced); the per-
# managed-resource rail lives on the detail page (composition-resources RA).
kind: List
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: rail-list
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  apiRef:
    name: compositions-list
    namespace: {{ .Release.Namespace }}
  widgetData:
    dataSource: []
    itemLayout: horizontal
    split: false
    itemTemplate:
      primaryText: '{name}'
      subPrimaryText: '{ns}'
      bar:
        percent: '{healthPercent}'
        color:
          value: '{railState}'
          map:
            healthy: green
            drift: violet
            pending: orange
            failed: red
        label: '{healthPercent}%'
        variant: rail
  widgetDataTemplate:
    - forPath: dataSource
      expression: '${ (.list // []) | sort_by(if .railState == "healthy" then 1 else 0 end) | .[0:12] }'
  resourcesRefs:
    items: []
