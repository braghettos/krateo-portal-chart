# "← Back to blueprints" link above the detail title (mirrors composition-detail-back).
kind: Button
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: blueprint-detail-back
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    label: Back to blueprints
    type: link
    size: small
    icon: fa-arrow-left
    clickActionId: back-nav
    actions:
      navigate:
        - id: back-nav
          path: /blueprints
          type: navigate
  resourcesRefs:
    items: []
