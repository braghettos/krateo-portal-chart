# Incident-detail SECTION CARDS — one unified visual language for the investigation anatomy
# (UX-20/#23/#24). Every major section (Evidence · Reasoning trace · Remediation · — and the
# Root cause + Missing-context cards defined in their own files) is the SAME antd Card treatment:
# titleVariant: eyebrow (small mono uppercase section caption), variant: outlined (one border +
# padding family), an optional headerLeft one-line desc, and the section's content widgets as Card
# children. This replaces the old bare "strong Paragraph label + secondary Paragraph desc + loose
# widget" run, so Evidence(Table+Markdown), Reasoning(Steps) and Remediation(rows) read as ONE
# family instead of three different UIs. Each card is included by the page Flex ONLY when its data
# exists (sections flags), so none renders over empty structure. All copy/counts are server-side.
#
# NB Card children are NOT constrained by the container allowedResources enum (Cards are
# unconstrained — see card.incident-gaps-card), so a Card can host Table/Markdown/Steps/Flex freely.

# EVIDENCE lead-in (issue #69 Reiteration 2): plain prose sentence above the table+sources block,
# e.g. "After evaluating 5 resources across 4 sources, the agent found the following:". Replaces
# the removed stat-style eyebrow title. Static-ish copy driven from RA evidenceLeadIn (server-side
# singular/plural). Static text: ' ' until the apiRef resolves.
kind: Paragraph
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: incident-evidence-leadin
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  keyExtras: [name, namespace]
  apiRef:
    name: incident-detail
    namespace: {{ .Release.Namespace }}
  widgetData:
    text: ' '
  widgetDataTemplate:
    - forPath: text
      expression: '${ .evidenceLeadIn // "" }'
  resourcesRefs:
    items: []
---
# EVIDENCE section (UX-23): the "N sources · N analyzed resources" count folds into the CARD TITLE
# (one presentation with the list, no separate grey caption); the card hosts the analyzed Table and
# the numbered source cards Markdown as one block.
kind: Card
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: incident-sec-evidence-card
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [name, namespace]
  apiRef:
    name: incident-detail
    namespace: {{ .Release.Namespace }}
  widgetData:
    title: What happened
    titleVariant: eyebrow
    variant: outlined
    icon:
      name: fa-magnifying-glass
      color: cyan
    items:
    - resourceRefId: incident-analyzed
    - resourceRefId: incident-evidence
  widgetDataTemplate:
    # Lead-in sentence always first, then the analyzed table (when rows exist), then the evidence
    # markdown (when sources exist). Lead-in renders even when only one axis has data.
    - forPath: items
      expression: '${ [ { resourceRefId: "incident-evidence-leadin" } ] + (if ((.analyzedRows // []) | length) > 0 then [ { resourceRefId: "incident-analyzed" } ] else [] end) + (if ((.evidenceMd // "") != "") then [ { resourceRefId: "incident-evidence" } ] else [] end) }'
  resourcesRefs:
    items:
    - id: incident-evidence-leadin
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: incident-evidence-leadin
      namespace: {{ .Release.Namespace }}
      resource: paragraphs
      verb: GET
    - id: incident-analyzed
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: incident-analyzed
      namespace: {{ .Release.Namespace }}
      resource: tables
      verb: GET
    - id: incident-evidence
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: incident-evidence
      namespace: {{ .Release.Namespace }}
      resource: markdowns
      verb: GET
---
# REMEDIATION PLAN section — the gated apply rows under the shared card header. The card hosts
# only the first `sections.remCount` rows (server-side templated `items`), so a 3-step plan renders
# exactly 3 rows inside one card and a v1 report renders no card at all.
kind: Card
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: incident-sec-remediation-card
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [name, namespace]
  apiRef:
    name: incident-detail
    namespace: {{ .Release.Namespace }}
  widgetData:
    title: How to fix
    titleVariant: eyebrow
    variant: outlined
    icon:
      name: fa-screwdriver-wrench
      color: cyan
    items:
    - resourceRefId: incident-rem-step-0
  widgetDataTemplate:
    # Include exactly the first sections.remCount rows (0..remCount-1), with a Divider between each
    # consecutive pair for clear visual separation (issue #69 Reiteration 2). Step 0 has no leading
    # Divider; step N (N>0) gets incident-rem-div-(N-1) prepended.
    - forPath: items
      expression: '${ [ range(0; (.sections.remCount // 0)) ] | to_entries | map(if .key > 0 then [{ resourceRefId: ("incident-rem-div-" + ((.key - 1) | tostring)) }, { resourceRefId: ("incident-rem-step-" + (.key | tostring)) }] else [{ resourceRefId: "incident-rem-step-0" }] end) | flatten }'
  resourcesRefs:
    items:
    {{- range $i := until 6 }}
    - id: incident-rem-step-{{ $i }}
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: incident-rem-step-{{ $i }}
      namespace: {{ $.Release.Namespace }}
      resource: flexes
      verb: GET
    {{- end }}
    {{- range $i := until 5 }}
    - id: incident-rem-div-{{ $i }}
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: incident-rem-div-{{ $i }}
      namespace: {{ $.Release.Namespace }}
      resource: dividers
      verb: GET
    {{- end }}
---
# SIMILAR INCIDENTS label — the Similar strip below stays a lightweight related-links list, not a
# heavy content card, so it reads as a footer affordance rather than a fifth investigation section.
kind: Paragraph
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: incident-sec-similar-label
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [name, namespace]
  widgetData:
    text: Similar incidents
    strong: true
  resourcesRefs:
    items: []
