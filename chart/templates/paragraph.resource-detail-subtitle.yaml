# /resources page subtitle — "namespace X · created <ts>" or "cluster-scoped" (data-driven).
kind: Paragraph
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: resource-detail-subtitle
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  keyExtras: [namespace, group, version, plural, name]
  apiRef:
    name: resource-detail
    namespace: {{ .Release.Namespace }}
  widgetData:
    text: ""
    type: secondary
  widgetDataTemplate:
    - forPath: text
      expression: '${ .subtitle // "" }'
  resourcesRefs:
    items: []
