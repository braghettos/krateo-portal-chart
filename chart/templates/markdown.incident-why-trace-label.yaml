# WHY-panel sub-divider (#72 §1) — the "reasoning trace" heading inside the merged Why card (was
# the incident-sec-trace card's own title). A lightweight bold Markdown line (not a strong Paragraph
# H1, not a sub-card) so the panel stays flat. Static copy (no apiRef); the antd Steps timeline
# (incident-trace) renders below it as the audit trail.
kind: Markdown
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: incident-why-trace-label
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [name, namespace]
  widgetData:
    markdown: "**Reasoning trace**"
  resourcesRefs:
    items: []
