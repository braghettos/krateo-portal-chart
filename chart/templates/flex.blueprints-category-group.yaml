# Category chip row for the Blueprints page — hosts the blueprint category filter chips
# horizontally, wrapping. Mirrors marketplace-category-group.
apiVersion: widgets.templates.krateo.io/v1beta1
kind: Flex
metadata:
  name: blueprints-category-group
  namespace: {{ .Release.Namespace }}
spec:
  widgetData:
    vertical: false
    gap: small
    wrap: true
    allowedResources:
      - buttons
    items:
{{- $cats := list "all" "platform" "observability" "blueprint" }}
{{- range $cats }}
      - resourceRefId: bp-cat-btn-{{ . }}
{{- end }}
  resourcesRefs:
    items:
{{- range $cats }}
      - id: bp-cat-btn-{{ . }}
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: bp-cat-btn-{{ . }}
        namespace: {{ $.Release.Namespace }}
        resource: buttons
        verb: GET
{{- end }}
