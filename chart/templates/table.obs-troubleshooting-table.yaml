# #72 §0.7: the Autopilot-investigations feed as a TABLE (shaped like the incidents table above:
# investigation/alert name · status · runs · age) instead of the former list-row layout. Off the
# same obs-troubleshooting RA; rows are the recent per-alert RCA runs (the data was "fine as-is" per
# the issue — only the container + header copy change). The panel-level "Investigate with Autopilot"
# CTA (button.obs-troubleshooting-investigate) replaces the old per-row "select an alert to continue"
# model, so no rowNavigateTo here.
kind: Table
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: obs-troubleshooting-table
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  apiRef:
    name: obs-troubleshooting
    namespace: {{ .Release.Namespace }}
  widgetData:
    allowedResources: []
    bordered: false
    size: small
    columns:
    - valueKey: name
      title: Investigation
    - valueKey: status
      title: Status
    - valueKey: runs
      title: Runs
    - valueKey: age
      title: Age
    dataSource: []
  widgetDataTemplate:
  - forPath: dataSource
    expression: '${ [ ((.rows // []) | .[0:8])[] | [ {valueKey:"name",kind:"jsonSchemaType",type:"string",stringValue:(.alert // "")}, {valueKey:"status",kind:"tag",stringValue:((.phase // "Pending")),color:((.phase // "Pending") | if . == "Analyzed" then "blue" elif . == "Analyzing" then "gold" elif . == "Failed" then "red" else "gray" end)}, {valueKey:"runs",kind:"jsonSchemaType",type:"string",stringValue:("×" + ((.runCount // 1) | tostring))}, {valueKey:"age",kind:"jsonSchemaType",type:"string",stringValue:(.lastRunAt // ""),format:"relative",color:"#8c8c8c"} ] ] }'
  resourcesRefs:
    items: []
