# Reconcile latency p95 — EXACT, from the reconcile span Duration (otel_traces) via
# obs-reconcile-perf. Amber = the slow tail worth watching.
kind: Statistic
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: obs-perf-p95
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [range]
  widgetData:
    title: Reconcile p95
    value: 0
    suffix: ' ms'
    valueStyle:
      color: var(--amber-color)
  # HONESTY (IA obs-deepdive): show an em-dash, not "0 ms", when zero reconcile spans are in
  # range (.n == 0) — otherwise "no trace data" reads as "sub-millisecond reconciles".
  widgetDataTemplate:
  - forPath: value
    expression: '${ if (.n // 0) == 0 then "—" else (.p95 // 0) end }'
  - forPath: suffix
    expression: '${ if (.n // 0) == 0 then "" else " ms" end }'
  apiRef:
    name: obs-reconcile-perf
    namespace: {{ .Release.Namespace }}
  resourcesRefs:
    items: []
