# "Blueprint" info card → hosts the info Descriptions. The top-right `extra` reflects whether a
# newer chart version exists in the helm index (server-derived updateAvailable); the version
# picker / Update lives in the blueprint-update Form below it on the page.
kind: Card
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: card-blueprint-detail-info
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [name, namespace]
  apiRef:
    name: blueprint-detail
    namespace: {{ .Release.Namespace }}
  widgetData:
    title: Details
    extra: ""
    # Render the extra as a status badge-pill: success (green health semantics) when up to
    # date, warning→amber when a newer version exists. NOTE (status-pill spec): the Card CRD
    # has no tag-style extra variant (text|badge only), so `badge` + semantic extraStatus is
    # the nearest schema-valid form; the badge's mono/uppercase/tint styling is frontend CSS.
    extraVariant: badge
    extraStatus: success
    items:
      - resourceRefId: descriptions-blueprint-detail-info
  widgetDataTemplate:
    - forPath: extra
      expression: '${ if .updateAvailable then ("Update available → " + .latestVersion) else "Up to date" end }'
    - forPath: extraStatus
      expression: '${ if .updateAvailable then "warning" else "success" end }'
  resourcesRefs:
    items:
      - id: descriptions-blueprint-detail-info
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: descriptions-blueprint-detail-info
        namespace: {{ .Release.Namespace }}
        resource: descriptions
        verb: GET
