# Title line: the blueprint name (H2 Paragraph) + an inline status Tag. Mirrors
# composition-detail-title-line.
kind: Flex
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: blueprint-detail-title-line
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    vertical: false
    align: center
    gap: middle
    allowedResources:
      - paragraphs
      - tags
    items:
      - resourceRefId: blueprint-detail-title
      - resourceRefId: blueprint-detail-status
  resourcesRefs:
    items:
      - id: blueprint-detail-title
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: blueprint-detail-title
        namespace: {{ .Release.Namespace }}
        resource: paragraphs
        verb: GET
      - id: blueprint-detail-status
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: blueprint-detail-status
        namespace: {{ .Release.Namespace }}
        resource: tags
        verb: GET
