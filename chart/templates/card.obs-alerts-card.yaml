# HyperDX alerts panel — the alert status table + a "N firing" headline (from the same RA).
# Lives on /incidents since the IA split (page-observability keeps only platform health).
kind: Card
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: obs-alerts-card
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    title: HyperDX alerts
    titleVariant: eyebrow
    variant: outlined
    extra: 'alert state · live'
    items:
    - resourceRefId: obs-alerts-table
  widgetDataTemplate:
  - forPath: extra
    expression: '${ ((.firing // 0)|tostring) + " firing · live" }'
  apiRef:
    name: obs-alerts
    namespace: {{ .Release.Namespace }}
  resourcesRefs:
    items:
    - id: obs-alerts-table
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-alerts
      namespace: {{ .Release.Namespace }}
      resource: tables
      verb: GET
