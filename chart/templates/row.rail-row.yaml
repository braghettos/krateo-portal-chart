kind: Row
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: rail-row
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
# Wraps the reconciliation rail in a single full-width (span 24) Row column so it goes
# through the SAME antd Row+Col gutter path as the other dashboard rows (stats/charts/
# lists). As a bare Card child of dashboard-flex the rail rendered flush while the
# row-wrapped cards are gutter-inset, so the rail read wider than the rows above/below.
spec:
  widgetData:
    allowedResources:
    - cards
    items:
    - resourceRefId: rail-card
      size: 24
  resourcesRefs:
    items:
    - id: rail-card
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: rail-card
      namespace: {{ .Release.Namespace }}
      resource: cards
      verb: GET
