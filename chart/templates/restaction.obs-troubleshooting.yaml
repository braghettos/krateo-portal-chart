# Lists the TroubleshootingReport CRs (observability.krateo.io, written by the krateo-alert-
# troubleshooter when a HyperDX alert fires and Autopilot finishes its RCA). Newest-first.
# Exposes the report feed (rows) + the latest report's markdown for the analysis panel.
apiVersion: templates.krateo.io/v1
kind: RESTAction
metadata:
  name: obs-troubleshooting
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  api:
    - name: reports
      path: /apis/observability.krateo.io/v1alpha1/namespaces/{{ .Release.Namespace }}/troubleshootingreports
      verb: GET
      continueOnError: true
      errorKey: reportsError
  # `?report=<name>` (URL → extras, read synchronously like ?status/?range) selects which
  # report the analysis panel shows; absent → the newest ($sorted[0]). Rows carry `name` so
  # the feed can deep-link each report (navigateTo /observability?report=<name>).
  filter: >
    ( ((.reports.items) // []) | sort_by(.spec.triggeredAt // "") | reverse ) as $sorted
    | (.report // "") as $sel
    | ( if $sel == "" then ($sorted[0] // {})
        else (($sorted | map(select(.metadata.name == $sel)))[0] // ($sorted[0] // {})) end ) as $selected
    | { rows: [ $sorted[] | { name: (.metadata.name // ""), alert: (.spec.alertName // ""), phase: (.status.phase // "Pending"),
                              triggeredAt: (.spec.triggeredAt // "") } ],
        count: ($sorted | length),
        selectedName: ($selected.metadata.name // ""),
        latestAlert: ($selected.spec.alertName // ""),
        latestPhase: ($selected.status.phase // ""),
        latestReport: ($selected.status.report // "") }
