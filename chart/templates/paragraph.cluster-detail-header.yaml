# Cluster-detail page header — the KubernetesTarget name as an H2 Paragraph. Text is
# the cluster's real name, resolved server-side by the cluster-detail RA from the
# route's ?extras.
kind: Paragraph
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: cluster-detail-header
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [name]
  apiRef:
    name: cluster-detail
    namespace: {{ .Release.Namespace }}
  widgetData:
    text: Cluster
    level: 2
  widgetDataTemplate:
    - forPath: text
      expression: '${ .name // "cluster" }'
  resourcesRefs:
    items: []
