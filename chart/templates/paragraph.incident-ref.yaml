# Affected-resource mono ref (mockup .ref) — the composition the investigation touched,
# derived server-side from status.analyzedResources (fallback: the triggering alert ref).
kind: Paragraph
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: incident-ref
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [name, namespace]
  apiRef:
    name: incident-detail
    namespace: {{ .Release.Namespace }}
  widgetData:
    text: '—'
    code: true
  widgetDataTemplate:
    - forPath: text
      expression: '${ .ref // "—" }'
  resourcesRefs:
    items: []
