kind: Statistic
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: stat-reconciles
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    title: Pending
    value: 0
    # The number takes the pending status colour (orange/warning) so it matches its own
    # "%" delta tag — same pattern as Failed (var(--error-color)) and Healthy (var(--cyan-color)).
    valueStyle:
      color: var(--warning-color)
    # live-refresh: watch the composition kinds in the data (computed, not hardcoded)
    watch: []
  widgetDataTemplate:
  - forPath: watch
    expression: '${ [ .list[] | { apiVersion: .av, kind: .kind } ] | unique }'
  - forPath: value
    expression: '${ ([.list[]|select((.conditions//[])|(any(.type=="Ready" and (.status=="True" or .status=="False"))|not))]|length) }'
  apiRef:
    name: compositions-list
    namespace: {{ .Release.Namespace }}
  resourcesRefs:
    items: []
