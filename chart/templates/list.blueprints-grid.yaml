# Blueprints (installed) as a CARD GRID — the same card UI as the Marketplace, but sourced from
# the cluster's INSTALLED CompositionDefinitions (blueprints-cards), per the design "blueprints
# and marketplace are the same page, distinguished only by source (installed vs installable)".
# Each tile's Create action navigates to the blueprint's create form (instantiate a composition).
# Compdefs carry no helm description, so the description line shows the chart source (.chart).
apiVersion: widgets.templates.krateo.io/v1beta1
kind: List
metadata:
  name: blueprints-grid
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  apiRef:
    name: blueprints-cards
    namespace: {{ .Release.Namespace }}
  widgetData:
    grid:
      gutter: 16
      column: 3
    dataSource: []
    itemTemplate:
      rowVariant: card
      iconVariant: tile
      icon: fa-cube
      primaryText: '{name}'
      subSecondaryText: 'v{version}'
      secondaryText: '{category}'
      secondaryTextAsTag: true
      description: '{chart}'
      color:
        value: '{category}'
        map:
          platform: amber
          observability: cyan
          blueprint: magenta
        default: gray
      # Installed → Create a composition from it (the blueprint-create form, per-blueprint).
      rowActions:
        - actionId: create
          label: Create
          icon: fa-plus
    actions:
      navigate:
        - id: create
          type: navigate
          path: /marketplace/${namespace}/${name}/new
  widgetDataTemplate:
    - forPath: dataSource
      expression: '${ [ .cards[] | { name: .metadata.name, namespace: .metadata.namespace, version: .version, category: .category, chart: .chart } ] }'
  resourcesRefs:
    items: []
