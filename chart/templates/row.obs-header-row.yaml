# Observability head row — title stack left, navigation actions right-aligned (UX-audit
# #15: the nav links leave the filter-chip band). Uses the SAME Row/Col grid as the
# dashboard header-row / compositions-header (title col size 16 + actions col size 8,
# actions Flex `justify: flex-end`) so the buttons pin to the far edge reliably — a bare
# Flex `justify: space-between` only right-aligns when the header stretches full-width,
# which was inconsistent there.
kind: Row
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: obs-header-row
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    allowedResources:
    - flexes
    alignment: middle
    items:
    - resourceRefId: obs-header
      size: 16
    - resourceRefId: obs-header-actions
      size: 8
  resourcesRefs:
    items:
    - id: obs-header
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-header
      namespace: {{ .Release.Namespace }}
      resource: flexes
      verb: GET
    - id: obs-header-actions
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-header-actions
      namespace: {{ .Release.Namespace }}
      resource: flexes
      verb: GET
