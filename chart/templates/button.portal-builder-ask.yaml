# "Ask Autopilot →" header CTA on /portal-builder — the page's own entry into the builder
# flow. Unlike the empty-state hint strips this is ALWAYS visible: the PR table below only
# lists in-flight work, so without it a returning user has no affordance to start a NEW
# build. Navigates to the page's ?ask= deep-link (the house one-shot Autopilot convention —
# the rail opens seeded with the builder prompt; urlquery does the encoding the RAs do
# with jq @uri).
kind: Button
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: portal-builder-ask
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    label: Ask Autopilot →
    icon: fa-wand-magic-sparkles
    size: small
    type: default
    variant: outlined
    clickActionId: portal-builder-ask
    actions:
      navigate:
        - id: portal-builder-ask
          type: navigate
          path: /portal-builder?ask={{ "I want to build a new portal page with the Portal builder. Help me compose it from the widget catalog, preview the draft live in the portal, and publish it as a gated pull request to the portal chart once I confirm." | urlquery }}
  resourcesRefs:
    items: []
