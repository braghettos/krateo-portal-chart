# External Endpoint for the braghettos blueprints helm-repo index. snowplow's
# RESTAction `endpointRef` resolves an Endpoint from a Secret keyed by `server-url`
# (the only REQUIRED field; token/ca/etc. are optional and unset here — the repo is
# public, served over a public CA so the default system trust pool validates TLS).
# Consumed by `restaction.blueprints-catalog` (GET /charts/blueprints/index.yaml).
# Requires snowplow >= 1.4.0 (external-fetch + YAML->JSON; external_fetch.go).
apiVersion: v1
kind: Secret
metadata:
  name: blueprints-endpoint
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
type: Opaque
stringData:
  server-url: https://braghettos.github.io
