# SUMMARY panel (#72 §1) — the incident TL;DR at the TOP of the detail: three label/value rows
# (What happened / Why / How to fix) so an SRE gets the answer before scrolling past evidence and
# reasoning. All three values are derived server-side by incident-detail (.summary) from data already
# gathered — no new agent field, no fabrication; each line degrades honestly. Shown only for
# STRUCTURED reports (sections.summary); a v1 prose report shows the prose card instead.
# Same unified card language as every other section (eyebrow title + outlined + headerLeft desc).
kind: Card
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: incident-summary-card
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [name, namespace]
  widgetData:
    title: Summary
    titleVariant: eyebrow
    variant: outlined
    icon:
      name: fa-clipboard-list
      color: cyan
    items:
    - resourceRefId: incident-summary-desc
  resourcesRefs:
    items:
    - id: incident-summary-desc
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: incident-summary-desc
      namespace: {{ .Release.Namespace }}
      resource: descriptions
      verb: GET
