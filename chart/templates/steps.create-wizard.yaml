# Wayfinding indicator for the blueprint create flow (Blueprint ✓ / Configure / Review).
# The blueprint is already chosen (reached via /marketplace/{ns}/{name}/new), so
# `current: 1` marks Blueprint done (antd auto-styles prior steps as finished) and
# Configure active. Review is REAL: the Form (reviewBeforeSubmit) reveals an in-place
# read-only summary of the entered values before the final create — so the indicator's
# three steps match the actual journey.
kind: Steps
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: create-wizard
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [name, namespace]
  widgetData:
    current: 1
    size: small
    items:
      - title: Blueprint
        eyebrow: Step 1
        description: Selected
      - title: Configure
        eyebrow: Step 2
        description: Set parameters
      - title: Review
        eyebrow: Step 3
        description: Review & create
