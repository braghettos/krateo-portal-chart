# Per-condition COVERAGE gauges — for each distinct condition TYPE (Ready, Synced, …)
# a bar shows how many compositions have it True ("N/M"). Straight off .conditions[].type
# /.status (no derivation). Identical jq to the dashboard's dashboard-conditions.
kind: Listy
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: obs-conditions-list
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  apiRef:
    name: compositions-list
    namespace: {{ .Release.Namespace }}
  widgetData:
    itemTemplate:
      primaryText: '{type}'
      bar:
        percent: '{percent}'
        label: '{label}'
        color:
          value: cyan
        variant: line
    dataSource: []
  widgetDataTemplate:
    - forPath: dataSource
      expression: '${ (.list // []) as $l | ([ $l[].conditions[]?.type ] | unique) as $types | [ $types[] | . as $t | ([ $l[] | select(any(.conditions[]?; .type == $t and .status == "True")) ] | length) as $tc | ([ $l[] | select(any(.conditions[]?; .type == $t)) ] | length) as $n | { type: $t, percent: (if $n > 0 then ($tc * 100 / $n | floor) else 0 end), label: (($tc | tostring) + "/" + ($n | tostring)) } ] }'
  resourcesRefs:
    items: []
