# The blueprint detail 2-column grid (mirrors composition-detail-grid, 1.7fr : 1fr →
# 24-grid span 15 : 9). Left = Details; right = Update version + Metadata.
kind: Row
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: blueprint-detail-grid
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    allowedResources:
      - flexes
    alignment: top
    items:
      - resourceRefId: blueprint-detail-col-left
        size: 15
      - resourceRefId: blueprint-detail-col-right
        size: 9
  resourcesRefs:
    items:
      - id: blueprint-detail-col-left
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: blueprint-detail-col-left
        namespace: {{ .Release.Namespace }}
        resource: flexes
        verb: GET
      - id: blueprint-detail-col-right
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: blueprint-detail-col-right
        namespace: {{ .Release.Namespace }}
        resource: flexes
        verb: GET
