# Root shell — the INIT target (config.INIT = /call?resource=layouts&name=app-shell&namespace=<ns>).
# antd Layout with a Sider that hosts the sidebar-nav Menu; the Content slot renders the routed
# page <Outlet/>. Replaces the legacy NavMenu/RoutesLoader shell (widget-taxonomy-and-layout.md §H).
kind: Layout
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: app-shell
  namespace: {{ .Release.Namespace }}
spec:
  widgetData:
    hasSider: true
    sider:
      resourceRefId: sider-content
      theme: light
      width: 236
    # Global side-effect widgets rendered invisibly once for the whole app (issue #49 §7):
    # the tenant Theme applies brand overrides (CSS custom properties) app-wide.
    effects:
      - app-theme
  resourcesRefs:
    items:
      - id: sider-content
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: sider-content
        namespace: {{ .Release.Namespace }}
        resource: flexes
        verb: GET
      - id: app-theme
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: app-theme
        namespace: {{ .Release.Namespace }}
        resource: themes
        verb: GET
