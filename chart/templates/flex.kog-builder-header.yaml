# /kog-builder page head — eyebrow + H1 + subtitle stack (mirrors incidents-header).
# Static copy; the page's data lives in the registry table below.
kind: Flex
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: kog-builder-header
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    allowedResources:
    - paragraphs
    vertical: true
    items:
    - resourceRefId: kog-builder-eyebrow
    - resourceRefId: kog-builder-title
    - resourceRefId: kog-builder-subtitle
  resourcesRefs:
    items:
    {{- range (list "kog-builder-eyebrow" "kog-builder-title" "kog-builder-subtitle") }}
    - id: {{ . }}
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: {{ . }}
      namespace: {{ $.Release.Namespace }}
      resource: paragraphs
      verb: GET
    {{- end }}
