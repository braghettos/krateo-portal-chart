# Incident detail H2 — the root-cause one-liner (honest fallbacks: alertName-based label,
# then the CR name), resolved server-side by incident-detail from the route's ?extras.
kind: Paragraph
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: incident-detail-title
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [name, namespace]
  apiRef:
    name: incident-detail
    namespace: {{ .Release.Namespace }}
  widgetData:
    text: Incident
    level: 2
  widgetDataTemplate:
    - forPath: text
      expression: '${ .title // "incident" }'
  resourcesRefs:
    items: []
