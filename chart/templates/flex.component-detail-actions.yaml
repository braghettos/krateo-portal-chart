# Right side of the component-detail pagehead: the action cluster. Currently one
# action — "View logs in Observability" (inline pod-log tailing is blocked on
# snowplow text/plain response support; see restaction.component-detail.yaml).
kind: Flex
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: component-detail-actions
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    vertical: false
    gap: small
    align: center
    allowedResources:
      - buttons
    items:
      - resourceRefId: component-detail-logs
  resourcesRefs:
    items:
      - id: component-detail-logs
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: component-detail-logs
        namespace: {{ .Release.Namespace }}
        resource: buttons
        verb: GET
