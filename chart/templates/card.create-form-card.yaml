# Bounded "Configuration" panel that wraps the generic blueprint-create Form so the
# create page reads as a card (mockup `.form-card`) instead of an edge-to-edge loose band
# under the stepper. Card is a valid container for a `forms` child: the Card CRD imposes
# NO allowedResources enum (children are generic items[].resourceRefId, rendered through
# WidgetRenderer), so snowplow accepts a Form child here — no image release needed.
#   - variant: outlined  → the bordered/radiused panel.
#   - titleVariant: eyebrow → the small mono uppercase "Configuration" section label.
#   - extra → a muted helper caption on the header's right (mirrors the mockup's hint).
# page-blueprint-create references THIS card in place of the direct blueprint-form ref.
kind: Card
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: create-form-card
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [name, namespace]
  widgetData:
    title: Configuration
    titleVariant: eyebrow
    variant: outlined
    extra: 'Fields come from the selected blueprint'
    items:
      - resourceRefId: blueprint-form
  resourcesRefs:
    items:
      - id: blueprint-form
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: blueprint-create
        namespace: {{ .Release.Namespace }}
        resource: forms
        verb: GET
