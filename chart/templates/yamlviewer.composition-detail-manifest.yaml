# The composition's desired-state manifest. The composition-detail RA emits it as
# a JSON string (.manifestJson); YamlViewer converts JSON → YAML for display.
kind: YamlViewer
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: yamlviewer-composition-detail-manifest
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  apiRef:
    name: composition-detail
    namespace: {{ .Release.Namespace }}
  widgetData:
    json: "{}"
  widgetDataTemplate:
    - forPath: json
      expression: '${ { apiVersion: .detail.apiVersion, kind: .detail.kind, metadata: { name: .detail.metadata.name, namespace: .detail.metadata.namespace, labels: (.detail.metadata.labels // {}) }, spec: (.detail.spec // {}) } | tojson }'
  resourcesRefs:
    items: []
