# Marketplace filter bar — composes the category Select; shares the picked value
# with widgets carrying the same `prefix` (the marketplace-grid List forwards it to
# each card, which self-hides if its tags don't match).
apiVersion: widgets.templates.krateo.io/v1beta1
kind: Filters
metadata:
  name: marketplace-filters
  namespace: {{ .Release.Namespace }}
spec:
  widgetData:
    prefix: marketplace-filters
    items:
      - resourceRefId: marketplace-category-filter
  resourcesRefs:
    items:
      - id: marketplace-category-filter
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: marketplace-category-filter
        namespace: {{ .Release.Namespace }}
        resource: selects
        verb: GET
