# Title + subtitle stack for the compositions head row (left side; the New-composition
# button sits on the right of compositions-header).
kind: Flex
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: compositions-title-stack
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    allowedResources:
    - paragraphs
    vertical: true
    items:
    - resourceRefId: compositions-eyebrow
    - resourceRefId: compositions-title
    - resourceRefId: compositions-subtitle
  resourcesRefs:
    items:
    - id: compositions-eyebrow
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: compositions-eyebrow
      namespace: {{ .Release.Namespace }}
      resource: paragraphs
      verb: GET
    - id: compositions-title
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: compositions-title
      namespace: {{ .Release.Namespace }}
      resource: paragraphs
      verb: GET
    - id: compositions-subtitle
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: compositions-subtitle
      namespace: {{ .Release.Namespace }}
      resource: paragraphs
      verb: GET
