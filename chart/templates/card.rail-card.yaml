# Reconciliation rail panel (dashboard signature element). Wraps the rail List;
# the mono eyebrow title (left) + the actual/drift/target legend key (top-right)
# follow the Petrol flight-deck language and the mockup `.rail-panel` header. The
# rail still auto-updates (rail-list watch); the mockup header carries the legend
# key here rather than a Live pill, so `live` is omitted.
kind: Card
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: rail-card
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    title: Reconciliation rail · desired vs actual
    titleVariant: eyebrow
    variant: outlined
    # Explicit false (not omitted) so `kubectl apply` merges OFF the prior live:true
    # on the helm-created CR — a removed field would not prune (no last-applied-config).
    live: false
    # Legend key — the gauge colour grammar: cyan converged "actual", magenta
    # "drift" hatch, amber "target" tick. Matches the mockup swatches (#34D6C8/#D86BC4/#F2A33C).
    legend:
    - {color: cyan, label: actual}
    - {color: magenta, label: drift}
    - {color: amber, label: target}
    items:
    - resourceRefId: rail-list
  resourcesRefs:
    items:
    - id: rail-list
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: rail-list
      namespace: {{ .Release.Namespace }}
      resource: lists
      verb: GET
