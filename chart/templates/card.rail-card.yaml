# Reconciliation rail panel (dashboard signature element). Wraps the rail List;
# the mono eyebrow title (left) + the actual/drift/target legend key (top-right)
# follow the Petrol flight-deck language and the mockup `.rail-panel` header. The
# rail still auto-updates (rail-list watch); the mockup header carries the legend
# key here rather than a Live pill, so `live` is omitted.
kind: Card
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: rail-card
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    # Title names WHAT each bar is (D2: users couldn't tell the rows were compositions,
    # not CompositionDefinitions). Each row = one composition's Ready×Synced convergence.
    title: Reconciliation rail · per composition · desired vs actual
    titleVariant: eyebrow
    variant: outlined
    # Explicit false (not omitted) so `kubectl apply` merges OFF the prior live:true
    # on the helm-created CR — a removed field would not prune (no last-applied-config).
    live: false
    # Legend key — cyan = converged "actual" fill, then the three non-converged remainder
    # states (hatch + % label, coloured by railState): violet=drift / orange=pending / red=failed.
    # Two swatches are deliberately OMITTED because the Petrol palette makes them duplicates of
    # another entry: HEALTHY (green token == cyan "actual") and TARGET (amber token == orange
    # "pending", both #F2A33C). The amber 100% goalpost tick stays in the rail, just unlegended.
    legend:
    - {color: cyan, label: actual}
    - {color: violet, label: drift}
    - {color: orange, label: pending}
    - {color: red, label: failed}
    items:
    - resourceRefId: rail-list
  resourcesRefs:
    items:
    - id: rail-list
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: rail-list
      namespace: {{ .Release.Namespace }}
      resource: listies
      verb: GET
