# "Events" card → this composition's recent k8s Events, as an EventList.
kind: Card
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: card-composition-detail-events
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    title: Events
    # SSE-backed feed — "Live" badge renders inline with the title.
    live: true
    items:
      - resourceRefId: eventlist-composition-detail-events
  resourcesRefs:
    items:
      - id: eventlist-composition-detail-events
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: eventlist-composition-detail-events
        namespace: {{ .Release.Namespace }}
        resource: eventlists
        verb: GET
