# Incidents lifecycle filter chips (All / Open / Mitigated / Resolved) — ONE data-driven
# Listy(chip) replacing the Helm-looped incidents-status-btn-* Buttons (widget-sprawl
# collapse). Lifecycle is URL state (?status=…): each chip navigates to /incidents?status=<k>,
# which the frontend forwards into the request `extras` — incidents-list filters `.rows`
# server-side and echoes `.status` + `.counts` (computed over the FULL set, before the filter)
# so every chip shows its live count (the muted suffix) and its active flag. ONE incidents-list
# resolution now serves the whole set (was one per Button chip).
#
# Chip navigateTo bypasses the client-side same-path query merge the old Buttons used, so the
# routes are merged SERVER-SIDE: ?projects (the shell scope selector, echoed by incidents-list)
# is re-emitted onto each chip's route (@uri-encoded). The one-shot ?ask= Autopilot handoff is
# deliberately NOT carried (it is consumed by the rail on landing; carrying it would partition
# the cache per prose string).
kind: Listy
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: incidents-status-chips
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell — `status` drives
  # the active flag, `projects` is carried into the routes.
  keyExtras: [projects, status]
  apiRef:
    name: incidents-list
    namespace: {{ .Release.Namespace }}
  widgetData:
    itemTemplate:
      rowVariant: chip
      primaryText: '{label}'
      navigateTo: '{route}'
    dataSource: []
  widgetDataTemplate:
    - forPath: dataSource
      expression: '${ ((.status // "all") | tostring) as $sel | (.counts // {}) as $counts | ((.projects // "") | tostring) as $projects | (if $projects != "" then ("&projects=" + ($projects | @uri)) else "" end) as $carry | [{key: "all", label: "All"}, {key: "open", label: "Open"}, {key: "mitigated", label: "Mitigated"}, {key: "resolved", label: "Resolved"}] | map({label: .label, count: ($counts[.key] // 0), active: (.key == $sel), route: ("/incidents?status=" + .key + $carry)}) }'
  resourcesRefs:
    items: []
