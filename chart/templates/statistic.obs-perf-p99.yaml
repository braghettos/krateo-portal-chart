# Reconcile latency p99 — EXACT, from the reconcile span Duration (otel_traces) via
# obs-reconcile-perf. Red = the worst-case tail (e.g. the installer composition ~40s).
kind: Statistic
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: obs-perf-p99
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [range]
  widgetData:
    title: Reconcile p99
    value: 0
    suffix: ' ms'
    valueStyle:
      color: var(--red-color)
  widgetDataTemplate:
  - forPath: value
    expression: '${ .p99 // 0 }'
  apiRef:
    name: obs-reconcile-perf
    namespace: {{ .Release.Namespace }}
  resourcesRefs:
    items: []
