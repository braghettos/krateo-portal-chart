# "Ask Autopilot →" header CTA on /blueprint-builder — the page's own entry into the
# authoring flow. The empty-state hint strip disappears the moment the first blueprint
# lands, which left the page with no way to start the NEXT one; this button is always
# visible. Same ?ask= deep-link (and prompt text) the blueprint-builder-hint rows carry,
# encoded here with urlquery instead of the RA's jq @uri.
kind: Button
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: blueprint-builder-ask
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    label: Ask Autopilot →
    icon: fa-wand-magic-sparkles
    size: small
    type: default
    variant: outlined
    clickActionId: blueprint-builder-ask
    actions:
      navigate:
        - id: blueprint-builder-ask
          type: navigate
          path: /blueprint-builder?ask={{ "I want to author a new blueprint (a Helm chart) with the Blueprint builder. Help me define its Chart.yaml, values.yaml, values.schema.json and templates, preview it with previewBlueprint, and publish it via a gated pull request to the blueprints repo once I confirm." | urlquery }}
  resourcesRefs:
    items: []
