# Blueprint detail page — route /blueprints/{namespace}/{name} (page-<slug> convention).
# Same layout as the composition detail page: a pagehead (back-link + name + status Tag +
# subtitle on the left, Create/Delete actions on the right) over a 2-column grid (Row 15:9):
#   left  = Details (chart / versions / status / synced / created)
#   right = Update version (version picker form) + Preview update impact + Metadata
# plus, full-width under the grid, the "What this update changes" card — mounted ONLY while
# ?to= (written by the Preview update impact Select, dashboard-range URL-state pattern)
# names a version DIFFERENT from the installed one; no preview selected ⇒ the page is
# byte-identical to before (exception-only). Every widget reads the shared blueprint-detail
# RA (installed CompositionDefinition + helm index versions, resolved from ?extras); the
# impact card reads the upgrade-impact RA (helm-render-service /diff).
kind: Flex
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: page-blueprint-detail
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell — `to` included:
  # the mounted-items set varies with the previewed target version.
  keyExtras: [name, namespace, to]
  apiRef:
    name: blueprint-detail
    namespace: {{ .Release.Namespace }}
  widgetData:
    vertical: true
    gap: large
    allowedResources:
      - flexes
      - rows
      - cards
    items:
      - resourceRefId: blueprint-detail-header-block
      - resourceRefId: blueprint-detail-grid
  # `.to` is the raw URL query param (extras merge is non-overwriting, and blueprint-detail's
  # filter emits no `to` key, so the extras value survives); `.currentVersion` comes from the
  # RA. Equal / absent / cleared ⇒ the impact card is not mounted and never fetched.
  widgetDataTemplate:
    - forPath: items
      expression: >-
        ${ [ { resourceRefId: "blueprint-detail-header-block" }, { resourceRefId: "blueprint-detail-grid" } ]
        + (if (((.to // "") != "") and ((.to // "") != (.currentVersion // ""))) then [ { resourceRefId: "card-blueprint-detail-impact" } ] else [] end) }
  resourcesRefs:
    items:
      - id: blueprint-detail-header-block
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: blueprint-detail-header-block
        namespace: {{ .Release.Namespace }}
        resource: flexes
        verb: GET
      - id: blueprint-detail-grid
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: blueprint-detail-grid
        namespace: {{ .Release.Namespace }}
        resource: rows
        verb: GET
      - id: card-blueprint-detail-impact
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: card-blueprint-detail-impact
        namespace: {{ .Release.Namespace }}
        resource: cards
        verb: GET
