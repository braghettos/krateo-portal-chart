# Dashboard recent-activity — real events from the events-presenter (krateo-sse-proxy),
# the canonical krateo events source (k8s -> OTel -> ClickHouse -> sse-proxy), NOT raw
# k8s core events. No composition filter here: the dashboard shows ALL recent activity.
# Thin/generic: raw GET + exportJwt; the EventList shapes/caps. DEPENDS ON the platform's
# `sse-proxy-internal-endpoint` Endpoint + the sse-proxy stack; absent that, getEvents fails
# gracefully (continueOnError) and the card is empty.
#
# Per-row deep-link: sse-proxy (>= 1.1.0) stamps `compositionId` on every event (from the
# LogAttributes['krateo.io/composition-id'] label — the same field composition-events scopes
# by). The crds→comps walk below (mirrors composition-events' crds→found) resolves that id
# back to the composition's {ns,name} SERVER-SIDE, and each event gains `route`
# ("/compositions/<ns>/<name>", or "" when the event carries no resolvable composition tag —
# those rows stay inert in the activity lists; nothing is fabricated).
apiVersion: templates.krateo.io/v1
kind: RESTAction
metadata:
  name: events
  namespace: {{ .Release.Namespace }}
  annotations:
    krateo.io/verbose: "true"
spec:
  api:
    - name: crds
      path: /apis/apiextensions.k8s.io/v1/customresourcedefinitions
      verb: GET
      headers:
        - 'Accept: application/json'
      filter: "[.crds.items[] | select(.spec.group == \"composition.krateo.io\") | {plural: .status.acceptedNames.plural, version: ((([.spec.versions[] | select(.served and .storage)])[0]) // (([.spec.versions[] | select(.served)])[0])).name}]"
      continueOnError: true
    - name: comps
      dependsOn:
        name: crds
        iterator: .crds
      path: ${ "/apis/composition.krateo.io/" + .version + "/" + .plural }
      verb: GET
      headers:
        - 'Accept: application/json'
      continueOnError: true
      filter: "[.comps.items[]? | {name: .metadata.name, namespace: .metadata.namespace, compositionId: (.metadata.labels[\"krateo.io/composition-id\"] // \"\")}]"
    - name: getEvents
      endpointRef:
        name: sse-proxy-internal-endpoint
        namespace: {{ .Release.Namespace }}
      path: /events
      verb: GET
      headers:
        - 'Accept: application/json'
      exportJwt: true
      continueOnError: true
  filter: >
    ( [ (.comps // [])[] | select((.compositionId // "") != "")
        | { key: .compositionId, value: { ns: .namespace, name: .name } } ]
      | from_entries ) as $byCid
    | {
      list: (
        ( .getEvents | if type == "array" then . elif type == "object" then (.resources // .items // []) else [] end )
        | group_by((.involvedObject.uid // "") + "|" + (.reason // "") + "|" + (.message // ""))
        | map(max_by(.lastTimestamp // .eventTime // .firstTimestamp // ""))
        | sort_by(.lastTimestamp // .eventTime // .firstTimestamp // "")
        | reverse
        | .[0:50]
        | map(. + { route: ( ($byCid[(.compositionId // "")] // null) as $c
                             | if $c != null then ("/compositions/" + $c.ns + "/" + $c.name) else "" end ) })
      )
    }
