# Onboarding empty-state — the first-run "what do you want to build?" surface for a
# zero-knowledge user. It renders ONLY when the user owns NO compositions yet, then
# disappears the moment they have one — a server-driven conditional section, not a
# client "we decided you're new" flag.
#
# GATE: apiRef = compositions-list (returns the user's ns-scoped `.list`). The
# widgetDataTemplate emits the intent tiles ONLY when `(.list | length) == 0`; otherwise
# it emits an empty array and `hideWhenEmpty: true` makes the whole Listy render nothing
# (instead of an antd "No data" box). So the card appears/vanishes purely with the data.
#
# TILES (curated intents, Autopilot-driven): each is a Card that NAVIGATES to a real
# marketplace SEARCH (`?q=<term>` — honest: it shows whatever actually matches, never a
# fabricated count) AND opens the Autopilot rail with a matching starter prompt
# (`&ask=<prompt>`, URL-encoded via @uri — consumed once by AutopilotProvider). If
# Autopilot is disabled on this install the `ask` is simply ignored and the tile still
# filters the marketplace — graceful degradation. The first tile hands the whole choice
# to Autopilot ("help me choose"), the rest seed a concrete intent.
apiVersion: widgets.templates.krateo.io/v1beta1
kind: Listy
metadata:
  name: onboarding-empty
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  apiRef:
    name: compositions-list
    namespace: {{ .Release.Namespace }}
  widgetData:
    # When the gate emits [] (the user already owns a composition), render nothing.
    hideWhenEmpty: true
    bordered: true
    header: "Welcome to Krateo — what do you want to build?"
    grid:
      gutter: 16
      column: 4
      xs: 1
      sm: 2
      md: 2
      lg: 4
    dataSource: []
    itemTemplate:
      rowVariant: card
      iconVariant: tile
      icon: '{icon}'
      primaryText: '{name}'
      description: '{description}'
      cardCta: 'Start'
      navigateTo: '{navigateTo}'
      color:
        value: '{color}'
        default: cyan
  widgetDataTemplate:
    - forPath: dataSource
      expression: >-
        ${ if ((.list | type) == "array") and ((.list | length) == 0) then
             [
               { name: "Help me choose", icon: "fa-wand-magic-sparkles", color: "amber",
                 description: "Not sure where to start? Ask Autopilot to guide you.",
                 navigateTo: ("/marketplace?ask=" + ("Show me around and help me choose a blueprint to deploy." | @uri)) },
               { name: "Databases", icon: "fa-database", color: "cyan",
                 description: "Provision managed databases and data stores.",
                 navigateTo: ("/marketplace?q=database&ask=" + ("I want to set up a database — which blueprint fits?" | @uri)) },
               { name: "Networking", icon: "fa-network-wired", color: "cyan",
                 description: "Set up networks, load balancers and connectivity.",
                 navigateTo: ("/marketplace?q=network&ask=" + ("I want to configure networking — what are my options?" | @uri)) },
               { name: "Observability", icon: "fa-chart-line", color: "cyan",
                 description: "Add metrics, logs and dashboards to your estate.",
                 navigateTo: ("/marketplace?q=observability&ask=" + ("I want to add observability — which blueprint should I use?" | @uri)) }
             ]
           else [] end }
  resourcesRefs:
    items: []
