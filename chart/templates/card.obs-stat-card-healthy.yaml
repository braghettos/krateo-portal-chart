kind: Card
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: obs-stat-card-healthy
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    variant: outlined
    clickActionId: view-healthy
    widgetActions:
      navigate:
        - id: view-healthy
          type: navigate
          path: /compositions?status=healthy
    items:
    # The DASHBOARD's stat-healthy Statistic, reused verbatim (the obs copy was
    # byte-identical; keyExtras exclude `range`, so the cache cell is shared).
    - resourceRefId: stat-healthy
  resourcesRefs:
    items:
    - id: stat-healthy
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: stat-healthy
      namespace: {{ .Release.Namespace }}
      resource: statistics
      verb: GET
