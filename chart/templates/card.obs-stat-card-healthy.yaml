kind: Card
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: obs-stat-card-healthy
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    variant: outlined
    clickActionId: view-healthy
    widgetActions:
      navigate:
        - id: view-healthy
          type: navigate
          path: /compositions?status=healthy
    items:
    - resourceRefId: obs-stat-healthy
  resourcesRefs:
    items:
    - id: obs-stat-healthy
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-stat-healthy
      namespace: {{ .Release.Namespace }}
      resource: statistics
      verb: GET
