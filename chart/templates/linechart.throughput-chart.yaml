kind: LineChart
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: throughput-chart
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    xField: t
    yField: v
    colorField: series
    shapeField: smooth
    area: true
    legend: true
    height: 220
    data: []
  widgetDataTemplate:
  - forPath: data
    expression: '${ . as $r | [ range(0;14) | (now - (.*86400)) as $t | ($t|gmtime|strftime("%Y-%m-%d")) as $day | { t: ($t|gmtime|strftime("%b %d")), series: "Created", v: ([ $r.list[]? | select(((.ts//"")[0:10]) == $day) ] | length) } ] | reverse }'
  apiRef:
    name: compositions-list
    namespace: {{ .Release.Namespace }}
  resourcesRefs:
    items: []
