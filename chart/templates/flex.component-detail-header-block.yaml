# Component-detail pagehead — a space-between row mirroring the composition-detail
# header block: [ title-stack (name + ready Tag + subtitle) ]   [ actions (logs link) ].
kind: Flex
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: component-detail-header-block
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    vertical: false
    justify: space-between
    align: flex-start
    gap: middle
    allowedResources:
      - flexes
    items:
      - resourceRefId: component-detail-title-stack
      - resourceRefId: component-detail-actions
  resourcesRefs:
    items:
      - id: component-detail-title-stack
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: component-detail-title-stack
        namespace: {{ .Release.Namespace }}
        resource: flexes
        verb: GET
      - id: component-detail-actions
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: component-detail-actions
        namespace: {{ .Release.Namespace }}
        resource: flexes
        verb: GET
