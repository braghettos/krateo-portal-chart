# Condition coverage — honest aggregate of the REAL status.conditions across all
# compositions (Ready N/M, Synced N/M, …). Card head shows "N total" off the same RA.
# Reuses the dashboard status-card + dashboard-conditions pattern.
kind: Card
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: obs-conditions-card
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [projects, q, status]
  widgetData:
    title: Condition coverage
    titleVariant: eyebrow
    variant: outlined
    extra: ''
    items:
    - resourceRefId: obs-conditions-list
  widgetDataTemplate:
  - forPath: extra
    expression: '${ ((.list // []) | length | tostring) + " total" }'
  apiRef: { name: compositions-list, namespace: {{ .Release.Namespace }} }
  resourcesRefs:
    items:
    - id: obs-conditions-list
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-conditions-list
      namespace: {{ .Release.Namespace }}
      resource: listies
      verb: GET
