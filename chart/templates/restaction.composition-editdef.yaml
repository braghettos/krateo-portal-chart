# Edit-form data source — resolves, for ONE composition (?extras .name/.namespace):
#   schemaSpec : the composition's own CRD spec schema (form fields)
#   values     : the current .spec (pre-fills the form)
#   gvr        : apiVersion/resource/name/namespace (the PATCH target)
# Compositions are heterogeneous per-blueprint kinds, so discover generically (list
# composition.krateo.io CRDs incl. their spec schema; list each; pick name+namespace).
# Only fetched when the Edit drawer opens — the heavy discovery isn't on the detail
# page's load path. Extras reach RA api steps on this snowplow (same as composition-detail).
apiVersion: templates.krateo.io/v1
kind: RESTAction
metadata:
  name: composition-editdef
  namespace: {{ .Release.Namespace }}
  annotations:
    krateo.io/verbose: "true"
spec:
  api:
    - name: crds
      path: /apis/apiextensions.k8s.io/v1/customresourcedefinitions
      verb: GET
      headers:
        - 'Accept: application/json'
      continueOnError: true
      filter: "[.crds.items[] | select(.spec.group == \"composition.krateo.io\") | (((([.spec.versions[] | select(.served and .storage)])[0]) // (([.spec.versions[] | select(.served)])[0])).name) as $v | {plural: .status.acceptedNames.plural, kind: .status.acceptedNames.kind, group: .spec.group, version: $v, schema: (.spec.versions[] | select(.name == $v) | .schema.openAPIV3Schema.properties.spec)}]"
    - name: found
      dependsOn:
        name: crds
        iterator: .crds
      path: ${ "/apis/composition.krateo.io/" + .version + "/" + .plural }
      verb: GET
      headers:
        - 'Accept: application/json'
      continueOnError: true
      filter: "[.found.items[]? | del(.metadata.managedFields, .metadata.annotations[\"kubectl.kubernetes.io/last-applied-configuration\"])]"
  filter: >
    .name as $n
    | .namespace as $ns
    | ([ .found[]? | select(.metadata.name == $n and .metadata.namespace == $ns) ][0] // {}) as $d
    | ($d.apiVersion // "") as $av
    | ([ .crds[]? | select(.group == ($av | split("/")[0]) and .kind == $d.kind) ][0] // {}) as $crd
    | ([ (($crd.schema.properties) // {}) | to_entries[] | select((.value.title // "") | test("should be hidden"; "i")) | .key ]) as $hidden
    | {
        schemaSpec: ($crd.schema // {}),
        values: ($d.spec // {}),
        propertiesToHide: $hidden,
        gvr: {
          apiVersion: $av,
          resource: ($crd.plural // ""),
          name: ($d.metadata.name // $n),
          namespace: ($d.metadata.namespace // $ns)
        }
      }
