# The detail 2-column grid (mockup .detail-grid = 1.7fr : 1fr). Row item `size` is
# the 24-grid span → 15 (left) : 9 (right). Each column is a vertical Flex of Cards.
kind: Row
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: composition-detail-grid
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [name, namespace]
  widgetData:
    allowedResources:
      - flexes
    alignment: top
    items:
      - resourceRefId: composition-detail-col-left
        size: 15
      - resourceRefId: composition-detail-col-right
        size: 9
  resourcesRefs:
    items:
      - id: composition-detail-col-left
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: composition-detail-col-left
        namespace: {{ .Release.Namespace }}
        resource: flexes
        verb: GET
      - id: composition-detail-col-right
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: composition-detail-col-right
        namespace: {{ .Release.Namespace }}
        resource: flexes
        verb: GET
