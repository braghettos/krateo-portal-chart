# WHY-panel sub-divider (#72 §1) — the "assumptions & gaps" heading inside the merged Why card
# (was the incident-gaps card's own title before the 3 cards folded into one). A lightweight bold
# Markdown line, NOT a strong Paragraph (which the frontend styles as a 26px page H1) and NOT a
# sub-card — keeps the panel flat. Static copy (no apiRef); the amber gaps Alert renders below it.
kind: Markdown
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: incident-why-gaps-label
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [name, namespace]
  widgetData:
    markdown: "**What the agent couldn't verify**"
  resourcesRefs:
    items: []
