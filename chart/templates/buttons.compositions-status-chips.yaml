# Compositions status filter chips (All / Healthy / Drift / Pending / Failed). Status is URL
# state (?status=…): each chip NAVIGATES to /compositions?status=<k>, which the frontend
# forwards into the request `extras` — so compositions-list filters its `.filtered` set
# server-side. The Failed-stat card's CTA lands here via ?status=failed. Same-path
# navigation merges query params (the frontend navigate handler), so picking a status
# keeps any active range.
#
# apiRef = compositions-list so each chip shows its live COUNT in the label ("Healthy
# (11)") and reads `.status` for its selected-state. Counts come from the RA's `.counts`,
# computed over the date-WINDOWED set BEFORE the status filter — so every chip shows the
# full per-status breakdown within the active time range regardless of which status is
# selected, and the counts shrink/grow with the range/from-to filters. `.status` and the
# counts are echoed by compositions-list (the RA's `.list` is untouched, so the dashboard
# widgets that share this RA are unaffected). Cost: one compositions-list resolution per
# chip — chosen for the live counts.
{{- /* `c` = the leading status-dot palette colour (mockup ●cy/●am/●cr); "all" has no dot.
     Drift (violet — the rail-state palette) filters on .railState server-side: Ready but
     Synced=False, an overlay of healthy — its count can overlap the Healthy chip's. */}}
{{- $opts := list (dict "k" "all" "l" "All" "c" "") (dict "k" "healthy" "l" "Healthy" "c" "green") (dict "k" "drift" "l" "Drift" "c" "violet") (dict "k" "pending" "l" "Pending" "c" "orange") (dict "k" "failed" "l" "Failed" "c" "red") }}
{{- range $opts }}
---
apiVersion: widgets.templates.krateo.io/v1beta1
kind: Button
metadata:
  name: comp-status-btn-{{ .k }}
  namespace: {{ $.Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [projects, q, status]
  widgetData:
    label: {{ .l | quote }}
    size: small
    type: default
    variant: outlined
    {{- if .c }}
    icon: fa-circle
    iconColor: {{ .c }}
    {{- end }}
    clickActionId: set-status-{{ .k }}
    actions:
      navigate:
        - id: set-status-{{ .k }}
          type: navigate
          path: /compositions?status={{ .k }}
  widgetDataTemplate:
    - forPath: label
      expression: '${ "{{ .l }} (" + (((.counts.{{ .k }}) // 0) | tostring) + ")" }'
    - forPath: type
      expression: '${ if (.status // "all") == {{ .k | quote }} then "primary" else "default" end }'
    - forPath: variant
      expression: '${ if (.status // "all") == {{ .k | quote }} then "filled" else "outlined" end }'
  apiRef:
    name: compositions-list
    namespace: {{ $.Release.Namespace }}
  resourcesRefs:
    items: []
{{- end }}
