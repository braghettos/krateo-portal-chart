# The blueprints deployed to THIS cluster — one row per CompositionDefinition whose
# spec.deploy.targetRef.name == the target (JOINed server-side by cluster-detail).
# Each row = a health dot (this blueprint's OWN status.target.connectionStatus — the
# per-blueprint reachability core-provider probes each reconcile) + name + namespace
# (mono) + a health Tag + the chart version. Rows navigate to the blueprint's detail
# page (/blueprints/{namespace}/{name} — the existing nav route); an empty set renders
# the honest antd empty state (a registered target no blueprint deploys to yet).
kind: Listy
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: cluster-detail-blueprints
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [name]
  apiRef:
    name: cluster-detail
    namespace: {{ .Release.Namespace }}
  widgetData:
    dataSource: []
    itemLayout: horizontal
    split: false
    itemTemplate:
      navigateTo: '/blueprints/{namespace}/{name}'
      iconVariant: dot
      color:
        value: '{conn}'
        map:
          Healthy: green
          Down: red
        default: gray
      primaryText: '{name}'
      subPrimaryText: '{namespace}'
      subPrimaryTextMono: true
      secondaryText: '{connLabel}'
      secondaryTextAsTag: true
      subSecondaryText: '{versionLabel}'
  widgetDataTemplate:
    - forPath: dataSource
      expression: '${ .blueprints // [] }'
  resourcesRefs:
    items: []
