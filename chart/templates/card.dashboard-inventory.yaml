# #14 — "Platform inventory" card for the DASHBOARD. Wraps the three existing, real
# Statistics (installed blueprints · composition kinds · active projects) — the SAME CRs
# the observability page used (obs-stat-blueprints / -kinds / -projects), referenced
# read-only here (they keep their obs-stat-* names and their cluster-wide keyExtras;
# nothing is moved or edited). A widget CR may be referenced by more than one parent, so
# both this dashboard card and the obs page can GET the same statistics.
#
# This is a NEW card (card.dashboard-inventory), distinct from the obs page's
# card.obs-inventory-card: the observability agent removes the inventory from the obs page,
# this group only ADDS it to the dashboard — the two pages stay independent (no shared
# click-targets or containers).
kind: Card
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: dashboard-inventory
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    title: Platform inventory
    titleVariant: eyebrow
    variant: outlined
    items:
    - resourceRefId: obs-stat-blueprints
    - resourceRefId: obs-stat-kinds
    - resourceRefId: obs-stat-projects
  resourcesRefs:
    items:
    - id: obs-stat-blueprints
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-stat-blueprints
      namespace: {{ .Release.Namespace }}
      resource: statistics
      verb: GET
    - id: obs-stat-kinds
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-stat-kinds
      namespace: {{ .Release.Namespace }}
      resource: statistics
      verb: GET
    - id: obs-stat-projects
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-stat-projects
      namespace: {{ .Release.Namespace }}
      resource: statistics
      verb: GET
