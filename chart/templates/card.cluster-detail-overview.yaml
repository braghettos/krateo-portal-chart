# "Identity" card → the KubernetesTarget's registration + probe facts as a
# Descriptions list (label/value rows), shaped by the cluster-detail RA.
kind: Card
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: card-cluster-detail-overview
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [name]
  widgetData:
    title: Identity
    titleVariant: eyebrow
    variant: outlined
    items:
      - resourceRefId: descriptions-cluster-detail-overview
  resourcesRefs:
    items:
      - id: descriptions-cluster-detail-overview
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: descriptions-cluster-detail-overview
        namespace: {{ .Release.Namespace }}
        resource: descriptions
        verb: GET
