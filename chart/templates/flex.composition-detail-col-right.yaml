# Right column (narrower): Reconcile activity, Relations, Metadata. (Conditions/Health
# promoted to the page top.)
kind: Flex
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: composition-detail-col-right
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [name, namespace]
  widgetData:
    vertical: true
    gap: middle
    allowedResources:
      - cards
    items:
      - resourceRefId: card-composition-detail-reconcile
      - resourceRefId: card-composition-detail-relations
      - resourceRefId: card-composition-detail-metadata
  resourcesRefs:
    items:
      - id: card-composition-detail-reconcile
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: card-composition-detail-reconcile
        namespace: {{ .Release.Namespace }}
        resource: cards
        verb: GET
      - id: card-composition-detail-relations
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: card-composition-detail-relations
        namespace: {{ .Release.Namespace }}
        resource: cards
        verb: GET
      - id: card-composition-detail-metadata
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: card-composition-detail-metadata
        namespace: {{ .Release.Namespace }}
        resource: cards
        verb: GET
