# Affected-resource ref as a LINK — the analyzed composition's detail page, one click
# from the incident header (CTA audit: the mono ref alone was a dead end). The label
# is the same server-derived ref text as paragraph.incident-ref; the concrete path is
# baked server-side from incident-detail's refRoute (the blueprint-detail-create
# navigate pattern), so the click is a plain literal navigate (no client jq). The
# chips Flex includes THIS widget only when refRoute is non-empty and falls back to
# the inert mono Paragraph otherwise — an alert-only ref never becomes a broken link.
kind: Button
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: incident-ref-link
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [name, namespace]
  apiRef:
    name: incident-detail
    namespace: {{ .Release.Namespace }}
  widgetData:
    label: '—'
    type: link
    size: small
    icon: fa-arrow-up-right-from-square
    clickActionId: open-composition
    actions:
      navigate:
        - id: open-composition
          type: navigate
          path: /compositions
  widgetDataTemplate:
    - forPath: label
      expression: '${ .ref // "—" }'
    # Defensive fallback: the chips Flex only renders this widget when refRoute is
    # non-empty, but if it ever renders without one the click lands on the
    # compositions LIST, never a 404.
    - forPath: actions
      expression: '${ { navigate: [ { id: "open-composition", type: "navigate", path: (if (.refRoute // "") != "" then .refRoute else "/compositions" end) } ] } }'
  resourcesRefs:
    items: []
