# Detail meta line — started / updated / phase / confidence, joined server-side with
# empty parts OMITTED (never a dash for data we don't have).
kind: Paragraph
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: incident-meta
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [name, namespace]
  apiRef:
    name: incident-detail
    namespace: {{ .Release.Namespace }}
  widgetData:
    text: ' '
    type: secondary
  widgetDataTemplate:
    - forPath: text
      expression: '${ .meta // " " }'
  resourcesRefs:
    items: []
