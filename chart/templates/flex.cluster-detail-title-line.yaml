# Title line: the cluster (KubernetesTarget) name as an H2 Paragraph + an inline
# probe-verdict Tag — mirrors component-detail-title-line.
kind: Flex
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: cluster-detail-title-line
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    vertical: false
    align: center
    gap: middle
    allowedResources:
      - paragraphs
      - tags
    items:
      - resourceRefId: cluster-detail-header
      - resourceRefId: cluster-detail-status
  resourcesRefs:
    items:
      - id: cluster-detail-header
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: cluster-detail-header
        namespace: {{ .Release.Namespace }}
        resource: paragraphs
        verb: GET
      - id: cluster-detail-status
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: cluster-detail-status
        namespace: {{ .Release.Namespace }}
        resource: tags
        verb: GET
