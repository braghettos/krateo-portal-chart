# Composition events via the events-presenter (krateo-sse-proxy): the canonical
# krateo composition-events source (events flow k8s -> OTel -> ClickHouse ->
# sse-proxy), NOT raw k8s core events.
#
# This page is generic/runtime. `found` discovers THIS composition's
# `krateo.io/composition-id` LABEL (the krateo composition-id, NOT the k8s uid) —
# that is the id the OTel→ClickHouse pipeline tags events with. `getEvents` then
# asks the presenter to filter SERVER-SIDE via ?composition_id=<that label>
# (sse-proxy >= 1.1.0, PR #1: bound as a ClickHouse param against
# LogAttributes['krateo.io/composition-id']). So `list` is already scoped to this
# composition (incl. its managed resources) — no client-side involvedObject scope
# needed; we only guard list=[] when the id can't be resolved (else the presenter
# would return ALL events unfiltered). `compositionId` (the label) also drives the
# EventList SSE topic/endpoint. Path templates read extras+`.found` safely (full
# dict); a per-STEP filter does NOT see extras. exportJwt forwards the user's JWT
# (the proxy validates it only when JWT_SIGN_KEY is set). DEPENDS ON the
# `sse-proxy-internal-endpoint` Endpoint + the krateo-sse-proxy stack; absent it,
# getEvents fails gracefully (continueOnError).
apiVersion: templates.krateo.io/v1
kind: RESTAction
metadata:
  name: composition-events
  namespace: {{ .Release.Namespace }}
  annotations:
    krateo.io/verbose: "true"
spec:
  api:
    - name: crds
      path: /apis/apiextensions.k8s.io/v1/customresourcedefinitions
      verb: GET
      headers:
        - 'Accept: application/json'
      filter: "[.crds.items[] | select(.spec.group == \"composition.krateo.io\") | {plural: .status.acceptedNames.plural, version: ((([.spec.versions[] | select(.served and .storage)])[0]) // (([.spec.versions[] | select(.served)])[0])).name}]"
      continueOnError: true
    - name: found
      dependsOn:
        name: crds
        iterator: .crds
      path: ${ "/apis/composition.krateo.io/" + .version + "/" + .plural }
      verb: GET
      headers:
        - 'Accept: application/json'
      continueOnError: true
      filter: "[.found.items[]? | {name: .metadata.name, namespace: .metadata.namespace, uid: .metadata.uid, compositionId: (.metadata.labels[\"krateo.io/composition-id\"] // \"\")}]"
    - name: getEvents
      endpointRef:
        name: sse-proxy-internal-endpoint
        namespace: {{ .Release.Namespace }}
      # Static path (no dependsOn / dynamic template — those tripped a 400). We GET
      # recent events and scope to THIS composition CLIENT-SIDE in the final filter
      # by the `compositionId` field that sse-proxy >= 1.1.0 stamps on every event
      # (from LogAttributes['krateo.io/composition-id']).
      path: /events?limit=200
      verb: GET
      headers:
        - 'Accept: application/json'
      exportJwt: true
      continueOnError: true
    # IA F7: kind→plural discovery for per-event deep-links. The involvedObject in an
    # event carries {apiVersion, kind, name, namespace} but NOT the plural, and a
    # lowercase(kind)+"s" guess is WRONG for many kinds — so resolve the plural from
    # the REAL CRD registry (status.acceptedNames.plural, keyed by group+kind). Built-in
    # core/apps/batch kinds (no CRD) are covered by a small static k8s-scoping map in the
    # final filter. Any involvedObject we still can't resolve gets route "" → inert.
    - name: allcrds
      path: /apis/apiextensions.k8s.io/v1/customresourcedefinitions
      verb: GET
      headers:
        - 'Accept: application/json'
      continueOnError: true
      filter: '[.allcrds.items[]? | {group: .spec.group, kind: .status.acceptedNames.kind, plural: .status.acceptedNames.plural}]'
  filter: >
    (.name) as $n
    | (.namespace) as $ns
    | ([ .found[]? | select(.name == $n and .namespace == $ns) ][0].compositionId // "") as $cid
    | ( .getEvents | if type == "array" then . elif type == "object" then (.resources // .items // []) else [] end ) as $all
    # IA F7: (group,kind)->plural resolver. Built-in kinds (no CRD) from a small static
    # k8s-scoping map ($builtin); every CRD kind from the REAL CRD registry (.allcrds).
    # Never a lowercase(kind)+"s" guess.
    | ({"core|Pod":"pods","core|Service":"services","core|ConfigMap":"configmaps","core|Secret":"secrets","core|PersistentVolumeClaim":"persistentvolumeclaims","core|ServiceAccount":"serviceaccounts","core|Endpoints":"endpoints","core|Namespace":"namespaces","core|Node":"nodes","apps|Deployment":"deployments","apps|ReplicaSet":"replicasets","apps|StatefulSet":"statefulsets","apps|DaemonSet":"daemonsets","batch|Job":"jobs","batch|CronJob":"cronjobs","networking.k8s.io|Ingress":"ingresses","rbac.authorization.k8s.io|Role":"roles","rbac.authorization.k8s.io|RoleBinding":"rolebindings","rbac.authorization.k8s.io|ClusterRole":"clusterroles","rbac.authorization.k8s.io|ClusterRoleBinding":"clusterrolebindings"}) as $builtin
    | ( [ (.allcrds // [])[] | { key: (.group + "|" + .kind), value: .plural } ] | from_entries ) as $crdPlural
    | {
        list: (if $cid == "" then []
               else ( [ $all[]?
                        | select((.compositionId // "") == $cid)
                        # Resolve the involvedObject's /resources deep-link (route) BEFORE
                        # reshaping. apiVersion → group/version (1 part ⇒ core group). plural
                        # from $builtin (core/apps/batch/...) or the real CRD registry; unknown
                        # ⇒ route "" (inert, nothing fabricated). ns from involvedObject.
                        | ((.involvedObject.apiVersion // "") | split("/")) as $gv
                        | (if ($gv | length) > 1 then $gv[0] else "core" end) as $grp
                        | (if ($gv | length) > 1 then $gv[1] else ($gv[0] // "v1") end) as $ver
                        | (.involvedObject.kind // "") as $ik
                        | ($builtin[$grp + "|" + $ik] // $crdPlural[$grp + "|" + $ik] // "") as $plural
                        | (.involvedObject.namespace // "") as $ins
                        | (.involvedObject.name // "") as $inm
                        # composition.krateo.io involved objects ARE compositions → drill into
                        # the first-class /compositions detail (mirrors composition-resources'
                        # navHref rule); every other kind → the generic /resources view.
                        | (if ($grp == "composition.krateo.io" and $inm != "" and $ins != "")
                           then ("/compositions/" + $ins + "/" + $inm)
                           elif ($plural != "" and $inm != "")
                           then ("/resources/" + (if $ins == "" then "cluster" else $ins end) + "/" + $grp + "/" + $ver + "/" + $plural + "/" + $inm)
                           else "" end) as $route
                        # conform to the EventList schema (type is enum Normal|Warning,
                        # required metadata/involvedObject/reason/message/type/source);
                        # `route` is an accepted extra field (mirrors the dashboard events RA).
                        | { metadata: (.metadata // {}),
                            involvedObject: (.involvedObject // {}),
                            reason: (.reason // ""),
                            message: (.message // ""),
                            type: (if (.type // "") == "Warning" then "Warning" else "Normal" end),
                            source: (.source // {}),
                            firstTimestamp: (.firstTimestamp // .eventTime),
                            lastTimestamp: (.lastTimestamp // .eventTime),
                            eventTime: (.eventTime),
                            route: $route } ]
                      | .[0:20] )
               end),
        compositionId: $cid
      }
