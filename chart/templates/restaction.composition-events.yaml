# Composition events via the events-presenter (krateo-sse-proxy): the canonical
# krateo composition-events source (events flow k8s -> OTel -> ClickHouse ->
# sse-proxy), NOT raw k8s core events.
#
# This page is generic/runtime (the reference blueprint bakes compositionId at
# Helm time). We GET ALL recent events from the presenter, then scope to THIS
# composition in the FINAL filter by involvedObject (name+namespace, also uid when
# resolved) — matching where `?extras` (.name/.namespace) is reliably in scope
# (the resolve dict is seeded with extras; a per-STEP filter is NOT a safe place
# to read them, so the discovery + scoping both live in the final filter). The
# composition's uid is discovered for `compositionId` (used by the EventList's
# SSE sseEndpoint). exportJwt forwards the user's JWT to the presenter.
# NOTE: sse-proxy v0.1.0 ignores ?composition_id (returns all); server-side
# filtering arrives with the enhanced proxy — the client-side scope here is correct
# regardless. DEPENDS ON the platform's `events-presenter-endpoint` Endpoint + the
# krateo-sse-proxy stack; absent it, getEvents fails gracefully (continueOnError).
apiVersion: templates.krateo.io/v1
kind: RESTAction
metadata:
  name: composition-events
  namespace: {{ .Release.Namespace }}
  annotations:
    krateo.io/verbose: "true"
spec:
  api:
    - name: crds
      path: /apis/apiextensions.k8s.io/v1/customresourcedefinitions
      verb: GET
      headers:
        - 'Accept: application/json'
      filter: "[.crds.items[] | select(.spec.group == \"composition.krateo.io\") | {plural: .status.acceptedNames.plural, version: .status.storedVersions[0]}]"
      continueOnError: true
    - name: found
      dependsOn:
        name: crds
        iterator: .crds
      path: ${ "/apis/composition.krateo.io/" + .version + "/" + .plural }
      verb: GET
      headers:
        - 'Accept: application/json'
      continueOnError: true
      filter: "[.found.items[]? | {name: .metadata.name, namespace: .metadata.namespace, uid: .metadata.uid}]"
    - name: getEvents
      endpointRef:
        name: events-presenter-endpoint
        namespace: {{ .Release.Namespace }}
      path: /events?limit=200
      verb: GET
      headers:
        - 'Accept: application/json'
      exportJwt: true
      continueOnError: true
  filter: >
    (.name) as $n
    | (.namespace) as $ns
    | ([ .found[]? | select(.name == $n and .namespace == $ns) ][0].uid // "") as $uid
    | ( .getEvents | if type == "array" then . elif type == "object" then (.resources // .items // []) else [] end ) as $all
    | {
        list: [
          $all[]?
          | select((.involvedObject.name == $n and .involvedObject.namespace == $ns) or (($uid != "") and (.involvedObject.uid == $uid)))
        ],
        compositionId: $uid
      }
