# "Blueprint" — the reverse correlation link (IA followup F2): from a running composition
# back to the blueprint (CompositionDefinition) it was created from. composition-detail
# reverse-joins the composition's kind to the owning CD (.blueprintHref, server-built);
# the click is a plain literal navigate to /blueprints/{ns}/{name} — same pattern as the
# Diagnose button. Defensive: if the CD can't be resolved, blueprintHref falls back to the
# /blueprints index (never a 404). Kept type:default (secondary) so Sync stays primary.
kind: Button
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: composition-detail-blueprint
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [name, namespace]
  apiRef:
    name: composition-detail
    namespace: {{ .Release.Namespace }}
  widgetData:
    label: Blueprint
    type: default
    size: small
    icon: fa-layer-group
    clickActionId: blueprint
    actions:
      navigate:
        - id: blueprint
          type: navigate
          path: /blueprints
  widgetDataTemplate:
    - forPath: actions
      expression: '${ { navigate: [ { id: "blueprint", type: "navigate", path: (if (.blueprintHref // "") != "" then .blueprintHref else "/blueprints" end) } ] } }'
  resourcesRefs:
    items: []
