# "Reconcile activity" card → this composition's reconcile rate/latency from the
# controller's trace spans (composition-reconcile-perf). The extra pins the window
# and source so the figures are self-describing.
kind: Card
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: card-composition-detail-reconcile
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    title: Reconcile activity
    titleVariant: eyebrow
    variant: outlined
    extra: 'last 6h · reconcile trace spans'
    items:
      - resourceRefId: composition-detail-reconcile-row
  resourcesRefs:
    items:
      - id: composition-detail-reconcile-row
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: composition-detail-reconcile-row
        namespace: {{ .Release.Namespace }}
        resource: flexes
        verb: GET
