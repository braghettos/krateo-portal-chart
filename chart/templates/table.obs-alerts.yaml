# HyperDX alerts status — lists the Alert CRs (observability.krateo.io) with their live state,
# from restaction.obs-alerts. state is a filled Tag (status-pill spec): ALERT→red "Alert",
# PENDING→gold "Pending", OK→green "OK" ("OK" kept verbatim — it is the literal HyperDX state
# word, and "Ok"/"Healthy" would be prettier but less truthful). The numbers/threshold are the
# real alert config; state is mirrored from HyperDX by the reconciler.
# Lives on the /alerts rule catalog. Row click → the per-alert detail page
# /alerts/{namespace}/{name} (item 25); the "Investigate with Autopilot" ask flow the row used
# to own now rides that page's pagehead button (the seed is still built server-side, just one
# hop further in). Routed via routeNs/routeName cells (the CR's real identity, not displayName).
kind: Table
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: obs-alerts
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    allowedResources: []
    bordered: false
    size: small
    # Row click → the per-alert detail page /alerts/{namespace}/{name} (item 25; there was no
    # detail page before, so the row deep-linked straight to /incidents?ask=). The route params
    # ride in hidden routeNs/routeName cells (the CR's metadata.namespace/name — NOT the human
    # displayName, which may carry an emoji and wouldn't resolve the per-name GET). The Table
    # URI-encodes each interpolated cell, so an emoji/space slug lands safely. The Autopilot ask
    # flow the old row-click owned now lives on the detail pagehead ("Investigate with Autopilot").
    rowNavigateTo: /alerts/{routeNs}/{routeName}
    pagination:
      defaultPageSize: 10
    columns:
    - valueKey: name
      title: Alert
    - valueKey: watching
      title: Watching
    - valueKey: threshold
      title: Threshold
    - valueKey: interval
      title: Every
    - valueKey: state
      title: State
    dataSource: []
  widgetDataTemplate:
  - forPath: dataSource
    expression: '${ [ (.rows // [])[] | [ {valueKey:"name",kind:"jsonSchemaType",type:"string",stringValue:.name}, {valueKey:"routeNs",kind:"jsonSchemaType",type:"string",stringValue:(.routeNs // "")}, {valueKey:"routeName",kind:"jsonSchemaType",type:"string",stringValue:(.routeName // "")}, {valueKey:"watching",kind:"jsonSchemaType",type:"string",stringValue:(.watching // "-"),color:"#8c8c8c"}, {valueKey:"threshold",kind:"jsonSchemaType",type:"string",stringValue:((.thresholdType // "") + " " + (.threshold // ""))}, {valueKey:"interval",kind:"jsonSchemaType",type:"string",stringValue:(.interval // "-"),color:"#8c8c8c"}, {valueKey:"state",kind:"tag",stringValue:((.state // "PENDING") | if . == "ALERT" then "Alert" elif . == "PENDING" then "Pending" else . end),color:((.state // "PENDING") | if . == "ALERT" then "red" elif . == "PENDING" then "gold" elif . == "OK" then "green" else "gray" end)} ] ] }'
  apiRef:
    name: obs-alerts
    namespace: {{ .Release.Namespace }}
  resourcesRefs:
    items: []
