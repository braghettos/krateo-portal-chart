# DETERMINISTIC evidence basis of the root cause ("grounded in N verbatim sources · N analyzed
# resources") — a real, countable backing, NOT a model-declared "confidence NN%" (false precision
# that erodes trust). The RA (restaction.incident-detail) derives it from status.sources +
# status.analyzedResources; the raw model confidence is still emitted as `.confidence` for anyone
# who wants it, but the verdict card shows what actually backs the claim.
kind: Paragraph
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: incident-rootcause-confidence
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [name, namespace]
  apiRef:
    name: incident-detail
    namespace: {{ .Release.Namespace }}
  widgetData:
    text: confidence not declared
    type: secondary
  widgetDataTemplate:
    - forPath: text
      expression: '${ .rootCauseConfidence // "confidence not declared" }'
  resourcesRefs:
    items: []
