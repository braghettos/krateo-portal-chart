# Compositions time-range chips — ONE data-driven Listy(chip) replacing the four Helm-looped
# comp-range-btn-* Buttons (widget-sprawl collapse). Same filter the dashboard exposes, on the
# compositions page (?range=24h|7d|30d|all): compositions-list reads `.range` from extras and
# time-windows its `.filtered` set by creationTimestamp. Default is "all" here (a list page
# shows everything until narrowed), unlike the dashboard's 24h default; while the custom
# picker is active (?range=custom) no preset chip is active. Chip navigateTo bypasses the
# client-side same-path query merge the old Buttons used, so the routes are merged SERVER-SIDE:
# the page's other filter params (?status, ?q, ?from, ?to, ?projects) are re-emitted onto each
# chip's route from extras (@uri-encoded) — range still composes with the status chips, the
# search box and the custom from/to picker.
kind: Listy
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: compositions-range-chips
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell — `range` drives
  # the active flag, the rest are carried into the routes.
  keyExtras: [from, projects, q, range, status, to, namespace]
  widgetData:
    itemTemplate:
      rowVariant: chip
      primaryText: '{label}'
      navigateTo: '{route}'
    dataSource: []
  # No apiRef — snowplow merges request extras into a no-apiRef widget's
  # widgetDataTemplate data source (same mechanism the old range Buttons used).
  widgetDataTemplate:
    - forPath: dataSource
      expression: '${ ((.range // "all") | tostring) as $sel | ((.status // "") | tostring) as $status | ((.q // "") | tostring) as $q | ((.from // "") | tostring) as $from | ((.to // "") | tostring) as $to | ((.projects // "") | tostring) as $projects | ((if $status != "" then ("&status=" + ($status | @uri)) else "" end) + (if $q != "" then ("&q=" + ($q | @uri)) else "" end) + (if $from != "" then ("&from=" + ($from | @uri)) else "" end) + (if $to != "" then ("&to=" + ($to | @uri)) else "" end) + (if $projects != "" then ("&projects=" + ($projects | @uri)) else "" end)) as $carry | [{key: "24h", label: "24h"}, {key: "7d", label: "7d"}, {key: "30d", label: "30d"}, {key: "all", label: "All"}] | map({label: .label, active: (.key == $sel), route: ("/compositions?range=" + .key + $carry)}) }'
  resourcesRefs:
    items: []
