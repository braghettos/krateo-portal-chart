# Right column (narrower): Update version (form card) + Preview update impact (the ?to=
# picker card, mounted server-side ONLY when the helm index lists a version other than the
# installed one — nothing to update to ⇒ no preview chrome) + Metadata. Items are templated
# off the same blueprint-detail RA the column's cards already read; resourcesRefs stay
# static (unmounted children are never fetched — page-incident-detail pattern).
kind: Flex
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: blueprint-detail-col-right
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [name, namespace]
  apiRef:
    name: blueprint-detail
    namespace: {{ .Release.Namespace }}
  widgetData:
    vertical: true
    gap: middle
    allowedResources:
      - cards
    items:
      - resourceRefId: card-blueprint-detail-update
      - resourceRefId: card-blueprint-detail-metadata
  widgetDataTemplate:
    - forPath: items
      expression: >-
        ${ [ { resourceRefId: "card-blueprint-detail-update" } ]
        + (if (((.availableVersions // []) - [(.currentVersion // "")]) | length) > 0 then [ { resourceRefId: "card-blueprint-impact-picker" } ] else [] end)
        + [ { resourceRefId: "card-blueprint-detail-metadata" } ] }
  resourcesRefs:
    items:
      - id: card-blueprint-detail-update
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: card-blueprint-detail-update
        namespace: {{ .Release.Namespace }}
        resource: cards
        verb: GET
      - id: card-blueprint-impact-picker
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: card-blueprint-impact-picker
        namespace: {{ .Release.Namespace }}
        resource: cards
        verb: GET
      - id: card-blueprint-detail-metadata
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: card-blueprint-detail-metadata
        namespace: {{ .Release.Namespace }}
        resource: cards
        verb: GET
