# The impact OBJECT table — one row per rendered object the update adds / removes / modifies
# (upgrade-impact .rows, already grouped added→removed→modified server-side). The change
# column is a colored antd Tag whose color the RA computed server-side (value→presentation
# in jq: green/red/gold — and red for the honest error row, whose detail carries the render
# service's error text verbatim). Mounted by the impact card only when rows exist.
kind: Table
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: blueprint-impact-table
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [name, namespace, to]
  apiRef:
    name: upgrade-impact
    namespace: {{ .Release.Namespace }}
  widgetData:
    allowedResources: []
    bordered: false
    size: small
    columns:
      - valueKey: change
        title: Change
      - valueKey: kind
        title: Kind
      - valueKey: name
        title: Name
      - valueKey: detail
        title: Detail
    dataSource: []
  widgetDataTemplate:
    - forPath: dataSource
      expression: '${ [ (.rows // [])[] | [ {valueKey:"change",kind:"tag",stringValue:(.change // ""),color:(.color // "gray")}, {valueKey:"kind",kind:"jsonSchemaType",type:"string",stringValue:(.kind // "")}, {valueKey:"name",kind:"jsonSchemaType",type:"string",stringValue:(.name // "")}, {valueKey:"detail",kind:"jsonSchemaType",type:"string",stringValue:(.detail // "")} ] ] }'
  resourcesRefs:
    items: []
