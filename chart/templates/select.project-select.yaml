# Project (= namespace) scope selector for the shell sider. A URL-query-bound MULTI-select
# (mode: multiple, queryParam: projects): picking one or more projects writes ?projects=<ns,ns>
# (comma-joined), which the frontend forwards into extras; compositions-list (dashboard
# stats/donut/rail + the compositions table) and blueprints-cards read `.projects` and scope
# to those namespaces server-side. An EMPTY selection = All projects (cluster-wide) — there is
# no "All projects" option; the placeholder shows it. allowClear ✕ resets to all. Options come
# from the `projects` RA (UAF-gated namespaces, minus the installer's own namespace).
kind: Select
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: project-select
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    name: projects
    queryParam: projects
    # `label` is the switcher PANEL header eyebrow (mockup `.sw-head` "Projects · namespaces"),
    # distinct from the "All projects" master row (which comes from `placeholder`).
    label: 'Projects · namespaces'
    mode: multiple
    placeholder: All projects
    size: small
    allowClear: true
    options: []
  widgetDataTemplate:
    - forPath: options
      expression: '${ .options }'
  apiRef:
    name: projects
    namespace: {{ .Release.Namespace }}
  resourcesRefs:
    items: []
