# Estate graph (v1, read-only, scale-bounded) — discovers composition.krateo.io CRDs and lists each
# kind, then bounds the GRAPH so it renders on estates with tens of thousands of one kind (snowplow
# ≥1.6/0.30.250 paged-walks the full list without timing out, so the bound is on the OUTPUT, not the
# fetch). A high-cardinality kind (> CAP=25 instances) collapses to a SINGLE summary node
# ("<Kind> · <N> instances") instead of exploding into thousands; low-cardinality kinds expand to a
# node per composition (health-coloured) + a node per managed resource (parent = its composition).
# Edges derive client-side from parentRefs[].uid → node.uid. NOTE: snowplow builds the list request
# from the GVR + its own page limit and clears remainingItemCount, so the true total is just the
# accumulated item count; we only materialise per-composition `comps` for kinds at/under the cap.
apiVersion: templates.krateo.io/v1
kind: RESTAction
metadata:
  name: estate-graph
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  api:
  - name: crds
    path: /apis/apiextensions.k8s.io/v1/customresourcedefinitions
    verb: GET
    filter: "[.crds.items[] | select(.spec.group == \"composition.krateo.io\") | {plural: .status.acceptedNames.plural, version: ((([.spec.versions[] | select(.served and .storage)])[0]) // (([.spec.versions[] | select(.served)])[0])).name}]"
    continueOnError: true
    errorKey: crdsError
  - name: allCompositions
    dependsOn:
      name: crds
      iterator: ".crds"
    path: ${ "/apis/composition.krateo.io/" + (.version) + "/" + (.plural) }
    verb: GET
    continueOnError: true
    errorKey: allCompositionsError
    userAccessFilter:
      verb: list
      group: composition.krateo.io
      resourcesFrom: "[ (.crds // [])[] | .plural ]"
      namespaceFrom: .metadata.namespace
    # one object PER KIND: kind/version, the instance total, and — only when at/under CAP — the
    # per-composition list (so a 60k-instance kind never materialises 60k objects downstream).
    filter: >
      [ ((.allCompositions.items // []) | length) as $total
        | { kind: ((.allCompositions.kind // "") | rtrimstr("List")),
            av: (.allCompositions.apiVersion // "v1"),
            total: $total,
            comps: (if $total <= 25
                    then [ .allCompositions.items[]?
                           | {uid: .metadata.uid, name: .metadata.name, ns: .metadata.namespace,
                              ts: .metadata.creationTimestamp, conditions: (.status.conditions // []),
                              managed: (.status.managed // [])} ]
                    else [] end) } ]
  filter: >
    (.allCompositions // []) as $kinds
    | ([ $kinds[] | select(.total > 25) ]) as $big
    | ([ $kinds[] | select(.total <= 25) ]) as $small
    | { nodes: (
        [ $big[]
          | { uid: ("kind:" + .kind), kind: .kind, name: .kind, namespace: "",
              version: .av, resourceVersion: "0", date: "",
              icon: {name: "fa-layer-group", color: "blue", message: .kind},
              statusIcon: {name: "fa-cubes", color: "gray", message: ((.total | tostring) + " instances")},
              parentRefs: [] } ]
        + [ $small[] | . as $k | $k.comps[]
            | (.conditions // []) as $c
            | (any($c[]?; .type=="Ready" and .status=="True")) as $ready
            | (any($c[]?; .type=="Ready" and .status=="False")) as $notready
            | (any($c[]?; .type=="Synced" and .status=="False")) as $unsynced
            | { uid: .uid, kind: $k.kind, name: .name, namespace: (.ns // ""),
                version: $k.av, resourceVersion: "0", date: (.ts // ""),
                icon: {name: "fa-cubes", color: "blue", message: $k.kind},
                statusIcon: (
                  if $ready and ($unsynced | not) then {name: "fa-check", color: "green", message: "Ready · Synced"}
                  elif $ready and $unsynced then {name: "fa-triangle-exclamation", color: "orange", message: "Drift · Synced=False"}
                  elif $notready then {name: "fa-xmark", color: "red", message: "Not ready"}
                  else {name: "fa-clock", color: "gray", message: "Pending"} end),
                parentRefs: [] } ]
        + [ $small[] | .comps[] | .uid as $puid | (.managed // [])[]?
            | select((.apiVersion // "") | (startswith("widgets.templates.krateo.io") or startswith("templates.krateo.io")) | not)
            | { uid: .path, kind: .resource, name: .name, namespace: (.namespace // ""),
                version: (.apiVersion // "v1"), resourceVersion: "0", date: "",
                icon: {name: "fa-cube", color: "gray", message: .resource},
                statusIcon: {name: "fa-circle-dot", color: "blue", message: "managed"},
                parentRefs: [ {uid: $puid} ] } ]
      ) }
