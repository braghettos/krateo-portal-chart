kind: Card
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: stat-card-compositions
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    variant: outlined
    # Petrol density (D5/O1): compact stat cards to align to the dense one-screen mockup.
    # antd `size: small` trims the card's header + body padding; combined with the frontend
    # .statCard vertical-padding trim it brings the card toward the mockup's ~70px stat tile.
    # (A hard ~70px height is NOT expressible in the Card CR — it needs a frontend CSS cap.)
    size: small
    # D4: whole-card CTA → the full compositions list (total count → all rows).
    clickActionId: view-all
    widgetActions:
      navigate:
        - id: view-all
          type: navigate
          path: /compositions
    items:
    - resourceRefId: stat-compositions
    - resourceRefId: delta-compositions
  resourcesRefs:
    items:
    - id: stat-compositions
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: stat-compositions
      namespace: {{ .Release.Namespace }}
      resource: statistics
      verb: GET
    - id: delta-compositions
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: delta-compositions
      namespace: {{ .Release.Namespace }}
      resource: flexes
      verb: GET
