# Observability → Telemetry tab content (R2 #9). A Col wrapper — the Tabs allowedResources
# enum has `cols`/`rows`/`paragraphs`/`listies` but not `flexes` — stacking the live-telemetry
# section: the OTel → ClickHouse error digest, the chronological log stream and the cluster
# resource-usage trend + snapshot.
#
# The Performance sub-group (reconcile-trace throughput/latency/percentiles/phases) is a
# HONESTY-GUARDED opt-in: otel_traces + otel_metrics_histogram are emitted ONLY by the
# composition-dynamic-controller, so on a cluster without the CDC tracing pipeline those tables
# are permanently empty and the group would render fabricated zeros. Default HIDDEN — opt in
# with `observability.reconcileTracing: true`. (Same guard as the pre-tabs page flow.)
#
# R2 #11: obs-svc-filter-note (a dismissible chip Listy) sits ABOVE the log stream, appearing
# ONLY when a ?svc= scope is active — it names the filtered service and clears back to the
# unscoped page. hideWhenEmpty keeps the healthy/default unfiltered state clean (exception-only).
kind: Col
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: obs-tab-telemetry
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    allowedResources:
    - paragraphs
    - rows
    - listies
    items:
    - resourceRefId: obs-sec-logs-label
    - resourceRefId: obs-sec-logs-desc
    {{- if (.Values.observability | default dict).reconcileTracing }}
    # — Performance — (reconcile-trace telemetry; opt-in, see header honesty guard).
    - resourceRefId: obs-sec-performance-label
    - resourceRefId: obs-sec-performance-desc
    - resourceRefId: obs-telemetry-row
    - resourceRefId: obs-perf-phases-row
    - resourceRefId: obs-latency-row
    - resourceRefId: obs-perf-stat-row
    {{- end }}
    - resourceRefId: obs-errors-row
    - resourceRefId: obs-svc-filter-note
    - resourceRefId: obs-log-stream-row
    - resourceRefId: obs-resource-row
  resourcesRefs:
    items:
    - id: obs-sec-logs-label
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-sec-logs-label
      namespace: {{ .Release.Namespace }}
      resource: paragraphs
      verb: GET
    - id: obs-sec-logs-desc
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-sec-logs-desc
      namespace: {{ .Release.Namespace }}
      resource: paragraphs
      verb: GET
    {{- if (.Values.observability | default dict).reconcileTracing }}
    - id: obs-sec-performance-label
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-sec-performance-label
      namespace: {{ .Release.Namespace }}
      resource: paragraphs
      verb: GET
    - id: obs-sec-performance-desc
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-sec-performance-desc
      namespace: {{ .Release.Namespace }}
      resource: paragraphs
      verb: GET
    - id: obs-telemetry-row
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-telemetry-row
      namespace: {{ .Release.Namespace }}
      resource: rows
      verb: GET
    - id: obs-perf-phases-row
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-perf-phases-row
      namespace: {{ .Release.Namespace }}
      resource: rows
      verb: GET
    - id: obs-latency-row
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-latency-row
      namespace: {{ .Release.Namespace }}
      resource: rows
      verb: GET
    - id: obs-perf-stat-row
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-perf-stat-row
      namespace: {{ .Release.Namespace }}
      resource: rows
      verb: GET
    {{- end }}
    - id: obs-errors-row
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-errors-row
      namespace: {{ .Release.Namespace }}
      resource: rows
      verb: GET
    - id: obs-svc-filter-note
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-svc-filter-note
      namespace: {{ .Release.Namespace }}
      resource: listies
      verb: GET
    - id: obs-log-stream-row
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-log-stream-row
      namespace: {{ .Release.Namespace }}
      resource: rows
      verb: GET
    - id: obs-resource-row
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-resource-row
      namespace: {{ .Release.Namespace }}
      resource: rows
      verb: GET
