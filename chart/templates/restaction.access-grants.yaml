# Access persona managed grants (W3-2) — the Roles + RoleBindings the Access page
# itself created, label-selected on krateo.io/managed-by=portal-access and
# filtered server-side to this persona (krateo.io/subject label == the slugified
# route username; the slug — lowercase, [a-z0-9-] — is the grant convention, see
# form.access-grant). ADMIN read, per-user dispatch (no UAF): non-admins 403 →
# continueOnError → empty grants, honest for a page only admins can act on.
#
# Emits:
#   .grants     — table rows: one per RoleBinding, its Role's rules joined by
#                 (namespace, roleRef.name) and summarized as a human string
#   .current    — the managed pair in the ACTIVE ?ns scope (or null): the revoke
#                 button's resourcesRefsTemplate resolves its two DELETE targets
#                 from these LIVE object names (never re-derived client-side)
#   .hasGrantInNs — drives the conditional revoke row (inert when absent)
#   .username/.ns — echoed extras (grant-form initialValues + keying)
apiVersion: templates.krateo.io/v1
kind: RESTAction
metadata:
  name: access-grants
  namespace: {{ .Release.Namespace }}
  annotations:
    krateo.io/verbose: "true"
spec:
  api:
    - name: bindings
      path: /apis/rbac.authorization.k8s.io/v1/rolebindings?labelSelector=krateo.io%2Fmanaged-by%3Dportal-access
      verb: GET
      headers:
        - 'Accept: application/json'
      continueOnError: true
      errorKey: bindingsError
      filter: >
        [ .bindings.items[]?
          | { bindingName: (.metadata.name // ""),
              namespace: (.metadata.namespace // ""),
              subject: (((.metadata.labels // {})["krateo.io/subject"]) // ""),
              subjectKind: (((.subjects // [])[0].kind) // "User"),
              subjectName: (((.subjects // [])[0].name) // ""),
              roleKind: (.roleRef.kind // "Role"),
              roleName: (.roleRef.name // ""),
              created: (.metadata.creationTimestamp // "") } ]
    - name: roles
      path: /apis/rbac.authorization.k8s.io/v1/roles?labelSelector=krateo.io%2Fmanaged-by%3Dportal-access
      verb: GET
      headers:
        - 'Accept: application/json'
      continueOnError: true
      errorKey: rolesError
      filter: >
        [ .roles.items[]?
          | { name: (.metadata.name // ""),
              namespace: (.metadata.namespace // ""),
              rules: (.rules // []) } ]
  # Join each binding to its Role's rules and summarize the rules server-side
  # ("verb/verb on resource,resource (group)" per rule). The ACTIVE-namespace
  # pair (.current) feeds the revoke button's DELETE refs.
  filter: >
    def slug: ascii_downcase | gsub("[^a-z0-9-]"; "-");
    ((.username // "") | slug) as $subject
    | (if (.ns // "") != "" then .ns else {{ .Release.Namespace | quote }} end) as $ns
    | (.roles // []) as $roles
    | ([ (.bindings // [])[]
        | select(.subject == $subject)
        | . as $b
        | ((([ $roles[] | select(.namespace == $b.namespace and .name == $b.roleName) ] | first) | .rules) // []) as $rules
        | $b + {
            rulesSummary: (if ($rules | length) > 0 then
                ([ $rules[] | (((.verbs // [])|join("/")) + " on " + ((.resources // [])|join(","))
                   + (if ((.apiGroups // []) | map(select(. != "")) | length) > 0 then " (" + ((.apiGroups // []) | map(select(. != "")) | join(",")) + ")" else "" end)) ]
                 | join(" · "))
              else "role missing or empty" end)
          }
      ] | sort_by(.namespace)) as $grants
    | {
      username: (.username // ""),
      ns: $ns,
      grants: $grants,
      current: ([ $grants[] | select(.namespace == $ns) ] | first),
      hasGrantInNs: (([ $grants[] | select(.namespace == $ns) ] | length) > 0)
    }
