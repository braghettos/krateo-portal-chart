# The impact SUMMARY line — "N added · N removed · N modified" (or the honest no-changes /
# render-failed statement), joined server-side by the upgrade-impact RA filter.
kind: Paragraph
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: blueprint-impact-summary
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [name, namespace, to]
  apiRef:
    name: upgrade-impact
    namespace: {{ .Release.Namespace }}
  widgetData:
    text: ''
    strong: true
  widgetDataTemplate:
    - forPath: text
      expression: '${ .summary // "" }'
  resourcesRefs:
    items: []
