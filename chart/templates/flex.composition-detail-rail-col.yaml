# Full-width column holding ONLY the reconciliation rail card. It exists so the rail rides the
# SAME Row > Flex-col > Card structure as the Spec/Health grid below it — and therefore gets the
# identical antd-Row gutter inset, instead of spanning ~8px wider each side as a bare flex child.
kind: Flex
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: composition-detail-rail-col
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    vertical: true
    allowedResources:
      - cards
    items:
      - resourceRefId: card-composition-detail-rail
  resourcesRefs:
    items:
      - id: card-composition-detail-rail
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: card-composition-detail-rail
        namespace: {{ .Release.Namespace }}
        resource: cards
        verb: GET
