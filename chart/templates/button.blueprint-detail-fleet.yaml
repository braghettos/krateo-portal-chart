# "Deploy to fleet" (W3-1) — opens a Drawer hosting the fleet-rollout Form: pick N
# registered spoke clusters, ONE gated submit creates one CompositionDefinition per
# cluster (spec.deploy.targetRef.name). Mirrors composition-detail-edit's wiring: no
# apiRef needed on the button — it just points the drawer at the form (the form owns
# the per-blueprint resolution via ?extras and the fan-out POST target).
kind: Button
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: blueprint-detail-fleet
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    label: Deploy to fleet
    icon: fa-share-nodes
    type: default
    size: small
    clickActionId: open-fleet-rollout
    actions:
      openDrawer:
        - id: open-fleet-rollout
          type: openDrawer
          resourceRefId: fleet-rollout-form
          title: Deploy to fleet
          size: large
  resourcesRefs:
    items:
      - id: fleet-rollout-form
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: fleet-rollout
        namespace: {{ .Release.Namespace }}
        resource: forms
        verb: GET
