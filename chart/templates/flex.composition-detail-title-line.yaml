# Title line: the composition name (H2 Paragraph) + an inline status Tag,
# matching the mockup's `<h1>name <span class="tag">Healthy</span></h1>`.
kind: Flex
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: composition-detail-title-line
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    vertical: false
    align: center
    gap: middle
    allowedResources:
      - paragraphs
      - tags
    items:
      - resourceRefId: composition-detail-header
      - resourceRefId: composition-detail-status
  resourcesRefs:
    items:
      - id: composition-detail-header
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: composition-detail-header
        namespace: {{ .Release.Namespace }}
        resource: paragraphs
        verb: GET
      - id: composition-detail-status
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: composition-detail-status
        namespace: {{ .Release.Namespace }}
        resource: tags
        verb: GET
