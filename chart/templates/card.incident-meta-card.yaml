# UX-19: invisible host for the meta Descriptions. The Descriptions plural isn't in the Flex
# container allowedResources enum (adding it is a frontend-CRD change, out of scope), and Card
# children are NOT constrained by that enum — so the started/updated/phase Descriptions rides
# inside a borderless, padding-free Card (same "invisible host" pattern as incident-gaps-card).
# No card title/border: the meta reads as a bare strip under the header title + chips.
kind: Card
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: incident-meta-card
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [name, namespace]
  widgetData:
    variant: borderless
    size: small
    items:
    - resourceRefId: incident-meta-desc
  resourcesRefs:
    items:
    - id: incident-meta-desc
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: incident-meta-desc
      namespace: {{ .Release.Namespace }}
      resource: descriptions
      verb: GET
