# Per-composition reconcile latency — the composition-dynamic-controller's `reconcile`
# trace spans grouped by the composition they reconciled (kind+name), straight from
# ClickHouse (otel_traces) via restaction.obs-reconcile-by-composition. Rows come back
# slowest-first (server-side ORDER BY p95 DESC), so the top rows are the hot compositions.
# p95 cell is tinted by severity (>3s crimson, >1.5s amber) to draw the eye — the threshold
# colour is applied per-cell; the numbers themselves are the real measured ms.
kind: Table
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: obs-reconcile-by-composition
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [range]
  widgetData:
    allowedResources: []
    bordered: false
    size: small
    # Row click → the composition's detail page ({ns}/{name} from a hidden ns cell + the
    # name cell). Rows whose ns/name don't resolve simply don't navigate (buildRowPath guard).
    rowNavigateTo: /compositions/{ns}/{name}
    pagination:
      defaultPageSize: 10
    columns:
    - valueKey: name
      title: Composition
    - valueKey: kind
      title: Type
    - valueKey: reconciles
      title: Reconciles
    - valueKey: p95
      title: p95
    - valueKey: avg
      title: avg
    dataSource: []
  widgetDataTemplate:
  # Rows already sorted slowest-first server-side. p95 tinted by threshold; avg stays
  # neutral. All numbers are the real measured latency (ms) — nothing derived client-side.
  - forPath: dataSource
    expression: '${ [ (.rows // [])[] | [ {valueKey:"name",kind:"jsonSchemaType",type:"string",stringValue:.name}, {valueKey:"ns",kind:"jsonSchemaType",type:"string",stringValue:.ns}, {valueKey:"kind",kind:"jsonSchemaType",type:"string",stringValue:.kind}, {valueKey:"reconciles",kind:"jsonSchemaType",type:"string",stringValue:(.reconciles|tostring)}, {valueKey:"p95",kind:"jsonSchemaType",type:"string",stringValue:((.p95_ms|tostring)+" ms"),color:((.p95_ms|tonumber) | if . > 3000 then "#cf1322" elif . > 1500 then "#d48806" else "#8c8c8c" end)}, {valueKey:"avg",kind:"jsonSchemaType",type:"string",stringValue:((.avg_ms|tostring)+" ms"),color:"#8c8c8c"} ] ] }'
  apiRef:
    name: obs-reconcile-by-composition
    namespace: {{ .Release.Namespace }}
  resourcesRefs:
    items: []
