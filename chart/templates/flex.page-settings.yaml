# Page wrapper for /settings: a vertical Flex stacking the page header (title + subtitle)
# above the admin Tabs (Krateo / Users). Previously the /settings route rendered
# `settings-admin` (the Tabs) directly with no header at all — this adds the mockup's
# `.pg-head` (H1 + subtitle). The nav `id: settings` is repointed here.
kind: Flex
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: page-settings
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    allowedResources:
    - flexes
    - tabs
    vertical: true
    gap: large
    items:
    - resourceRefId: settings-title-stack
    - resourceRefId: settings-admin
  resourcesRefs:
    items:
    - id: settings-title-stack
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: settings-title-stack
      namespace: {{ .Release.Namespace }}
      resource: flexes
      verb: GET
    - id: settings-admin
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: settings-admin
      namespace: {{ .Release.Namespace }}
      resource: tabs
      verb: GET
