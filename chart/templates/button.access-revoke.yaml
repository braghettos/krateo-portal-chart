# Revoke the managed grant in the active ?ns scope (W3-2) — the DELETE twin of
# the grant form's ops[] action: RoleBinding FIRST, then Role (the safe delete
# order — an interrupted set leaves a subject-less Role, never a dangling
# binding). ONE aggregated blast-radius confirm gates the pair (DELETEs are
# unconditionally gated); ONE set AuditRecord records it.
#
# The two DELETE targets resolve SERVER-SIDE from the LIVE objects: access-grants
# emits `.current` (the managed pair in the active namespace) and the
# resourcesRefsTemplate below fills name/namespace from it — nothing re-derived
# client-side. Rendered only when a grant exists in scope (see
# flex.access-grants-actions), so the refs are never empty when clickable.
kind: Button
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: access-revoke
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [username, ns]
  apiRef:
    name: access-grants
    namespace: {{ .Release.Namespace }}
  widgetData:
    label: Revoke grant
    icon: fa-user-slash
    type: default
    danger: true
    size: small
    clickActionId: revoke
    actions:
      rest:
        - id: revoke
          type: rest
          resourceRefId: delete-grant-binding
          headers:
            - 'Accept: application/json'
          successMessage: Grant revoked — RoleBinding and Role deleted
          errorMessage: Revoke failed — the grant may have been changed outside the portal; refresh and retry
          loading:
            display: true
          ops:
            # RoleBinding first: stop-on-first-error must never orphan a live binding.
            - resourceRefId: delete-grant-binding
            - resourceRefId: delete-grant-role
  widgetDataTemplate:
    - forPath: label
      expression: '${ "Revoke grant in " + ((.current.namespace) // (.ns // "")) }'
  resourcesRefs:
    items: []
  resourcesRefsTemplate:
    - template:
        id: delete-grant-binding
        apiVersion: rbac.authorization.k8s.io/v1
        resource: rolebindings
        name: ${ (.current.bindingName) // "" }
        namespace: ${ (.current.namespace) // "" }
        verb: DELETE
    - template:
        id: delete-grant-role
        apiVersion: rbac.authorization.k8s.io/v1
        resource: roles
        name: ${ (.current.roleName) // "" }
        namespace: ${ (.current.namespace) // "" }
        verb: DELETE
