# Sub-line under the blueprint title: "CompositionDefinition · <namespace> · created <relative>".
# Mirrors composition-detail-subtitle; assembled server-side from the blueprint-detail RA.
kind: Paragraph
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: blueprint-detail-subtitle
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [name, namespace]
  apiRef:
    name: blueprint-detail
    namespace: {{ .Release.Namespace }}
  widgetData:
    text: ""
    type: secondary
  widgetDataTemplate:
    - forPath: text
      expression: '${ "CompositionDefinition · " + (.namespace // "?") + " · created " + ((.created // "") as $ts | if ($ts | length) == 0 then "?" else ((now - ($ts | fromdateiso8601)) as $sec | if $sec < 60 then "just now" elif $sec < 3600 then ((($sec/60)|floor)|tostring) + "m ago" elif $sec < 86400 then ((($sec/3600)|floor)|tostring) + "h ago" else ((($sec/86400)|floor)|tostring) + "d ago" end) end) }'
  resourcesRefs:
    items: []
