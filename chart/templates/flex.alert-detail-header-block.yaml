# Alert detail pagehead — back-link, H1 title (spec.displayName), chips line (live State tag),
# meta line (phase · lastSynced), then the "Investigate with Autopilot" action. Mirrors
# incident-detail-header-block / composition-detail-header-block so the three detail pageheads
# read identically. The investigate button sits under the meta line as the pagehead's single
# CTA (the ask flow the OLD /alerts row-click owned, moved here — item 25).
kind: Flex
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: alert-detail-header-block
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [name, namespace]
  widgetData:
    allowedResources:
    - buttons
    - paragraphs
    - flexes
    vertical: true
    gap: small
    items:
    - resourceRefId: alert-detail-back
    - resourceRefId: alert-detail-title
    - resourceRefId: alert-detail-chips
    - resourceRefId: alert-detail-meta
    - resourceRefId: alert-detail-investigate
  resourcesRefs:
    items:
    - id: alert-detail-back
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: alert-detail-back
      namespace: {{ .Release.Namespace }}
      resource: buttons
      verb: GET
    - id: alert-detail-title
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: alert-detail-title
      namespace: {{ .Release.Namespace }}
      resource: paragraphs
      verb: GET
    - id: alert-detail-chips
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: alert-detail-chips
      namespace: {{ .Release.Namespace }}
      resource: flexes
      verb: GET
    - id: alert-detail-meta
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: alert-detail-meta
      namespace: {{ .Release.Namespace }}
      resource: paragraphs
      verb: GET
    - id: alert-detail-investigate
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: alert-detail-investigate
      namespace: {{ .Release.Namespace }}
      resource: buttons
      verb: GET
