# Resolves ONE composition (from ?extras .name/.namespace) and shapes EVERY field
# the Detail page needs — server-side, per the nothing-client-side rule. Compositions
# are heterogeneous per-blueprint kinds, so discover generically: list the
# composition.krateo.io CRDs, list each cluster-wide, pick the item matching the
# route name+namespace, then ALSO pull that object's namespaced Events.
#
# Returns:
#   detail        : {apiVersion,kind,name,namespace}  flat identity (object-level watch)
#   title         : the composition name (header)
#   subtitle      : "<kind> · <namespace> · created <ts>"
#   manifestJson  : desired-state manifest as a JSON string (YamlViewer renders it)
#   specItems     : [{label,value}]  the spec, as Descriptions rows
#   metadataItems : [{label,value}]  namespace/uid/created + labels
#   healthPercent : % of status.conditions that are True (0 when none reported)
#   events        : this object's recent k8s Events (honest ~1h TTL window)
# Extras reach RA api steps on this snowplow (same mechanism as blueprint-formdef).
apiVersion: templates.krateo.io/v1
kind: RESTAction
metadata:
  name: composition-detail
  namespace: {{ .Release.Namespace }}
  annotations:
    krateo.io/verbose: "true"
spec:
  api:
    - name: crds
      path: /apis/apiextensions.k8s.io/v1/customresourcedefinitions
      verb: GET
      headers:
        - 'Accept: application/json'
      filter: "[.crds.items[] | select(.spec.group == \"composition.krateo.io\") | {plural: .status.acceptedNames.plural, version: .status.storedVersions[0]}]"
      continueOnError: true
    - name: found
      dependsOn:
        name: crds
        iterator: .crds
      path: ${ "/apis/composition.krateo.io/" + .version + "/" + .plural }
      verb: GET
      headers:
        - 'Accept: application/json'
      continueOnError: true
      filter: "[.found.items[]? | del(.metadata.managedFields, .metadata.annotations[\"kubectl.kubernetes.io/last-applied-configuration\"])]"
    - name: objectEvents
      path: ${ "/api/v1/namespaces/" + (.namespace // "krateo-system") + "/events" }
      verb: GET
      headers:
        - 'Accept: application/json'
      continueOnError: true
      filter: "[.objectEvents.items[]?]"
  filter: >
    .name as $n
    | .namespace as $ns
    | ([ .found[]? | select(.metadata.name == $n and .metadata.namespace == $ns) ][0] // {}) as $obj
    | ($obj.status.conditions // []) as $conds
    | {
        detail: { apiVersion: $obj.apiVersion, kind: $obj.kind, name: $obj.metadata.name, namespace: $obj.metadata.namespace },
        title: ($obj.metadata.name // $n // "composition"),
        subtitle: (($obj.kind // "Composition") + " · " + ($obj.metadata.namespace // $ns // "?") + " · created " + ($obj.metadata.creationTimestamp // "?")),
        manifestJson: ({ apiVersion: $obj.apiVersion, kind: $obj.kind, metadata: { name: $obj.metadata.name, namespace: $obj.metadata.namespace, labels: ($obj.metadata.labels // {}) }, spec: ($obj.spec // {}) } | tojson),
        specItems: (($obj.spec // {}) | to_entries | map({ label: .key, value: (.value | if type == "string" then . else tojson end) })),
        metadataItems: ([ { label: "Namespace", value: ($obj.metadata.namespace // "") }, { label: "UID", value: ($obj.metadata.uid // "") }, { label: "Created", value: ($obj.metadata.creationTimestamp // "") } ] + (($obj.metadata.labels // {}) | to_entries | map({ label: ("label/" + .key), value: .value }))),
        healthPercent: (if ($conds | length) > 0 then (($conds | map(select(.status == "True")) | length) * 100 / ($conds | length) | floor) else 0 end),
        events: ([ .objectEvents[]? | select(.involvedObject.name == $n) | { metadata: { name: .metadata.name, namespace: .metadata.namespace, uid: .metadata.uid, creationTimestamp: .metadata.creationTimestamp }, involvedObject: .involvedObject, reason: .reason, message: .message, type: .type, lastTimestamp: .lastTimestamp, eventTime: .eventTime, source: .source } ] | sort_by(.lastTimestamp // .eventTime // "") | reverse | .[0:8])
      }
