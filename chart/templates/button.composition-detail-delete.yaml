# Delete the composition — destructive, so requireConfirmation gates it behind the
# engine's antd confirm modal; RBAC via the user token. On success the engine
# redirects to /compositions (onSuccessNavigateTo). Target GVR resolved server-side
# from composition-detail (.gvr) — no hardcode. A DELETE removes the object directly
# (no controller needed), so this is fully effective on any cluster.
kind: Button
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: composition-detail-delete
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  apiRef:
    name: composition-detail
    namespace: {{ .Release.Namespace }}
  widgetData:
    label: Delete
    icon: fa-trash
    type: default
    danger: true
    size: small
    clickActionId: delete
    actions:
      rest:
        - id: delete
          type: rest
          resourceRefId: delete-composition
          headers:
            - 'Accept: application/json'
          requireConfirmation: true
          successMessage: Composition deleted
          onSuccessNavigateTo: /compositions
          loading:
            display: true
  resourcesRefs:
    items: []
  resourcesRefsTemplate:
    - template:
        id: delete-composition
        apiVersion: ${ .gvr.apiVersion }
        resource: ${ .gvr.resource }
        name: ${ .gvr.name }
        namespace: ${ .gvr.namespace }
        verb: DELETE
