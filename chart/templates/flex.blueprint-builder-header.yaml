# /blueprint-builder page head — eyebrow + H1 + subtitle stack (sibling of
# kog-builder-header). Static copy; the page's data lives in the deliverables table below.
kind: Flex
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: blueprint-builder-header
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    allowedResources:
    - paragraphs
    vertical: true
    items:
    - resourceRefId: blueprint-builder-eyebrow
    - resourceRefId: blueprint-builder-title
    - resourceRefId: blueprint-builder-subtitle
  resourcesRefs:
    items:
    {{- range (list "blueprint-builder-eyebrow" "blueprint-builder-title" "blueprint-builder-subtitle") }}
    - id: {{ . }}
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: {{ . }}
      namespace: {{ $.Release.Namespace }}
      resource: paragraphs
      verb: GET
    {{- end }}
