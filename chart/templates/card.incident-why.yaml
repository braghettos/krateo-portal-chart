# WHY panel (#72 §1) — merges the former Root cause + Missing-context + Reasoning-trace cards into
# ONE flat section (D1 flat / D2 verdict-first): the VERDICT (root-cause statement + category chip +
# grounded-confidence line) on top, then the ASSUMPTIONS/GAPS callout, then the REASONING-TRACE
# timeline as the audit trail you expand to check the work. Children are plain content widgets —
# NOT sub-cards (no double borders); the two mid-panel dividers are lightweight Markdown headings.
# Items are templated off the sections flags so each sub-block appears only when its data exists
# (a report with a verdict but no gaps/trace renders just the verdict). Card children are NOT bound
# by the Flex allowedResources enum, so hosting paragraphs/tags/markdowns/alerts/steps is fine.
kind: Card
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: incident-why-card
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [name, namespace]
  apiRef:
    name: incident-detail
    namespace: {{ .Release.Namespace }}
  widgetData:
    title: Why did it happen
    titleVariant: eyebrow
    variant: outlined
    icon:
      name: fa-circle-exclamation
      color: red
    items:
    - resourceRefId: incident-why-tabs
  widgetDataTemplate:
    # Single Tabs widget: "Reasoning trace" (Steps, default/first), "Verdict" (Paragraph, when
    # rootcause exists), "Gaps & assumptions" (Alert, when gaps/assumptions exist). Tabs widget
    # itself gates each tab via its own widgetDataTemplate, so this card just passes the Tabs ref.
    - forPath: items
      expression: '${ [ { resourceRefId: "incident-why-tabs" } ] }'
  resourcesRefs:
    items:
    - id: incident-why-tabs
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: incident-why-tabs
      namespace: {{ .Release.Namespace }}
      resource: tabs
      verb: GET
