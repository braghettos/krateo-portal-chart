# GENERIC blueprint create Form — ONE Form for ALL blueprints (replaces every
# per-blueprint create form, e.g. the hand-authored rancher-create).
#   - apiRef → blueprint-formdef: returns the CRD's spec schema (with synthetic
#     name+namespace fields prepended) + the discovered GVR (apiVersion/kind/resource).
#   - schema ← schemaSpec: SchemaFields renders the instance Name, Namespace, and the
#     blueprint's own spec fields.
#   - create target (resourcesRefsTemplate) is built from the discovered GVR — no hardcode.
#   - submit routes the user's name/namespace into metadata and the rest into spec.
# page-blueprint-create points its child ref at THIS form (forms/blueprint-create) instead
# of a per-blueprint form. VERIFIED end-to-end on kind-krateo-dash (after installing the
# core-provider CRDs + a CompositionDefinition with populated status): the form renders the
# discovered schema and a submit deploys the composition. Both prior unknowns resolved:
#  - snowplow's POST /call INFERS apiVersion/kind from the URL (resource+apiVersion query);
#    the body only needs metadata + spec, so action.payload doesn't template them.
#  - resourcesRefsTemplate resolves ${.apiVersion}/${.resource} from the apiRef result.
# Supersedes the per-blueprint rancher-create/rancher-formdef.
kind: Form
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: blueprint-create
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  apiRef:
    name: blueprint-formdef
    namespace: {{ .Release.Namespace }}
  widgetData:
    layout: vertical
    # Real Configure→Review: the primary button validates and reveals an in-place
    # read-only Review of the entered values; only the Review step's button creates.
    reviewBeforeSubmit: true
    submitActionId: submit
    # Save draft: persists the CURRENT field values un-validated to the BROWSER (localStorage),
    # so an incomplete form survives a reload with NO backend persistence. The Form keys the
    # draft by __owner (the per-user/blueprint key seeded into initialValues but never
    # rendered/validated) and resumes it on mount; the real submit (onFinish, registered fields
    # only) stays clean. draftActionId only ENABLES the button now — no REST action backs it.
    draftActionId: save-draft
    schema: {}
    buttonConfig:
      primary:
        # The Configure-step label is "Review →" (Form.tsx default) — the trailing arrow
        # glyph is already the mockup's right-side affordance, so NO leading FA icon (it
        # would double the arrow and sit on the wrong side).
        label: Create composition
      secondary:
        label: Cancel
        # Cancel → back to the Marketplace (navigate, not a form reset).
        navigateTo: /marketplace
      draft:
        label: Save draft
        # Disk on Save-draft (mockup `.actionbar` left).
        icon: fa-floppy-disk
    actions:
      rest:
        - id: submit
          type: rest
          resourceRefId: create-composition
          headers:
            - 'Content-Type: application/json'
          # Redirect to the NEW composition's DETAIL page (not the list). resolveJq sees the
          # built request body as `.json`, which carries metadata.name + metadata.namespace
          # (set by payloadToOverride below).
          onSuccessNavigateTo: '${ "/compositions/" + .json.metadata.namespace + "/" + .json.metadata.name }'
          successMessage: Composition created
          # All from {json} (the form values) — the only context payloadToOverride jq sees.
          # __owner is absent here (onFinish yields only registered fields), so it can't leak.
          payloadToOverride:
            - { name: metadata.name,      value: '${ .json.name }' }
            - { name: metadata.namespace, value: '${ .json.namespace }' }
            - { name: spec,               value: '${ .json | del(.name) | del(.namespace) }' }
  widgetDataTemplate:
    - forPath: schema
      expression: '${ .schemaSpec }'
    # Order-preserving schema (authoring order): the raw values.schema.json as a STRING; the
    # Form prefers `stringSchema` over `schema` and JSON.parses it client-side (key insertion
    # order survives), so fields render in the blueprint's authoring order, not the CRD's
    # alphabetized map. null when the jsonschema CM is absent → Form falls back to `schema`.
    - forPath: stringSchema
      expression: '${ .stringSchema }'
    - forPath: propertiesToHide
      expression: '${ .propertiesToHide }'
    # Resume: a saved draft (+ the __owner key) pre-fills the form. Form merges these
    # over schema defaults; __owner has no schema field so it stays unrendered.
    - forPath: initialValues
      expression: '${ .initialValues }'
  resourcesRefs:
    # No static resourcesRefs: the create POST target is built per-blueprint in
    # resourcesRefsTemplate below, and the draft no longer writes anything (it lives in the
    # browser's localStorage), so there is no draft ConfigMap ref here.
    items: []
  resourcesRefsTemplate:
    - template:
        id: create-composition
        apiVersion: '${ .apiVersion }'
        resource: '${ .resource }'
        namespace: '${ .namespace }'
        verb: POST
