# /blueprint-builder deliverables — one row per Autopilot-authored blueprint, sourced
# from the git PullRequest CRs to the blueprints repo (spec.repo == krateo-blueprints),
# JOINED to the registered CompositionDefinition so each row shows whether the merged
# chart is live yet. Cluster-native (no GitHub token/endpoint): lists
# pullrequests.github.krateo.io + compositiondefinitions.core.krateo.io, continueOnError
# so a narrow-RBAC user degrades to an empty table instead of a failed widget. The chart
# name is derived server-side from the PR's `builder/<chart>` branch; the row's ns+chart
# drive the table's rowNavigateTo into the blueprint detail page (the linkable deliverable).
apiVersion: templates.krateo.io/v1
kind: RESTAction
metadata:
  name: blueprint-builder-deliverables
  namespace: {{ .Release.Namespace }}
  annotations:
    krateo.io/verbose: "true"
spec:
  api:
    # Builder pull requests to the blueprints repo. status.state (open/closed) + number +
    # html_url are written by the KOG provider after the PR lands; a just-created PR has
    # none, so read every status field defensively. Filter to the blueprints repo here so
    # the join below only ever considers blueprint deliverables.
    - name: prs
      path: /apis/github.krateo.io/v1alpha1/namespaces/{{ .Release.Namespace }}/pullrequests
      verb: GET
      headers:
        - 'Accept: application/json'
      continueOnError: true
      errorKey: prsError
      filter: >
        [ (.prs.items // [])[]
          | select(((.spec.repo) // "") == "krateo-blueprints")
          | { chart: (((.spec.head) // "") | sub("^builder/"; "")),
              title: ((.spec.title) // ""),
              number: ((.status.number) // 0),
              state: ((.status.state) // "pending"),
              url: ((.status.html_url) // ""),
              created: ((.metadata.creationTimestamp) // "") } ]
    # The registered blueprints (CompositionDefinitions). The join key is metadata.name ==
    # the PR's chart name (the builder names the branch, the chart and the CD identically).
    - name: cds
      path: /apis/core.krateo.io/v1alpha1/namespaces/{{ .Release.Namespace }}/compositiondefinitions
      verb: GET
      headers:
        - 'Accept: application/json'
      continueOnError: true
      errorKey: cdsError
      filter: >
        [ (.cds.items // [])[]
          | { name: (.metadata.name // ""),
              version: ((.spec.chart.version) // ""),
              ready: ([ (.status.conditions // [])[] | select((.type // "") == "Ready") ] | first // {} | (.status // "")) } ]
  # Join PRs → CDs. Status verdict (Registered/Reconciling/In review) + its chip colour are
  # computed HERE, server-side. Rows are newest-first. The empty-state hint is emitted ONLY
  # when zero deliverables exist (exception-only UX), carrying a /blueprint-builder?ask=
  # Autopilot deep-link that seeds the blueprint-authoring flow.
  filter: >
    (.cds // []) as $cds
    | ([ (.prs // [])[]
         | . as $pr
         | ( [ $cds[] | select(.name == $pr.chart) ] | first ) as $cd
         | { chart: $pr.chart,
             title: $pr.title,
             pr: ("#" + ($pr.number | tostring)),
             version: (if $cd != null then ("v" + ($cd.version // "?")) else "—" end),
             status: (if ($cd != null and $cd.ready == "True") then "Registered"
                      elif ($cd != null) then "Reconciling"
                      else "In review" end),
             statusColor: (if ($cd != null and $cd.ready == "True") then "green"
                           elif ($cd != null) then "gold"
                           else "blue" end),
             ns: "{{ .Release.Namespace }}",
             age: $pr.created }
       ] | sort_by(.age // "") | reverse) as $rows
    | { rows: $rows,
        counts: { total: ($rows | length),
                  registered: ([ $rows[] | select(.status == "Registered") ] | length) },
        hint: (if ($rows | length) == 0
               then [ { title: "Author your first blueprint with Autopilot",
                        detail: "Describe the blueprint in the rail — the agent drafts the Helm chart, previews a live helm-render, and opens a gated pull request. Merged, it publishes an OCI chart and lands on the Blueprints page.",
                        askHref: ("/blueprint-builder?ask=" + (("I want to author a new blueprint (a Helm chart) with the Blueprint builder. Help me define its Chart.yaml, values.yaml, values.schema.json and templates, preview it with previewBlueprint, and publish it via a gated pull request to the blueprints repo once I confirm.") | @uri)) } ]
               else [] end) }
