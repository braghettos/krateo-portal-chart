# Access-page paragraphs (W3-2): the Settings-tab intro, the persona-page header
# pieces (eyebrow / H1 / the honesty line) and the three section label+caption
# pairs (mockup .blocklabel style). The honesty line is LOAD-BEARING UX: the
# capability preview is a run-as-admin SubjectAccessReview about the persona —
# it must say exactly which identity+groups were checked, and that IdP-managed
# (OIDC/LDAP) groups are unknowable from the cluster (user-only check
# understates group-granted access).
kind: Paragraph
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: access-intro
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    text: Pick a persona to preview what it can do, grant namespaced access (Role + RoleBinding in one gated submit) and revoke managed grants. Grants land as native RBAC — enforcement follows within seconds.
    type: secondary
  resourcesRefs:
    items: []
---
kind: Paragraph
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: access-detail-eyebrow
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    text: Settings · Access
    type: secondary
  resourcesRefs:
    items: []
---
# H1 — the persona name, echoed server-side from the route's ?extras by
# access-grants (never parsed client-side).
kind: Paragraph
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: access-detail-title
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [username]
  apiRef:
    name: access-grants
    namespace: {{ .Release.Namespace }}
  widgetData:
    text: persona
    level: 2
  widgetDataTemplate:
    - forPath: text
      expression: '${ .username // "persona" }'
  resourcesRefs:
    items: []
---
# The honesty line: exactly which identity+groups the preview checked, and how.
kind: Paragraph
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: access-checked-as
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [username, ns]
  apiRef:
    name: access-preview
    namespace: {{ .Release.Namespace }}
  widgetData:
    text: capability preview runs as the calling admin (SubjectAccessReview), not as the persona's live session
    type: secondary
  widgetDataTemplate:
    - forPath: text
      expression: >
        ${ "Checked as user " + (.username // "?")
          + (if ((.groups // []) | length) > 0
             then " + groups [" + (.groups | join(", ")) + ", system:authenticated]"
             else " — groups unknown (IdP-managed identity): user-only check, group-granted access may be understated" end)
          + " · run as the calling admin via SubjectAccessReview, in namespace " + (.ns // "") }
  resourcesRefs:
    items: []
---
kind: Paragraph
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: access-preview-label
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    text: What can this persona do?
    strong: true
  resourcesRefs:
    items: []
---
kind: Paragraph
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: access-preview-desc
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    text: apiserver-authorizer truth per capability — a snapshot, not the persona's live session
    type: secondary
  resourcesRefs:
    items: []
---
kind: Paragraph
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: access-grant-label
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    text: Grant access
    strong: true
  resourcesRefs:
    items: []
---
kind: Paragraph
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: access-grant-desc
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    text: Role + RoleBinding in one gated submit · namespaced only (cluster-wide grants are out of scope in v1)
    type: secondary
  resourcesRefs:
    items: []
---
kind: Paragraph
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: access-grants-label
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    text: Existing grants
    strong: true
  resourcesRefs:
    items: []
---
kind: Paragraph
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: access-grants-desc
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    text: grants managed by this page (label-selected) · click a row to focus its namespace and arm Revoke
    type: secondary
  resourcesRefs:
    items: []
