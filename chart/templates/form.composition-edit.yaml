# Edit composition — schema-driven Form hosted in the Edit drawer. Mirrors the create
# Form but: (1) schema = the composition's OWN CRD spec schema (composition-editdef),
# (2) fields are PRE-FILLED from the current .spec (initialValues), (3) submit is a
# merge-PATCH of spec (no resourceVersion read-modify-write needed). The composition
# identity comes from the detail route params (?extras → composition-editdef). On
# success the engine closes the drawer + invalidates widget queries → detail refreshes.
kind: Form
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: composition-edit
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  apiRef:
    name: composition-editdef
    namespace: {{ .Release.Namespace }}
  widgetData:
    layout: vertical
    submitActionId: submit
    schema: {}
    buttonConfig:
      primary:
        label: Save changes
    actions:
      rest:
        - id: submit
          type: rest
          resourceRefId: edit-composition
          headers:
            - 'Content-Type: application/merge-patch+json'
          successMessage: Composition updated
          # The whole form payload becomes spec (merge-patch updates spec in place).
          payloadToOverride:
            - { name: spec, value: '${ .json }' }
  widgetDataTemplate:
    - forPath: schema
      expression: '${ .schemaSpec }'
    - forPath: initialValues
      expression: '${ .values }'
    - forPath: propertiesToHide
      expression: '${ .propertiesToHide }'
  resourcesRefs:
    items: []
  resourcesRefsTemplate:
    - template:
        id: edit-composition
        apiVersion: ${ .gvr.apiVersion }
        resource: ${ .gvr.resource }
        name: ${ .gvr.name }
        namespace: ${ .gvr.namespace }
        verb: PATCH
