# Reconciliation health — the single converged % (Ready AND Synced across all
# compositions) up top, with the rail-state breakdown (converged / drift / pending /
# failed counts) below. All off compositions-list's server-derived .railState — honest,
# the same field the reconciliation rail uses.
kind: Card
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: obs-reconcile-card
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    title: Reconciliation health
    titleVariant: eyebrow
    variant: outlined
    items:
    - resourceRefId: obs-reconcile-stat
    - resourceRefId: obs-reconcile-breakdown
  resourcesRefs:
    items:
    - id: obs-reconcile-stat
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-reconcile-stat
      namespace: {{ .Release.Namespace }}
      resource: statistics
      verb: GET
    - id: obs-reconcile-breakdown
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-reconcile-breakdown
      namespace: {{ .Release.Namespace }}
      resource: listies
      verb: GET
