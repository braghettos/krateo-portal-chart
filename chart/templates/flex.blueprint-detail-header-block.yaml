# Page header block — a space-between row: [ title-stack (back + name + status + subtitle) ]
# [ actions (Create · Delete) ]. Mirrors composition-detail-header-block.
kind: Flex
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: blueprint-detail-header-block
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    vertical: false
    justify: space-between
    align: flex-start
    gap: middle
    allowedResources:
      - flexes
    items:
      - resourceRefId: blueprint-detail-title-stack
      - resourceRefId: blueprint-detail-actions
  resourcesRefs:
    items:
      - id: blueprint-detail-title-stack
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: blueprint-detail-title-stack
        namespace: {{ .Release.Namespace }}
        resource: flexes
        verb: GET
      - id: blueprint-detail-actions
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: blueprint-detail-actions
        namespace: {{ .Release.Namespace }}
        resource: flexes
        verb: GET
