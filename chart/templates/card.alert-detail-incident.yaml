# "Investigation" card → the linked incident back-link (alert→incident, item 22 alert-side).
# Wraps alert-detail-incident-link. The page Flex includes this card ONLY when sections.incident
# is true (a TroubleshootingReport matched this alert), so an alert with no investigation shows
# no empty card (exception-only, honest data). If you want to START one, use the "Investigate
# with Autopilot" button in the pagehead — this card is the back-link to an EXISTING report.
kind: Card
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: card-alert-detail-incident
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [name, namespace]
  widgetData:
    title: Investigation
    titleVariant: eyebrow
    variant: outlined
    items:
      - resourceRefId: alert-detail-incident-link
  resourcesRefs:
    items:
      - id: alert-detail-incident-link
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: alert-detail-incident-link
        namespace: {{ .Release.Namespace }}
        resource: buttons
        verb: GET
