kind: Card
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: stat-card-reconciles
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    variant: outlined
    # Petrol density (D5/O1): compact stat cards to align to the dense one-screen mockup.
    # antd `size: small` trims the card's header + body padding; combined with the frontend
    # .statCard vertical-padding trim it brings the card toward the mockup's ~70px stat tile.
    # (A hard ~70px height is NOT expressible in the Card CR — it needs a frontend CSS cap.)
    size: small
    icon:
      name: fa-clock
      color: orange
    # Whole-card CTA: this card's Statistic (stat-reconciles) is titled "Pending", so clicking
    # it jumps to the compositions list already filtered to the pending ones (?status=pending
    # read by compositions-list from extras) — same pattern as stat-card-failed.
    clickActionId: view-pending
    widgetActions:
      navigate:
        - id: view-pending
          type: navigate
          path: /compositions?status=pending
    items:
    - resourceRefId: stat-reconciles
    - resourceRefId: delta-reconciles
  resourcesRefs:
    items:
    - id: stat-reconciles
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: stat-reconciles
      namespace: {{ .Release.Namespace }}
      resource: statistics
      verb: GET
    - id: delta-reconciles
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: delta-reconciles
      namespace: {{ .Release.Namespace }}
      resource: flexes
      verb: GET
