kind: Card
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: stat-card-reconciles
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    title: Reconciles / h
    variant: outlined
    icon:
      name: fa-bolt
      color: orange
    items:
    - resourceRefId: stat-reconciles
    - resourceRefId: delta-reconciles
  resourcesRefs:
    items:
    - id: stat-reconciles
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: stat-reconciles
      namespace: {{ .Release.Namespace }}
      resource: statistics
      verb: GET
    - id: delta-reconciles
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: delta-reconciles
      namespace: {{ .Release.Namespace }}
      resource: flexes
      verb: GET
