kind: Statistic
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: stat-compositions
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    title: Compositions
    value: 0
  widgetDataTemplate:
  - forPath: value
    expression: ${ .list | length }
  apiRef:
    name: compositions-list
    namespace: {{ .Release.Namespace }}
  resourcesRefs:
    items: []
