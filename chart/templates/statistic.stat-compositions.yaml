kind: Statistic
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: stat-compositions
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [projects, q, status]
  widgetData:
    title: Compositions
    value: 0
    # live-refresh: watch the composition kinds in the data (computed, not hardcoded)
    watch: []
  widgetDataTemplate:
  - forPath: watch
    expression: '${ [ .list[] | { apiVersion: .av, kind: .kind } ] | unique }'
  - forPath: value
    expression: ${ .list | length }
  apiRef:
    name: compositions-list
    namespace: {{ .Release.Namespace }}
  resourcesRefs:
    items: []
