# Portal builder header eyebrow — same "Builders · tenant" strip as the blueprint/KOG
# builders, so the three builder homes read as one family.
kind: Paragraph
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: portal-builder-eyebrow
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    text: 'Builders · tenant {{ .Values.tenant | default "krateo-enterprise" }}'
    variant: eyebrow
  resourcesRefs:
    items: []
