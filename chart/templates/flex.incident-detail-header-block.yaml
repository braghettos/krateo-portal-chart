# Incident detail pagehead — back-link, H1 title (UX-17: the short alert name, incident-first),
# chips line (lifecycle / trigger / affected-resource ref / triggering-alert link) and the meta
# strip (started · updated · phase as an antd Descriptions — UX-19). Mirrors
# composition-detail-header-block.
kind: Flex
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: incident-detail-header-block
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [name, namespace]
  widgetData:
    allowedResources:
    - buttons
    - paragraphs
    - flexes
    - cards
    vertical: true
    gap: small
    items:
    # UX-27 (#69 §0.2): the "Back to incidents" link was removed — the breadcrumb's clickable
    # "Incidents" segment is the single way back (no duplicate navigation control).
    # #69 §0.4: the title now shares its line with the Lifecycle + Trigger tags (incident-detail-
    # titleline); the chips row below keeps only the affected-resource ref + the clickable Alert link.
    - resourceRefId: incident-detail-titleline
    - resourceRefId: incident-detail-chips
    # UX-19: the meta is now a Descriptions list hosted in a borderless Card (the Descriptions
    # plural isn't in the Flex child enum; Card children are unconstrained — incident-meta-card).
    - resourceRefId: incident-meta-card
  resourcesRefs:
    items:
    - id: incident-detail-titleline
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: incident-detail-titleline
      namespace: {{ .Release.Namespace }}
      resource: flexes
      verb: GET
    - id: incident-detail-chips
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: incident-detail-chips
      namespace: {{ .Release.Namespace }}
      resource: flexes
      verb: GET
    - id: incident-meta-card
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: incident-meta-card
      namespace: {{ .Release.Namespace }}
      resource: cards
      verb: GET
