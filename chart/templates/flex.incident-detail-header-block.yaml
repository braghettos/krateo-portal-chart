# Incident detail pagehead — back-link, H2 title (root-cause one-liner), chips line
# (lifecycle / trigger / mono ref) and the meta line (started · updated · phase ·
# confidence). Mirrors composition-detail-header-block.
kind: Flex
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: incident-detail-header-block
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    allowedResources:
    - buttons
    - paragraphs
    - flexes
    vertical: true
    gap: small
    items:
    - resourceRefId: incident-detail-back
    - resourceRefId: incident-detail-title
    - resourceRefId: incident-detail-chips
    - resourceRefId: incident-meta
  resourcesRefs:
    items:
    - id: incident-detail-back
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: incident-detail-back
      namespace: {{ .Release.Namespace }}
      resource: buttons
      verb: GET
    - id: incident-detail-title
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: incident-detail-title
      namespace: {{ .Release.Namespace }}
      resource: paragraphs
      verb: GET
    - id: incident-detail-chips
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: incident-detail-chips
      namespace: {{ .Release.Namespace }}
      resource: flexes
      verb: GET
    - id: incident-meta
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: incident-meta
      namespace: {{ .Release.Namespace }}
      resource: paragraphs
      verb: GET
