# Cluster identity — the KubernetesTarget's real kubeconfig secret ref, kubernetes
# version, last probe time and targeting-blueprint count as label/value rows
# (mirrors the component-detail overview Descriptions). Every value comes straight
# off the cluster-detail RA; absent facts render "—", never invented.
kind: Descriptions
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: descriptions-cluster-detail-overview
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [name]
  apiRef:
    name: cluster-detail
    namespace: {{ .Release.Namespace }}
  widgetData:
    column: 1
    variant: form
    bordered: false
    size: small
    items: []
  widgetDataTemplate:
    - forPath: items
      expression: '${ [ { label: "Kubeconfig secret", value: ((.secretRef // "") as $s | (.secretNamespace // "") as $sn | if $s == "" then "—" elif $sn != "" then ($sn + "/" + $s) else $s end) }, { label: "K8s version", value: (if (.version // "") != "" then .version else "—" end) }, { label: "Last probe", value: (if (.lastProbe // "") != "" then .lastProbe else "—" end) }, { label: "Targeting blueprints", value: ((.blueprintCount // 0) | tostring) } ] }'
  resourcesRefs:
    items: []
