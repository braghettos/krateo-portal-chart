# MISSING CONTEXT / ASSUMPTIONS — the amber first-class-uncertainty callout (mockup
# .callout): what the agent could NOT see, and what it assumed because of it. antd Alert
# type=warning; the text is joined server-side (incident-detail .gapsText). EXCEPTION-ONLY:
# the page Flex includes this section only when missingContext/assumptions are non-empty —
# an investigation with no declared gaps renders no callout at all.
# (Hosted inside the incident-gaps-card, whose unified header — "What the agent couldn't
# verify" — now NAMES the section, so this Alert no longer repeats that heading: its title
# is the gap text itself and it keeps only the amber warning styling as the callout body.
# The Alert widget's plural isn't in the Flex allowedResources enum yet, and Card children
# are unconstrained.)
kind: Alert
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: incident-gaps
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [name, namespace]
  apiRef:
    name: incident-detail
    namespace: {{ .Release.Namespace }}
  widgetData:
    # No redundant heading (the card header names the section): the amber Alert carries the joined
    # gaps text as its body. Falls back to a plain line if gapsText somehow resolves empty.
    title: ' '
    type: warning
    showIcon: true
    description: ''
  widgetDataTemplate:
  - forPath: description
    expression: '${ .gapsText // "" }'
  resourcesRefs:
    items: []
