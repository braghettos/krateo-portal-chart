# Blueprints page header — strong H1 + secondary subtitle stack (mirrors the
# compositions/dashboard header pattern so /blueprints is coherent with them).
# No right-side CTA: on this page the blueprint itself is the entry point (selecting
# a row starts "Configure"), so a generic button would be redundant.
kind: Flex
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: blueprints-header
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    allowedResources:
    - paragraphs
    vertical: true
    items:
    - resourceRefId: blueprints-title
    - resourceRefId: blueprints-subtitle
  resourcesRefs:
    items:
    - id: blueprints-title
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: blueprints-title
      namespace: {{ .Release.Namespace }}
      resource: paragraphs
      verb: GET
    - id: blueprints-subtitle
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: blueprints-subtitle
      namespace: {{ .Release.Namespace }}
      resource: paragraphs
      verb: GET
