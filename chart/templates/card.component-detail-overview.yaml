# "Overview" card → the Deployment's replica/strategy/image facts as a
# Descriptions list (label/value rows), shaped by the component-detail RA.
kind: Card
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: card-component-detail-overview
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [name]
  widgetData:
    title: Overview
    titleVariant: eyebrow
    variant: outlined
    items:
      - resourceRefId: descriptions-component-detail-overview
  resourcesRefs:
    items:
      - id: descriptions-component-detail-overview
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: descriptions-component-detail-overview
        namespace: {{ .Release.Namespace }}
        resource: descriptions
        verb: GET
