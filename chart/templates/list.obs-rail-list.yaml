# Reconciliation rail — per-composition desired-vs-actual bars. Real data: fed by
# compositions-list, each row a Progress line whose percent (.healthPercent) + colour
# (.railState) are server-derived from Ready×Synced. Non-healthy sort first. Row click →
# that composition's detail page. Identical itemTemplate/jq to the dashboard rail-list.
kind: Listy
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: obs-rail-list
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [projects, q, status]
  apiRef:
    name: compositions-list
    namespace: {{ .Release.Namespace }}
  widgetData:
    dataSource: []
    itemLayout: horizontal
    split: false
    itemTemplate:
      primaryText: '{name}'
      subPrimaryText: '{ns}'
      navigateTo: '/compositions/{ns}/{name}'
      bar:
        percent: '{healthPercent}'
        color:
          value: '{railState}'
          map:
            healthy: green
            drift: violet
            pending: orange
            failed: red
        label: '{healthPercent}%'
        variant: rail
  widgetDataTemplate:
    - forPath: dataSource
      expression: '${ (.list // []) | sort_by(if .railState == "healthy" then 1 else 0 end) | .[0:12] }'
  resourcesRefs:
    items: []
