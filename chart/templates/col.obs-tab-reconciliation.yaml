# Observability → Reconciliation tab content (R2 #9). A Col wrapper — the Tabs allowedResources
# enum has `cols`/`rows`/`paragraphs` but not `flexes` — stacking the section header (strong
# label + secondary caption) and the two composition-snapshot rows: the KPI strip (total/
# healthy/failed/pending) and the by-kind / by-namespace distribution. All off compositions-list
# — live cluster health, no telemetry pipeline dependency (so this tab is always populated).
kind: Col
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: obs-tab-reconciliation
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    allowedResources:
    - paragraphs
    - rows
    items:
    - resourceRefId: obs-sec-reconciliation-label
    - resourceRefId: obs-sec-reconciliation-desc
    - resourceRefId: obs-stats-row
    - resourceRefId: obs-distribution-row
  resourcesRefs:
    items:
    - id: obs-sec-reconciliation-label
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-sec-reconciliation-label
      namespace: {{ .Release.Namespace }}
      resource: paragraphs
      verb: GET
    - id: obs-sec-reconciliation-desc
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-sec-reconciliation-desc
      namespace: {{ .Release.Namespace }}
      resource: paragraphs
      verb: GET
    - id: obs-stats-row
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-stats-row
      namespace: {{ .Release.Namespace }}
      resource: rows
      verb: GET
    - id: obs-distribution-row
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-distribution-row
      namespace: {{ .Release.Namespace }}
      resource: rows
      verb: GET
