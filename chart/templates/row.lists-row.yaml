kind: Row
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: lists-row
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    allowedResources:
    - cards
    alignment: top
    items:
    - resourceRefId: activity-card
      size: 12
    - resourceRefId: blueprints-card
      size: 12
  resourcesRefs:
    items:
    - id: activity-card
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: activity-card
      namespace: {{ .Release.Namespace }}
      resource: cards
      verb: GET
    - id: blueprints-card
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: blueprints-card
      namespace: {{ .Release.Namespace }}
      resource: cards
      verb: GET
