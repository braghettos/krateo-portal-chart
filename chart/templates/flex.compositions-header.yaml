# Compositions head row — title+subtitle stack on the left, the primary
# "Create composition" CTA right-aligned (mockup layout). Uses the SAME Row/Col grid as the
# dashboard header-row (title col size 16 + actions col size 8, button `alignment: right`)
# so the CTA pins to the far edge reliably — a bare Flex `justify: space-between` only
# right-aligns when the header stretches full-width, which was inconsistent here.
kind: Row
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: compositions-header
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [namespace]
  widgetData:
    allowedResources:
    - flexes
    - buttons
    alignment: middle
    items:
    - resourceRefId: compositions-title-stack
      size: 16
    - resourceRefId: new-composition
      size: 8
      alignment: right
  resourcesRefs:
    items:
    - id: compositions-title-stack
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: compositions-title-stack
      namespace: {{ .Release.Namespace }}
      resource: flexes
      verb: GET
    - id: new-composition
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: new-composition
      namespace: {{ .Release.Namespace }}
      resource: buttons
      verb: GET
