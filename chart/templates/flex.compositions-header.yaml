# Compositions head row — title+subtitle stack on the left, the primary
# "Create composition" CTA pinned to the far-right edge (mockup layout).
#
# #4: the previous Row/Col grid (title Col size16 + button Col size8 alignment:right)
# still rendered the CTA ~2/3 across live, not flush at the edge — the size-8 Col's
# right-justify never reliably pinned the compact button to the header's true right edge.
# Switched to the SAME pattern the composition-detail pagehead uses and which DOES pin
# right: a full-width Flex `justify: space-between` with exactly two children
# [title-stack, button]. antd Flex is display:flex so it spans the page width; the
# title-stack anchors left, the button anchors hard right.
kind: Flex
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: compositions-header
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [namespace]
  widgetData:
    allowedResources:
    - flexes
    - buttons
    vertical: false
    justify: space-between
    align: flex-start
    gap: middle
    items:
    - resourceRefId: compositions-title-stack
    - resourceRefId: new-composition
  resourcesRefs:
    items:
    - id: compositions-title-stack
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: compositions-title-stack
      namespace: {{ .Release.Namespace }}
      resource: flexes
      verb: GET
    - id: new-composition
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: new-composition
      namespace: {{ .Release.Namespace }}
      resource: buttons
      verb: GET
