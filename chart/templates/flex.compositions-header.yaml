# Compositions head row — title+subtitle stack on the left, the primary
# "New composition" CTA on the right (mockup layout). justify space-between pushes
# the button to the far edge.
kind: Flex
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: compositions-header
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [namespace]
  widgetData:
    allowedResources:
    - flexes
    - buttons
    justify: space-between
    align: center
    items:
    - resourceRefId: compositions-title-stack
    - resourceRefId: new-composition
  resourcesRefs:
    items:
    - id: compositions-title-stack
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: compositions-title-stack
      namespace: {{ .Release.Namespace }}
      resource: flexes
      verb: GET
    - id: new-composition
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: new-composition
      namespace: {{ .Release.Namespace }}
      resource: buttons
      verb: GET
