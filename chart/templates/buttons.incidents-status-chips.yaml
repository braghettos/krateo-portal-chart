# Incidents lifecycle filter chips (All / Open / Mitigated / Resolved). Lifecycle is URL
# state (?status=…): each chip NAVIGATES to /incidents?status=<k>, which the frontend
# forwards into the request `extras` — incidents-list filters `.rows` server-side and
# echoes `.status` + `.counts` (computed over the FULL set, before the filter) so every
# chip shows its live count and its selected state. Mirrors compositions-status-chips.
{{- /* `c` = the leading lifecycle-dot palette colour (open crimson / mitigated amber /
       resolved cyan-as-green preset); "all" has no dot. */}}
{{- $opts := list (dict "k" "all" "l" "All" "c" "") (dict "k" "open" "l" "Open" "c" "red") (dict "k" "mitigated" "l" "Mitigated" "c" "orange") (dict "k" "resolved" "l" "Resolved" "c" "green") }}
{{- range $opts }}
---
apiVersion: widgets.templates.krateo.io/v1beta1
kind: Button
metadata:
  name: incidents-status-btn-{{ .k }}
  namespace: {{ $.Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [status]
  widgetData:
    label: {{ .l | quote }}
    size: small
    type: default
    variant: outlined
    {{- if .c }}
    icon: fa-circle
    iconColor: {{ .c }}
    {{- end }}
    clickActionId: set-status-{{ .k }}
    actions:
      navigate:
        - id: set-status-{{ .k }}
          type: navigate
          path: /incidents?status={{ .k }}
  widgetDataTemplate:
    - forPath: label
      expression: '${ "{{ .l }} (" + (((.counts.{{ .k }}) // 0) | tostring) + ")" }'
    - forPath: type
      expression: '${ if (.status // "all") == {{ .k | quote }} then "primary" else "default" end }'
    - forPath: variant
      expression: '${ if (.status // "all") == {{ .k | quote }} then "filled" else "outlined" end }'
  apiRef:
    name: incidents-list
    namespace: {{ $.Release.Namespace }}
  resourcesRefs:
    items: []
{{- end }}
