# Reasoning timeline (mockup .trace) — antd Steps, vertical: one step per reasoningTrace
# entry, each citing its evidence by number ("→ evidence #n", 1-based display of the
# 0-based evidenceRefs). Items shaped fully server-side (incident-detail .traceItems);
# the FINAL step turns crimson (status error) when a root cause was declared — the
# verdict marker. v1 reports have no trace → the page Flex omits this section entirely.
kind: Steps
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: incident-trace
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [name, namespace]
  apiRef:
    name: incident-detail
    namespace: {{ .Release.Namespace }}
  widgetData:
    orientation: vertical
    size: small
    items: []
  widgetDataTemplate:
  - forPath: items
    expression: '${ .traceItems // [] }'
  - forPath: current
    expression: '${ .traceCurrent // 0 }'
  resourcesRefs:
    items: []
