# Namespace scope selector for the Access persona page (W3-2). URL-state bound
# (queryParam: ns → ?ns= → extras, the dashboard-range house pattern): picking a
# namespace re-scopes the capability preview's SubjectAccessReviews, the grant
# form's prefill and the revoke row — synchronously, no persisted state. Options
# come from the existing `projects` RA (UAF-gated namespaces — DYNAMIC, which is
# why this is a Select and not a static Buttons chip row; nothing hardcoded).
# Empty selection = the release namespace (the RAs' server-side default), said
# by the placeholder.
kind: Select
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: access-ns-select
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    name: ns
    queryParam: ns
    label: 'Namespace · grant scope'
    placeholder: {{ .Release.Namespace }} (default)
    size: small
    allowClear: true
    options: []
  widgetDataTemplate:
    - forPath: options
      expression: '${ .options }'
  apiRef:
    name: projects
    namespace: {{ .Release.Namespace }}
  resourcesRefs:
    items: []
