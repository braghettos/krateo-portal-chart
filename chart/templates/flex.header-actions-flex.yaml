kind: Flex
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: header-actions-flex
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    allowedResources:
    - buttons
    - listies
    justify: flex-end
    align: center
    gap: small
    items:
    # The four range-btn-* Buttons collapsed into ONE data-driven Listy(chip)
    # (widget-sprawl collapse) — same targets, default and active logic.
    - resourceRefId: dashboard-range-chips
    - resourceRefId: new-composition
  resourcesRefs:
    items:
    - id: dashboard-range-chips
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: dashboard-range-chips
      namespace: {{ .Release.Namespace }}
      resource: listies
      verb: GET
    - id: new-composition
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: new-composition
      namespace: {{ .Release.Namespace }}
      resource: buttons
      verb: GET
