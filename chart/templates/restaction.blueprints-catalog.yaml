# Marketplace catalog — the INSTALLABLE items, merged from TWO braghettos helm-repo
# indexes: /charts/blueprints/index.yaml (~311 CompositionDefinition blueprints) AND
# /charts/operators/index.yaml (~18 Kubernetes operators). Every entry is stamped with
# `source: blueprint|operator` so the grid can tell them apart (badge + tinted icon) and
# a type toggle can filter them. Honest fields straight off each index: name/description/
# version/url. Categories are NOT a curated annotation any more — each card's `tags` are
# its raw helm `keywords` (multi-tag: a card lives under EVERY one of its keywords), and
# the `categories` array (distinct keyword + count, the popular ones) drives the chips
# data-driven. `?category=<kw>` keeps a card if <kw> is in its keywords; `?source=<src>`
# filters by type; `?q=` matches name/description/keywords.
#
# REQUIRES snowplow >= 1.4.0: the external `endpointRef` GET returns text/yaml, which
# snowplow converts YAML->JSON (external_fetch.go) before the jq filter runs.
#
# A compdefs api-step LISTs installed CompositionDefinitions and the filter LEFT-JOINs them onto
# the catalog by the helm-repo identity "<repoBaseUrl>|<chartName>" (a helm-repo CD carries
# spec.chart.repo = chart NAME + spec.chart.url = repo BASE URL). Only helm-repo CDs (non-empty
# .repo) can match; OCI/platform-component CDs are excluded, so a same-named OCI component never
# false-lights a tile → `installed` + `installedVersion` + `installedNs`/`installedName` (detail
# link). `continueOnError` everywhere: a missing index or a UAF-denied compdef list degrades to an
# empty/partial catalog, not a broken page.
apiVersion: templates.krateo.io/v1
kind: RESTAction
metadata:
  name: blueprints-catalog
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  api:
    - name: catalog
      endpointRef:
        name: blueprints-endpoint
        namespace: {{ .Release.Namespace }}
      path: /charts/blueprints/index.yaml
      verb: GET
      headers:
        - 'Accept: application/x-yaml, text/yaml, application/json'
      continueOnError: true
      errorKey: catalogError
    - name: operators
      endpointRef:
        name: blueprints-endpoint
        namespace: {{ .Release.Namespace }}
      path: /charts/operators/index.yaml
      verb: GET
      headers:
        - 'Accept: application/x-yaml, text/yaml, application/json'
      continueOnError: true
      errorKey: operatorsError
    - name: compdefs
      path: /apis/core.krateo.io/v1alpha1/compositiondefinitions
      verb: GET
      continueOnError: true
      errorKey: compdefsError
      userAccessFilter:
        verb: list
        group: core.krateo.io
        resource: compositiondefinitions
        namespaceFrom: .metadata.namespace
      # Project each installed CD down to just what the join needs. For a HELM-REPO install the
      # core-provider ChartInfo carries `spec.chart.repo` = the chart NAME and `spec.chart.url` =
      # the helm-repo BASE URL; OCI/tgz installs leave `repo` empty (url = full oci/tgz path). The
      # marketplace catalog only lists helm-repo blueprints, so the honest installed-match is against
      # helm-repo CDs (non-empty .repo). `ns`+`name` ride along for the installed-detail link.
      filter: '[.compdefs.items[]? | {name: .metadata.name, ns: .metadata.namespace, version: (.spec.chart.version // ""), repo: (.spec.chart.repo // ""), url: (.spec.chart.url // "")}]'
  # Literal block (|) NOT folded (>): the jq carries inline `#` comments, and a folded
  # scalar would join a comment line onto the following code line (commenting the code out).
  filter: |
    def qstr($p): ([ $p | to_entries[] | select(.value != null and .value != "") | (.key + "=" + .value) ] | join("&")) as $s
      | (if $s == "" then "/marketplace" else "/marketplace?" + $s end);
    # Presentational icon variety (honest — driven by the card's REAL helm data, not invented).
    # At ~330 charts the two source glyphs (fa-layer-group / fa-gears) make the grid a wall of
    # identical icons; this maps a card to a Font Awesome glyph off its own keywords first
    # (the service-family signal — ec2/rds/s3/kafka/...), then its `krateo.io/category`
    # annotation (compute/network/database/...), then falls back to the source glyph. Every
    # value here is a plain glyph name; a card with no matching keyword/category just gets the
    # source fallback (never an error, never a blank).
    #   $kwIcon: keyword (lower-case, matched by substring) -> glyph. Ordered most→least
    #   specific; FIRST hit wins. Keys are real tokens seen in the braghettos index keywords.
    def kwIcon:
      [ ["database","fa-database"], ["rds","fa-database"], ["dynamodb","fa-database"],
        ["documentdb","fa-database"], ["memorydb","fa-database"], ["docdb","fa-database"],
        ["elasticache","fa-bolt"], ["cache","fa-bolt"], ["redis","fa-bolt"],
        ["s3","fa-hard-drive"], ["storage","fa-hard-drive"], ["efs","fa-hard-drive"],
        ["backup","fa-box-archive"], ["ecr","fa-box-archive"], ["registry","fa-box-archive"],
        ["kafka","fa-list"], ["queue","fa-list"], ["sqs","fa-list"], ["sns","fa-bell"],
        ["eventbridge","fa-bell"], ["network","fa-network-wired"], ["vpc","fa-network-wired"],
        ["route53","fa-network-wired"], ["elbv2","fa-network-wired"], ["elb","fa-network-wired"],
        ["alb","fa-network-wired"], ["loadbalancer","fa-network-wired"], ["cloudfront","fa-network-wired"],
        ["apigateway","fa-route"], ["gateway","fa-route"], ["firewall","fa-shield-halved"],
        ["waf","fa-shield-halved"], ["security","fa-shield-halved"], ["iam","fa-key"],
        ["kms","fa-key"], ["identity","fa-key"], ["certificate","fa-certificate"],
        ["acm","fa-certificate"], ["vault","fa-shield-halved"], ["eks","fa-dharmachakra"],
        ["ecs","fa-cubes"], ["cluster","fa-dharmachakra"], ["kubernetes","fa-dharmachakra"],
        ["lambda","fa-bolt"], ["ec2","fa-server"], ["compute","fa-server"], ["ssm","fa-terminal"],
        ["sagemaker","fa-brain"], ["bedrock","fa-brain"], ["ai-agent","fa-robot"],
        ["kagent","fa-robot"], ["quicksight","fa-chart-line"], ["dashboard","fa-gauge-high"],
        ["cloudwatch","fa-chart-line"], ["prometheus","fa-chart-line"], ["observability","fa-chart-line"],
        ["opentelemetry","fa-chart-line"], ["codegen","fa-code"], ["oasgen","fa-code"],
        ["kog","fa-code"], ["helm","fa-ship"], ["domain","fa-globe"] ];
    #   $catIcon: krateo.io/category annotation -> glyph (the coarse fallback when no keyword hit).
    def catIcon:
      { "compute":"fa-server", "network":"fa-network-wired", "database":"fa-database",
        "storage":"fa-hard-drive", "security":"fa-shield-halved", "observability":"fa-chart-line",
        "application":"fa-cubes", "generator":"fa-code" };
    # iconFor: first keyword substring hit -> its glyph; else the category glyph; else the
    # source fallback ($fallback). $kws lower-cased upstream.
    def iconFor($kws; $cat; $fallback):
      ( first( kwIcon[] | select( . as $pair | any($kws[]; contains($pair[0])) ) | .[1] ) )
      // (catIcon[$cat]) // $fallback;
    # Title-case a lower-case category token for the on-card pill (compute -> Compute).
    def titlecase: if . == "" then "" else (.[0:1] | ascii_upcase) + .[1:] end;
    # INSTALLED index — the honest catalog<->cluster join. Keyed by "<repoBaseUrl>|<chartName>"
    # and built ONLY from helm-repo CDs (non-empty spec.chart.repo). A helm-repo CD carries
    # spec.chart.repo = the chart NAME and spec.chart.url = the helm-repo BASE URL, so the key
    # matches a catalog entry's own (repoBase | name). OCI/platform-component CDs have EMPTY .repo
    # and are excluded entirely, so a same-named platform component (e.g. an OCI `kagent`) can NEVER
    # false-light a catalog tile. On a cluster with only OCI components NOTHING matches → installed
    # is false everywhere → the tile badge stays hidden (correct + honest; never fabricated).
    ( [ (.compdefs // [])[] | select((.repo // "") != "")
        | { key: ((.url // "") + "|" + (.repo // "")),
            value: {ns: .ns, name: .name, version: .version} } ]
      | from_entries ) as $instByRepo
    | ((.category) // "all") as $sel
    | ((.source) // "all") as $src
    | ((.q) // "") as $q
    | ((.spotlight) // "") as $spot
    # ?sort= reorders the grid. Only two orders the helm index actually supports:
    #   "name"   -> chart name A->Z (the default; every entry has a name)
    #   "recent" -> most-recently-published first (index `created` RFC3339, desc)
    # The index carries NO downloads/popularity/rating field, so no "trending"/"popular"
    # sort is offered (would be fabricated). Unknown ?sort= values fall back to name.
    | (((.sort) // "name") | if . == "recent" then "recent" else "name" end) as $sort
    | ($q | ascii_downcase) as $ql
    | (
        [ (((.catalog // {}).entries) // {}) | to_entries[] | (.value[0] + {source: "blueprint"}) ]
        + [ (((.operators // {}).entries) // {}) | to_entries[] | (.value[0] + {source: "operator"}) ]
      ) as $raw
    | ( [ $raw[]
          # helm-repo base URL for THIS card (its own tarball URL with the filename stripped) and
          # the installed-join key "<repoBase>|<chartName>". Looked up in $instByRepo (helm-repo CDs
          # only); a hit means a CompositionDefinition installed FROM this exact repo+chart exists.
          | ((.urls[0] // "") | sub("/[^/]+$"; "")) as $repoBase
          | ($instByRepo[$repoBase + "|" + .name]) as $match
          | {
              name: .name,
              description: (.description // ""),
              keywords: (.keywords // []),
              tags: (.keywords // []),
              source: .source,
              typeLabel: (if .source == "operator" then "Operator" else "Blueprint" end),
              typeColor: (if .source == "operator" then "magenta" else "cyan" end),
              # CATEGORY pill (the mockup's per-tile defining signal) — the REAL
              # `krateo.io/category` annotation (compute/network/database/...), title-cased for
              # display. Empty when the chart carries no category (e.g. operators) -> the card
              # renders no pill (never invented). Type stays on the icon tint (typeColor).
              category: (((.annotations // {})["krateo.io/category"] // "") | ascii_downcase | titlecase),
              # Per-card icon: keyword service-family -> category annotation -> source glyph.
              # Presentational, driven entirely by the card's own real helm data.
              icon: iconFor(
                      ((.keywords // []) | map(ascii_downcase));
                      ((.annotations // {})["krateo.io/category"] // "" | ascii_downcase);
                      (if .source == "operator" then "fa-gears" else "fa-layer-group" end)
                    ),
              maturity: ((.annotations // {})["krateo.io/maturity"] // ""),
              version: (.version // ""),
              # helm index publish timestamp (RFC3339); drives the "recently updated" sort.
              created: (.created // ""),
              url: (.urls[0] // ""),
              repoUrl: $repoBase,
              # INSTALLED-ness — the honest catalog<->cluster join ($match, keyed by repoBase|name;
              # helm-repo CDs only). true only when a CD was installed from THIS repo+chart.
              installed: ($match != null),
              installedVersion: ($match.version // ""),
              # namespace + name of the matched CompositionDefinition (for the installed-detail
              # link); empty strings when not installed.
              installedNs: ($match.ns // ""),
              installedName: ($match.name // ""),
              # at-a-glance "already installed" glyph on the tile (reuses the Listy status channel);
              # empty icon when not installed -> the card renders no glyph (exception-only badge).
              installedIcon: (if $match != null then "fa-circle-check" else "" end),
              installedColor: (if $match != null then "green" else "" end),
              installedTooltip: (if $match != null then ("Installed · v" + ($match.version // "")) else "" end)
            }
        ] ) as $cards
    # The cards matching the ACTIVE facets (source + category + free-text) — computed once so
    # BOTH the head-stat count and the rendered grid stay in sync (the head-stat reflects what
    # is actually shown, never a fabricated total).
    | ( [ $cards[] | select(
            ($src == "all" or .source == $src)
            and ($sel == "all" or ((.keywords | index($sel)) != null))
            and ($ql == ""
                 or (.name | ascii_downcase | contains($ql))
                 or (.description | ascii_downcase | contains($ql))
                 or ((.keywords | join(" ")) | ascii_downcase | contains($ql)))
        ) ] ) as $shown
    # Head-stat noun: reflects the active source facet so the eyebrow reads honestly
    # ("blueprints" / "operators" / "charts" when the catalog is mixed).
    | (if $src == "blueprint" then "blueprints"
       elif $src == "operator" then "operators"
       else "charts" end) as $countLabel
    | {
        selectedCategory: $sel,
        selectedSource: $src,
        selectedSort: $sort,
        # Head-stat: real catalog cardinality. `total` = every card fetched from both indexes
        # (unfiltered); `count` = the cards the active facets show (what the grid renders).
        total: ($cards | length),
        count: ($shown | length),
        countLabel: $countLabel,
        categories: (
          [ {key: "all", label: "All", count: ($cards | length), active: ($sel == "all"),
             route: qstr({category: "", source: (if $src == "all" then "" else $src end), q: $q, sort: (if $sort == "name" then "" else $sort end)})} ]
          + ( [ $cards[] | .keywords[] ] | group_by(.)
              | map({key: .[0], label: .[0], count: length, active: (.[0] == $sel),
                     route: qstr({category: .[0], source: (if $src == "all" then "" else $src end), q: $q, sort: (if $sort == "name" then "" else $sort end)})})
              | map(select(.count >= 5)) | sort_by(.count) | reverse )
        ),
        sources: [
          {key: "all", label: "All", active: ($src == "all"),
           route: qstr({source: "", category: (if $sel == "all" then "" else $sel end), q: $q, sort: (if $sort == "name" then "" else $sort end)})},
          {key: "blueprint", label: "Blueprints", active: ($src == "blueprint"),
           route: qstr({source: "blueprint", category: (if $sel == "all" then "" else $sel end), q: $q, sort: (if $sort == "name" then "" else $sort end)})},
          {key: "operator", label: "Operators", active: ($src == "operator"),
           route: qstr({source: "operator", category: (if $sel == "all" then "" else $sel end), q: $q, sort: (if $sort == "name" then "" else $sort end)})}
        ],
        # Sort facet — ONLY the orders the helm index data supports (name, created). Each
        # chip's route preserves the active source/category/q filter so sort composes.
        sorts: [
          {key: "name", label: "Name (A–Z)", active: ($sort == "name"),
           route: qstr({sort: "", source: (if $src == "all" then "" else $src end), category: (if $sel == "all" then "" else $sel end), q: $q})},
          {key: "recent", label: "Recently updated", active: ($sort == "recent"),
           route: qstr({sort: "recent", source: (if $src == "all" then "" else $src end), category: (if $sel == "all" then "" else $sel end), q: $q})}
        ],
        cards: (
          # Base order per ?sort=: name A->Z (default) or created desc (most recent first).
          ( if $sort == "recent" then ($shown | sort_by(.created) | reverse)
            else ($shown | sort_by(.name)) end )
          # ?spotlight=<name> (a global-search catalog hit's hand-off): sort the matching
          # card FIRST and mark it via the EXISTING status-glyph channel (gold star +
          # tooltip) — search always lands on installable-only hits, so the installed
          # check (which this channel normally carries) is guarded, never overwritten.
          | (if $spot == "" then .
             else ( map(if (.name == $spot) and (.installed | not)
                        then . + { installedIcon: "fa-star", installedColor: "gold", installedTooltip: "Matched your search" }
                        else . end)
                    | ([ .[] | select(.name == $spot) ] + [ .[] | select(.name != $spot) ]) )
             end)
        )
      }
