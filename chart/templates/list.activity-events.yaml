# Dashboard "Recent activity" feed — recent events as an antd List (the bespoke
# non-antd EventList is retired). Fed by the `events` RA (all recent activity,
# deduped/sorted, NOT composition-filtered). Each row = a status dot (by type) +
# message + involvedObject ref + reason · relative-time. Live append was an
# EventList/SSE concern; live events surface globally via the SSE bell.
kind: Listy
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: list-activity-events
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  apiRef:
    name: events
    namespace: {{ .Release.Namespace }}
  widgetData:
    dataSource: []
    itemLayout: horizontal
    split: false
    itemTemplate:
      # Whole-row click → the tagged composition's detail page. `route` is resolved
      # SERVER-SIDE in the events RA (compositionId label → {ns,name}); events with no
      # resolvable composition tag carry route:"" and stay inert.
      navigateTo: '{route}'
      iconVariant: dot
      color:
        value: '{type}'
        map:
          Normal: green
          Warning: red
      primaryText: '{message}'
      subPrimaryText: '{ref}'
      # involvedObject ref as a mono bordered pill; reason as a soft-tint Tag pill
      # (coloured by the row's type→color) — the mockup `.event` row chrome.
      subPrimaryTextMono: true
      secondaryText: '{reason}'
      secondaryTextAsTag: true
      subSecondaryText: '{ts}'
      formats:
        subSecondaryText: relative
  widgetDataTemplate:
    - forPath: dataSource
      expression: '${ (.list // []) | .[0:8] | map({ message: (.message // ""), reason: (.reason // ""), type: (if (.type // "") == "Warning" then "Warning" else "Normal" end), ref: ((.involvedObject.kind // "") + "/" + (.involvedObject.name // "")), ts: (.lastTimestamp // .firstTimestamp // .eventTime // ""), route: (.route // "") }) }'
  resourcesRefs:
    items: []
