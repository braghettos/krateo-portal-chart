# Live reconcile throughput — the composition-dynamic-controller's `reconcile` trace spans,
# bucketed 10-min, straight from ClickHouse (otel_traces) via restaction.obs-reconcile-metrics.
# Data is ALREADY bucketed server-side (ClickHouse), so this chart just maps series -> {t,v};
# `t` is UNIX epoch seconds (the widget localizes the axis label to the browser TZ).
kind: LineChart
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: obs-reconcile-throughput
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [range]
  widgetData:
    xField: t
    yField: v
    colorField: series
    colorMap:
      reconciles: cyan
    shapeField: smooth
    area: true
    legend: false
    height: 160
    xTimeUnit: hour
    point: true
    scale:
      "y":
        zero: true
        nice: true
        domainMin: 0
        tickCount: 4
    axis:
      x:
        tickCount: 6
      "y":
        tickCount: 4
    data: []
  widgetDataTemplate:
  - forPath: data
    expression: '${ [ (.series // [])[] | { t: (.ts|tonumber), series: "reconciles", v: (.reconciles|tonumber) } ] }'
  apiRef:
    name: obs-reconcile-metrics
    namespace: {{ .Release.Namespace }}
  resourcesRefs:
    items: []
