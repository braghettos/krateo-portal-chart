# Installed blueprints — count of the cluster's CompositionDefinitions (.cards from
# blueprints-cards, the same RA the Blueprints page + dashboard "Recent blueprints" use).
kind: Statistic
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: obs-stat-blueprints
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    title: Installed blueprints
    value: 0
  widgetDataTemplate:
  - forPath: value
    expression: '${ (.cards // []) | length }'
  apiRef:
    name: blueprints-cards
    namespace: {{ .Release.Namespace }}
  resourcesRefs:
    items: []
