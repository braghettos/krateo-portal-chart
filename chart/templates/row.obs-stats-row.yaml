# Observability KPI strip — total / healthy / failed / pending, all off compositions-list.
# Same four signals as the dashboard stats, authored as independent CRs so the two pages
# don't share click-targets. cards enum already used by the dashboard stats-row.
kind: Row
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: obs-stats-row
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    allowedResources:
    - cards
    items:
    - resourceRefId: obs-stat-card-total
      size: 6
    - resourceRefId: obs-stat-card-healthy
      size: 6
    - resourceRefId: obs-stat-card-failed
      size: 6
    - resourceRefId: obs-stat-card-pending
      size: 6
  resourcesRefs:
    items:
    - id: obs-stat-card-total
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-stat-card-total
      namespace: {{ .Release.Namespace }}
      resource: cards
      verb: GET
    - id: obs-stat-card-healthy
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-stat-card-healthy
      namespace: {{ .Release.Namespace }}
      resource: cards
      verb: GET
    - id: obs-stat-card-failed
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-stat-card-failed
      namespace: {{ .Release.Namespace }}
      resource: cards
      verb: GET
    - id: obs-stat-card-pending
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-stat-card-pending
      namespace: {{ .Release.Namespace }}
      resource: cards
      verb: GET
