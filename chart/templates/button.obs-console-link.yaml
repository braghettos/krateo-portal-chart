# "View in console" deep-link — only rendered when a deployer sets observabilityConsoleUrl
# (e.g. the clickstack/HyperDX UI). Navigates to that absolute URL; the frontend's navigate
# action opens absolute http(s) targets in a new tab (globalThis.open, noopener). No default
# URL is invented, so nothing hardcoded and the link is simply absent on installs that don't
# configure a console. Sits in obs-header-actions (right-aligned head row) — UX-audit #15
# moved it out of the time-range band, where at chip size it read as a FILTER chip; the '↗'
# label glyph became the real external-link icon (same as incident-ref-link).
{{- if .Values.observabilityConsoleUrl }}
kind: Button
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: obs-console-link
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    label: View in console
    icon: fa-arrow-up-right-from-square
    type: default
    variant: outlined
    clickActionId: obs-open-console
    actions:
      navigate:
        - id: obs-open-console
          type: navigate
          path: {{ .Values.observabilityConsoleUrl | quote }}
  resourcesRefs:
    items: []
{{- end }}
