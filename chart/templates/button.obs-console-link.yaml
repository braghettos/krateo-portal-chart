# "View in console" deep-link — only rendered when a deployer sets observabilityConsoleUrl
# (e.g. the clickstack/HyperDX UI). Navigates to that absolute URL; the frontend's navigate
# action opens absolute http(s) targets in a new tab (globalThis.open, noopener). No default
# URL is invented, so nothing hardcoded and the link is simply absent on installs that don't
# configure a console. Sits at the end of the observability time-range group.
{{- if .Values.observabilityConsoleUrl }}
kind: Button
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: obs-console-link
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    label: 'View in console ↗'
    size: small
    type: default
    variant: outlined
    clickActionId: obs-open-console
    actions:
      navigate:
        - id: obs-open-console
          type: navigate
          path: {{ .Values.observabilityConsoleUrl | quote }}
  resourcesRefs:
    items: []
{{- end }}
