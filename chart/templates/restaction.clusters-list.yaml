# Cluster registry data source (hub-and-spoke Phase 1, design §2.1 + §1.3 Option 2).
#
# Lists the registered KubernetesTargets (the spokes a CompositionDefinition can deploy
# to) and derives each target's HEALTH by AGGREGATING CompositionDefinition.status.target
# across the blueprints that reference it — NO engine change (design §1.3 option 2):
#   - stage `targets`  : cluster-scoped LIST of KubernetesTargets (they live on the hub).
#   - stage `compdefs` : LIST of CompositionDefinitions (the same hub read the compositions
#     page uses) — each carries spec.deploy.targetRef.name (the spoke it targets) and
#     status.target.{connectionStatus,version} (per-blueprint reachability, probed each
#     reconcile by core-provider).
# The `filter` JOINs them: for each target, collect the compdefs whose targetRef.name == it,
# roll their connectionStatus up to a single per-cluster health cell (railState-style —
# any Down ⇒ failed/red, all Healthy ⇒ healthy/green, otherwise unknown/gray) and count them.
# Robust to absent status (a freshly-registered target with no referencing blueprint, or a
# blueprint whose status.target hasn't been populated yet, reads "unknown"). Both list steps
# continueOnError so the page degrades (empty rows) rather than failing the whole widget.
apiVersion: templates.krateo.io/v1
kind: RESTAction
metadata:
  name: clusters-list
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  api:
    # KubernetesTarget is cluster-scoped (core.krateo.io/v1alpha1). UAF gates the LIST by the
    # user's list grant on kubernetestargets; a narrow-RBAC user simply sees fewer/no rows.
    - name: targets
      path: /apis/core.krateo.io/v1alpha1/kubernetestargets
      verb: GET
      headers:
        - 'Accept: application/json'
      continueOnError: true
      errorKey: targetsError
      userAccessFilter:
        verb: list
        group: core.krateo.io
        resource: kubernetestargets
      # Project the LIST body's .items to the fields the final JOIN needs (status.target may be
      # absent on a freshly-registered target — read defensively). The step key then holds THIS
      # array (a step WITH a filter yields the filter output, not the raw body).
      filter: >
        [ .targets.items[]?
          | { name: .metadata.name,
              secretRef: (.spec.kubeconfigRef.name // ""),
              version: (.status.target.version // ""),
              lastProbe: (.status.target.lastProbeTime // .metadata.creationTimestamp // "") } ]
    # CompositionDefinitions carry the per-blueprint target reachability we roll up. This is a
    # cluster-scope LIST (compositiondefinitions is namespaced, but the cluster-scope LIST
    # endpoint returns all namespaces the caller may see — same shape compositions-list relies
    # on for its per-item UAF); we only read spec.deploy.targetRef + status.target here.
    - name: compdefs
      path: /apis/core.krateo.io/v1alpha1/compositiondefinitions
      verb: GET
      headers:
        - 'Accept: application/json'
      continueOnError: true
      errorKey: compdefsError
      userAccessFilter:
        verb: list
        group: core.krateo.io
        resource: compositiondefinitions
        namespaceFrom: .metadata.namespace
      # Project the LIST body's .items to (targetRef.name, per-blueprint reachability). Only the
      # blueprints that actually target a spoke matter for the roll-up (drop the target-less/local
      # ones). The step key then holds THIS array.
      filter: >
        [ .compdefs.items[]?
          | { target: (.spec.deploy.targetRef.name // ""),
              conn: (.status.target.connectionStatus // ""),
              ver: (.status.target.version // "") }
          | select(.target != "") ]
  # Build the registry rows. For each KubernetesTarget, JOIN the CompositionDefinitions whose
  # spec.deploy.targetRef.name == target.metadata.name, roll their status.target.connectionStatus
  # up to a health verdict, and count them. `counts` summarises the fleet for an optional header.
  filter: >
    (.compdefs // []) as $cd
    | ([ (.targets // [])[]
        | . as $t
        | ($t.name) as $name
        | ([ $cd[] | select(.target == $name) ]) as $refs
        | ($refs | length) as $count
        | ([ $refs[] | .conn ]) as $conns
        | (if ($conns | any(. == "Down")) then "failed"
           elif ($count > 0 and ($conns | all(. == "Healthy"))) then "healthy"
           else "unknown" end) as $health
        | { name: $name,
            health: $health,
            healthPercent: (if $health == "healthy" then 100 elif $health == "failed" then 20 else 50 end),
            healthColor: (if $health == "healthy" then "green" elif $health == "failed" then "red" else "gray" end),
            version: (($t.version // "") as $tv | if $tv != "" then $tv else (([ $refs[] | .ver ] | map(select(. != "")))[0] // "") end),
            blueprintCount: $count,
            secretRef: ($t.secretRef // ""),
            lastProbe: ($t.lastProbe // "") } ]) as $rows
    | {
        list: $rows,
        counts: {
          total: ($rows | length),
          healthy: ($rows | map(select(.health == "healthy")) | length),
          failed:  ($rows | map(select(.health == "failed"))  | length),
          unknown: ($rows | map(select(.health == "unknown")) | length)
        }
      }
