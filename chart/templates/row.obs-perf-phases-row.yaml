# Full-width strip hosting the reconcile phase-breakdown card. Sits directly under the
# p50/p95/p99 percentile strip — together they form the reconcile-performance section.
kind: Row
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: obs-perf-phases-row
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    allowedResources:
    - cards
    items:
    - resourceRefId: obs-phases-card
      size: 24
  resourcesRefs:
    items:
    - id: obs-phases-card
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-phases-card
      namespace: {{ .Release.Namespace }}
      resource: cards
      verb: GET
