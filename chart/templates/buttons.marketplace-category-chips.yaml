# Marketplace category filter — always-visible toggle chips (mockup `.chip-group`), one
# per category in the catalog taxonomy + "All". Mirrors the compositions status-chip pattern:
# each chip is a Button that NAVIGATES to /marketplace?category=<k> (the `category` extras the
# blueprints-catalog RA reads to filter `.cards` server-side); the active chip reads back
# `.selectedCategory` (echoed by the RA from the same extras) → solid amber (type:primary),
# the rest stay outlined. Instant filter, no Apply. The taxonomy is the stable krateo.io/category
# set; "All" (/marketplace, no param) shows every card incl. any uncategorized.
{{- $cats := list (dict "k" "all" "l" "All") (dict "k" "compute" "l" "Compute") (dict "k" "network" "l" "Network") (dict "k" "database" "l" "Database") (dict "k" "application" "l" "Application") (dict "k" "security" "l" "Security") (dict "k" "observability" "l" "Observability") (dict "k" "storage" "l" "Storage") (dict "k" "generator" "l" "Generator") }}
{{- range $cats }}
---
apiVersion: widgets.templates.krateo.io/v1beta1
kind: Button
metadata:
  name: mp-cat-btn-{{ .k }}
  namespace: {{ $.Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    label: {{ .l | quote }}
    size: small
    type: default
    variant: outlined
    clickActionId: set-cat-{{ .k }}
    actions:
      navigate:
        - id: set-cat-{{ .k }}
          type: navigate
          path: {{ if eq .k "all" }}/marketplace{{ else }}/marketplace?category={{ .k }}{{ end }}
  widgetDataTemplate:
    - forPath: type
      expression: '${ if (.selectedCategory // "all") == {{ .k | quote }} then "primary" else "default" end }'
    - forPath: variant
      expression: '${ if (.selectedCategory // "all") == {{ .k | quote }} then "solid" else "outlined" end }'
  apiRef:
    name: blueprints-catalog
    namespace: {{ $.Release.Namespace }}
  resourcesRefs:
    items: []
{{- end }}
