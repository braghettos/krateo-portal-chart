# 'Live on this cluster' status line — ONE server-computed sentence from the
# cluster-compositions RA (spoke read-back, W3-3): the honest empty state ("No
# compositions deployed to this spoke yet."), the unreachable / not-provisioned
# verdicts, or the live counts summary when rows exist. All text is composed
# server-side in jq (value→presentation); the widget only prints it.
kind: Paragraph
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: cluster-detail-live-status
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [name]
  apiRef:
    name: cluster-compositions
    namespace: {{ .Release.Namespace }}
  widgetData:
    text: Reading live state from the spoke apiserver...
    type: secondary
  widgetDataTemplate:
    - forPath: text
      expression: '${ .statusText // "" }'
  resourcesRefs:
    items: []
