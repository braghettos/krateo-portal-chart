# Reconciliation band (detail page signature element) — wraps the per-resource
# rail List. Eyebrow title + a state badge (Synced / Not synced / Unknown)
# derived from the composition's real Synced condition. Mirrors the
# mockup `.rail-panel` placed directly under the title, above the 2-col grid.
kind: Card
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: card-composition-detail-rail
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [name, namespace]
  widgetData:
    title: Reconciliation · desired vs actual
    titleVariant: eyebrow
    variant: outlined
    extra: ''
    extraVariant: badge
    extraStatus: processing
    items:
    - resourceRefId: list-composition-detail-rail
  # Badge = the composition's REAL `Synced` condition (not a derived Converged/Reconciling label):
  # Synced=True → "Synced" (success), False → "Not synced" (error), absent → "Unknown". Sentence
  # case per the status-pill spec (the badge renderer's mono style may still uppercase visually —
  # that styling lives in the frontend, not this CR). When the engine's workload projection says
  # the workload is down (workloadHealthy == false) the badge keeps the sync FACT but appends
  # "· Unhealthy" and goes error — "Synced" alone over a CrashLoopBackOff workload reads as
  # all-clear, which is false.
  # (The per-resource bars below still come from composition-resources via the rail List's own apiRef.)
  widgetDataTemplate:
  - forPath: extra
    expression: '${ (.detail.status.conditions // []) as $c | ($c | map(select(.type == "Synced")) | .[0]) as $s | (if $s == null then "Unknown" elif $s.status == "True" then "Synced" else "Not synced" end) as $base | if .workloadHealthy == false then ($base + " · Unhealthy") else $base end }'
  - forPath: extraStatus
    expression: '${ (.detail.status.conditions // []) as $c | ($c | map(select(.type == "Synced")) | .[0]) as $s | if .workloadHealthy == false then "error" elif $s == null then "default" elif $s.status == "True" then "success" else "error" end }'
  apiRef: { name: composition-detail, namespace: {{ .Release.Namespace }} }
  resourcesRefs:
    items:
    - id: list-composition-detail-rail
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: list-composition-detail-rail
      namespace: {{ .Release.Namespace }}
      resource: listies
      verb: GET
