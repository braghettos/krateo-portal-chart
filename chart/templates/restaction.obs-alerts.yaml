# Lists the Krateo Alert CRs (observability.krateo.io) via the apiserver — same per-user path
# pattern as compositions-list. Each Alert's live state lives in .status.state (OK / ALERT /
# PENDING), mirrored from HyperDX by the session-driven reconciler in krateo-alert-troubleshooter.
# Exposes {rows[], firing} for the status table + the "firing" headline.
# Each row carries routeName/routeNs (the CR's metadata.name/namespace) — the /alerts table now
# deep-links each row to /alerts/{namespace}/{name}, the per-alert detail page (item 25). It
# still ALSO carries `ask` (the Autopilot seed for THIS alert, built server-side), but that seed
# now rides the detail page's "Investigate with Autopilot" button rather than the row-click, so
# the ask flow the row used to own isn't lost — just relocated one hop.
apiVersion: templates.krateo.io/v1
kind: RESTAction
metadata:
  name: obs-alerts
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  api:
    - name: alerts
      path: /apis/observability.krateo.io/v1alpha1/namespaces/{{ .Release.Namespace }}/alerts
      verb: GET
      continueOnError: true
      errorKey: alertsError
  filter: >
    { rows: [ ((.alerts.items) // [])[] | {
        name: (.spec.displayName // .metadata.name // ""),
        # routeName/routeNs are the CR's OWN identity (metadata.name/namespace) — the row now
        # deep-links to /alerts/{namespace}/{name} (the new detail page), and that route keys the
        # per-name Alert GET, so it MUST be the slug, NOT the human displayName above. A
        # namespace-scoped list omits .metadata.namespace per item (redundant with the path) and
        # snowplow does not backfill it → fall back to the release namespace we just listed
        # (same reasoning as incidents-list's namespace literal).
        routeName: (.metadata.name // ""),
        routeNs: (.metadata.namespace // "{{ .Release.Namespace }}"),
        watching: (.spec.where // "all logs"),
        threshold: ((.spec.threshold // 0) | tostring),
        interval: (.spec.interval // ""),
        thresholdType: (.spec.thresholdType // ""),
        phase: (.status.phase // "Pending"),
        state: (.status.state // "PENDING"),
        ask: ("Investigate the \"" + (.spec.displayName // .metadata.name // "this alert") + "\" observability alert — it is currently " + (.status.state // "PENDING") + "; explain what it watches, why it is in this state, and give me the concrete next steps.")
      } ],
      firing: ([ ((.alerts.items) // [])[] | select((.status.state // "") == "ALERT") ] | length) }
