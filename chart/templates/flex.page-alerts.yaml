# Convention page root for /alerts (IA incidents-deepdive D/4) — the alerting CONFIGURATION
# surface. Alert *rules* (thresholds/intervals/watching, incl. quiet OK ones) are config, not
# incidents, so they moved OFF the /incidents triage page to here. /incidents keeps only the
# firing signal (awaiting strip) + the per-alert investigation feed; this page owns the full
# rule catalog. Header + the obs-alerts rules table.
kind: Flex
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: page-alerts
  namespace: {{ include "portal.tierNamespace" (dict "ctx" . "tier" "admin") }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    allowedResources:
    - flexes
    - tables
    vertical: true
    gap: middle
    items:
    - resourceRefId: alerts-header
    - resourceRefId: obs-alerts
  resourcesRefs:
    items:
    - id: alerts-header
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: alerts-header
      namespace: {{ .Release.Namespace }}
      resource: flexes
      verb: GET
    - id: obs-alerts
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-alerts
      namespace: {{ .Release.Namespace }}
      resource: tables
      verb: GET
