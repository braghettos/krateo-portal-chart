# The incident list — ONE row per TroubleshootingReport, off incidents-list (which applies
# the ?status= lifecycle filter server-side). Columns mirror the mockup's 7-col grid:
# severity dot (derived server-side — resolved gray / confirmed-rootCause crimson /
# no-verdict amber), the root-cause one-liner, trigger badge, affected-resource mono ref,
# lifecycle chip, age, confidence. Row click → the incident detail page (hidden route);
# the {namespace}/{name} placeholders fill from hidden cells not bound to any column.
kind: Table
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: incidents-table
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [status]
  widgetData:
    allowedResources: []
    bordered: false
    size: small
    rowNavigateTo: /incidents/{namespace}/{name}
    pagination:
      defaultPageSize: 15
    columns:
    - valueKey: sev
      title: ' '
    - valueKey: title
      title: Incident
    - valueKey: trigger
      title: Trigger
    # UX-27 (#72 §0.3): "Affected resource" (ref) and "Evidence" (conf) columns dropped — both
    # are surfaced more usefully on the incident DETAIL page (relations + evidence table), so on
    # the list they only duplicated. The ref/conf cells stay in the row payload (harmless, unused).
    - valueKey: lifecycle
      title: Lifecycle
    - valueKey: age
      title: Age
    dataSource: []
  widgetDataTemplate:
  # The title (a root-cause one-liner) can run to hundreds of chars; unbounded it grabs the
  # whole auto-layout width and crushes the trailing columns to a couple of letters
  # (LIFECYCLE → "LI"). The Table CRD's columns carry no width/ellipsis knobs, so the cap is
  # server-side: truncate at ~110 chars with an ellipsis (the full statement lives one click
  # away on the incident detail).
  - forPath: dataSource
    expression: '${ [ (.rows // [])[] | [ {valueKey:"sev",kind:"jsonSchemaType",type:"string",stringValue:"●",color:(.sevColor // "#8c8c8c")}, {valueKey:"title",kind:"jsonSchemaType",type:"string",stringValue:((.title // "") | if length > 110 then (.[0:109] + "…") else . end)}, {valueKey:"trigger",kind:"tag",stringValue:((.trigger // "alert") | (.[0:1] | ascii_upcase) + .[1:]),color:"gray"}, {valueKey:"ref",kind:"jsonSchemaType",type:"string",stringValue:(.ref // "—"),color:"#8c8c8c"}, {valueKey:"lifecycle",kind:"tag",stringValue:((.lifecycle // "open") | (.[0:1] | ascii_upcase) + .[1:]),color:((.lifecycle // "open") | if . == "open" then "red" elif . == "mitigated" then "orange" else "green" end)}, {valueKey:"age",kind:"jsonSchemaType",type:"string",stringValue:(.age // ""),format:"relative"}, {valueKey:"conf",kind:"jsonSchemaType",type:"string",stringValue:(.grounding // "—"),color:"#8c8c8c"}, {valueKey:"name",kind:"jsonSchemaType",type:"string",stringValue:(.name // "")}, {valueKey:"namespace",kind:"jsonSchemaType",type:"string",stringValue:(.namespace // "")} ] ] }'
  apiRef:
    name: incidents-list
    namespace: {{ .Release.Namespace }}
  resourcesRefs:
    items: []
