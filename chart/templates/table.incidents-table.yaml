# The incident list — ONE row per TroubleshootingReport, off incidents-list (which applies
# the ?status= lifecycle filter server-side). Columns mirror the mockup's 7-col grid:
# severity dot (derived server-side — resolved gray / confirmed-rootCause crimson /
# no-verdict amber), the root-cause one-liner, trigger badge, affected-resource mono ref,
# lifecycle chip, age, confidence. Row click → the incident detail page (hidden route);
# the {namespace}/{name} placeholders fill from hidden cells not bound to any column.
kind: Table
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: incidents-table
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [status]
  widgetData:
    allowedResources: []
    bordered: false
    size: small
    rowNavigateTo: /incidents/{namespace}/{name}
    pagination:
      defaultPageSize: 15
    columns:
    - valueKey: sev
      title: ' '
    - valueKey: title
      title: Incident
    - valueKey: trigger
      title: Trigger
    - valueKey: ref
      title: Affected resource
    - valueKey: lifecycle
      title: Lifecycle
    - valueKey: age
      title: Age
    - valueKey: conf
      title: Conf.
    dataSource: []
  widgetDataTemplate:
  - forPath: dataSource
    expression: '${ [ (.rows // [])[] | [ {valueKey:"sev",kind:"jsonSchemaType",type:"string",stringValue:"●",color:(.sevColor // "#8c8c8c")}, {valueKey:"title",kind:"jsonSchemaType",type:"string",stringValue:(.title // "")}, {valueKey:"trigger",kind:"tag",stringValue:(.trigger // "alert"),color:"gray"}, {valueKey:"ref",kind:"jsonSchemaType",type:"string",stringValue:(.ref // "—"),color:"#8c8c8c"}, {valueKey:"lifecycle",kind:"tag",stringValue:(.lifecycle // "open"),color:((.lifecycle // "open") | if . == "open" then "red" elif . == "mitigated" then "orange" else "cyan" end)}, {valueKey:"age",kind:"jsonSchemaType",type:"string",stringValue:(.age // ""),format:"relative"}, {valueKey:"conf",kind:"jsonSchemaType",type:"string",stringValue:(.confidence // "—")}, {valueKey:"name",kind:"jsonSchemaType",type:"string",stringValue:(.name // "")}, {valueKey:"namespace",kind:"jsonSchemaType",type:"string",stringValue:(.namespace // "")} ] ] }'
  apiRef:
    name: incidents-list
    namespace: {{ .Release.Namespace }}
  resourcesRefs:
    items: []
