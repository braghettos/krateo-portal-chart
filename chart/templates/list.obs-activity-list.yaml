# Recent-activity feed — recent events as an antd List. Fed by the `events` RA (all
# recent activity, deduped/sorted). Each row = a status dot (by type) + message +
# involvedObject ref + reason · relative-time. Identical itemTemplate/jq to the
# dashboard's list-activity-events.
kind: Listy
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: obs-activity-list
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  apiRef:
    name: events
    namespace: {{ .Release.Namespace }}
  widgetData:
    dataSource: []
    itemLayout: horizontal
    split: false
    itemTemplate:
      # Whole-row click → the tagged composition's detail page. `route` is resolved
      # SERVER-SIDE in the events RA (compositionId label → {ns,name}); events with no
      # resolvable composition tag carry route:"" and stay inert.
      navigateTo: '{route}'
      iconVariant: dot
      color:
        value: '{type}'
        map:
          Normal: green
          Warning: red
      primaryText: '{message}'
      subPrimaryText: '{ref}'
      subPrimaryTextMono: true
      secondaryText: '{reason}'
      secondaryTextAsTag: true
      subSecondaryText: '{ts}'
      formats:
        subSecondaryText: relative
  widgetDataTemplate:
    - forPath: dataSource
      expression: '${ (.list // []) | .[0:8] | map({ message: (.message // ""), reason: (.reason // ""), type: (if (.type // "") == "Warning" then "Warning" else "Normal" end), ref: ((.involvedObject.kind // "") + "/" + (.involvedObject.name // "")), ts: (.lastTimestamp // .firstTimestamp // .eventTime // ""), route: (.route // "") }) }'
  resourcesRefs:
    items: []
