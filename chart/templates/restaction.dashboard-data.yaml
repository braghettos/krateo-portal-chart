# Dashboard data source = compositions-list + the persisted time-range (Tier C #10).
# Mirrors compositions-list (CRD discovery -> cluster LIST per kind, UAF-gated), then
# reads the dashboard-range ConfigMap and pre-filters the list by creationTimestamp.
# Returns the SAME shape as compositions-list ({list:[...]}) so the dashboard stat/
# donut/throughput widgets keep their per-widget jq unchanged — only their apiRef is
# repointed here. The range scope is shared across those widgets, so it lives once here
# (a page-level scope) rather than in each widget. Range write = the range-selector's
# rest PATCH on the ConfigMap; the post-write invalidate refetches this RA -> re-scopes.
apiVersion: templates.krateo.io/v1
kind: RESTAction
metadata:
  name: dashboard-data
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  api:
  - name: crds
    path: /apis/apiextensions.k8s.io/v1/customresourcedefinitions
    verb: GET
    filter: "[.crds.items[] | select(.spec.group == \"composition.krateo.io\") | {plural: .status.acceptedNames.plural, version: .status.storedVersions[0]}]"
    continueOnError: true
    errorKey: crdsError
  - name: allCompositions
    dependsOn:
      name: crds
      iterator: ".crds"
    path: ${ "/apis/composition.krateo.io/" + (.version) + "/" + (.plural) }
    verb: GET
    continueOnError: true
    errorKey: allCompositionsError
    userAccessFilter:
      verb: list
      group: composition.krateo.io
      resourcesFrom: "[ (.crds // [])[] | .plural ]"
      namespaceFrom: .metadata.namespace
    filter: >
      [.allCompositions.items[]?
       | {uid: .metadata.uid, name: .metadata.name, ns: .metadata.namespace, ts: .metadata.creationTimestamp, kind: .kind, av: .apiVersion, conditions: (.status.conditions // [])}]
  - name: rangeCfg
    path: /api/v1/namespaces/{{ .Release.Namespace }}/configmaps/dashboard-range
    verb: GET
    headers:
      - 'Accept: application/json'
    continueOnError: true
    errorKey: rangeCfgError
  filter: >
    ((.rangeCfg.data.range) // "all") as $range
    | (if $range == "24h" then 86400 elif $range == "7d" then 604800 elif $range == "30d" then 2592000 else 0 end) as $window
    | (now - $window) as $cutoff
    | {
        range: $range,
        list: [ (.allCompositions // [])[] | select($window == 0 or (((.ts // "") | (fromdateiso8601? // 0)) >= $cutoff)) ]
      }
