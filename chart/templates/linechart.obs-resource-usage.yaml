# Cluster resource-usage trend (R2 #15) — CPU cores + Memory GiB over the selected ?range
# window, bucketed server-side by restaction.obs-resource-usage-series (otel_metrics_gauge).
# The trend complement to the live top-pods snapshot table (obs-resource-table); the two share
# the Resource-usage card. Data arrives already bucketed, so this just fans each bucket into two
# series rows ({t,series,v}); `t` is UNIX epoch seconds (the widget localizes the axis to the
# browser TZ). Two lines, both BRAND palette colours (never status): CPU=cyan (the brand teal),
# Memory=blue (Krateo brand blue) — legible in light + dark. Legend on (two series need it).
# `y:` axis/scale keys are QUOTED — a bare y: map key parses as boolean true under YAML 1.1.
kind: LineChart
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: obs-resource-usage
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [range]
  widgetData:
    xField: t
    yField: v
    colorField: series
    colorMap:
      CPU cores: cyan
      Memory GiB: blue
    shapeField: smooth
    area: false
    legend: true
    height: 200
    xTimeUnit: hour
    point: true
    scale:
      "y":
        zero: true
        nice: true
        domainMin: 0
        tickCount: 4
    axis:
      x:
        tickCount: 6
      "y":
        tickCount: 4
    data: []
  widgetDataTemplate:
  - forPath: data
    expression: '${ [ (.series // [])[] | ( { t: (.ts|tonumber), series: "CPU cores", v: (.cpu_cores|tonumber) }, { t: (.ts|tonumber), series: "Memory GiB", v: (.mem_gib|tonumber) } ) ] }'
  apiRef:
    name: obs-resource-usage-series
    namespace: {{ .Release.Namespace }}
  resourcesRefs:
    items: []
