kind: Paragraph
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: greeting-title
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # Fully CLIENT-RENDERED greeting — no server-side identity, no apiRef, no extras. Both dynamic
  # parts are client tokens the Paragraph widget resolves at render (src/widgets/Paragraph/localTokens.ts):
  #   {localTimeOfDay} → morning/afternoon/evening from the viewer's browser clock+TZ. Deliberate:
  #     snowplow caches a no-apiRef widget's RENDERED output with `now` FROZEN at resolve time, so a
  #     server-side time-of-day is cache-incoherent (an 11:50-Rome user saw a stale "Good evening")
  #     — see [[snowplow-cache-coherence]]. Resolving in the browser is immune to that.
  #   {displayName}    → the login name from the browser's own login state (localStorage K_user),
  #     fallback "there".
  # This DROPS the former server-side `.displayName` (fed via ?extras.displayName). Under the
  # cache-identity architecture the frontend stops volunteering identity in extras (capability flag
  # api.SNOWPLOW_IDENTITY_INJECTION); greeting-title was the LAST server-side displayName consumer,
  # so it migrates to client-render. Now fully identity-free + extras-free → one shared L1 cell.
  # Requires the frontend to ship the {displayName} localTokens resolver (A5 / frontend PR #25).
  # See snowplow docs/A6-chart-enablement-spec-2026-07-07.md §1.4.
  widgetData:
    text: "Good {localTimeOfDay}, {displayName}"
    strong: true
  resourcesRefs:
    items: []
