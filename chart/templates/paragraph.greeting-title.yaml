kind: Paragraph
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: greeting-title
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # Data-driven greeting. Time-of-day is resolved CLIENT-SIDE: the jq emits the literal token
  # `{localTimeOfDay}` and the Paragraph widget replaces it at render with the browser-local
  # bucket (morning/afternoon/evening from `new Date().getHours()`). This is deliberate —
  # snowplow caches a no-apiRef widget's RENDERED output with `now` FROZEN at resolve time, so
  # any server-side `now`-based time-of-day is cache-incoherent (an 11:50-Rome user saw a stale
  # "Good evening"; a raw no-store fetch confirmed it was snowplow's frozen render, not the
  # frontend cache — see [[snowplow-cache-coherence]]). Emitting the token instead is immune to
  # that: the bucket is computed in the viewer's browser, in the viewer's TZ, on every render.
  # The name comes from the login identity forwarded via `?extras.displayName` (no runtime /me).
  # Requires snowplow >= 1.1.0 (extras-to-widgets, PR #27): Fix-2 merges request `extras` into a
  # no-apiRef widget's widgetDataTemplate data source, so `.displayName` resolves here; with no
  # extras it degrades to "there" (the `// "there"` fallback). `widgetData.text` below is only a
  # last-resort fallback if the template can't run.
  widgetData:
    text: Welcome
    strong: true
  widgetDataTemplate:
    - forPath: text
      expression: '${ "Good {localTimeOfDay}, " + (.displayName // "there") }'
  resourcesRefs:
    items: []
