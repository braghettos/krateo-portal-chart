# Convention page root for /compositions — header (H1 + subtitle) above the
# compositions table. The nav (`menu.sidebar-nav`) points its `compositions` ref here
# (was the bare table) so the page gains a header like the mockup.
kind: Flex
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: page-compositions
  namespace: {{ include "portal.tierNamespace" (dict "ctx" . "tier" "admin") }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [namespace]
  widgetData:
    allowedResources:
    - flexes
    - rows
    - tables
    vertical: true
    gap: middle
    items:
    - resourceRefId: compositions-header
    - resourceRefId: compositions-toolbar
    - resourceRefId: compositions-table
  resourcesRefs:
    items:
    # #4: compositions-header is now a Flex (space-between), not a Row — resolve it as `flexes`
    # so the CTA pins flush-right reliably (the Row/Col grid rendered it ~2/3 across live).
    - id: compositions-header
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: compositions-header
      namespace: {{ .Release.Namespace }}
      resource: flexes
      verb: GET
    - id: compositions-toolbar
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: compositions-toolbar
      namespace: {{ .Release.Namespace }}
      resource: flexes
      verb: GET
    - id: compositions-table
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: compositions-table
      namespace: {{ .Release.Namespace }}
      resource: tables
      verb: GET
