# Convention page root for /compositions — header (H1 + subtitle) above the
# compositions table. The nav (`menu.sidebar-nav`) points its `compositions` ref here
# (was the bare table) so the page gains a header like the mockup.
kind: Flex
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: page-compositions
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    allowedResources:
    - flexes
    - tables
    vertical: true
    gap: large
    items:
    - resourceRefId: compositions-header
    - resourceRefId: compositions-table
  resourcesRefs:
    items:
    - id: compositions-header
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: compositions-header
      namespace: {{ .Release.Namespace }}
      resource: flexes
      verb: GET
    - id: compositions-table
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: compositions-table
      namespace: {{ .Release.Namespace }}
      resource: tables
      verb: GET
