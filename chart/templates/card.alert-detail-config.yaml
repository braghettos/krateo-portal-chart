# "Rule" card → the alert's configuration (Watching / Threshold / Every / Message) as a
# Descriptions list. Wraps descriptions-alert-detail-config (the page Flex enum has no
# `descriptions`, so the Descriptions must nest in a Card — same as card-composition-detail-
# metadata). titleVariant: eyebrow to match the composition/blueprint detail section cards.
kind: Card
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: card-alert-detail-config
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [name, namespace]
  widgetData:
    title: Rule
    titleVariant: eyebrow
    variant: outlined
    items:
      - resourceRefId: descriptions-alert-detail-config
  resourcesRefs:
    items:
      - id: descriptions-alert-detail-config
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: descriptions-alert-detail-config
        namespace: {{ .Release.Namespace }}
        resource: descriptions
        verb: GET
