# Compact reconcile-activity row on the composition detail page: three Statistics
# (reconciles-in-window · p95 duration · last reconcile) fed by the per-composition
# composition-reconcile-perf RA. Layout-only — the figures live in the Statistics.
kind: Flex
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: composition-detail-reconcile-row
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    vertical: false
    gap: large
    align: center
    allowedResources:
      - statistics
    items:
      - resourceRefId: composition-reconcile-count
      - resourceRefId: composition-reconcile-p95
      - resourceRefId: composition-reconcile-last
  resourcesRefs:
    items:
      - id: composition-reconcile-count
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: composition-reconcile-count
        namespace: {{ .Release.Namespace }}
        resource: statistics
        verb: GET
      - id: composition-reconcile-p95
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: composition-reconcile-p95
        namespace: {{ .Release.Namespace }}
        resource: statistics
        verb: GET
      - id: composition-reconcile-last
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: composition-reconcile-last
        namespace: {{ .Release.Namespace }}
        resource: statistics
        verb: GET
