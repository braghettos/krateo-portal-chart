# Convention page root for the templated create route /marketplace/{namespace}/{name}/new
# (nav item `page: blueprint-create` → resource `flexes`, name `page-<slug>`).
#
# Generic, data-driven create container: it renders the blueprint's OWN create Form,
# resolved purely from the route params that arrive via ?extras. resourcesRefsTemplate
# builds a single ref to `forms/{name}-create@{namespace}` — name=${.name}+"-create",
# namespace=${.namespace} — evaluated against the extras-merged data source (snowplow
# TestExtrasReferenceable_InResourcesRefsTemplate). So /marketplace/cattle-system/rancher/new
# renders forms/rancher-create with NO per-blueprint frontend code; every blueprint form
# generated by gen-portal-widgets (apiRef → its CRD-schema formdef RA, submit → POST the
# composition) is picked up automatically.
kind: Flex
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: page-blueprint-create
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    allowedResources:
      - forms
    vertical: true
    items:
      - resourceRefId: blueprint-form
  # resourcesRefs (static) is required by the CRD; the actual ref is generated
  # dynamically below from the route params.
  resourcesRefs:
    items: []
  resourcesRefsTemplate:
    - template:
        id: blueprint-form
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: ${ .name + "-create" }
        namespace: ${ .namespace }
        resource: forms
        verb: GET
