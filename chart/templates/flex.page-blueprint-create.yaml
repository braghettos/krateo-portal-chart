# Convention page root for the templated create route /marketplace/{namespace}/{name}/new
# (nav item `page: blueprint-create` → resource `flexes`, name `page-<slug>`).
#
# Renders the ONE generic create Form (forms/blueprint-create) for every blueprint.
# The blueprint identity (namespace/name) arrives via ?extras and flows to the form's
# apiRef (blueprint-formdef), which discovers the composition CRD from the
# CompositionDefinition status and feeds its schema to the form. No per-blueprint form.
kind: Flex
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: page-blueprint-create
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    allowedResources:
      - flexes
      - forms
      - steps
    vertical: true
    gap: large
    items:
      - resourceRefId: create-header
      - resourceRefId: create-wizard
      - resourceRefId: blueprint-form
  resourcesRefs:
    items:
      - id: create-header
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: create-header
        namespace: {{ .Release.Namespace }}
        resource: flexes
        verb: GET
      - id: create-wizard
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: create-wizard
        namespace: {{ .Release.Namespace }}
        resource: steps
        verb: GET
      - id: blueprint-form
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: blueprint-create
        namespace: {{ .Release.Namespace }}
        resource: forms
        verb: GET
