# Wraps the reconcile-throughput LineChart; header extra shows the current p95 latency + the
# REAL 6h reconcile-failure count and error rate (from the RA's provider_runtime.reconcile
# counters — NOT the always-Unset span StatusCode) — the live headline numbers beside the trend.
kind: Card
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: obs-throughput-card
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [range]
  widgetData:
    title: Reconcile throughput
    titleVariant: eyebrow
    variant: outlined
    extra: 'live · per 10 min'
    items:
    - resourceRefId: obs-reconcile-throughput
  # HONESTY (IA obs-deepdive): when there are zero reconciles in range ($tot==0) show an
  # explicit "no reconcile-trace data" instead of "p95 0ms · 0 fail" (which reads as a real
  # healthy measurement). Otherwise the live p95 + failure count + rate.
  widgetDataTemplate:
  - forPath: extra
    expression: '${ (.current // {}) as $c | (.failures // 0) as $f | (.successes // 0) as $ok | ($f + $ok) as $tot | (if $tot == 0 then "no reconcile-trace data" else ("p95 " + (($c.p95_ms // 0)|tostring) + "ms · " + ($f|tostring) + " fail (" + (($f * 100 / $tot)|floor|tostring) + "%)") end) }'
  apiRef:
    name: obs-reconcile-metrics
    namespace: {{ .Release.Namespace }}
  resourcesRefs:
    items:
    - id: obs-reconcile-throughput
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-reconcile-throughput
      namespace: {{ .Release.Namespace }}
      resource: linecharts
      verb: GET
