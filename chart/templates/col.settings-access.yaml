# Settings → Access tab content (W3-2 RBAC guardrails). A Col wrapper — the Tabs
# allowedResources enum has `cols` but not `flexes` — stacking the intro line and
# the personas table. Each persona row drills down to /settings/access/{username}
# (capability preview + grant + revoke).
kind: Col
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: settings-access
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    allowedResources:
      - paragraphs
      - tables
    items:
      - resourceRefId: access-intro
      - resourceRefId: access-personas
  resourcesRefs:
    items:
      - id: access-intro
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: access-intro
        namespace: {{ .Release.Namespace }}
        resource: paragraphs
        verb: GET
      - id: access-personas
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: settings-access-personas
        namespace: {{ .Release.Namespace }}
        resource: tables
        verb: GET
