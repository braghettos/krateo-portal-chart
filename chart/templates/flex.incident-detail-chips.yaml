# Detail chips line — lifecycle chip + trigger badge + affected-resource mono ref
# (mockup det-head second toprow).
kind: Flex
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: incident-detail-chips
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    allowedResources:
    - tags
    - paragraphs
    gap: small
    align: center
    wrap: true
    items:
    - resourceRefId: incident-lifecycle
    - resourceRefId: incident-trigger
    - resourceRefId: incident-ref
  resourcesRefs:
    items:
    - id: incident-lifecycle
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: incident-lifecycle
      namespace: {{ .Release.Namespace }}
      resource: tags
      verb: GET
    - id: incident-trigger
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: incident-trigger
      namespace: {{ .Release.Namespace }}
      resource: tags
      verb: GET
    - id: incident-ref
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: incident-ref
      namespace: {{ .Release.Namespace }}
      resource: paragraphs
      verb: GET
