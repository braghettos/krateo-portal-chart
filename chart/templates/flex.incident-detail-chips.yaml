# Detail chips line — lifecycle chip + trigger badge + affected-resource ref + triggering-alert
# link (mockup det-head second toprow). Two slots are templated SERVER-SIDE off incident-detail:
#   · ref: when the investigation isolated a composition the ref renders as a LINK Button (one
#     click to /compositions/{ns}/{name}); otherwise the inert mono Paragraph — an alert-only ref
#     never becomes a broken link (CTA audit).
#   · alert (UX-22): the triggering alert. Rendered as a LINK Button to /alerts/{ns}/{name} ONLY
#     when incident-detail resolved the alert's real metadata.name (alertRoute non-empty);
#     otherwise the alert name is inert text — a display-name-only report never becomes a broken
#     link. Omitted entirely when the report carries no alertName.
kind: Flex
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: incident-detail-chips
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [name, namespace]
  apiRef:
    name: incident-detail
    namespace: {{ .Release.Namespace }}
  widgetData:
    allowedResources:
    - tags
    - paragraphs
    - buttons
    gap: small
    align: center
    wrap: true
    items:
    - resourceRefId: incident-lifecycle
    - resourceRefId: incident-trigger
    - resourceRefId: incident-ref
  widgetDataTemplate:
    - forPath: items
      expression: >-
        ${ [ { resourceRefId: "incident-lifecycle" }, { resourceRefId: "incident-trigger" } ]
        + (if (.refRoute // "") != "" then [ { resourceRefId: "incident-ref-link" } ] else [ { resourceRefId: "incident-ref" } ] end)
        + (if (.alertName // "") != "" then (if (.alertRoute // "") != "" then [ { resourceRefId: "incident-alert-link" } ] else [ { resourceRefId: "incident-alert-text" } ] end) else [] end) }
  resourcesRefs:
    items:
    - id: incident-ref-link
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: incident-ref-link
      namespace: {{ .Release.Namespace }}
      resource: buttons
      verb: GET
    - id: incident-lifecycle
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: incident-lifecycle
      namespace: {{ .Release.Namespace }}
      resource: tags
      verb: GET
    - id: incident-trigger
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: incident-trigger
      namespace: {{ .Release.Namespace }}
      resource: tags
      verb: GET
    - id: incident-ref
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: incident-ref
      namespace: {{ .Release.Namespace }}
      resource: paragraphs
      verb: GET
    - id: incident-alert-link
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: incident-alert-link
      namespace: {{ .Release.Namespace }}
      resource: buttons
      verb: GET
    - id: incident-alert-text
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: incident-alert-text
      namespace: {{ .Release.Namespace }}
      resource: tags
      verb: GET
