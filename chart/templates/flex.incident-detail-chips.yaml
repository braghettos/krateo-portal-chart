# Detail chips line — lifecycle chip + trigger badge + affected-resource ref
# (mockup det-head second toprow). The ref slot is templated SERVER-SIDE off
# incident-detail's refRoute: when the investigation isolated a composition the ref
# renders as a LINK Button (one click to /compositions/{ns}/{name}); otherwise the
# inert mono Paragraph — an alert-only ref never becomes a broken link (CTA audit).
kind: Flex
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: incident-detail-chips
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [name, namespace]
  apiRef:
    name: incident-detail
    namespace: {{ .Release.Namespace }}
  widgetData:
    allowedResources:
    - tags
    - paragraphs
    - buttons
    gap: small
    align: center
    wrap: true
    items:
    - resourceRefId: incident-lifecycle
    - resourceRefId: incident-trigger
    - resourceRefId: incident-ref
  widgetDataTemplate:
    - forPath: items
      expression: '${ [ { resourceRefId: "incident-lifecycle" }, { resourceRefId: "incident-trigger" } ] + (if (.refRoute // "") != "" then [ { resourceRefId: "incident-ref-link" } ] else [ { resourceRefId: "incident-ref" } ] end) }'
  resourcesRefs:
    items:
    - id: incident-ref-link
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: incident-ref-link
      namespace: {{ .Release.Namespace }}
      resource: buttons
      verb: GET
    - id: incident-lifecycle
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: incident-lifecycle
      namespace: {{ .Release.Namespace }}
      resource: tags
      verb: GET
    - id: incident-trigger
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: incident-trigger
      namespace: {{ .Release.Namespace }}
      resource: tags
      verb: GET
    - id: incident-ref
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: incident-ref
      namespace: {{ .Release.Namespace }}
      resource: paragraphs
      verb: GET
