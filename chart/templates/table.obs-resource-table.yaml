# Top pods by resource usage — latest CPU (millicores) + memory working-set (MiB) per pod,
# from otel_metrics_gauge via obs-resource-usage. Sorted memory-desc server-side (the top rows
# are the memory hogs). Memory cell is tinted by magnitude (>1 GiB crimson, >512 MiB amber);
# the numbers are the real measured gauge values.
# Rows deep-link to the log stream scoped to the pod (CTA audit #89 F8): /observability?svc={pod}
# where {pod} is the raw pod name. obs-log-stream's ?svc does a bidirectional case-insensitive
# CONTAINS against OTel ServiceName, so a pod name resolves to its owning service (the service
# name is a substring of the pod name) — verified live on krateo-installer-release. This closes
# the loop "this pod is the memory hog → what is it logging?". Empty/absent pod → the Table's
# buildRowPath returns undefined, so the row is inert (no broken link).
kind: Table
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: obs-resource-table
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    allowedResources: []
    bordered: false
    size: small
    # Row → observability log stream, scoped to this pod's owning service (see header).
    rowNavigateTo: /observability?svc={pod}
    pagination:
      defaultPageSize: 10
    columns:
    - valueKey: pod
      title: Pod
    - valueKey: ns
      title: Namespace
    - valueKey: cpu
      title: CPU
    - valueKey: mem
      title: Memory
    dataSource: []
  widgetDataTemplate:
  - forPath: dataSource
    expression: '${ [ (.rows // [])[] | [ {valueKey:"pod",kind:"jsonSchemaType",type:"string",stringValue:.pod}, {valueKey:"ns",kind:"jsonSchemaType",type:"string",stringValue:.ns}, {valueKey:"cpu",kind:"jsonSchemaType",type:"string",stringValue:((.cpu_m|tostring)+" m")}, {valueKey:"mem",kind:"jsonSchemaType",type:"string",stringValue:((.mem_mib|tostring)+" MiB"),color:((.mem_mib|tonumber) | if . > 1024 then "#cf1322" elif . > 512 then "#d48806" else "#8c8c8c" end)} ] ] }'
  apiRef:
    name: obs-resource-usage
    namespace: {{ .Release.Namespace }}
  resourcesRefs:
    items: []
