# The chart-defaults HONESTY note under the impact summary — this preview diffs the two
# chart versions rendered with DEFAULT values (real composition values are not recoverable
# chart-side), and the text says so. Server-assembled by the upgrade-impact RA.
kind: Paragraph
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: blueprint-impact-note
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [name, namespace, to]
  apiRef:
    name: upgrade-impact
    namespace: {{ .Release.Namespace }}
  widgetData:
    text: ''
    type: secondary
  widgetDataTemplate:
    - forPath: text
      expression: '${ .note // "" }'
  resourcesRefs:
    items: []
