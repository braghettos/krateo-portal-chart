kind: Statistic
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: stat-healthy
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    title: Healthy
    value: 0
  widgetDataTemplate:
  - forPath: value
    expression: ${ [.list[] | select((.conditions // []) | any(.type=="Ready" and .status=="True"))] | length }
  apiRef:
    name: compositions-list
    namespace: {{ .Release.Namespace }}
  resourcesRefs:
    items: []
