kind: Flex
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: delta-reconciles
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    allowedResources:
    - tags
    - paragraphs
    align: center
    gap: small
    items:
    - resourceRefId: delta-tag-reconciles
    - resourceRefId: delta-cap-reconciles
  resourcesRefs:
    items:
    - id: delta-tag-reconciles
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: delta-tag-reconciles
      namespace: {{ .Release.Namespace }}
      resource: tags
      verb: GET
    - id: delta-cap-reconciles
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: delta-cap-reconciles
      namespace: {{ .Release.Namespace }}
      resource: paragraphs
      verb: GET
