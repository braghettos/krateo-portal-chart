# Reconcile latency p50 (median) — EXACT, from the reconcile span Duration (otel_traces)
# via obs-reconcile-perf. Cyan = the healthy/typical case.
kind: Statistic
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: obs-perf-p50
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [range]
  widgetData:
    title: Reconcile p50
    value: 0
    suffix: ' ms'
    valueStyle:
      color: var(--cyan-color)
  widgetDataTemplate:
  - forPath: value
    expression: '${ .p50 // 0 }'
  apiRef:
    name: obs-reconcile-perf
    namespace: {{ .Release.Namespace }}
  resourcesRefs:
    items: []
