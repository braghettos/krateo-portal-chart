# Mockup `.greet .eyebrow` — the mono uppercase context caption above the H1
# ("PLATFORM · TENANT <t>"). Tenant = the cluster, named by deployer config
# (.Values.tenant, same source as the sider tenant-chip) — honest, not fabricated.
# Renders via the Paragraph `variant: eyebrow` treatment (IBM Plex Mono, letter-spaced,
# muted, uppercased by CSS).
kind: Paragraph
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: compositions-eyebrow
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    text: 'Platform · tenant {{ .Values.tenant | default "krateo-enterprise" }}'
    variant: eyebrow
  resourcesRefs:
    items: []
