# The composition's REAL status.conditions — NOT a derived "Healthy/Drift/Pending/converged" label.
# Every condition is shown (Ready, Synced, …) with its type + status (True/False) + reason·message;
# a leading dot and a right-aligned status Tag are BOTH coloured cyan (status True) / crimson (False).
# Honest: the raw k8s conditions, all of them, coloured by their own truth value.
kind: Listy
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: list-composition-detail-conditions
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [name, namespace, status]
  apiRef:
    name: composition-detail
    namespace: {{ .Release.Namespace }}
  widgetData:
    itemTemplate:
      iconVariant: dot
      primaryText: '{type}'
      secondaryText: '{status}'
      secondaryTextAsTag: true
      # reason·message rides on subPrimaryText (the Item.Meta description line the DEFAULT
      # row variant actually renders) — `description` is only painted by the `card` variant
      # (ListView.tsx), so it would silently drop here.
      subPrimaryText: '{desc}'
      color:
        value: '{status}'
        map:
          # YAML 1.1 Norway problem: bare True/False parse as booleans → quote the map keys.
          # 'red' is the palette's crimson failed-hex; 'crimson' is NOT a key (would fall back to ink).
          "True": cyan
          "False": red
        default: gray
    dataSource: []
  widgetDataTemplate:
    - forPath: dataSource
      expression: '${ [ (.detail.status.conditions // [])[] | { type: .type, status: (.status | tostring), desc: ((.reason // "") + (if ((.message // "") | length) > 0 then (" · " + .message) else "" end)) } ] }'
  resourcesRefs:
    items: []
