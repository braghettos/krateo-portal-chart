# Object metadata (namespace / uid / created + labels) as label/value rows.
# Shaped server-side by the composition-detail RA (.metadataItems).
kind: Descriptions
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: descriptions-composition-detail-metadata
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  apiRef:
    name: composition-detail
    namespace: {{ .Release.Namespace }}
  widgetData:
    column: 1
    bordered: true
    size: small
    items: []
  widgetDataTemplate:
    - forPath: items
      expression: '${ .metadataItems }'
  resourcesRefs:
    items: []
