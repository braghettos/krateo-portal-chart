# Object metadata (namespace / uid / created + labels) as label/value rows.
# Shaped server-side by the composition-detail RA (.metadataItems).
kind: Descriptions
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: descriptions-composition-detail-metadata
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [name, namespace]
  apiRef:
    name: composition-detail
    namespace: {{ .Release.Namespace }}
  widgetData:
    column: 1
    # Form-style (read-only mirror of the create Form): connector-rail fields grouped into sections —
    # Namespace/UID/Created ungrouped at the top, the object's labels under a "labels" section.
    variant: form
    bordered: false
    size: small
    items: []
  widgetDataTemplate:
    - forPath: items
      expression: '${ [ { label: "Namespace", value: (.detail.metadata.namespace // "") }, { label: "UID", value: (.detail.metadata.uid // "") }, { label: "Created", value: (.detail.metadata.creationTimestamp // "") } ] + ((.detail.metadata.labels // {}) | to_entries | map({ section: "labels", label: .key, value: .value })) }'
  resourcesRefs:
    items: []
