# Marketplace search box — STANDALONE URL-query-bound Input.Search (queryParam: q). Submitting
# writes ?q=<text> → extras → the blueprints-catalog RA filters the catalog tiles server-side by
# name / description ($q), composing with the category facet. Sits between the page header and
# the category chips in flex.marketplace-flex.
kind: Input
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: marketplace-search
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    name: q
    queryParam: q
    placeholder: Search the catalog by name or description…
    allowClear: true
    size: middle
  resourcesRefs:
    items: []
