# The component's pods — name / ready x/y / restarts / state / age / image, all real
# values shaped by the component-detail RA. State shows the first waiting reason
# (e.g. CrashLoopBackOff, ImagePullBackOff) when a container is stuck, else the pod
# phase; cells are tinted only when something needs the eye (not-ready → crimson,
# restarts>0 → amber, stuck state → crimson / transitional → amber).
# Rows deep-link to the observability log stream scoped to the pod (CTA audit #89 F8:
# a pod row was a dead end — "which of these is spewing errors?" had no answer). The
# hand-off is /observability?svc={name} where {name} is the raw pod name; obs-log-stream's
# ?svc filter does a bidirectional case-insensitive CONTAINS against OTel ServiceName, so
# a pod name (e.g. snowplow-6dd6…-mgmqh) resolves to its owning service (ServiceName
# "snowplow" is a substring of the pod name) — verified live on krateo-installer-release
# to scope EXACTLY that service (and, unlike the bare deployment name, NOT its sibling
# *-controller/*-agent services that merely share the token). Empty/absent name → the
# Table's buildRowPath returns undefined, so the row is inert (no broken link).
kind: Table
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: component-detail-pods
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [name]
  widgetData:
    allowedResources: []
    bordered: false
    size: small
    # Row → observability log stream, scoped to this pod's owning service (see header).
    rowNavigateTo: /observability?svc={name}
    columns:
    - valueKey: name
      title: Pod
    - valueKey: ready
      title: Ready
    - valueKey: restarts
      title: Restarts
    - valueKey: state
      title: State
    - valueKey: age
      title: Age
    - valueKey: image
      title: Image
    dataSource: []
  widgetDataTemplate:
  - forPath: dataSource
    expression: '${ [ (.pods // [])[] | [ {valueKey:"name",kind:"jsonSchemaType",type:"string",stringValue:.name}, ({valueKey:"ready",kind:"jsonSchemaType",type:"string",stringValue:.ready} + ((.ready | split("/")) as $p | if $p[0] == $p[1] then {} else {color:"#cf1322"} end)), ({valueKey:"restarts",kind:"jsonSchemaType",type:"string",stringValue:(.restarts|tostring)} + (if .restarts > 0 then {color:"#d48806"} else {color:"#8c8c8c"} end)), ({valueKey:"state",kind:"jsonSchemaType",type:"string",stringValue:.state} + (if .state == "Running" then {color:"#8c8c8c"} elif (.state == "Pending" or .state == "ContainerCreating" or .state == "PodInitializing") then {color:"#d48806"} else {color:"#cf1322"} end)), {valueKey:"age",kind:"jsonSchemaType",type:"string",stringValue:.created,format:"relative"}, {valueKey:"image",kind:"jsonSchemaType",type:"string",stringValue:(.images | join(", ")),color:"#8c8c8c"} ] ] }'
  apiRef:
    name: component-detail
    namespace: {{ .Release.Namespace }}
  resourcesRefs:
    items: []
