# External Endpoint for the clickstack ClickHouse HTTP interface (:8123). snowplow's RESTAction
# `endpointRef` resolves it from this Secret (server-url key). No auth: the ClickHouse `default`
# user is open on the in-cluster network. Consumed by restaction.obs-reconcile-metrics.
apiVersion: v1
kind: Secret
metadata:
  name: clickhouse-endpoint
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
type: Opaque
stringData:
  server-url: http://krateo-clickstack-clickhouse-clickhouse-headless.{{ .Release.Namespace }}.svc:8123
