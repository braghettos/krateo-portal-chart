# This composition's events. Snapshot from the composition-events RA (GET
# /events?composition_id=<uuid> via the events-presenter); LIVE updates via SSE on
# /notifications?composition_id=<uuid> (topic "krateo") — the EventList component
# subscribes itself. compositionId is resolved at runtime by the RA.
kind: EventList
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: eventlist-composition-detail-events
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  apiRef:
    name: composition-events
    namespace: {{ .Release.Namespace }}
  widgetData:
    events: []
    sseTopic: krateo
  widgetDataTemplate:
    - forPath: events
      expression: '${ .list }'
    - forPath: sseEndpoint
      expression: '${ "/notifications?composition_id=" + (.compositionId // "") }'
  resourcesRefs:
    items: []
