# This composition's events. Snapshot from the composition-events RA (GET
# /events?composition_id=<uuid> via the events-presenter); LIVE updates via SSE on
# /notifications?composition_id=<uuid>. krateo-sse-proxy subscribes a composition_id
# connection to topic == compositionId and writes its frames as `event: <compositionId>`,
# so sseTopic MUST equal the compositionId (NOT "krateo") or the client — which listens by
# SSE event-name == sseTopic — receives nothing. Falls back to the global "krateo" topic
# only when the RA couldn't resolve a compositionId (then the endpoint's empty
# composition_id makes the proxy serve the global firehose under `event: krateo`).
# compositionId is resolved at runtime by the RA.
kind: EventList
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: eventlist-composition-detail-events
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  apiRef:
    name: composition-events
    namespace: {{ .Release.Namespace }}
  widgetData:
    events: []
    sseTopic: krateo
  widgetDataTemplate:
    - forPath: events
      expression: '${ .list }'
    - forPath: sseEndpoint
      expression: '${ "/notifications?composition_id=" + (.compositionId // "") }'
    # Listen on the per-composition SSE event-name (== compositionId); fall back to the
    # global "krateo" topic only when no compositionId was resolved.
    - forPath: sseTopic
      expression: '${ if (.compositionId // "") == "" then "krateo" else .compositionId end }'
  resourcesRefs:
    items: []
