# Settings → Krateo tab content — the Krateo control-plane workloads (real
# Deployments in the Krateo namespace), shaped here in widgetDataTemplate from
# the thin settings-krateo-status RA. Ready = readyReplicas/replicas; Image =
# the first container image basename. No fabricated status.
kind: Table
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: settings-krateo-status
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    allowedResources: []
    bordered: false
    size: middle
    columns:
    - valueKey: name
      title: Component
    - valueKey: ready
      title: Ready
    - valueKey: image
      title: Image
    dataSource: []
  widgetDataTemplate:
  - forPath: dataSource
    expression: '${ [ .list[] | [ {valueKey:"name",kind:"jsonSchemaType",type:"string",stringValue:.metadata.name}, {valueKey:"ready",kind:"jsonSchemaType",type:"string",stringValue:( ((.status.readyReplicas // 0)|tostring) + "/" + ((.spec.replicas // 0)|tostring) )}, {valueKey:"image",kind:"jsonSchemaType",type:"string",stringValue:( (.spec.template.spec.containers[0].image // "") | split("/") | last )} ] ] }'
  apiRef:
    name: settings-krateo-status
    namespace: {{ .Release.Namespace }}
  resourcesRefs:
    items: []
