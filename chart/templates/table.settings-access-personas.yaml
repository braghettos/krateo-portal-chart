# Settings → Access personas table (W3-2). One row per platform user — the same
# strategy-agnostic clientconfig-Secret source as the Users tab, via the extended
# settings-users RA's `.personas` (username + basic-User groups + managed-grant
# count, all joined server-side). Groups render "—" for OIDC/LDAP identities
# (membership lives in the IdP — an honesty limit the detail page repeats).
# Rows navigate to the per-persona drill-down: preview / grant / revoke.
kind: Table
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: settings-access-personas
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    allowedResources: []
    rowNavigateTo: /settings/access/{user}
    bordered: false
    size: middle
    columns:
    - valueKey: user
      title: User
    - valueKey: groups
      title: Groups
    - valueKey: issued
      title: First login
    - valueKey: grants
      title: Managed grants
    dataSource: []
  widgetDataTemplate:
  # One row per persona. Groups is the basic-User CR join (blank → "—", honest for
  # IdP-managed identities); grants is the count of portal-access RoleBindings.
  - forPath: dataSource
    expression: >
      ${ [ (.personas // [])[] | [
          {valueKey:"user",kind:"jsonSchemaType",type:"string",stringValue:(.username // "")},
          {valueKey:"groups",kind:"jsonSchemaType",type:"string",stringValue:(if ((.groups // [])|length) > 0 then (.groups|join(", ")) else "—" end)},
          {valueKey:"issued",kind:"jsonSchemaType",type:"string",stringValue:(.created // ""),format:"relative"},
          {valueKey:"grants",kind:"jsonSchemaType",type:"string",stringValue:((.grants // 0)|tostring)}
        ] ] }
  apiRef:
    name: settings-users
    namespace: {{ .Release.Namespace }}
  resourcesRefs:
    items: []
