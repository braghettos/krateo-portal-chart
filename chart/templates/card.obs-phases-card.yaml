# Titled panel around the reconcile phase-breakdown list. The `extra` shows the overall
# reconcile mean + sample count (from the RA's pctl step) — e.g. "avg 1674ms · 11179 reconciles · 6h".
kind: Card
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: obs-phases-card
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [range]
  widgetData:
    title: Where reconcile time goes
    titleVariant: eyebrow
    variant: outlined
    extra: 'mean per phase'
    items:
    - resourceRefId: obs-reconcile-phases
  widgetDataTemplate:
  - forPath: extra
    expression: '${ "avg " + ((.avg // 0)|tostring) + "ms · " + ((.n // 0)|tostring) + " reconciles" }'
  apiRef:
    name: obs-reconcile-perf
    namespace: {{ .Release.Namespace }}
  resourcesRefs:
    items:
    - id: obs-reconcile-phases
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-reconcile-phases
      namespace: {{ .Release.Namespace }}
      resource: listies
      verb: GET
