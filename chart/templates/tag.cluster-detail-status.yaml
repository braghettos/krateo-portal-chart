# Probe-verdict pill next to the cluster title — the SAME state grammar as the
# clusters-table Health column (cluster connectivity is a STATE, not a progress bar).
# Label + colour are computed server-side by the cluster-detail RA (own-probe first,
# compdef roll-up fallback). Honest states:
#   Healthy   (green) — the target's probe (or all targeting blueprints) report Healthy
#   Down      (red)   — the target's probe (or any targeting blueprint) reports Down
#   Unknown   (gray)  — no probe signal yet
#   NotFound  (gray)  — no such KubernetesTarget (or not visible to this user)
kind: Tag
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: cluster-detail-status
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [name]
  apiRef:
    name: cluster-detail
    namespace: {{ .Release.Namespace }}
  widgetData:
    label: Unknown
    color: default
  widgetDataTemplate:
    - forPath: label
      expression: '${ .healthLabel // "Unknown" }'
    - forPath: color
      expression: '${ .healthColor // "gray" }'
  resourcesRefs:
    items: []
