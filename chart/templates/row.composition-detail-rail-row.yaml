# Single full-width (size 24) Row wrapping the rail column — mirrors composition-detail-grid's Row
# so the rail card lands on the EXACT same left/right edges as the Spec/Health cards beneath it
# (both inset by the same Row gutter), fixing the "rail reads wider than the grid" mismatch.
kind: Row
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: composition-detail-rail-row
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [name, namespace]
  widgetData:
    allowedResources:
      - flexes
    alignment: top
    items:
      - resourceRefId: composition-detail-rail-col
        size: 24
  resourcesRefs:
    items:
      - id: composition-detail-rail-col
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: composition-detail-rail-col
        namespace: {{ .Release.Namespace }}
        resource: flexes
        verb: GET
