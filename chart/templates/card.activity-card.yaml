kind: Card
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: activity-card
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    title: Recent activity
    titleVariant: eyebrow
    variant: outlined
    # Live events surface via the global SSE bell; this is the recent-activity snapshot.
    live: true
    # "View all" is now a real CTA → the Observability event feed (CTA-audit D1: it was
    # a dead text label — promise without payload).
    extra: View all
    clickActionId: view-activity
    widgetActions:
      navigate:
        - id: view-activity
          type: navigate
          path: /observability
    items:
    - resourceRefId: list-activity-events
  resourcesRefs:
    items:
    - id: list-activity-events
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: list-activity-events
      namespace: {{ .Release.Namespace }}
      resource: listies
      verb: GET
