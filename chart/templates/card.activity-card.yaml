kind: Card
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: activity-card
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    title: Recent activity
    variant: outlined
    # SSE-backed feed — "Live" badge renders inline with the title.
    live: true
    extra: View all
    items:
    - resourceRefId: activity-events
  resourcesRefs:
    items:
    - id: activity-events
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: activity-events
      namespace: {{ .Release.Namespace }}
      resource: eventlists
      verb: GET
