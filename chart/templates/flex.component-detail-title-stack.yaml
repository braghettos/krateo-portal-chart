# Left side of the component-detail pagehead: back link over the title line
# (name + ready Tag) over the subtitle — same stack as composition-detail.
kind: Flex
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: component-detail-title-stack
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [name]
  widgetData:
    vertical: true
    gap: small
    allowedResources:
      - buttons
      - flexes
      - paragraphs
    items:
      - resourceRefId: component-detail-back
      - resourceRefId: component-detail-title-line
      - resourceRefId: component-detail-subtitle
  resourcesRefs:
    items:
      - id: component-detail-back
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: component-detail-back
        namespace: {{ .Release.Namespace }}
        resource: buttons
        verb: GET
      - id: component-detail-title-line
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: component-detail-title-line
        namespace: {{ .Release.Namespace }}
        resource: flexes
        verb: GET
      - id: component-detail-subtitle
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: component-detail-subtitle
        namespace: {{ .Release.Namespace }}
        resource: paragraphs
        verb: GET
