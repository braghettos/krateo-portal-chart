kind: Tag
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: delta-tag-compositions
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    label: '+0'
    color: blue
    # Sized to match (slightly exceed) the caption so the delta number is legible.
    style:
      fontSize: '15px'
      fontWeight: 600
      lineHeight: '20px'
  widgetDataTemplate:
  - forPath: label
    expression: '${ "+" + ((.list | length) | tostring) }'
  apiRef:
    name: dashboard-data
    namespace: {{ .Release.Namespace }}
  resourcesRefs:
    items: []
