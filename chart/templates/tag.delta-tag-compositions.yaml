kind: Tag
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: delta-tag-compositions
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    label: '▲+0'
    color: cyan
    # Sized to match (slightly exceed) the caption so the delta number is legible.
    style:
      fontSize: '13px'
      fontWeight: 700
      lineHeight: '18px'
    # live-refresh: watch the composition kinds so the delta updates with the count Statistic
    # (which already watches) — keeps count + delta consistent without a reload. Computed, not hardcoded.
    watch: []
  widgetDataTemplate:
  - forPath: watch
    expression: '${ [ .list[] | { apiVersion: .av, kind: .kind } ] | unique }'
  - forPath: label
    expression: '${ "▲+" + ((.list | length) | tostring) }'
  apiRef:
    name: dashboard-data
    namespace: {{ .Release.Namespace }}
  resourcesRefs:
    items: []
