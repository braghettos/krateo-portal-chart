# The published-blueprints registry — ONE row per Autopilot-authored blueprint, off
# blueprint-builder-deliverables. Columns: Blueprint (chart) / Pull request title /
# Version / Status chip (Registered=green, Reconciling=gold, In review=blue) /
# Marketplace chip (Available=green, shown only when the chart is in the helm index) /
# PR # / Published age. Rows are LINKABLE: rowNavigateTo lands on the blueprint detail
# page (/blueprints/{ns}/{chart}) — the {ns} + {chart} tokens resolve from the row's
# cells (ns rides as a hidden cell, bound to no column). A merged+registered blueprint
# opens its detail; an in-review one still links (detail shows not-found until CI registers it).
#
# WHY the PR is a plain "#N" TEXT cell, not a link (issue #28): a Table can only navigate a
# whole ROW (rowNavigateTo) — it has NO per-cell href, and rowNavigateTo runs
# encodeURIComponent on every interpolated value (Table.tsx), which percent-mangles a full
# https:// URL so it stops matching navigateOrExternal's ^https?:// external-link test. So the
# primary row deliberately targets the richer BLUEPRINT detail (/blueprints/{ns}/{chart}); the
# raw GitHub PR remains openable on the /portal-builder page, whose Listy lists EVERY builder
# PR (blueprint + portal) and CAN pass a full html_url verbatim. The url rides as a hidden cell
# here so the row still carries the PR link in page context (agent grounding), just not clickable.
kind: Table
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: blueprint-builder-deliverables
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    allowedResources: []
    bordered: false
    size: small
    rowNavigateTo: /blueprints/{ns}/{chart}
    pagination:
      defaultPageSize: 15
    columns:
    - valueKey: chart
      title: Blueprint
    - valueKey: title
      title: Pull request
    - valueKey: version
      title: Version
    - valueKey: status
      title: Status
    - valueKey: market
      title: Marketplace
    - valueKey: pr
      title: PR
    - valueKey: age
      title: Published
    dataSource: []
  widgetDataTemplate:
  - forPath: dataSource
    expression: '${ [ (.rows // [])[] | [ {valueKey:"chart",kind:"jsonSchemaType",type:"string",stringValue:(.chart // "")}, {valueKey:"title",kind:"jsonSchemaType",type:"string",stringValue:(.title // "")}, {valueKey:"version",kind:"jsonSchemaType",type:"string",stringValue:(.version // "—"),color:"#8c8c8c"}, {valueKey:"status",kind:"tag",stringValue:(.status // "In review"),color:(.statusColor // "gold")}, (if (.marketLabel // "") != "" then {valueKey:"market",kind:"tag",stringValue:.marketLabel,color:(.marketColor // "green")} else {valueKey:"market",kind:"jsonSchemaType",type:"string",stringValue:"—",color:"#8c8c8c"} end), {valueKey:"pr",kind:"jsonSchemaType",type:"string",stringValue:(.pr // ""),color:"#8c8c8c"}, {valueKey:"age",kind:"jsonSchemaType",type:"string",stringValue:(.age // ""),format:"relative"}, {valueKey:"ns",kind:"jsonSchemaType",type:"string",stringValue:(.ns // "")}, {valueKey:"url",kind:"jsonSchemaType",type:"string",stringValue:(.url // "")} ] ] }'
  apiRef:
    name: blueprint-builder-deliverables
    namespace: {{ .Release.Namespace }}
  resourcesRefs:
    items: []
