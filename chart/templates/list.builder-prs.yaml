# In-flight builder pull requests — one row per pullrequests.github.krateo.io CR. Each row is
# EXTERNALLY LINKABLE: navigateTo carries the PR's status.html_url, and the frontend opens an
# http(s) target in a new tab (navigateOrExternal, frontend ≥ 1.3.36) — so a click lands on the
# real GitHub PR.
#
# WHY A Listy, NOT A Table (the same-pattern consistency question, issues #26/#27): a Table can
# only navigate a whole ROW via rowNavigateTo, and its buildRowPath runs encodeURIComponent on
# every interpolated cell (Table.tsx) — which percent-mangles a full https:// URL so it no
# longer matches navigateOrExternal's ^https?:// test and gets treated as a broken in-app route.
# A Listy passes navigateTo THROUGH verbatim, so it is the only widget that can open the real PR.
# We therefore keep the Listy but bring it up to the blueprint/kog deliverables tables' richness:
# a domain STATE chip + the PR identity (owner/repo · #N · branch) + a relative open-age, and the
# row is self-evidently clickable (no static "select a row" instruction needed — #27 dropped it).
#
# STATE chip is GitHub-domain vocabulary (NOT k8s status): open→blue "Open", merged→green
# "Merged" (a genuinely-landed deliverable earns green, the health colour), closed→slate/gray
# "Closed", pre-reconcile→gold. Sentence-cased + merged-vs-closed derived server-side. A PR with
# no URL yet (pre-reconcile) is inert.
kind: Listy
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: builder-prs
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  apiRef:
    name: builder-prs
    namespace: {{ .Release.Namespace }}
  widgetData:
    dataSource: []
    itemLayout: horizontal
    split: false
    itemTemplate:
      navigateTo: '{url}'
      iconVariant: dot
      color:
        value: '{state}'
        map:
          open: blue
          merged: green
          closed: gray
        default: gold
      primaryText: '{title}'
      # Identity pill: "<owner>/<repo> · #<N> · <branch>" (mono).
      subPrimaryText: '{sub}'
      subPrimaryTextMono: true
      # Open age (raw creationTimestamp → "14d ago" via the relative format below).
      subSecondaryText: '{created}'
      secondaryText: '{stateLabel}'
      secondaryTextAsTag: true
      formats:
        subSecondaryText: relative
  widgetDataTemplate:
    - forPath: dataSource
      # The RA already emits per-row title/sub/state/stateLabel/created/url — pass rows through.
      expression: '${ .rows // [] }'
  resourcesRefs:
    items: []
