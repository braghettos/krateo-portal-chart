kind: Card
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: obs-stat-card-total
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    variant: outlined
    clickActionId: view-all
    widgetActions:
      navigate:
        - id: view-all
          type: navigate
          path: /compositions
    items:
    - resourceRefId: obs-stat-total
  resourcesRefs:
    items:
    - id: obs-stat-total
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-stat-total
      namespace: {{ .Release.Namespace }}
      resource: statistics
      verb: GET
