# Mono uppercase context caption above the /search H1 — joins the shared page-header
# rhythm (eyebrow + H1 + subtitle) the other pages carry (UX-audit #11: the results
# page had no header family at all). "portal-wide" states the scope honestly: the
# global-search RA spans compositions, blueprints, clusters and incidents.
kind: Paragraph
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: search-eyebrow
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): /search carries ?q= as an extra; declare it so the cache guard
  # accepts Puts for this widget (content is q-invariant, key partitioning is not).
  keyExtras: [q]
  widgetData:
    text: 'Search · portal-wide'
    variant: eyebrow
  resourcesRefs:
    items: []
