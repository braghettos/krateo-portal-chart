# Header-search results. Fed by the `global-search` RESTAction (apiRef), which
# filters compositions + blueprints server-side by the `q` term the frontend
# forwards as ?extras={"q":...} on this List's /call. widgetDataTemplate maps the
# RA's `.items` into the List `dataSource`; itemTemplate renders each row.
# Each row is clickable: itemTemplate.navigateTo binds the RA's per-result `link`
# (compositions → /compositions/{ns}/{name}; blueprints → /marketplace/{ns}/{name}/new),
# so a hit SPA-navigates to its detail/create route (the §A per-row navigate slice).
# A leading dot colors by result type (composition vs blueprint) for scannability —
# neutral/blue hues only (status-pill spec: green is reserved for HEALTH; a type is
# not a status). The subtitle carries the type word, so no information rides on hue.
kind: Listy
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: search-results
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [q]
  apiRef:
    name: global-search
    namespace: {{ .Release.Namespace }}
  widgetData:
    itemLayout: horizontal
    split: false
    dataSource: []
    itemTemplate:
      primaryText: '{title}'
      secondaryText: '{subtitle}'
      navigateTo: '{link}'
      iconVariant: dot
      color:
        value: '{type}'
        map:
          composition: blue
          blueprint: slate
        default: gray
  widgetDataTemplate:
    - forPath: dataSource
      expression: ${ .items }
  resourcesRefs:
    items: []
