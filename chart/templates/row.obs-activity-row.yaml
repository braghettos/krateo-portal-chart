# Activity + inventory — recent platform events (left, wide) and the platform inventory
# stats (right). Events off the `events` RA; inventory off blueprints-cards +
# compositions-list. Mirrors the dashboard charts-row split, cards enum already used.
kind: Row
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: obs-activity-row
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    allowedResources:
    - cards
    alignment: top
    items:
    - resourceRefId: obs-activity-card
      size: 16
    - resourceRefId: obs-inventory-card
      size: 8
  resourcesRefs:
    items:
    - id: obs-activity-card
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-activity-card
      namespace: {{ .Release.Namespace }}
      resource: cards
      verb: GET
    - id: obs-inventory-card
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-inventory-card
      namespace: {{ .Release.Namespace }}
      resource: cards
      verb: GET
