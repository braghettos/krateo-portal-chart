# Right side of the detail pagehead: the action button cluster.
# Sync (refresh page data) · Pause/Resume · Edit · Delete are appended here as each
# is wired. Buttons resolve their per-composition target from the composition-detail
# RA (.gvr), so this Flex itself is data-agnostic.
kind: Flex
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: composition-detail-actions
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [name, namespace]
  widgetData:
    vertical: false
    gap: small
    align: center
    allowedResources:
      - buttons
    items:
      - resourceRefId: composition-detail-diagnose
      - resourceRefId: composition-detail-sync
      - resourceRefId: composition-detail-pause
      - resourceRefId: composition-detail-edit
      - resourceRefId: composition-detail-delete
  resourcesRefs:
    items:
      - id: composition-detail-diagnose
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: composition-detail-diagnose
        namespace: {{ .Release.Namespace }}
        resource: buttons
        verb: GET
      - id: composition-detail-sync
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: composition-detail-sync
        namespace: {{ .Release.Namespace }}
        resource: buttons
        verb: GET
      - id: composition-detail-pause
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: composition-detail-pause
        namespace: {{ .Release.Namespace }}
        resource: buttons
        verb: GET
      - id: composition-detail-edit
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: composition-detail-edit
        namespace: {{ .Release.Namespace }}
        resource: buttons
        verb: GET
      - id: composition-detail-delete
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: composition-detail-delete
        namespace: {{ .Release.Namespace }}
        resource: buttons
        verb: GET
