kind: Button
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: new-composition
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    label: New composition
    type: primary
    icon: fa-plus
    # Navigate to the Marketplace (the blueprint picker) → Install → Create flow.
    clickActionId: new-composition-nav
    actions:
      navigate:
        - id: new-composition-nav
          path: /marketplace
          type: navigate
  resourcesRefs:
    items: []
