kind: Button
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: new-composition
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [namespace]
  widgetData:
    # "Create composition" not "New composition" (UX-audit #10): Create is THE verb for
    # making a composition (blueprints grid, blueprint detail, form submit all say Create).
    label: Create composition
    type: primary
    icon: fa-plus
    # A composition is created ONLY from an installed blueprint → navigate to /blueprints
    # (the installed-blueprint catalog); pick one → its detail page → Create. The Marketplace
    # is for INSTALLING blueprints (deploying CompositionDefinitions), not creating compositions.
    clickActionId: new-composition-nav
    actions:
      navigate:
        - id: new-composition-nav
          path: /blueprints
          type: navigate
  resourcesRefs:
    items: []
