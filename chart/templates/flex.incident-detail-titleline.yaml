# #69 §0.4: the incident H2 title with the Lifecycle + Trigger tags INLINE directly after it
# (compact metadata on the title's own line, e.g. "Payments-API database failure  ● Open · Alert"),
# instead of a separate full-width chip block below the title. Horizontal, vertically centered,
# wrapping so a long title drops the tags to the next line rather than overflowing. The affected-
# resource ref + the clickable Alert link stay on their own line below (incident-detail-chips).
kind: Flex
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: incident-detail-titleline
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [name, namespace]
  widgetData:
    allowedResources:
    - paragraphs
    - tags
    gap: small
    align: center
    wrap: true
    items:
    - resourceRefId: incident-detail-title
    - resourceRefId: incident-lifecycle
    - resourceRefId: incident-trigger
  resourcesRefs:
    items:
    - id: incident-detail-title
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: incident-detail-title
      namespace: {{ .Release.Namespace }}
      resource: paragraphs
      verb: GET
    - id: incident-lifecycle
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: incident-lifecycle
      namespace: {{ .Release.Namespace }}
      resource: tags
      verb: GET
    - id: incident-trigger
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: incident-trigger
      namespace: {{ .Release.Namespace }}
      resource: tags
      verb: GET
