# Page header (H1 + subtitle) for the create route — greeting pattern.
kind: Flex
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: create-header
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [name, namespace]
  widgetData:
    allowedResources:
    - paragraphs
    vertical: true
    items:
    - resourceRefId: create-title
    - resourceRefId: create-subtitle
  resourcesRefs:
    items:
    - id: create-title
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: create-title
      namespace: {{ .Release.Namespace }}
      resource: paragraphs
      verb: GET
    - id: create-subtitle
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: create-subtitle
      namespace: {{ .Release.Namespace }}
      resource: paragraphs
      verb: GET
