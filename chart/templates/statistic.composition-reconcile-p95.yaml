# p95 reconcile duration for THIS composition (trace-span Duration, ms). Honest-empty:
# with zero reconciles in the window the value is an em dash and the unit suffix is
# dropped — never a fabricated 0 ms.
kind: Statistic
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: composition-reconcile-p95
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [name, namespace]
  apiRef:
    name: composition-reconcile-perf
    namespace: {{ .Release.Namespace }}
  widgetData:
    title: p95 duration
    value: '—'
    suffix: ''
  widgetDataTemplate:
    - forPath: value
      expression: '${ if .p95 == null then "—" else (.p95 | floor) end }'
    - forPath: suffix
      expression: '${ if .p95 == null then "" else "ms" end }'
  resourcesRefs:
    items: []
