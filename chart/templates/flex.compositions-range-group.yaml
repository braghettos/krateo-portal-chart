# SUPERSEDED / UNREFERENCED — the compositions toolbar was decluttered to match the mockup
# (search + status chips only). This Flex used to hold the time-range apparatus (preset
# chips 24h/7d/30d/all + the custom from/to comp-date-range RangePicker) plus the search
# box, and was referenced by compositions-toolbar. The time-range controls were removed and
# the search is now referenced DIRECTLY by compositions-toolbar, so nothing references this
# Flex anymore. Kept as an empty, inert widget (no items → renders nothing) rather than
# deleted, mirroring how the compositions-range-chips / comp-date-range CRs are left in place
# but unreferenced. Safe to delete later.
kind: Flex
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: compositions-range-group
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [namespace]
  widgetData:
    allowedResources:
    - listies
    - rangepickers
    - inputs
    gap: small
    align: center
    wrap: true
    items: []
  resourcesRefs:
    items: []
