# Time-range chip group + custom range picker (right side of the compositions toolbar).
# The preset chips (24h/7d/30d/all) and the custom from/to RangePicker both drive the
# same compositions-list time window via the URL; the picker (comp-date-range) sets
# ?from/?to which take precedence over a preset ?range.
kind: Flex
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: compositions-range-group
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    allowedResources:
    - listies
    - rangepickers
    - inputs
    gap: small
    align: center
    wrap: true
    items:
    # The four comp-range-btn-* Buttons collapsed into ONE data-driven Listy(chip)
    # (widget-sprawl collapse) — same targets, default and active logic.
    - resourceRefId: compositions-range-chips
    - resourceRefId: comp-date-range
    - resourceRefId: comp-search
  resourcesRefs:
    items:
    - id: compositions-range-chips
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: compositions-range-chips
      namespace: {{ .Release.Namespace }}
      resource: listies
      verb: GET
    - id: comp-date-range
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: comp-date-range
      namespace: {{ $.Release.Namespace }}
      resource: rangepickers
      verb: GET
    - id: comp-search
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: compositions-search
      namespace: {{ $.Release.Namespace }}
      resource: inputs
      verb: GET
