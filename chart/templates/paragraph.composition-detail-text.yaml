# Proof widget for the convention's templated routing. On /compositions/{namespace}/{name}
# the route params reach this widget via ?extras (useWidgetQuery folds useParams() in,
# snowplow >= 1.1.0 Fix-2 merges extras into the widgetDataTemplate data source). This
# no-apiRef Paragraph computes its text server-side from extras.namespace / extras.name —
# proving params flow through the same channel as the greeting's displayName and search's q.
kind: Paragraph
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: composition-detail-text
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  apiRef:
    name: composition-detail
    namespace: {{ .Release.Namespace }}
  widgetData:
    text: Composition detail
    strong: true
    # object-level live-refresh: watch exactly THIS composition. The composition-detail
    # RA discovers its GVK from the route name/namespace; the matcher's name pins it to
    # the one object, so only this detail page refetches when it reconciles.
    watch: []
  widgetDataTemplate:
    - forPath: text
      expression: '${ "Composition " + (.detail.name // "?") + " in namespace " + (.detail.namespace // "?") }'
    - forPath: watch
      expression: '${ [ .detail | select(.apiVersion != null) | { apiVersion: .apiVersion, kind: .kind, namespace: .namespace, name: .name } ] }'
  resourcesRefs:
    items: []
