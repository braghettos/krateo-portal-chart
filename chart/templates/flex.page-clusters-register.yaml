# Register page — the route /clusters/register renders here (page-<slug> convention).
# Hosts the register-cluster Form, which POSTs a KubernetesTarget (registers a spoke).
# Mirrors flex.page-blueprint-install.
kind: Flex
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: page-clusters-register
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    allowedResources:
      - flexes
      - forms
    vertical: true
    gap: large
    items:
      - resourceRefId: register-cluster-form
  resourcesRefs:
    items:
      - id: register-cluster-form
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: register-cluster
        namespace: {{ .Release.Namespace }}
        resource: forms
        verb: GET
