# /incidents data source — one row per TroubleshootingReport CR (observability.krateo.io,
# written by krateo-alert-troubleshooter). All derivation is server-side:
#   rows      : the incident list (title = rootCause one-liner with honest fallbacks,
#               lifecycle, trigger, affected-resource mono ref, age, confidence, severity
#               dot colour), filtered by the ?status= lifecycle chip (extras).
#   counts    : per-lifecycle totals over the FULL set (before the status filter) so every
#               chip shows its live count regardless of the selected chip.
#   awaiting  : firing Alert CRs (state=ALERT) that have NO report yet — the
#               "awaiting investigation" strip (exception-only; hidden when empty). Each
#               carries askHref: an /incidents?ask= Autopilot deep-link (@uri, server-built).
#   projects  : echo of the shell scope param, so the chip Listy (incidents-status-chips)
#               can rebuild query-merged routes server-side.
# Severity is DERIVED, not invented (Alert CRs carry no severity field): resolved → gray
# (calm), confirmed rootCause while unresolved → crimson, still-uninvestigated/no-verdict →
# amber. v1 prose-only reports degrade to their alertName/CR name and "—" confidence.
apiVersion: templates.krateo.io/v1
kind: RESTAction
metadata:
  name: incidents-list
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  api:
    - name: reports
      path: /apis/observability.krateo.io/v1alpha1/namespaces/{{ .Release.Namespace }}/troubleshootingreports
      verb: GET
      continueOnError: true
      errorKey: reportsError
    - name: alerts
      path: /apis/observability.krateo.io/v1alpha1/namespaces/{{ .Release.Namespace }}/alerts
      verb: GET
      continueOnError: true
      errorKey: alertsError
  filter: >
    (.status // "all") as $sel
    | ((.reports.items) // []) as $items
    | ($items | map(
        (.status.rootCause // {}) as $rc
        | (.status.lifecycle // "open") as $lc
        | ([ (.status.analyzedResources // [])[] | select((.gvr // "") | contains("composition")) ] | first) as $comp
        | {
            name: (.metadata.name // ""),
            # namespace is DERIVED from the query namespace (this RA lists a fixed
            # namespaces/<ns>/troubleshootingreports path), NOT from .metadata.namespace: a
            # namespace-scoped list omits it per item (redundant with the path) and snowplow
            # does not backfill it — an empty {namespace} made the incidents-table rowNavigateTo
            # (/incidents/{namespace}/{name}) resolve empty, so Table.buildRowPath returned
            # undefined and the row click opened nothing. The literal is honest: these reports
            # ARE in the release namespace we just queried.
            namespace: "{{ .Release.Namespace }}",
            title: (if ($rc.statement // "") != "" then $rc.statement elif (.spec.alertName // "") != "" then ("Investigation — " + .spec.alertName) else (.metadata.name // "") end),
            trigger: (.spec.trigger // "alert"),
            lifecycle: $lc,
            phase: (.status.phase // "Pending"),
            ref: (if $comp then ((($comp.gvr // "") | split("/") | last) + "/" + ($comp.name // "") + " · " + ($comp.namespace // "")) else "—" end),
            age: (.metadata.creationTimestamp // ""),
            triggeredAt: (.spec.triggeredAt // .metadata.creationTimestamp // ""),
            confidence: (((($rc.confidence // "") | (try tonumber catch null))) as $n | if $n != null then ((($n * 100) | round | tostring) + "%") else "—" end),
            sevColor: (if $lc == "resolved" then "#8c8c8c" elif ($rc.statement // "") != "" then "#cf1322" else "#d48806" end)
          }
      ) | sort_by(.triggeredAt // "") | reverse) as $rows
    | ([ ((.alerts.items) // [])[]
         | . as $a
         | select((.status.state // "") == "ALERT")
         # HONESTY (IA incidents-deepdive): a report keys its alert by DISPLAY name
         # (spec.alertName, may carry an emoji) while the Alert CR's identity is a slug
         # (metadata.name) + a separate spec.displayName. The old literal alertName==metadata.name
         # NEVER matched, so an already-analyzed firing alert was wrongly listed "awaiting".
         # Match on a NORMALIZED key (lowercased, alphanumerics only) against BOTH the alert's
         # metadata.name AND its displayName.
         | (($a.metadata.name // "") | ascii_downcase | gsub("[^a-z0-9]"; "")) as $anorm
         | (($a.spec.displayName // "") | ascii_downcase | gsub("[^a-z0-9]"; "")) as $dnorm
         | select(([ $items[]
                     | (((.spec.alertName // "") | ascii_downcase | gsub("[^a-z0-9]"; ""))) as $rnorm
                     | select($rnorm != "" and ($rnorm == $anorm or $rnorm == $dnorm)) ] | length) == 0)
         | { name: ($a.spec.displayName // $a.metadata.name // ""),
             state: ($a.status.state // "ALERT"),
             askHref: ("/incidents?ask=" + (("Investigate the \"" + ($a.spec.displayName // $a.metadata.name // "this alert") + "\" observability alert — it is firing but has no troubleshooting report yet. Run a root-cause analysis and give me the concrete next steps.") | @uri)) }
       ] | .[0:8]) as $awaiting
    | {
        rows: (if $sel == "all" then $rows else [ $rows[] | select(.lifecycle == $sel) ] end),
        counts: {
          all: ($rows | length),
          open: ([ $rows[] | select(.lifecycle == "open") ] | length),
          mitigated: ([ $rows[] | select(.lifecycle == "mitigated") ] | length),
          resolved: ([ $rows[] | select(.lifecycle == "resolved") ] | length)
        },
        status: $sel,
        projects: ((.projects // "") | tostring),
        awaiting: $awaiting,
        awaitingCount: ($awaiting | length)
      }
