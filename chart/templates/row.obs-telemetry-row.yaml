# Live telemetry strip — the reconcile-throughput card (ClickHouse otel_traces), full width.
# First widget on the observability page sourced from OTel telemetry rather than composition
# snapshots. Room for latency/error breakdown cards beside it in a later pass.
kind: Row
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: obs-telemetry-row
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    allowedResources:
    - cards
    items:
    - resourceRefId: obs-throughput-card
      size: 24
  resourcesRefs:
    items:
    - id: obs-throughput-card
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-throughput-card
      namespace: {{ .Release.Namespace }}
      resource: cards
      verb: GET
