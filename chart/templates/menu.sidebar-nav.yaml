# Sidebar nav — antd Menu hosted in the app-shell Sider; the SINGLE route source (no RoutesLoader).
# Each inline item is a folded nav entry (widget-taxonomy-and-layout.md §H):
#  - items with a `label` → a visible sidebar entry AND a route;
#  - label-less items → route-only (hidden), e.g. the templated detail/create routes;
#  - content endpoint precedence: `resourceRefId` (via resourcesRefs, RBAC-aware)
#    → the `flexes/page-<slug>` convention (`page:` overrides the path-derived slug).
# Templated `{param}` segments become :param and reach the page widget via ?extras.
kind: Menu
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: sidebar-nav
  namespace: {{ .Release.Namespace }}
spec:
  widgetData:
    mode: inline
    theme: light
    # NOTE: stale — predates the convention; the menu now references flexes/tables, not
    # navmenuitems/pages. Kept until the Menu.schema.json allowedResources enum is updated.
    allowedResources:
      - navmenuitems
      - pages
    items:
      - { label: Dashboard,    icon: fa-gauge,        order: 1, path: /dashboard,    resourceRefId: dashboard }
      - { label: Compositions, icon: fa-cubes,        order: 2, path: /compositions, resourceRefId: compositions }
      # Clusters → page-clusters: the hub-and-spoke registry (registered KubernetesTargets a
      # CompositionDefinition can deploy to; health rolled up from CompositionDefinition.status.target).
      - { label: Clusters,     icon: fa-server,       order: 3, path: /clusters,     resourceRefId: clusters }
      # (per-composition resource topology now lives on the composition detail page as a FlowChart —
      #  the cluster-wide /estate graph was removed: it had to list every composition, unusable at scale.)
      # Observability → page-observability: aggregates compositions health, reconciliation,
      # by-kind/by-project distribution, inventory and recent activity into one view.
      - { label: Observability, icon: fa-chart-line,  order: 4, path: /observability, resourceRefId: observability }
      # Incidents → page-incidents: the SRE page — one row per TroubleshootingReport
      # (lifecycle chips, gated remediation on the detail pages). Alerts + the Autopilot
      # troubleshooting feed moved here from /observability in the IA split.
      - { label: Incidents,    icon: fa-triangle-exclamation, order: 5, path: /incidents, resourceRefId: incidents }
      # Blueprints → page-blueprints (header + the now-selectable catalog table).
      - { label: Blueprints,   icon: fa-layer-group,  order: 6, path: /blueprints,   resourceRefId: blueprints }
      - { label: Marketplace,  icon: fa-store,        order: 7, path: /marketplace,  resourceRefId: marketplace }
      - { label: Settings,     icon: fa-gear,         order: 8, path: /settings,     resourceRefId: settings }
      # Portal Builder (CHART-P1) — the Autopilot builders' home: how-it-works + the in-flight
      # builder pull-requests table. `page: portal-builder` resolves flexes/page-portal-builder.
      - { label: Portal Builder, icon: fa-hammer, order: 9, path: /portal-builder, page: portal-builder }
      # Builder Demo — a portal page AUTHORED by the Autopilot Portal builder and published
      # end-to-end via the KOG git-write path (PR #37). `page: builderdemo` resolves the
      # flexes/page-builderdemo convention root. This nav entry is the maintainer step the
      # builder's PR body requested (the page ships via git; the nav ref is added here).
      - { label: Builder Demo, icon: fa-wand-magic-sparkles, order: 9, path: /builderdemo, page: builderdemo }
      # route-only (no label → hidden). /search renders the search-results List; its
      # ?q= is forwarded as extras to the global-search RA (server-side jq filter).
      - { order: 800, path: /search, resourceRefId: search-results }
      # Templated detail + create routes via the convention. Paths are quoted — the
      # {param} braces would otherwise be read as YAML flow mappings.
      - { order: 900, path: "/compositions/{namespace}/{name}",   page: composition-detail }
      # per-namespace compositions list — the namespace breadcrumb crumb links here.
      # Reuses page-compositions; its compositions-table self-filters by ?extras.namespace
      # (compositions-list RA) since the route param rides through as extras.
      - { order: 905, path: "/compositions/{namespace}",          page: compositions }
      - { order: 910, path: "/blueprints/{namespace}/{name}/new", page: blueprint-create }
      # Install a blueprint = deploy a CompositionDefinition (the marketplace card's Install
      # navigates here with the blueprint name; the form renders the CompositionDefinition CRD).
      - { order: 915, path: "/marketplace/{name}/install", page: blueprint-install }
      # Register a cluster = POST a KubernetesTarget (the clusters page's "Register cluster" CTA
      # navigates here; route-only/hidden → the register-cluster Form via page-clusters-register).
      - { order: 917, path: "/clusters/register", page: clusters-register }
      # Cluster drill-down — a clusters-table row click lands here (route-only/hidden).
      # One KubernetesTarget: identity + probe verdict + the blueprints targeting it
      # (the "Down" investigation surface the registry table links into).
      - { order: 918, path: "/clusters/{name}", page: cluster-detail }
      # Marketplace blueprint detail — a catalog tile's "Details" lands here (and Autopilot can
      # navigate here). Shows the helm-index metadata (description / versions / links) + Install.
      - { order: 912, path: "/marketplace/{name}", page: marketplace-detail }
      # Installed-blueprint detail — a Blueprints card click lands here. Shows chart/version/status
      # and hosts Create (instantiate) / Delete (uninstall) / version-update.
      - { order: 920, path: "/blueprints/{namespace}/{name}", page: blueprint-detail }
      # Settings component drill-down — a Krateo Deployments row click (settings-krateo-status
      # Table) lands here. Pods / conditions / events for one control-plane Deployment.
      - { order: 930, path: "/settings/components/{name}", page: component-detail }
      # Incident detail — an incidents-table row click lands here (route-only/hidden). The
      # investigation anatomy: evidence / gaps / reasoning / root cause / gated remediation.
      - { order: 940, path: "/incidents/{namespace}/{name}", page: incident-detail }
      # Access persona drill-down (W3-2) — a Settings → Access row click lands here.
      # Capability preview (SubjectAccessReview, run as the calling admin) + the grant
      # form (Role + RoleBinding in ONE gated ops[] submit) + managed-grant revoke.
      # {username} + the ?ns= scope ride through as extras to every RA on the page.
      - { order: 950, path: "/settings/access/{username}", page: access-detail }
      # KOG builder — the RestDefinition registry + post-publish verification surface
      # (w4-kog-builder spec §2.5). Route-only/hidden: Autopilot navigates here after a
      # gated publish (and the empty-state ?ask= CTA lands here too); a visible
      # author-gated "Builders" nav entry is deferred to the W3-2 grants model.
      - { order: 951, path: /kog-builder, page: kog-builder }
      # Builder-published pages (#106) — each Autopilot-authored page drops a nav fragment at
      # files/nav-fragments/<slug>.yaml ({ item: {<nav entry>} }). The Portal builder writes it as
      # part of the publish PR, so the sidebar entry ships WITH the page — no manual menu edit.
      # Builder pages use the page:<slug> convention (resolves flexes/page-<slug>), so a fragment
      # needs ONLY the `item` (no resourcesRefs entry). Glob over an empty/absent dir is a no-op.
      {{- range $path, $_ := (.Files.Glob "files/nav-fragments/*.yaml") }}
      {{- with ((($.Files.Get $path) | fromYaml).item) }}
      - {{ . | toJson }}
      {{- end }}
      {{- end }}
  resourcesRefs:
    items:
      - id: dashboard
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: dashboard-flex
        namespace: {{ .Release.Namespace }}
        resource: flexes
        verb: GET
      - id: observability
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: page-observability
        namespace: {{ .Release.Namespace }}
        resource: flexes
        verb: GET
      - id: incidents
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: page-incidents
        namespace: {{ .Release.Namespace }}
        resource: flexes
        verb: GET
      - id: compositions
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: page-compositions
        namespace: {{ .Release.Namespace }}
        resource: flexes
        verb: GET
      - id: clusters
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: page-clusters
        namespace: {{ .Release.Namespace }}
        resource: flexes
        verb: GET
      - id: blueprints
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: page-blueprints
        namespace: {{ .Release.Namespace }}
        resource: flexes
        verb: GET
      - id: marketplace
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: marketplace-flex
        namespace: {{ .Release.Namespace }}
        resource: flexes
        verb: GET
      - id: search-results
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: search-results
        namespace: {{ .Release.Namespace }}
        resource: listies
        verb: GET
      - id: settings
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: page-settings
        namespace: {{ .Release.Namespace }}
        resource: flexes
        verb: GET
