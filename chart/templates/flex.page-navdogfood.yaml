kind: Flex
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: page-navdogfood
  namespace: krateo-system
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    allowedResources:
    - paragraphs
    vertical: true
    gap: middle
    items:
    - resourceRefId: navdogfood-title
    - resourceRefId: navdogfood-note
  resourcesRefs:
    items:
    - id: navdogfood-title
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: navdogfood-title
      namespace: krateo-system
      resource: paragraphs
      verb: GET
    - id: navdogfood-note
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: navdogfood-note
      namespace: krateo-system
      resource: paragraphs
      verb: GET
