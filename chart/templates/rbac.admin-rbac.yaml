{{- if .Values.enableAdminUser }}
{{- /* Preserve an existing password across re-renders: randAlphaNum yields a NEW value
       every reconcile, so an unguarded generate makes the cdc detect drift and churn a
       helm revision every cycle (the reconcile correctly sees genuinely-different data).
       lookup the live Secret and reuse its password; only generate on first create. */}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace "admin-password" }}
{{- $password := "" }}
{{- if and $existing $existing.data (index $existing.data "password") }}
{{- $password = index $existing.data "password" | b64dec }}
{{- else }}
{{- $password = randAlphaNum 12 }}
{{- end }}
apiVersion: v1
kind: Secret
type: kubernetes.io/basic-auth
metadata:
  name: admin-password
  namespace: {{ .Release.Namespace }}
stringData:
  password: {{ $password | quote }}
---
apiVersion: basic.authn.krateo.io/v1alpha1
kind: User
metadata:
  name: admin
  namespace: {{ .Release.Namespace }}
spec:
  displayName: Admin
  avatarURL: https://i.pravatar.cc/256?img=69
  groups:
    - admins
  passwordRef:
    namespace: {{ .Release.Namespace }}
    name: admin-password
    key: password
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cluster-admin-binding-{{ .Release.Namespace }}
subjects:
- kind: Group
  name: admins
  apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: cluster-admin
  apiGroup: rbac.authorization.k8s.io
{{- end }}