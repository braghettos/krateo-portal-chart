# "Update version" card → hosts the blueprint-update Form (version picker + Update button)
# in the right column, mirroring the composition detail's card-hosted widgets.
kind: Card
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: card-blueprint-detail-update
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    title: Update version
    items:
      - resourceRefId: blueprint-update-form
  resourcesRefs:
    items:
      - id: blueprint-update-form
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: blueprint-update
        namespace: {{ .Release.Namespace }}
        resource: forms
        verb: GET
