# Title line: the component (Deployment) name as an H2 Paragraph + an inline
# ready-state Tag — mirrors composition-detail-title-line.
kind: Flex
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: component-detail-title-line
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [name]
  widgetData:
    vertical: false
    align: center
    gap: middle
    allowedResources:
      - paragraphs
      - tags
    items:
      - resourceRefId: component-detail-header
      - resourceRefId: component-detail-status
  resourcesRefs:
    items:
      - id: component-detail-header
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: component-detail-header
        namespace: {{ .Release.Namespace }}
        resource: paragraphs
        verb: GET
      - id: component-detail-status
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: component-detail-status
        namespace: {{ .Release.Namespace }}
        resource: tags
        verb: GET
