# Lifecycle chip â€” colour computed server-side by incident-detail (openâ†’red severity /
# mitigatedâ†’orange transitional / resolvedâ†’green).
# UX-18: the chip carries a muted "Lifecycle:" prefix so the bare token ("Open") isn't
# context-free next to the trigger chip; the lifecycle token stays verbatim after the label
# (Open / Mitigated / Resolved, sentence-cased) and keeps its health colour.
kind: Tag
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: incident-lifecycle
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [name, namespace]
  apiRef:
    name: incident-detail
    namespace: {{ .Release.Namespace }}
  widgetData:
    label: 'Lifecycle: Open'
    color: red
  widgetDataTemplate:
    - forPath: label
      expression: '${ "Lifecycle: " + ((.lifecycle // "open") | (.[0:1] | ascii_upcase) + .[1:]) }'
    - forPath: color
      expression: '${ .lifecycleColor // "red" }'
  resourcesRefs:
    items: []
