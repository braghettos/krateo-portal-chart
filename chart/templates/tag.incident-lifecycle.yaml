# Lifecycle chip (Open / Mitigated / Resolved, sentence case) â€” colour computed server-side
# by incident-detail (openâ†’red severity / mitigatedâ†’orange transitional / resolvedâ†’green).
kind: Tag
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: incident-lifecycle
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [name, namespace]
  apiRef:
    name: incident-detail
    namespace: {{ .Release.Namespace }}
  widgetData:
    label: Open
    color: red
  widgetDataTemplate:
    - forPath: label
      expression: '${ (.lifecycle // "open") | (.[0:1] | ascii_upcase) + .[1:] }'
    - forPath: color
      expression: '${ .lifecycleColor // "red" }'
  resourcesRefs:
    items: []
