# Health = % of the composition's status.conditions that are True (computed
# server-side by the composition-detail RA, .healthPercent). 0% when no
# conditions are reported yet (honest — not "unhealthy", just not reconciled).
# The ring is STATE-COLOURED (not always cyan): a Ready-but-Synced=False comp
# is DRIFT → magenta ring, so a 50% drift ring doesn't read cyan-"healthy".
# Mirrors the reconciliation-rail / status-chip Petrol state language.
kind: Progress
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: progress-composition-detail-health
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  apiRef:
    name: composition-detail
    namespace: {{ .Release.Namespace }}
  widgetData:
    type: circle
    showInfo: true
    percent: 0
    # strokeColor enum maps via getColorCode → Petrol hexes: green=#34D6C8 (cyan),
    # violet=#D86BC4 (magenta/drift), orange=#F2A33C (amber/pending), red=crimson.
    strokeColor: green
  widgetDataTemplate:
    - forPath: percent
      expression: '${ (.detail.status.conditions // []) as $c | if ($c | length) > 0 then (($c | map(select(.status == "True")) | length) * 100 / ($c | length) | floor) else 0 end }'
    - forPath: strokeColor
      expression: '${ (.detail.status.conditions // []) as $c | (($c | map(select(.type == "Ready" and .status == "True")) | length) > 0) as $ready | (($c | map(select(.type == "Synced" and .status == "False")) | length) > 0) as $unsynced | if $ready and $unsynced then "violet" elif $ready then "green" elif ($c | map(select(.status == "False")) | length) > 0 then "red" else "orange" end }'
  resourcesRefs:
    items: []
