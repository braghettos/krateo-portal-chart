kind: Card
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: obs-stat-card-failed
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    variant: outlined
    clickActionId: view-failed
    widgetActions:
      navigate:
        - id: view-failed
          type: navigate
          path: /compositions?status=failed
    items:
    # The DASHBOARD's stat-failed Statistic, reused verbatim (the obs copy was
    # byte-identical; keyExtras exclude `range`, so the cache cell is shared).
    - resourceRefId: stat-failed
  resourcesRefs:
    items:
    - id: stat-failed
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: stat-failed
      namespace: {{ .Release.Namespace }}
      resource: statistics
      verb: GET
