# Access persona existing-grants table (W3-2) — one row per managed RoleBinding
# (access-grants RA, label-selected + subject-filtered server-side). Permissions
# is the joined Role's rules summarized server-side; Scope is the grant's
# namespace. Clicking a row re-scopes the page to that grant's namespace
# (?ns= → extras, the URL-state house pattern): the capability preview flips to
# that namespace and the gated Revoke row appears under this table. Each row
# also carries a non-column `pageUser` cell so rowNavigateTo can interpolate the
# route back to THIS persona page.
kind: Table
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: access-grants
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [username, ns]
  widgetData:
    allowedResources: []
    rowNavigateTo: /settings/access/{pageUser}?ns={namespace}
    bordered: false
    size: small
    columns:
    - valueKey: namespace
      title: Namespace
    - valueKey: subject
      title: Subject
    - valueKey: permissions
      title: Permissions
    - valueKey: created
      title: Granted
    dataSource: []
  widgetDataTemplate:
  - forPath: dataSource
    expression: >
      ${ (.username // "") as $u
        | [ (.grants // [])[] | [
          {valueKey:"namespace",kind:"jsonSchemaType",type:"string",stringValue:(.namespace // "")},
          {valueKey:"subject",kind:"jsonSchemaType",type:"string",stringValue:((.subjectKind // "User") + " " + (.subjectName // ""))},
          {valueKey:"permissions",kind:"jsonSchemaType",type:"string",stringValue:(.rulesSummary // "")},
          {valueKey:"created",kind:"jsonSchemaType",type:"string",stringValue:(.created // ""),format:"relative"},
          {valueKey:"pageUser",kind:"jsonSchemaType",type:"string",stringValue:$u}
        ] ] }
  apiRef:
    name: access-grants
    namespace: {{ .Release.Namespace }}
  resourcesRefs:
    items: []
