# Declarative Sider content: the brand logo stacked above the nav Menu. This is
# what makes the brand declarative — the engine no longer injects a hardcoded
# Brand; the Layout's Sider renders this Flex (app-shell sider.resourceRefId).
# (The user footer is still engine-injected — it's per-user identity, not data.)
kind: Flex
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: sider-content
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    vertical: true
    gap: middle
    allowedResources:
      - images
      - menus
    items:
      - resourceRefId: brand
      - resourceRefId: nav
  resourcesRefs:
    items:
      - id: brand
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: brand-logo
        namespace: {{ .Release.Namespace }}
        resource: images
        verb: GET
      - id: nav
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: sidebar-nav
        namespace: {{ .Release.Namespace }}
        resource: menus
        verb: GET
