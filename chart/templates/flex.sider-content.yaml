# Declarative Sider content: brand logo → context strip (tenant chip + project
# selector) → nav Menu. The context strip makes the platform model visible — TENANT
# = cluster (tenant-chip, deployer config), PROJECT = namespace (project-select, a
# ?project= URL→extras scope that filters compositions/dashboard server-side). This
# is what makes the brand+scope declarative — the engine injects no hardcoded chrome.
# (The user footer is still engine-injected — per-user identity, not data.)
kind: Flex
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: sider-content
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    vertical: true
    gap: middle
    allowedResources:
      - images
      - tags
      - selects
      - menus
    items:
      - resourceRefId: brand
      - resourceRefId: tenant-chip
      - resourceRefId: project-select
      - resourceRefId: nav
  resourcesRefs:
    items:
      - id: brand
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: brand-logo
        namespace: {{ .Release.Namespace }}
        resource: images
        verb: GET
      - id: tenant-chip
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: tenant-chip
        namespace: {{ .Release.Namespace }}
        resource: tags
        verb: GET
      - id: project-select
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: project-select
        namespace: {{ .Release.Namespace }}
        resource: selects
        verb: GET
      - id: nav
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: sidebar-nav
        namespace: {{ .Release.Namespace }}
        resource: menus
        verb: GET
