# "Awaiting investigation" strip — firing Alert CRs (state=ALERT) that have NO
# TroubleshootingReport yet, off incidents-list. EXCEPTION-ONLY: hideWhenEmpty removes the
# whole strip when every firing alert is already investigated (the calm default). Each row
# navigates to the server-built /incidents?ask= deep-link, opening the Autopilot rail
# seeded to investigate THAT alert.
kind: Listy
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: incidents-awaiting
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  apiRef:
    name: incidents-list
    namespace: {{ .Release.Namespace }}
  widgetData:
    dataSource: []
    itemLayout: horizontal
    split: false
    hideWhenEmpty: true
    header: Firing alerts awaiting investigation — select one to start it in Autopilot →
    itemTemplate:
      navigateTo: '{askHref}'
      iconVariant: dot
      color:
        value: '{state}'
        map:
          ALERT: red
        default: gray
      primaryText: '{name}'
      secondaryText: '{state}'
      secondaryTextAsTag: true
  widgetDataTemplate:
  - forPath: dataSource
    expression: '${ .awaiting // [] }'
  resourcesRefs:
    items: []
