# "Awaiting investigation" strip — firing Alert CRs (state=ALERT) that have NO
# TroubleshootingReport yet, off incidents-list. EXCEPTION-ONLY: hideWhenEmpty removes the
# whole strip when every firing alert is already investigated (the calm default). Each row
# navigates to the server-built /incidents?ask= deep-link, opening the Autopilot rail
# seeded to investigate THAT alert.
kind: Listy
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: incidents-awaiting
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  apiRef:
    name: incidents-list
    namespace: {{ .Release.Namespace }}
  widgetData:
    dataSource: []
    itemLayout: horizontal
    split: false
    hideWhenEmpty: true
    header: Not yet investigated — firing alerts with no report; select one to start it in Autopilot →
    itemTemplate:
      navigateTo: '{askHref}'
      iconVariant: dot
      color:
        value: '{state}'
        map:
          ALERT: red
        default: gray
      primaryText: '{name}'
      # Sentence-cased server-side ("ALERT" → "Alert"); the raw state keys the colour map.
      secondaryText: '{stateLabel}'
      secondaryTextAsTag: true
  widgetDataTemplate:
  - forPath: dataSource
    expression: '${ (.awaiting // []) | map(. + { stateLabel: ((.state // "") | ascii_downcase | if . == "" then "" else ((.[0:1] | ascii_upcase) + .[1:]) end) }) }'
  resourcesRefs:
    items: []
