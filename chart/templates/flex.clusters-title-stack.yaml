# Title + subtitle stack for the clusters head row (left side; the Register-cluster button
# sits on the right of clusters-header). Mirrors compositions-title-stack.
kind: Flex
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: clusters-title-stack
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    allowedResources:
    - paragraphs
    vertical: true
    items:
    - resourceRefId: clusters-title
    - resourceRefId: clusters-subtitle
  resourcesRefs:
    items:
    - id: clusters-title
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: clusters-title
      namespace: {{ .Release.Namespace }}
      resource: paragraphs
      verb: GET
    - id: clusters-subtitle
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: clusters-subtitle
      namespace: {{ .Release.Namespace }}
      resource: paragraphs
      verb: GET
