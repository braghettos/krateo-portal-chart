# Per-composition reconcile breakdown from ClickHouse (clickstack otel_traces). Each
# `reconcile` span carries the composition it reconciled in SpanAttributes[k8s.object.*];
# this GROUPs the last 6h by kind+name → count + p95 + avg latency (ms), slowest-first,
# so the observability table shows WHICH compositions are hot/slow. Same external-fetch
# endpointRef pattern as obs-reconcile-metrics (ClickHouse HTTP, FORMAT JSON via query).
apiVersion: templates.krateo.io/v1
kind: RESTAction
metadata:
  name: obs-reconcile-by-composition
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  api:
    - name: byc
      endpointRef:
        name: clickhouse-endpoint
        namespace: {{ .Release.Namespace }}
      path: /?query=SELECT%20SpanAttributes%5B%27k8s.object.kind%27%5D%20AS%20kind%2C%20SpanAttributes%5B%27k8s.object.name%27%5D%20AS%20name%2C%20count%28%29%20AS%20reconciles%2C%20round%28quantile%280.95%29%28Duration%29%2F1e6%2C0%29%20AS%20p95_ms%2C%20round%28avg%28Duration%29%2F1e6%2C0%29%20AS%20avg_ms%20FROM%20otel_traces%20WHERE%20ServiceName%3D%27composition-dynamic-controller%27%20AND%20SpanName%3D%27reconcile%27%20AND%20Timestamp%20%3E%20now%28%29%20-%20INTERVAL%206%20HOUR%20GROUP%20BY%20kind%2Cname%20ORDER%20BY%20p95_ms%20DESC%20LIMIT%2050%20FORMAT%20JSON
      verb: GET
      headers:
        - 'Accept: application/json'
      continueOnError: true
      errorKey: bycError
  # ClickHouse FORMAT JSON => {meta, data:[{kind,name,reconciles,p95_ms,avg_ms}], rows}.
  filter: >
    { rows: ((.byc.data) // []) }
