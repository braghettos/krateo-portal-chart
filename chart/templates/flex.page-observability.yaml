# Convention page root for /observability — PLATFORM HEALTH ONLY after the /incidents IA
# split: Reconciliation (composition snapshots) · Performance (traces/metrics) · Logs
# (otel_logs) · Resources (otel_metrics_gauge + inventory). Alerts, the troubleshooting
# feed and the activity/event feed moved to /incidents (events remain on the composition
# detail page); the header range-group carries an "Incidents" link. Every value is REAL —
# composition snapshots from compositions-list/blueprints, live telemetry from the
# clickstack ClickHouse OTel tables via the obs-* RESTActions. antd-only widgets; the
# section headers are plain Paragraphs (strong label + secondary caption).
kind: Flex
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: page-observability
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    allowedResources:
    - flexes
    - rows
    - paragraphs
    vertical: true
    gap: middle
    items:
    - resourceRefId: obs-header
    - resourceRefId: obs-range-group
    # — Reconciliation —
    - resourceRefId: obs-sec-reconciliation-label
    - resourceRefId: obs-sec-reconciliation-desc
    - resourceRefId: obs-stats-row
    # The reconciliation rail is the DASHBOARD's rail-row, reused verbatim: the obs copy
    # (row.obs-rail-row → card.obs-rail-card → list.obs-rail-list) was byte-identical, so
    # the obs page now references the shared CRs. Their keyExtras ([projects, q, status])
    # exclude `range`, so both pages share the same cache cells.
    - resourceRefId: rail-row
    - resourceRefId: obs-health-row
    - resourceRefId: obs-distribution-row
    # — Performance —
    - resourceRefId: obs-sec-performance-label
    - resourceRefId: obs-sec-performance-desc
    - resourceRefId: obs-telemetry-row
    - resourceRefId: obs-latency-row
    - resourceRefId: obs-perf-stat-row
    - resourceRefId: obs-perf-phases-row
    # — Logs —
    - resourceRefId: obs-sec-logs-label
    - resourceRefId: obs-sec-logs-desc
    - resourceRefId: obs-errors-row
    - resourceRefId: obs-log-stream-row
    # — Resources —
    - resourceRefId: obs-sec-resources-label
    - resourceRefId: obs-sec-resources-desc
    - resourceRefId: obs-resource-row
  resourcesRefs:
    items:
    - id: obs-header
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-header
      namespace: {{ .Release.Namespace }}
      resource: flexes
      verb: GET
    - id: obs-range-group
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-range-group
      namespace: {{ .Release.Namespace }}
      resource: flexes
      verb: GET
    - id: obs-sec-reconciliation-label
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-sec-reconciliation-label
      namespace: {{ .Release.Namespace }}
      resource: paragraphs
      verb: GET
    - id: obs-sec-reconciliation-desc
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-sec-reconciliation-desc
      namespace: {{ .Release.Namespace }}
      resource: paragraphs
      verb: GET
    - id: obs-stats-row
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-stats-row
      namespace: {{ .Release.Namespace }}
      resource: rows
      verb: GET
    - id: rail-row
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: rail-row
      namespace: {{ .Release.Namespace }}
      resource: rows
      verb: GET
    - id: obs-health-row
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-health-row
      namespace: {{ .Release.Namespace }}
      resource: rows
      verb: GET
    - id: obs-distribution-row
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-distribution-row
      namespace: {{ .Release.Namespace }}
      resource: rows
      verb: GET
    - id: obs-sec-performance-label
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-sec-performance-label
      namespace: {{ .Release.Namespace }}
      resource: paragraphs
      verb: GET
    - id: obs-sec-performance-desc
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-sec-performance-desc
      namespace: {{ .Release.Namespace }}
      resource: paragraphs
      verb: GET
    - id: obs-telemetry-row
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-telemetry-row
      namespace: {{ .Release.Namespace }}
      resource: rows
      verb: GET
    - id: obs-latency-row
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-latency-row
      namespace: {{ .Release.Namespace }}
      resource: rows
      verb: GET
    - id: obs-perf-stat-row
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-perf-stat-row
      namespace: {{ .Release.Namespace }}
      resource: rows
      verb: GET
    - id: obs-perf-phases-row
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-perf-phases-row
      namespace: {{ .Release.Namespace }}
      resource: rows
      verb: GET
    - id: obs-sec-logs-label
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-sec-logs-label
      namespace: {{ .Release.Namespace }}
      resource: paragraphs
      verb: GET
    - id: obs-sec-logs-desc
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-sec-logs-desc
      namespace: {{ .Release.Namespace }}
      resource: paragraphs
      verb: GET
    - id: obs-errors-row
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-errors-row
      namespace: {{ .Release.Namespace }}
      resource: rows
      verb: GET
    - id: obs-log-stream-row
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-log-stream-row
      namespace: {{ .Release.Namespace }}
      resource: rows
      verb: GET
    - id: obs-sec-resources-label
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-sec-resources-label
      namespace: {{ .Release.Namespace }}
      resource: paragraphs
      verb: GET
    - id: obs-sec-resources-desc
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-sec-resources-desc
      namespace: {{ .Release.Namespace }}
      resource: paragraphs
      verb: GET
    - id: obs-resource-row
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-resource-row
      namespace: {{ .Release.Namespace }}
      resource: rows
      verb: GET
