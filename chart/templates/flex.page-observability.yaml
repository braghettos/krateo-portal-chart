# Convention page root for /observability — PLATFORM HEALTH ONLY after the /incidents IA
# split. R2 #9: the page body is now a Tabs widget (obs-main) with two tabs —
# Reconciliation (composition snapshots from compositions-list/blueprints) and Telemetry
# (live otel_logs / otel_metrics_gauge via the obs-* RESTActions, plus the opt-in reconcile-
# trace Performance sub-group). Alerts, the troubleshooting feed and the activity/event feed
# moved to /incidents (events remain on the composition detail page); R2 #8 dropped the header
# "Incidents" hand-off Button (a duplicate of the first-class /incidents nav item). The range
# chips stay ABOVE the tabs as a SHARED filter (obs-range-group), so switching range re-scopes
# both tabs at once. Every value is REAL. antd-only widgets; the section headers (inside each
# tab's Col) are plain Paragraphs (strong label + secondary caption).
kind: Flex
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: page-observability
  namespace: {{ include "portal.tierNamespace" (dict "ctx" . "tier" "admin") }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    allowedResources:
    - flexes
    - rows
    - tabs
    vertical: true
    gap: middle
    items:
    - resourceRefId: obs-header-row
    - resourceRefId: obs-range-group
    - resourceRefId: obs-main
  resourcesRefs:
    items:
    - id: obs-header-row
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-header-row
      namespace: {{ .Release.Namespace }}
      resource: rows
      verb: GET
    - id: obs-range-group
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-range-group
      namespace: {{ .Release.Namespace }}
      resource: flexes
      verb: GET
    - id: obs-main
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-main
      namespace: {{ .Release.Namespace }}
      resource: tabs
      verb: GET
