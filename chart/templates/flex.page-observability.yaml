      verb: GET
    - id: obs-sec-resources-label
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-sec-resources-label
      namespace: {{ .Release.Namespace }}
      resource: paragraphs
      verb: GET
    - id: obs-sec-resources-desc
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-sec-resources-desc
      namespace: {{ .Release.Namespace }}
      resource: paragraphs
      verb: GET
    - id: obs-resource-row
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-resource-row
      namespace: {{ .Release.Namespace }}
      resource: rows
      verb: GET
    - id: obs-sec-activity-label
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-sec-activity-label
      namespace: {{ .Release.Namespace }}
      resource: paragraphs
      verb: GET
    - id: obs-sec-activity-desc
