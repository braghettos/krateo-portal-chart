# /alerts page head — eyebrow + H1 + subtitle stack (sibling of kog-builder-header).
kind: Flex
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: alerts-header
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    allowedResources:
    - paragraphs
    vertical: true
    items:
    - resourceRefId: alerts-eyebrow
    - resourceRefId: alerts-title
    - resourceRefId: alerts-subtitle
  resourcesRefs:
    items:
    {{- range (list "alerts-eyebrow" "alerts-title" "alerts-subtitle") }}
    - id: {{ . }}
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: {{ . }}
      namespace: {{ $.Release.Namespace }}
      resource: paragraphs
      verb: GET
    {{- end }}
