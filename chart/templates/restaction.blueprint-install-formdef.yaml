# Install-form schema source — renders the CompositionDefinition CRD's spec (the FULL spec)
# as the form schema, so "installing a blueprint" = filling a CompositionDefinition. The
# blueprint `name` arrives via ?extras (route /marketplace/{name}/install). Pre-fills
# chart.{url,repo,version} by looking the blueprint up in the braghettos helm index (needs
# snowplow >= 1.4.0 for the external YAML fetch). Prepends a synthetic `name` (the
# CompositionDefinition metadata.name; namespace is fixed to the release ns by the form).
# Returns { schemaSpec, initialValues, apiVersion/kind/resource } — mirrors blueprint-formdef.
apiVersion: templates.krateo.io/v1
kind: RESTAction
metadata:
  name: blueprint-install-formdef
  namespace: {{ .Release.Namespace }}
  annotations:
    krateo.io/verbose: "true"
spec:
  api:
    # The CompositionDefinition CRD — its openAPIV3Schema.properties.spec IS the form schema.
    - name: crd
      path: /apis/apiextensions.k8s.io/v1/customresourcedefinitions/compositiondefinitions.core.krateo.io
      verb: GET
      headers:
        - 'Accept: application/json'
    # The helm indexes — used only to pre-fill chart.{url,repo,version} for the selected item.
    # The marketplace lists items from TWO braghettos helm-repo indexes: /charts/blueprints
    # (CompositionDefinition blueprints) AND /charts/operators (Kubernetes operators, e.g.
    # the ACK ec2-chart). Both must be fetched here or an OPERATOR name (not present in the
    # blueprints index) resolves to an empty $entry → empty url/version → the empty-prune in
    # form.blueprint-install leaves spec.chart={repo:"<name>"}, which the CD CRD rejects
    # (chart.url is REQUIRED) → the install silently produces NO CompositionDefinition. Mirror
    # the two-index fetch of restaction.blueprints-catalog so the pre-fill covers both sources.
    - name: catalog
      endpointRef:
        name: blueprints-endpoint
        namespace: {{ .Release.Namespace }}
      path: /charts/blueprints/index.yaml
      verb: GET
      headers:
        - 'Accept: application/x-yaml, text/yaml, application/json'
      continueOnError: true
      errorKey: catalogError
    - name: operators
      endpointRef:
        name: blueprints-endpoint
        namespace: {{ .Release.Namespace }}
      path: /charts/operators/index.yaml
      verb: GET
      headers:
        - 'Accept: application/x-yaml, text/yaml, application/json'
      continueOnError: true
      errorKey: operatorsError
    # Namespaces the user may create CompositionDefinitions in → the Namespace select's enum
    # (UAF SubjectAccessReview, mirrors blueprint-formdef).
    - name: namespaces
      path: /api/v1/namespaces
      verb: GET
      headers:
        - 'Accept: application/json'
      userAccessFilter:
        verb: create
        group: core.krateo.io
        resource: compositiondefinitions
        namespaceFrom: .metadata.name
      filter: "[.namespaces.items[] | .metadata.name]"
    # Registered spokes (hub-and-spoke P2): their names become the enum for the deploy.targetRef.name
    # field, so the installer PICKS a registered KubernetesTarget instead of typing it — the blueprint
    # then deploys its compositions on that spoke. continueOnError + list-UAF: no grant / no spokes →
    # the field stays a plain string and, left empty, the empty-prune drops deploy → deploys on the hub.
    # KubernetesTarget is namespaced; the cluster-scope collection endpoint returns targets across all
    # namespaces the caller may see (per-item UAF gates them). NOTE: targetRef resolves same-namespace,
    # so a picked target must live in the namespace this CompositionDefinition is created in (the release
    # namespace) — a follow-up can scope the enum to that namespace once the picker carries it.
    - name: targets
      path: /apis/core.krateo.io/v1alpha1/kubernetestargets
      verb: GET
      headers:
        - 'Accept: application/json'
      continueOnError: true
      errorKey: targetsError
      userAccessFilter:
        verb: list
        group: core.krateo.io
        resource: kubernetestargets
        namespaceFrom: .metadata.namespace
      filter: "[.targets.items[]? | .metadata.name]"
  filter: |
    # Drop statusDataTemplate — it's a blueprint-author field (status projection), not something
    # the installer sets; remove it from the fetched CRD schema so it doesn't render in the form.
    (.crd.spec.versions[]? | select(.name == "v1alpha1") | .schema.openAPIV3Schema.properties.spec | del(.properties.statusDataTemplate)) as $spec0
    # Strip nested `required` arrays so the optional objects (apiRef / deploy / chart.credentials)
    # don't block submit when left empty. chart.url is pre-filled so it still rides through; only
    # the synthetic top-level `name` stays required (set below).
    | ($spec0 | .properties = ((.properties // {}) | walk(if (type == "object" and has("required")) then del(.required) else . end))) as $spec
    | (.name // "") as $bp
    | .namespaces as $namespaces
    | ((.targets // []) | map(select(. != null and . != ""))) as $targetNames
    # Resolve the selected item across BOTH helm indexes (blueprints first, then operators).
    # A helm-repo entry carries urls[0] = the full .tgz URL and version. The core-provider
    # ChartInfo convention (verified in braghettos-core-provider types.go + composition.go:
    # Reconcile is called with URL=chart.url, ChartName=chart.repo, ChartVersion=chart.version)
    # for a helm-repo-INDEX install is: chart.url = the repo BASE URL (tgz filename stripped),
    # chart.repo = the chart NAME, chart.version = the version. That is exactly what the
    # marketplace catalog's installed-join keys on (restaction.blueprints-catalog). So for an
    # operator like ec2-chart this yields url=https://braghettos.github.io/charts/operators,
    # repo=ec2-chart, version=1.15.2 — a well-formed CD (chart.url is non-empty, so it survives
    # the form's empty-prune and satisfies the CRD's required:[url]).
    | (((.catalog.entries[$bp]?) // (.operators.entries[$bp]?) // [])[0]) as $entry
    | ($entry.version // "") as $ver
    | (($entry.urls[0]? // "") | sub("/[^/]+$"; "")) as $repoUrl
    | {
        schemaSpec: ($spec
          | .properties = ({
              name: { type: "string", title: "Name", description: "Name for the installed blueprint (the CompositionDefinition)" },
              namespace: { type: "string", title: "Namespace", description: "Namespace to install the blueprint into", enum: $namespaces }
            } + (.properties // {}))
          | .required = (["name", "namespace"] + (.required // []))
          | (if (($targetNames | length) > 0) and ((.properties.deploy.properties.targetRef.properties.name? // null) != null)
             then (.properties.deploy.properties.targetRef.properties.name |= (. + { title: "Deploy to cluster", description: "Leave empty to deploy on this (hub) cluster; pick a registered spoke to deploy remotely.", enum: $targetNames }))
             else . end)),
        initialValues: {
          name: $bp,
          namespace: "{{ .Release.Namespace }}",
          chart: { url: $repoUrl, repo: $bp, version: $ver }
        },
        apiVersion: "core.krateo.io/v1alpha1",
        kind: "CompositionDefinition",
        resource: "compositiondefinitions"
      }
