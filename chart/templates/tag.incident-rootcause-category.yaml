# rootCause.category tag (mockup .cattag, magenta = classification) — "uncategorised"
# when the agent declared a cause without a failure class (honest absence, not invented).
kind: Tag
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: incident-rootcause-category
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [name, namespace]
  apiRef:
    name: incident-detail
    namespace: {{ .Release.Namespace }}
  widgetData:
    label: uncategorised
    color: magenta
  widgetDataTemplate:
    - forPath: label
      expression: '${ .rootCauseCategory // "uncategorised" }'
  resourcesRefs:
    items: []
