# Dashboard "Recent activity" — real, no hardcoded data. Snapshot from the `events`
# RA (events-presenter /events, all recent activity); LIVE updates via SSE on
# /notifications (topic "krateo" = global feed) — the EventList subscribes itself.
# The card shows the most recent few; the cap is widget representation.
kind: EventList
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: activity-events
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  apiRef:
    name: events
    namespace: {{ .Release.Namespace }}
  widgetData:
    events: []
    sseEndpoint: /notifications
    sseTopic: krateo
  widgetDataTemplate:
    - forPath: events
      expression: '${ (.list // []) | .[0:8] }'
  resourcesRefs:
    items: []
