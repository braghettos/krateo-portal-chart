# Dashboard "Recent activity" — real, no hardcoded data. Fed from the `events`
# RA (real core/v1 Events, Krateo-involved, last ~1h). The EventList renders each
# k8s Event (reason/message/type/involvedObject/timestamp) directly; the RA
# already shaped the items, so the widget just forwards them.
kind: EventList
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: activity-events
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  apiRef:
    name: events
    namespace: {{ .Release.Namespace }}
  widgetData:
    events: []
  widgetDataTemplate:
    - forPath: events
      expression: '${ .events }'
  resourcesRefs:
    items: []
