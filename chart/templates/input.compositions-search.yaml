# Compositions search box — a STANDALONE, URL-query-bound Input.Search (queryParam: q).
# Submitting writes ?q=<text> into the URL → request extras → the compositions-list RA jq
# filters its rows server-side by name/kind ($q). Clearing removes the param. Sits between
# the page header and the status/range toolbar in flex.page-compositions.
kind: Input
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: compositions-search
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    name: q
    queryParam: q
    placeholder: Search compositions by name…
    allowClear: true
    size: middle
  resourcesRefs:
    items: []
