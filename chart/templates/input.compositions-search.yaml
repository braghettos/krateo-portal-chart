# Compositions search box — a STANDALONE, URL-query-bound Input.Search (queryParam: q).
# Submitting writes ?q=<text> into the URL → request extras → the compositions-list RA jq
# filters its rows server-side by name/kind ($q). Clearing removes the param. Sits on the
# right of the compositions toolbar (referenced directly by compositions-toolbar now that
# the range group was removed — needs `inputs` in the Flex allowedResources enum, which was
# added to the Flex widget CRD). Rendered at default size to be a prominent primary
# affordance, matching the mockup.
kind: Input
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: compositions-search
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [namespace]
  widgetData:
    name: q
    queryParam: q
    placeholder: Search by name or type…
    allowClear: true
  resourcesRefs:
    items: []
