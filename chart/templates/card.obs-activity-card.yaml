# Recent activity — recent platform events as an antd List (off the `events` RA; same
# source as the dashboard's Recent activity). Live events also surface via the global SSE bell.
kind: Card
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: obs-activity-card
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    title: Recent activity
    titleVariant: eyebrow
    variant: outlined
    live: true
    extra: View all
    items:
    - resourceRefId: obs-activity-list
  resourcesRefs:
    items:
    - id: obs-activity-list
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-activity-list
      namespace: {{ .Release.Namespace }}
      resource: listies
      verb: GET
