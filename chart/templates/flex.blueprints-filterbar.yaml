# #75 §0.2: blueprints filter bar — the category chips (left) and the search input (right) on ONE
# line (space-between), replacing the standalone chips row + the frontend PageSearch that sat above
# the grid. Both children are already-deployed widget kinds (listies + inputs, both in the Flex
# allowedResources enum, verified live).
kind: Flex
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: blueprints-filterbar
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    allowedResources:
    - listies
    - inputs
    justify: space-between
    align: center
    gap: middle
    wrap: true
    items:
    - resourceRefId: blueprints-category-chips
    - resourceRefId: blueprints-search
  resourcesRefs:
    items:
    - id: blueprints-category-chips
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: blueprints-category-chips
      namespace: {{ .Release.Namespace }}
      resource: listies
      verb: GET
    - id: blueprints-search
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: blueprints-search
      namespace: {{ .Release.Namespace }}
      resource: inputs
      verb: GET
