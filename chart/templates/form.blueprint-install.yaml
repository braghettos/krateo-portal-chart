# Blueprint INSTALL form — deploys a CompositionDefinition (i.e. installs the blueprint).
# Distinct from blueprint-create (which instantiates an ALREADY-installed blueprint from its
# generated CRD). Schema = the CompositionDefinition CRD spec (full), via blueprint-install
# -formdef; chart.{url,repo,version} are pre-filled from the helm index for the selected
# blueprint. Submit POSTs the CompositionDefinition into the release namespace; on success
# it lands on /blueprints (the installed set).
kind: Form
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: blueprint-install
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  apiRef:
    name: blueprint-install-formdef
    namespace: {{ .Release.Namespace }}
  widgetData:
    layout: vertical
    submitActionId: submit
    schema: {}
    buttonConfig:
      primary:
        label: Install blueprint
      secondary:
        label: Cancel
        navigateTo: /marketplace
    actions:
      rest:
        - id: submit
          type: rest
          resourceRefId: create-compdef
          headers:
            - 'Content-Type: application/json'
          onSuccessNavigateTo: /blueprints
          successMessage: Blueprint installed
          # Body = metadata (name from the form, namespace fixed to the release ns) + spec
          # (the form values minus the synthetic name). antd registers the hidden-section
          # fields, so an untouched optional object rides along EMPTY (e.g. deploy.targetRef:{}),
          # which the real CRD rejects (targetRef.name required) → 422. RECURSIVELY prune empty
          # values (null / "" / {} / []) bottom-up so only filled objects (chart) remain.
          payload:
            apiVersion: core.krateo.io/v1alpha1
            kind: CompositionDefinition
            metadata:
              namespace: {{ .Release.Namespace }}
          payloadToOverride:
            - { name: metadata.name, value: '${ .json.name }' }
            - { name: metadata.namespace, value: '${ .json.namespace }' }
            - { name: spec, value: '${ (.json | del(.name) | del(.namespace)) | walk(if type == "object" then with_entries(select(.value != null and .value != "" and .value != {} and .value != [])) else . end) }' }
  widgetDataTemplate:
    - forPath: schema
      expression: '${ .schemaSpec }'
    - forPath: initialValues
      expression: '${ .initialValues }'
  resourcesRefs:
    items:
      # POST target — create a CompositionDefinition in the release namespace. snowplow infers
      # apiVersion/kind from this ref; the body carries metadata + spec.
      - id: create-compdef
        apiVersion: core.krateo.io/v1alpha1
        namespace: {{ .Release.Namespace }}
        resource: compositiondefinitions
        verb: POST
