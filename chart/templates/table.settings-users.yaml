# Settings → Users tab content — platform users from their authn clientconfig
# Secret. Username = secret name minus the "-clientconfig" suffix; "Certificate
# expires" = creationTimestamp + authn's cert duration, computed server-side via
# jq (fromdateiso8601 + duration-seconds → todateiso8601). The duration string
# (e.g. "24h"/"168h") is parsed into seconds here. All shaping in the widget; the
# RA stays thin. Empty on a cluster without authn (no clientconfig Secrets).
#
# ACCEPTED APPROXIMATION (by design): creationTimestamp is the FIRST issuance —
# authn updates the clientconfig Secret in place on re-login, so the timestamp
# never moves. Thus "Certificate expires" under-reports for refreshed sessions
# (an active user can read as already-expired). An exact value would require
# authn to stamp notAfter per-login; deliberately not done — this lightweight
# created+duration estimate is sufficient.
kind: Table
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: settings-users
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    allowedResources: []
    bordered: false
    size: middle
    columns:
    - valueKey: name
      title: User
    - valueKey: issued
      title: Issued
    - valueKey: expires
      title: Certificate expires
    dataSource: []
  widgetDataTemplate:
  - forPath: dataSource
    expression: >
      ${ (.certDuration // "24h") as $d
        | ( ((($d|capture("(?<v>[0-9]+)h")) // {v:"0"} | .v|tonumber)*3600)
          + ((($d|capture("(?<v>[0-9]+)m")) // {v:"0"} | .v|tonumber)*60)
          + ((($d|capture("(?<v>[0-9]+)s")) // {v:"0"} | .v|tonumber) ) ) as $secs
        | [ .list[] | [
            {valueKey:"name",kind:"jsonSchemaType",type:"string",stringValue:((.name // "") | rtrimstr("-clientconfig"))},
            {valueKey:"issued",kind:"jsonSchemaType",type:"string",stringValue:(.creationTimestamp // "")},
            {valueKey:"expires",kind:"jsonSchemaType",type:"string",stringValue:( if .creationTimestamp then ((.creationTimestamp|fromdateiso8601) + $secs | todateiso8601) else "" end )}
          ] ] }
  apiRef:
    name: settings-users
    namespace: {{ .Release.Namespace }}
  resourcesRefs:
    items: []
