# Related resources — the composition's composed children (its managed resources)
# WITH live reconcile state. Fed by the composition-resources RA (which fetches
# each managed resource and derives Ready×Synced / Available / ready-by-presence
# → state), so each row mirrors the mockup `.rel-row`: a state-colored dot +
# the resource Kind (· name) + a right-aligned state tag (ready/drift/failed).
# Honest: rows ARE the real .status.managed children, state IS the live object's
# condition read — no ownerReferences (those point at the parent, usually empty).
kind: List
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: list-composition-detail-relations
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  apiRef:
    name: composition-resources
    namespace: {{ .Release.Namespace }}
  widgetData:
    itemLayout: horizontal
    split: false
    dataSource: []
    itemTemplate:
      rowVariant: tree
      iconVariant: dot
      color:
        value: '{state}'
        map:
          healthy: green
          drift: violet
          pending: orange
          failed: red
      primaryText: '{kind}'
      subPrimaryText: '{name}'
      secondaryText: '{state}'
  widgetDataTemplate:
    - forPath: dataSource
      expression: '${ (.resources // []) | map({ kind: .kind, name: .name, ns: .ns, state: .state }) }'
  resourcesRefs:
    items: []
