# Related resources — the composition's composed children (its managed resources)
# WITH live reconcile state. Fed by the composition-resources RA (which fetches
# each managed resource and derives Ready×Synced / Available / ready-by-presence
# → state), so each row mirrors the mockup `.rel-row`: a state-colored tree dot +
# the resource Kind (· name) + a right-aligned FILLED state Tag (status-pill spec:
# sentence-case label "Healthy"/"Drift"/"Pending"/"Failed", green/violet/orange/red).
# Honest: rows ARE the real .status.managed children, state IS the live object's
# condition read — no ownerReferences (those point at the parent, usually empty).
kind: Listy
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: list-composition-detail-relations
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [name, namespace]
  apiRef:
    name: composition-resources
    namespace: {{ .Release.Namespace }}
  widgetData:
    itemLayout: horizontal
    split: false
    dataSource: []
    itemTemplate:
      # IA followup F5: composition-group children carry a non-empty {navHref} → the row
      # becomes clickable into that child's own composition detail; core-k8s children have
      # navHref "" → the row stays inert (interpolate() treats "" as falsy). Honest partial
      # drill-down — only children that HAVE a first-class detail page link onward.
      navigateTo: '{navHref}'
      rowVariant: tree
      iconVariant: dot
      color:
        value: '{state}'
        map:
          healthy: green
          drift: violet
          pending: orange
          failed: red
      primaryText: '{kind}'
      subPrimaryText: '{name}'
      # Sentence-cased server-side (stateLabel); rendered as a filled Tag, not bare text.
      secondaryText: '{stateLabel}'
      secondaryTextAsTag: true
  widgetDataTemplate:
    - forPath: dataSource
      expression: '${ (.resources // []) | map({ kind: .kind, name: .name, ns: .ns, state: .state, stateLabel: ((.state // "") | if . == "" then "" else ((.[0:1] | ascii_upcase) + .[1:]) end), navHref: .navHref }) }'
  resourcesRefs:
    items: []
