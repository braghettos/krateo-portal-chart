# Distribution — composition counts BY KIND (left) and BY NAMESPACE/project (right),
# both honest group-by counts off compositions-list. Equal-width split (mirrors the
# dashboard lists-row), cards enum already used there.
kind: Row
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: obs-distribution-row
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    allowedResources:
    - cards
    alignment: top
    items:
    - resourceRefId: obs-by-kind-card
      size: 12
    - resourceRefId: obs-by-namespace-card
      size: 12
  resourcesRefs:
    items:
    - id: obs-by-kind-card
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-by-kind-card
      namespace: {{ .Release.Namespace }}
      resource: cards
      verb: GET
    - id: obs-by-namespace-card
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-by-namespace-card
      namespace: {{ .Release.Namespace }}
      resource: cards
      verb: GET
