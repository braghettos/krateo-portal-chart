# Namespace-scope row for the Access persona page (W3-2): the section label pair
# is implicit here — just the Select, right-sized. Kept as its own Flex so the
# page stack stays flat and the control doesn't stretch full-width.
kind: Flex
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: access-scope-row
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [username]
  widgetData:
    allowedResources:
    - selects
    gap: middle
    align: center
    items:
    - resourceRefId: access-ns-select
  resourcesRefs:
    items:
    - id: access-ns-select
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: access-ns-select
      namespace: {{ .Release.Namespace }}
      resource: selects
      verb: GET
