apiVersion: templates.krateo.io/v1
kind: RESTAction
metadata:
  name: compositions-list
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  api:
  # RBAC-native type discovery — list CompositionDefinitions, NOT CRDs.
  #
  # PRIOR SHAPE (through portal-chart 0.30.178): stage 1 listed
  # /apis/apiextensions.k8s.io/v1/customresourcedefinitions, dispatched AS THE
  # USER. That is a CLUSTER-SCOPED list, which a narrowed-RBAC tenant is not
  # granted — so discovery returned empty and the entire compositions list came
  # back blank for any non-admin (reproduced live on a real cluster). CRDs are
  # cluster metadata a tenant legitimately cannot enumerate.
  #
  # NEW SHAPE: stage 1 lists core.krateo.io CompositionDefinitions (the shared
  # blueprint TYPES) via the NAMESPACED path — CDs are registered in the Krateo
  # system namespace, so a tenant can be granted read with a plain namespaced
  # Role + RoleBinding there. NO user ever needs a ClusterRole: the namespaced
  # LIST is authorizable by a namespaced grant (a cluster-scope LIST is not).
  # Types are non-sensitive shared metadata; per-INSTANCE visibility stays
  # gated by the allCompositions userAccessFilter below (which honors the
  # tenant's per-namespace RoleBindings). The generated plural + served version
  # are read straight off the CD .status (.status.resource, .status.apiVersion).
  # The `name: crds` key and the {plural, version} output shape are UNCHANGED,
  # so allCompositions's dependsOn/iterator and resourcesFrom are untouched.
  #
  # Companion RBAC (ships in the platform/tenant RBAC layer, NOT this chart) —
  # all NAMESPACED, zero ClusterRoles:
  #   Role (in the Krateo system namespace): get,list,watch on
  #   core.krateo.io/compositiondefinitions (+ portal widget/restaction read),
  #   with a per-tenant RoleBinding.
  # See also snowplow #118 (userAccessFilter cache staleness + refilter
  # fidelity) — the instance-step userAccessFilter still depends on that path.
  - name: crds
    path: /apis/core.krateo.io/v1alpha1/namespaces/{{ .Release.Namespace }}/compositiondefinitions
    verb: GET
    filter: "[.crds.items[]? | select(.status.resource != null and .status.apiVersion != null) | {plural: .status.resource, version: (.status.apiVersion | split(\"/\")[1])}] | unique"
    continueOnError: true
    errorKey: crdsError
  - name: allCompositions
    # Phase 3' / portal-chart 0.30.177 — namespace-dim REMOVED from iterator.
    #
    # PRIOR SHAPE (portal-chart 0.30.176): iterator was the K×N (CRDs ×
    # namespaces) cross-product emitted by compositions-get-ns-and-crd. The
    # per-(CRD,ns) LIST then ran through snowplow's cluster_list collapse to
    # a single cluster-scope LIST per CRD (Ship D.5 / 0.30.152).
    #
    # NEW SHAPE: iterator is just the K CRD entries. Each iteration hits the
    # cluster-scope LIST endpoint /apis/composition.krateo.io/<version>/<plural>
    # directly (no /namespaces/<ns>/ segment). The per-item UAF gates by
    # .metadata.namespace, so narrow-RBAC users receive only items in
    # namespaces where they hold the grant — byte-equivalent to today's
    # runtime collapse + per-item refilter.
    dependsOn:
      name: crds
      iterator: ".crds"
    path: ${ "/apis/composition.krateo.io/" + (.version) + "/" + (.plural) }
    verb: GET
    continueOnError: true
    errorKey: allCompositionsError
    userAccessFilter:
      verb: list
      group: composition.krateo.io
      resourcesFrom: "[ (.crds // [])[] | .plural ]"
      namespaceFrom: .metadata.namespace
    filter: >
      [.allCompositions.items[]?
       | {uid: .metadata.uid, name: .metadata.name, ns: .metadata.namespace, ts: .metadata.creationTimestamp, kind: .kind, av: .apiVersion, conditions: (.status.conditions // []), wh: .status.workloadHealthy, whMsg: (.status.healthMessage // ""), platform: ((((.metadata.labels // {})["krateo.io/composition-name"]) == "installer") or (((.metadata.labels // {})["krateo.io/composition-definition-name"]) == "installer"))}]
  # Final shape. `list` stays the FULL (ns-scoped) set — the dashboard stat/donut/delta
  # widgets share this RA and read `.list` for totals, so it must NOT be date/status
  # filtered. The compositions PAGE reads `.filtered` (status + time-window applied) and
  # `.counts` (per-status totals for the toolbar chips). All scope params come from the
  # request `extras` (?status, ?range, ?from, ?to in the URL, read synchronously — same
  # mechanism as dashboard-data's ?range). Each item gains a derived `.state`
  # (healthy/pending/failed from the Ready condition) so filtering/counting is one pass.
  # ?status=drift is the ONE railState-backed value (Ready+Unsynced — a healthy-state
  # OVERLAY, so counts.drift overlaps counts.healthy): it powers the Drift chip and the
  # reconcile-breakdown drill-down; the other status values keep filtering on .state.
  # The scope params (status/range/q/from/to/projects) are ECHOED back so the toolbar
  # chip Listys (compositions-status-chips) can rebuild query-merged routes and their
  # active flag server-side — chip navigateTo does not client-merge like Buttons did.
  filter: >
    (((.projects // "") | split(",") | map(select(. != ""))) as $projSel
     | ((.project // .namespace) // "") as $proj
     | if ($projSel | length) > 0 then $projSel elif $proj != "" then [$proj] else [] end) as $projects
    | (.status // "all") as $status
    | (.scope // "workloads") as $scope
    | (.range // "") as $range
    | ((.from // "") | tostring) as $from
    | ((.to // "") | tostring) as $to
    | ((.q // "") | ascii_downcase) as $q
    | now as $now
    | ((.allCompositions // []) | map(select(($projects | length) == 0 or (([.ns] - $projects) | length == 0))) | map(. + ((.conditions // []) as $c | (any($c[]?; .type == "Ready" and .status == "True")) as $ready | (any($c[]?; .type == "Ready" and .status == "False")) as $notready | (any($c[]?; .type == "Synced" and .status == "False")) as $unsynced | {conditions: ((.conditions // []) + (if .wh == false then [{type: "Workload", status: "False", reason: "Unhealthy", message: (.whMsg // "")}] else [] end)), state: (if .wh == false then "failed" elif $ready then "healthy" elif $notready then "failed" else "pending" end), railState: (if .wh == false then "failed" elif $ready and ($unsynced | not) then "healthy" elif $ready and $unsynced then "drift" elif $notready then "failed" else "pending" end), healthPercent: (if .wh == false then 20 elif $ready and ($unsynced | not) then 100 elif $ready and $unsynced then 50 elif $notready then 20 else 50 end)}))) as $all
    | (if $range == "24h" then {lo: ($now - 86400), hi: ($now + 86400)} elif $range == "7d" then {lo: ($now - 604800), hi: ($now + 86400)} elif $range == "30d" then {lo: ($now - 2592000), hi: ($now + 86400)} elif $range == "all" then {lo: 0, hi: ($now + 86400)} elif $from != "" and $to != "" then {lo: ($from | tonumber), hi: ($to | tonumber)} else {lo: 0, hi: ($now + 86400)} end) as $win
    | ($all | map(select(((.ts | fromdateiso8601?) // 0) >= $win.lo and ((.ts | fromdateiso8601?) // 0) <= $win.hi))) as $dated
    | ($dated | map(select(if $scope == "all" then true elif $scope == "platform" then .platform else (.platform | not) end))) as $scoped
    | {
        list: $all,
        filtered: ($scoped | map(select((if $status == "drift" then (.railState == "drift") else ($status == "all" or .state == $status) end) and ($q == "" or ((.name // "") | ascii_downcase | contains($q)) or ((.kind // "") | ascii_downcase | contains($q)))))),
        counts: {all: ($scoped | length), healthy: ($scoped | map(select(.state == "healthy")) | length), drift: ($scoped | map(select(.railState == "drift")) | length), pending: ($scoped | map(select(.state == "pending")) | length), failed: ($scoped | map(select(.state == "failed")) | length)},
        scopeCounts: {workloads: ($dated | map(select(.platform | not)) | length), platform: ($dated | map(select(.platform)) | length), all: ($dated | length)},
        scope: $scope,
        status: $status,
        range: $range,
        q: ((.q // "") | tostring),
        from: $from,
        to: $to,
        projects: ((.projects // "") | tostring)
      }
