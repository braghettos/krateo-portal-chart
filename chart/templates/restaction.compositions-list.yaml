apiVersion: templates.krateo.io/v1
kind: RESTAction
metadata:
  name: compositions-list
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  api:
  # Phase 3'.1 / portal-chart 0.30.178 — CRD discovery collapsed in-place.
  #
  # PRIOR SHAPE (portal-chart 0.30.177): stage 1 was a cross-RA /call hop into
  # compositions-get-ns-and-crd to fetch CRD list, costing one extra HTTP
  # round-trip per compositions page load.
  #
  # NEW SHAPE: stage 1 is a direct LIST of CRDs (filtered to
  # composition.krateo.io group) — same path the standalone RA used. The
  # cross-RA /call hop is eliminated; compositions-get-ns-and-crd RA itself
  # is also deleted (zero SPA references; was only consumed by this RA).
  - name: crds
    path: /apis/apiextensions.k8s.io/v1/customresourcedefinitions
    verb: GET
    filter: "[.crds.items[] | select(.spec.group == \"composition.krateo.io\") | {plural: .status.acceptedNames.plural, version: ((([.spec.versions[] | select(.served and .storage)])[0]) // (([.spec.versions[] | select(.served)])[0])).name}]"
    continueOnError: true
    errorKey: crdsError
  - name: allCompositions
    # Phase 3' / portal-chart 0.30.177 — namespace-dim REMOVED from iterator.
    #
    # PRIOR SHAPE (portal-chart 0.30.176): iterator was the K×N (CRDs ×
    # namespaces) cross-product emitted by compositions-get-ns-and-crd. The
    # per-(CRD,ns) LIST then ran through snowplow's cluster_list collapse to
    # a single cluster-scope LIST per CRD (Ship D.5 / 0.30.152).
    #
    # NEW SHAPE: iterator is just the K CRD entries. Each iteration hits the
    # cluster-scope LIST endpoint /apis/composition.krateo.io/<version>/<plural>
    # directly (no /namespaces/<ns>/ segment). The per-item UAF gates by
    # .metadata.namespace, so narrow-RBAC users receive only items in
    # namespaces where they hold the grant — byte-equivalent to today's
    # runtime collapse + per-item refilter.
    dependsOn:
      name: crds
      iterator: ".crds"
    path: ${ "/apis/composition.krateo.io/" + (.version) + "/" + (.plural) }
    verb: GET
    continueOnError: true
    errorKey: allCompositionsError
    userAccessFilter:
      verb: list
      group: composition.krateo.io
      resourcesFrom: "[ (.crds // [])[] | .plural ]"
      namespaceFrom: .metadata.namespace
    filter: >
      [.allCompositions.items[]?
       | {uid: .metadata.uid, name: .metadata.name, ns: .metadata.namespace, ts: .metadata.creationTimestamp, kind: .kind, av: .apiVersion, conditions: (.status.conditions // [])}]
  # Final shape. `list` stays the FULL (ns-scoped) set — the dashboard stat/donut/delta
  # widgets share this RA and read `.list` for totals, so it must NOT be date/status
  # filtered. The compositions PAGE reads `.filtered` (status + time-window applied) and
  # `.counts` (per-status totals for the toolbar chips). All scope params come from the
  # request `extras` (?status, ?range, ?from, ?to in the URL, read synchronously — same
  # mechanism as dashboard-data's ?range). Each item gains a derived `.state`
  # (healthy/pending/failed from the Ready condition) so filtering/counting is one pass.
  filter: >
    ((.project // .namespace) // "") as $ns
    | (.status // "all") as $status
    | (.range // "") as $range
    | ((.from // "") | tostring) as $from
    | ((.to // "") | tostring) as $to
    | now as $now
    | ((.allCompositions // []) | map(select($ns == "" or .ns == $ns)) | map(. + ((.conditions // []) as $c | (any($c[]?; .type == "Ready" and .status == "True")) as $ready | (any($c[]?; .type == "Ready" and .status == "False")) as $notready | (any($c[]?; .type == "Synced" and .status == "False")) as $unsynced | {state: (if $ready then "healthy" elif $notready then "failed" else "pending" end), railState: (if $ready and ($unsynced | not) then "healthy" elif $ready and $unsynced then "drift" elif $notready then "failed" else "pending" end), healthPercent: (if $ready and ($unsynced | not) then 100 elif $ready and $unsynced then 50 elif $notready then 20 else 50 end)}))) as $all
    | (if $range == "24h" then {lo: ($now - 86400), hi: ($now + 86400)} elif $range == "7d" then {lo: ($now - 604800), hi: ($now + 86400)} elif $range == "30d" then {lo: ($now - 2592000), hi: ($now + 86400)} elif $range == "all" then {lo: 0, hi: ($now + 86400)} elif $from != "" and $to != "" then {lo: ($from | tonumber), hi: ($to | tonumber)} else {lo: 0, hi: ($now + 86400)} end) as $win
    | ($all | map(select(((.ts | fromdateiso8601?) // 0) >= $win.lo and ((.ts | fromdateiso8601?) // 0) <= $win.hi))) as $dated
    | {
        list: $all,
        filtered: ($dated | map(select($status == "all" or .state == $status))),
        counts: {all: ($dated | length), healthy: ($dated | map(select(.state == "healthy")) | length), pending: ($dated | map(select(.state == "pending")) | length), failed: ($dated | map(select(.state == "failed")) | length)},
        status: $status,
        range: $range
      }
