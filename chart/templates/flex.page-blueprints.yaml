# Convention page root for /blueprints — header (H1 + subtitle) above the now-selectable
# blueprints catalog table. The nav (menu.sidebar-nav) points its `blueprints` ref here
# (was the bare table) so the page gains a header like compositions/dashboard.
kind: Flex
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: page-blueprints
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    allowedResources:
    - flexes
    - tables
    vertical: true
    gap: large
    items:
    - resourceRefId: blueprints-header
    - resourceRefId: blueprints-table
  resourcesRefs:
    items:
    - id: blueprints-header
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: blueprints-header
      namespace: {{ .Release.Namespace }}
      resource: flexes
      verb: GET
    - id: blueprints-table
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: blueprints-table
      namespace: {{ .Release.Namespace }}
      resource: tables
      verb: GET
