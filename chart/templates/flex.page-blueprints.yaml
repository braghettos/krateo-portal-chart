# Convention page root for /blueprints — header (H1 + subtitle) above the now-selectable
# blueprints catalog table. The nav (menu.sidebar-nav) points its `blueprints` ref here
# (was the bare table) so the page gains a header like compositions/dashboard.
kind: Flex
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: page-blueprints
  namespace: {{ include "portal.tierNamespace" (dict "ctx" . "tier" "tenant") }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    allowedResources:
    - flexes
    - listies
    vertical: true
    gap: large
    items:
    - resourceRefId: blueprints-header
    # #75 §0.2: category chips + search on one line (blueprints-filterbar), replacing the standalone
    # chips row + the frontend PageSearch above the grid.
    - resourceRefId: blueprints-filterbar
    - resourceRefId: blueprints-grid
  resourcesRefs:
    items:
    - id: blueprints-header
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: blueprints-header
      namespace: {{ .Release.Namespace }}
      resource: flexes
      verb: GET
    - id: blueprints-filterbar
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: blueprints-filterbar
      namespace: {{ .Release.Namespace }}
      resource: flexes
      verb: GET
    - id: blueprints-grid
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: blueprints-grid
      namespace: {{ .Release.Namespace }}
      resource: listies
      verb: GET
