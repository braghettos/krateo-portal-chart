kind: Card
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: blueprints-card
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    title: Top blueprints
    titleVariant: eyebrow
    variant: outlined
    # No timeframe label: this list isn't range-scoped, so a "This month" badge would
    # falsely imply it tracks the dashboard's time filter.
    items:
    - resourceRefId: blueprints-list
  resourcesRefs:
    items:
    - id: blueprints-list
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: blueprints-list
      namespace: {{ .Release.Namespace }}
      resource: lists
      verb: GET
