kind: Card
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: blueprints-card
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    # "Recent", not "Top" (D3): there is no per-blueprint usage/popularity metric, so the
    # list is the most-recently-registered blueprints (sorted creationTimestamp desc in
    # blueprints-list). "Top" falsely implied a ranking that no real signal backs.
    title: Recent blueprints
    titleVariant: eyebrow
    variant: outlined
    # No timeframe label: this list isn't range-scoped, so a "This month" badge would
    # falsely imply it tracks the dashboard's time filter.
    items:
    - resourceRefId: blueprints-list
  resourcesRefs:
    items:
    - id: blueprints-list
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: blueprints-list
      namespace: {{ .Release.Namespace }}
      resource: lists
      verb: GET
