# Data source for ONE incident — /incidents/{namespace}/{name} (route params ride in as
# ?extras .name/.namespace, same mechanism as composition-detail). Lists the release-namespace
# TroubleshootingReports ONCE and shapes EVERYTHING server-side (nothing-hardcoded):
#   header fields (title / lifecycle+colour / trigger / mono ref / meta line / confidence),
#   analyzedRows (evidence table), evidenceMd (numbered source cards as markdown — type badge,
#   ref, verbatim mono excerpt), gapsText (missing context + assumptions, exception-only),
#   traceItems (antd Steps items, each citing "→ evidence #n", 1-based; final step crimson when
#   a root cause is declared), rootCause fields, remSteps (per-step REST wiring: restVerb map,
#   gvr → apiVersion/resource split, op line, payload, headers, markdown row, applied flag),
#   similar (same rootCause.category, self excluded, ≤4), proseMd (v1 fallback), and
#   `sections` — the flags the page Flex uses to include ONLY the sections that exist, so a
#   v1 prose-only report renders as prose and never as fabricated empty structure.
# The full list (not a per-name GET) also feeds the SIMILAR strip in the same resolution.
apiVersion: templates.krateo.io/v1
kind: RESTAction
metadata:
  name: incident-detail
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  api:
    - name: reports
      path: /apis/observability.krateo.io/v1alpha1/namespaces/{{ .Release.Namespace }}/troubleshootingreports
      verb: GET
      continueOnError: true
      errorKey: reportsError
  filter: >
    def rel: (fromdateiso8601? // null) as $t | if $t == null then . else (now - $t) as $dt | (if $dt < 60 then "just now" elif $dt < 3600 then ((($dt/60)|floor|tostring) + "m ago") elif $dt < 86400 then ((($dt/3600)|floor|tostring) + "h ago") elif $dt < 5184000 then ((($dt/86400)|floor|tostring) + "d ago") else .[0:10] end) end;
    (.name // "") as $n
    | (.namespace // "") as $ns
    | ((.reports.items) // []) as $items
    | ([ $items[] | select((.metadata.name // "") == $n and (.metadata.namespace // "") == $ns) ] | first // {}) as $r
    | ($r.spec // {}) as $sp
    | ($r.status // {}) as $st
    | ($st.rootCause // {}) as $rc
    | ($st.sources // []) as $sources
    | ($st.analyzedResources // []) as $analyzed
    | ($st.missingContext // []) as $gaps
    | ($st.assumptions // []) as $assump
    | (($st.reasoningTrace // []) | sort_by(.step // 0)) as $trace
    | ($st.remediationPlan // []) as $plan
    | ($st.lifecycle // "open") as $lc
      # UX-20 (Ready homonym): the CR's analysis-complete phase is spelled "Ready" — presented
      # as "Analyzed" (matches the troubleshooting feed; "Ready" stays K8s-readiness-only).
    | (($st.phase // "Pending") | if . == "Ready" then "Analyzed" else . end) as $phase
    | ($sp.triggeredAt // ($r.metadata.creationTimestamp // "")) as $started
    | ($st.completedAt // "") as $updated
    | ((($rc.confidence // "") | (try tonumber catch null)) as $cn | if $cn != null then ((($cn * 100) | round | tostring) + "%") else "—" end) as $conf
    | ((($analyzed | length) > 0) or (($sources | length) > 0) or (($trace | length) > 0) or (($rc.statement // "") != "") or (($plan | length) > 0)) as $structured
    | ([ $analyzed[] | select((.gvr // "") | contains("composition")) ] | first) as $comp
    | ($trace | to_entries | map({
        eyebrow: ("step " + ((.value.step // (.key + 1)) | tostring)),
        title: (.value.statement // ""),
        description: (if ((.value.evidenceRefs // []) | length) > 0 then ("→ evidence " + ((.value.evidenceRefs // []) | map("#" + ((. + 1) | tostring)) | join(", "))) else "" end),
        status: "finish"
      })) as $ti0
    | (if (($ti0 | length) > 0) and (($rc.statement // "") != "") then ($ti0[0:-1] + [ ($ti0[-1] + {status: "error"}) ]) else $ti0 end) as $traceItems
    | ($plan | to_entries | map(
        .key as $i | .value as $s
        | (($s.verb // "") | ascii_downcase) as $vb
        | (if $vb == "delete" then "DELETE" elif ($vb == "create" or $vb == "post") then "POST" elif ($vb == "put" or $vb == "replace") then "PUT" else "PATCH" end) as $rv
        | (($s.gvr // "") | split("/")) as $g
        | (if ($g | length) >= 3 then { apiVersion: ($g[0] + "/" + $g[1]), resource: $g[2] } else { apiVersion: "", resource: "" } end) as $tv
        | ($s.target.name // "") as $tn
        | ($s.target.namespace // "") as $tns
        | (($tv.resource != "") and ($tn != "") and ($vb != "apply") and ($vb != "install")) as $actionable
        | (if $actionable then ($rv + " " + $tv.resource + "/" + $tn + (if $tns != "" then (" -n " + $tns) else "" end)) else ("provision " + (if $tn != "" then $tn else "the missing resource" end) + (if $tns != "" then (" -n " + $tns) else "" end) + "  ·  Marketplace self-service") end) as $op
        | {
            i: $i,
            restVerb: $rv,
            verbKey: ($rv | ascii_downcase),
            apiVersion: $tv.apiVersion,
            resource: $tv.resource,
            name: $tn,
            namespace: $tns,
            payload: ($s.payload // {}),
            actionable: $actionable,
            navigateTo: "/marketplace",
            danger: ($rv == "DELETE" and $actionable),
            applied: (($s.observedOutcome // "") != ""),
            headers: (if $rv == "PATCH" then ["Content-Type: application/merge-patch+json"] else ["Content-Type: application/json"] end),
            successMessage: ("Remediation step " + (($i + 1) | tostring) + " submitted — verify: " + ($s.successCriterion // "see plan")),
            md: ("**" + (($i + 1) | tostring) + ". " + ($s.description // "") + "**\n\n```\n" + $op + (if $actionable and (($s.payload // {}) | length) > 0 then ("\n" + (($s.payload // {}) | tojson)) else "" end) + "\n```" + (if ($s.successCriterion // "") != "" then ("\n\nsuccessCriterion: **" + $s.successCriterion + "**") else "" end) + (if ($s.observedOutcome // "") != "" then ("\n\n✓ observedOutcome: " + $s.observedOutcome) else "" end))
          }
      )) as $remSteps
    | (if ($rc.category // "") != "" then
        ([ $items[]
           | select(((.metadata.name // "") != $n) or ((.metadata.namespace // "") != $ns))
           | select((.status.rootCause.category // "") == ($rc.category // ""))
           | { name: (.metadata.name // ""), namespace: (.metadata.namespace // ""),
               title: (if (.status.rootCause.statement // "") != "" then .status.rootCause.statement elif (.spec.alertName // "") != "" then ("Investigation — " + .spec.alertName) else (.metadata.name // "") end),
               lifecycle: (.status.lifecycle // "open"),
               completedAt: (.status.completedAt // .spec.triggeredAt // .metadata.creationTimestamp // "") }
         ] | .[0:4])
       else [] end) as $similar
    | {
        title: (if ($rc.statement // "") != "" then $rc.statement elif ($sp.alertName // "") != "" then ("Investigation — " + $sp.alertName) else $n end),
        lifecycle: $lc,
        lifecycleColor: (if $lc == "open" then "red" elif $lc == "mitigated" then "orange" else "green" end),
        trigger: ($sp.trigger // "alert"),
        phase: $phase,
        ref: (if $comp then ((($comp.gvr // "") | split("/") | last) + "/" + ($comp.name // "") + " · " + ($comp.namespace // "")) elif ($sp.alertName // "") != "" then ("alerts/" + $sp.alertName) else "—" end),
        refRoute: (if $comp then ("/compositions/" + ($comp.namespace // "") + "/" + ($comp.name // "")) else "" end),
        # HONESTY: the header meta line is lifecycle metadata only (started/updated/phase).
        # The raw model `confidence` is deliberately NOT surfaced here — a fabricated NN%
        # presented as if measured erodes trust. The verdict card states the DETERMINISTIC
        # basis instead (grounded in N verbatim sources · N analyzed resources). The raw
        # `confidence: $conf` field below is still emitted for anyone who wants it programmatically.
        # Timestamps render as the same compact relative age the incidents table uses (a
        # Paragraph has no `format: relative`, so `rel` derives it server-side via `now`).
        meta: ([ (if $started != "" then ("started " + ($started | rel)) else empty end),
                 (if $updated != "" then ("updated " + ($updated | rel)) else empty end),
                 ("phase " + $phase) ] | join("  ·  ")),
        confidence: $conf,
        # IA F6-full: every analyzed resource drills into the generic /resources view (the
        # last-mile is closed for ALL kinds, not just compositions). gvr is "group/version/plural"
        # (3-part) or "version/plural" (2-part core). aNs="cluster" for cluster-scoped rows (empty
        # namespace); resource-detail re-discovers the real scope. Unparseable rows emit "" → the
        # Table's buildRowPath finds a missing token → the row stays inert (no 404). Per-segment
        # cells (not one full-path token) because the Table URI-encodes each interpolated cell.
        analyzedRows: ($analyzed | map(
            ((.gvr // "") | split("/")) as $parts
            | (if ($parts | length) >= 3 then ($parts[0] // "") else "core" end) as $grp
            | (if ($parts | length) >= 3 then ($parts[1] // "v1") else ($parts[0] // "v1") end) as $ver
            | ($parts[-1] // "") as $plural
            | (.name // "") as $nm
            | (.namespace // "") as $ns
            | (($nm != "") and ($plural != "")) as $ok
            | { gvr: (.gvr // ""), name: $nm, namespace: $ns, what: (.whatWasRead // ""),
                aNs: (if $ok then (if $ns != "" then $ns else "cluster" end) else "" end),
                aGrp: (if $ok then $grp else "" end),
                aVer: (if $ok then $ver else "" end),
                aPlural: (if $ok then $plural else "" end),
                aName: (if $ok then $nm else "" end) })),
        evidenceDesc: ("what the agent read, verbatim — " + (($sources | length) | tostring) + " sources · " + (($analyzed | length) | tostring) + " analyzed resources"),
        evidenceMd: ($sources | to_entries | map("**#" + ((.key + 1) | tostring) + " · " + ((.value.type // "object") | ascii_upcase) + "**" + (if (.value.ref // "") != "" then (" — `" + .value.ref + "`") else "" end) + "\n\n```\n" + (.value.excerpt // "") + "\n```") | join("\n\n")),
        gapsText: (($gaps | join("  •  ")) + (if ($assump | length) > 0 then ((if ($gaps | length) > 0 then "   —   " else "" end) + "Assumed: " + ($assump | join("  •  "))) else "" end)),
        traceItems: $traceItems,
        traceCurrent: (if ($traceItems | length) > 0 then (($traceItems | length) - 1) else 0 end),
        rootCauseStatement: ($rc.statement // ""),
        rootCauseCategory: (if ($rc.category // "") != "" then ("category: " + $rc.category) else "uncategorised" end),
        # HONEST GROUNDING (not model theater): the root-cause footer states the DETERMINISTIC
        # evidence basis — the real count of verbatim sources + analyzed resources the agent read —
        # NOT a model-declared "confidence NN%" (a fabricated number presented as if measured, which
        # erodes trust). The raw `confidence: $conf` field is still emitted for anyone who wants it,
        # but the verdict card shows what actually backs the claim.
        rootCauseConfidence: (if (($sources | length) > 0) or (($analyzed | length) > 0) then ("grounded in " + (($sources | length) | tostring) + " verbatim source" + (if ($sources | length) == 1 then "" else "s" end) + " · " + (($analyzed | length) | tostring) + " analyzed resource" + (if ($analyzed | length) == 1 then "" else "s" end)) else "grounded in the cited evidence" end),
        remSteps: $remSteps,
        remediationDesc: ((($plan | length) | tostring) + " ordered steps · each is a gated action you review before anything changes" + (if ($plan | length) > 6 then " · showing the first 6" else "" end)),
        similar: $similar,
        # HONESTY (IA incidents-deepdive): a FAILED run must not be dressed up as analysis.
        # The old ladder showed $st.report BEFORE $st.error — but a failed run leaves the raw
        # provider error (e.g. "400 Bad Request … token count exceeds the maximum …") in
        # status.report AND a truthful status.error. So: if the run recorded an error, OR the
        # report body IS a provider-error dump, surface the honest failure — never the dump.
        proseMd: (
          ($st.report // "") as $rpt
          | ($st.error // "") as $err
          | (($rpt | test("Bad Request|token count|exceeds the maximum|no output|^ *[0-9][0-9][0-9] ")) or ($err != "")) as $failed
          | if $structured then ""
            elif $failed then ("**Analysis could not complete.** " + (if $err != "" then $err else "The investigation returned a provider error instead of a report; re-run the analysis from the Autopilot rail." end))
            elif ($rpt != "") then $rpt
            else "_Analysis in progress — the investigation will appear here when the Autopilot run completes._" end),
        sections: {
          evidence: ((($analyzed | length) > 0) or (($sources | length) > 0)),
          analyzed: (($analyzed | length) > 0),
          sources: (($sources | length) > 0),
          gaps: ((($gaps | length) > 0) or (($assump | length) > 0)),
          trace: (($traceItems | length) > 0),
          rootcause: (($rc.statement // "") != ""),
          remediation: (($remSteps | length) > 0),
          remCount: ([ ($remSteps | length), 6 ] | min),
          similar: (($similar | length) > 0),
          prose: ($structured | not)
        }
      }
