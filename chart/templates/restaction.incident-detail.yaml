# Data source for ONE incident — /incidents/{namespace}/{name} (route params ride in as
# ?extras .name/.namespace, same mechanism as composition-detail). Lists the release-namespace
# TroubleshootingReports ONCE and shapes EVERYTHING server-side (nothing-hardcoded):
#   header fields (title / lifecycle+colour / trigger / mono ref / meta line / confidence),
#   analyzedRows (evidence table), evidenceMd (numbered source cards as markdown — type badge,
#   ref, verbatim mono excerpt), gapsText (missing context + assumptions, exception-only),
#   traceItems (antd Steps items, each citing "→ evidence #n", 1-based; final step crimson when
#   a root cause is declared), rootCause fields, remSteps (per-step REST wiring: restVerb map,
#   gvr → apiVersion/resource split, op line, payload, headers, markdown row, applied flag),
#   similar (same rootCause.category, self excluded, ≤4), proseMd (v1 fallback), and
#   `sections` — the flags the page Flex uses to include ONLY the sections that exist, so a
#   v1 prose-only report renders as prose and never as fabricated empty structure.
# The full list (not a per-name GET) also feeds the SIMILAR strip in the same resolution.
apiVersion: templates.krateo.io/v1
kind: RESTAction
metadata:
  name: incident-detail
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  api:
    - name: reports
      path: /apis/observability.krateo.io/v1alpha1/namespaces/{{ .Release.Namespace }}/troubleshootingreports
      verb: GET
      continueOnError: true
      errorKey: reportsError
      # UX-22 (incident↔alert coupling): list the alerts so we can resolve the triggering alert's
      # real metadata.name. A report keys its alert by DISPLAY name (spec.alertName, may carry an
      # emoji) while the Alert CR's identity is a slug (metadata.name); the slug can't be derived
      # from the display name. So we match a NORMALIZED display name (lowercased, alphanumerics
      # only) against the live alerts and read back metadata.name — only then is the "Alert:" chip
      # a real link to /alerts/{ns}/{name}. No match → the alert name renders as inert text (never
      # a broken link). continueOnError: the incident detail still resolves fully if alerts 404.
    - name: alerts
      path: /apis/observability.krateo.io/v1alpha1/namespaces/{{ .Release.Namespace }}/alerts
      verb: GET
      continueOnError: true
      errorKey: alertsError
  # NOTE: literal `|` block (NOT folded `>`) — the filter contains `#` comments, and a folded
  # block collapses newlines to spaces so every `#` would comment out the rest of the (now single-
  # line) jq, silently breaking the whole RA. `|` preserves the line breaks so comments terminate.
  filter: |
    # UX-19: fromdateiso8601 only parses `...SSZ` (no fractional seconds, no numeric offset). The
    # troubleshooter writes Python isoformat — `2026-07-22T21:14:00.892447+00:00` — so NORMALISE
    # first: drop the `.ffffff` fraction and fold a `+00:00`/`+0000` UTC offset to `Z` before
    # parsing (k8s `...SSZ` passes through unchanged). Unparseable → the raw first-10 (a date).
    def rel: (if type == "string" then (sub("\\.[0-9]+"; "") | sub("(\\+00:?00)$"; "Z")) else . end) as $norm
      | ($norm | fromdateiso8601? // null) as $t
      | if $t == null then .[0:10] else (now - $t) as $dt | (if $dt < 60 then "just now" elif $dt < 3600 then ((($dt/60)|floor|tostring) + "m ago") elif $dt < 86400 then ((($dt/3600)|floor|tostring) + "h ago") elif $dt < 5184000 then ((($dt/86400)|floor|tostring) + "d ago") else .[0:10] end) end;
    (.name // "") as $n
    | (.namespace // "") as $ns
    | ((.reports.items) // []) as $items
    | ([ $items[] | select((.metadata.name // "") == $n and (.metadata.namespace // "") == $ns) ] | first // {}) as $r
    | ($r.spec // {}) as $sp
    | ($r.status // {}) as $st
    | ($st.rootCause // {}) as $rc
    | ($st.sources // []) as $sources
    | ($st.analyzedResources // []) as $analyzed
    | ($st.missingContext // []) as $gaps
    | ($st.assumptions // []) as $assump
    | (($st.reasoningTrace // []) | sort_by(.step // 0)) as $trace
    | ($st.remediationPlan // []) as $plan
    | ($st.lifecycle // "open") as $lc
      # UX-20 (Ready homonym): the CR's analysis-complete phase is spelled "Ready" — presented
      # as "Analyzed" (matches the troubleshooting feed; "Ready" stays K8s-readiness-only).
    | (($st.phase // "Pending") | if . == "Ready" then "Analyzed" else . end) as $phase
    | ($sp.triggeredAt // ($r.metadata.creationTimestamp // "")) as $started
    | ($st.completedAt // "") as $updated
    | ((($rc.confidence // "") | (try tonumber catch null)) as $cn | if $cn != null then ((($cn * 100) | round | tostring) + "%") else "—" end) as $conf
    | ((($analyzed | length) > 0) or (($sources | length) > 0) or (($trace | length) > 0) or (($rc.statement // "") != "") or (($plan | length) > 0)) as $structured
    | ([ $analyzed[] | select((.gvr // "") | contains("composition")) ] | first) as $comp
      # UX-22 (incident↔alert coupling): resolve the triggering alert's real metadata.name so the
      # "Alert:" chip can link to /alerts/{ns}/{name}. spec.alertName is a DISPLAY name (emoji-bearing)
      # while the Alert CR identity is a slug — match on a normalized key against BOTH the alert's
      # displayName AND its metadata.name; no match → $alertRealName stays "" and the chip is inert text.
    | ($sp.alertName // "") as $alertName
    | ($sp.alertNamespace // $ns) as $alertNs
    | (($alertName | ascii_downcase | gsub("[^a-z0-9]"; ""))) as $alertNorm
    | (if $alertNorm == "" then "" else
        ([ ((.alerts.items) // [])[]
           | select((.metadata.namespace // $alertNs) == $alertNs)
           | (((.spec.displayName // "") | ascii_downcase | gsub("[^a-z0-9]"; ""))) as $dnorm
           | (((.metadata.name // "") | ascii_downcase | gsub("[^a-z0-9]"; ""))) as $mnorm
           | select($dnorm == $alertNorm or $mnorm == $alertNorm)
           | (.metadata.name // "") ] | first // "")
      end) as $alertRealName
    | ($trace | to_entries | map({
        eyebrow: ("step " + ((.value.step // (.key + 1)) | tostring)),
        title: (.value.statement // ""),
        description: (if ((.value.evidenceRefs // []) | length) > 0 then ("→ evidence " + ((.value.evidenceRefs // []) | map("#" + ((. + 1) | tostring)) | join(", "))) else "" end),
        status: "finish"
      })) as $ti0
    | (if (($ti0 | length) > 0) and (($rc.statement // "") != "") then ($ti0[0:-1] + [ ($ti0[-1] + {status: "error"}) ]) else $ti0 end) as $traceItems
    | ($plan | to_entries | map(
        .key as $i | .value as $s
        | (($s.verb // "") | ascii_downcase) as $vb
        | (if $vb == "delete" then "DELETE" elif ($vb == "create" or $vb == "post") then "POST" elif ($vb == "put" or $vb == "replace") then "PUT" else "PATCH" end) as $rv
        | (($s.gvr // "") | split("/")) as $g
        | (if ($g | length) >= 3 then { apiVersion: ($g[0] + "/" + $g[1]), resource: $g[2] } else { apiVersion: "", resource: "" } end) as $tv
        | ($s.target.name // "") as $tn
        | ($s.target.namespace // "") as $tns
        | (($tv.resource != "") and ($tn != "") and ($vb != "apply") and ($vb != "install")) as $actionable
        | (if $actionable then ($rv + " " + $tv.resource + "/" + $tn + (if $tns != "" then (" -n " + $tns) else "" end)) else ("provision " + (if $tn != "" then $tn else "the missing resource" end) + (if $tns != "" then (" -n " + $tns) else "" end) + "  ·  Marketplace self-service") end) as $op
        | {
            i: $i,
            restVerb: $rv,
            verbKey: ($rv | ascii_downcase),
            apiVersion: $tv.apiVersion,
            resource: $tv.resource,
            name: $tn,
            namespace: $tns,
            payload: ($s.payload // {}),
            actionable: $actionable,
            navigateTo: "/marketplace",
            danger: ($rv == "DELETE" and $actionable),
            applied: (($s.observedOutcome // "") != ""),
            title: ($s.description // ""),
            headers: (if $rv == "PATCH" then ["Content-Type: application/merge-patch+json"] else ["Content-Type: application/json"] end),
            successMessage: ("Remediation step " + (($i + 1) | tostring) + " submitted — verify: " + ($s.successCriterion // "see plan")),
            md: ("**" + (($i + 1) | tostring) + ". " + ($s.description // "") + "**\n\n```\n" + $op + (if $actionable and (($s.payload // {}) | length) > 0 then ("\n" + (($s.payload // {}) | tojson)) else "" end) + "\n```" + (if ($s.successCriterion // "") != "" then ("\n\nsuccessCriterion: **" + $s.successCriterion + "**") else "" end) + (if ($s.observedOutcome // "") != "" then ("\n\n✓ observedOutcome: " + $s.observedOutcome) else "" end))
          }
      )) as $remSteps
    | ([ $remSteps[] | select((.applied // false) | not) | .i ] | first // ($remSteps | length)) as $remCurrentStep
    | (if ($rc.category // "") != "" then
        ([ $items[]
           | select(((.metadata.name // "") != $n) or ((.metadata.namespace // "") != $ns))
           | select((.status.rootCause.category // "") == ($rc.category // ""))
           | { name: (.metadata.name // ""), namespace: (.metadata.namespace // ""),
               title: (if (.status.rootCause.statement // "") != "" then .status.rootCause.statement elif (.spec.alertName // "") != "" then ("Investigation — " + .spec.alertName) else (.metadata.name // "") end),
               lifecycle: (.status.lifecycle // "open"),
               completedAt: (.status.completedAt // .spec.triggeredAt // .metadata.creationTimestamp // "") }
         ] | .[0:4])
       else [] end) as $similar
    | {
        # UX-17: the H1 leads with the INCIDENT, not the whole RCA sentence. Prefer the short
        # alert name (spec.alertName, e.g. "🚨 Payments-API database failure" — kept verbatim,
        # emoji and all: it's the alert's own name), then the rootCause statement (v1 reports with
        # no alert name), then the CR name. The full rootCause.statement lives ONLY in the Root
        # cause card (.rootCauseStatement) — the header no longer duplicates it.
        # UX-27 (#69 §0.3): strip the leading emoji from the alert display name so the page
        # title reads as plain text (basic printable-ASCII filter — no unicode-property regex).
        title: (if ($sp.alertName // "") != "" then ($sp.alertName | gsub("[^ -~]"; "") | sub("^ +";"") | sub(" +$";"")) elif ($rc.statement // "") != "" then $rc.statement else $n end),
        lifecycle: $lc,
        lifecycleColor: (if $lc == "open" then "red" elif $lc == "mitigated" then "orange" else "green" end),
        trigger: ($sp.trigger // "alert"),
        phase: $phase,
        # UX-27 (#69 §0.5): only a REAL composition ref here — the alert-only fallback
        # ("alerts/<name>") duplicated the clickable "Alert: …" link (0.6), so it's dropped.
        ref: (if $comp then ((($comp.gvr // "") | split("/") | last) + "/" + ($comp.name // "") + " · " + ($comp.namespace // "")) else "—" end),
        refRoute: (if $comp then ("/compositions/" + ($comp.namespace // "") + "/" + ($comp.name // "")) else "" end),
        # UX-22 (incident↔alert coupling): the triggering alert, surfaced on the detail. alertName is
        # the display name (kept verbatim); alertRoute is a real link to /alerts/{ns}/{name} ONLY when
        # the alert's metadata.name resolved by normalized-displayName match — empty otherwise (the
        # chip Flex then renders the name as inert text, never a broken link). The /alerts/{ns}/{name}
        # route is owned by the alerts page group.
        alertName: $alertName,
        alertRoute: (if $alertRealName != "" then ("/alerts/" + $alertNs + "/" + $alertRealName) else "" end),
        # HONESTY: the header meta line is lifecycle metadata only (started/updated/phase).
        # The raw model `confidence` is deliberately NOT surfaced here — a fabricated NN%
        # presented as if measured erodes trust. The verdict card states the DETERMINISTIC
        # basis instead (grounded in N verbatim sources · N analyzed resources). The raw
        # `confidence: $conf` field below is still emitted for anyone who wants it programmatically.
        # Timestamps render as the same compact relative age the incidents table uses (a
        # Paragraph has no `format: relative`, so `rel` derives it server-side via `now`).
        meta: ([ (if $started != "" then ("started " + ($started | rel)) else empty end),
                 (if $updated != "" then ("updated " + ($updated | rel)) else empty end),
                 ("analysis stage " + $phase) ] | join("  ·  ")),
        # UX-19: the same started/updated/phase facts as a Descriptions list (label/value rows) so the
        # meta reads as the same "form" visual language as the rest of the detail, not a bare ISO run-on.
        # Timestamps are RELATIVE (via `rel`, server-side — a Descriptions value has no format:relative);
        # empty parts are OMITTED (never a dash for data we don't have — same honesty as the meta line).
        metaItems: ([ (if $started != "" then { label: "Started", value: ($started | rel) } else empty end),
                      (if $updated != "" then { label: "Updated", value: ($updated | rel) } else empty end),
                      { label: "Analysis stage", value: $phase } ]),
        # SUMMARY panel (#72 §1): the incident TL;DR — what happened / why / how to fix — at the top of
        # the detail so an SRE gets the answer before scrolling. Derived ENTIRELY from data already
        # gathered (no new agent field, no fabrication): the alert + affected resource, the root-cause
        # statement, the first remediation step. Each line degrades HONESTLY when its basis is absent
        # ("not yet determined", "no steps yet"). Rendered by card.incident-summary (a Descriptions);
        # shown only for structured reports (sections.summary below).
        summary: {
          whatHappened: ((if ($sp.alertName // "") != "" then ($sp.alertName | gsub("[^ -~]"; "") | sub("^ +";"") | sub(" +$";"")) elif ($rc.statement // "") != "" then $rc.statement else $n end)
            + (if $comp then (" — affecting " + (($comp.gvr // "") | split("/") | last) + "/" + ($comp.name // "")) else "" end)),
          why: (if ($rc.statement // "") != "" then $rc.statement else "Root cause not yet determined — the investigation may still be running." end),
          howToFix: (if ($plan | length) > 0 then (($plan[0].description // "") | if . == "" then (($plan | length | tostring) + " gated remediation steps below") else . end) else "No remediation steps proposed yet." end)
        },
        confidence: $conf,
        # IA F6-full: every analyzed resource drills into the generic /resources view (the
        # last-mile is closed for ALL kinds, not just compositions). gvr is "group/version/plural"
        # (3-part) or "version/plural" (2-part core). aNs="cluster" for cluster-scoped rows (empty
        # namespace); resource-detail re-discovers the real scope. Unparseable rows emit "" → the
        # Table's buildRowPath finds a missing token → the row stays inert (no 404). Per-segment
        # cells (not one full-path token) because the Table URI-encodes each interpolated cell.
        #
        # UX-21 (composition rows → richer /compositions detail): NOT wired here. The Table's
        # rowNavigateTo is ONE fixed per-segment template and buildRowPath URI-encodes EACH cell
        # (frontend Table.tsx:39 encodeURIComponent), so a single full-path "route" cell would be
        # encoded ("/compositions/ns/name" → "%2Fcompositions%2F…") and a fixed template can't hold
        # both a 2-arg /compositions path and a 5-arg /resources path (empty segments make the row
        # inert). Branching per-row needs a Table capability that doesn't exist yet (a raw per-row
        # navigate cell or a `kind: link` cell) — reported as a frontend follow-up. Until then all
        # analyzed rows keep the generic /resources route below, which already resolves for
        # composition kinds too, so no row is a dead end.
        analyzedRows: ($analyzed | map(
            ((.gvr // "") | split("/")) as $parts
            | (if ($parts | length) >= 3 then ($parts[0] // "") else "core" end) as $grp
            | (if ($parts | length) >= 3 then ($parts[1] // "v1") else ($parts[0] // "v1") end) as $ver
            | ($parts[-1] // "") as $plural
            | (.name // "") as $nm
            | (.namespace // "") as $ns
            | (($nm != "") and ($plural != "")) as $ok
            | { gvr: (.gvr // ""), name: $nm, namespace: $ns, what: (.whatWasRead // ""),
                aNs: (if $ok then (if $ns != "" then $ns else "cluster" end) else "" end),
                aGrp: (if $ok then $grp else "" end),
                aVer: (if $ok then $ver else "" end),
                aPlural: (if $ok then $plural else "" end),
                aName: (if $ok then $nm else "" end) })),
        evidenceDesc: ("what the agent read, verbatim — " + (($sources | length) | tostring) + " sources · " + (($analyzed | length) | tostring) + " analyzed resources"),
        # Issue #69 Reiteration 2: plain-language lead-in sentence for the evidence section —
        # "After evaluating X resources across Y sources, the agent found the following:" — replaces
        # the stat-style card title (removed). Singular/plural handled server-side.
        evidenceLeadIn: ("After evaluating " + (($analyzed | length) | tostring) + " resource" + (if ($analyzed | length) == 1 then "" else "s" end) + " across " + (($sources | length) | tostring) + " source" + (if ($sources | length) == 1 then "" else "s" end) + ", the agent found the following:"),
        # UX-23: the evidence count folds into the section CARD title so the "N sources · N analyzed
        # resources" caption is ONE presentation with the list below (no separate grey Paragraph).
        # Singular/plural handled server-side; a section with only one axis omits the empty half.
        evidenceCardTitle: ("Evidence — "
          + (($sources | length) | tostring) + " source" + (if ($sources | length) == 1 then "" else "s" end)
          + " · " + (($analyzed | length) | tostring) + " analyzed resource" + (if ($analyzed | length) == 1 then "" else "s" end)),
        evidenceMd: ($sources | to_entries | map("**#" + ((.key + 1) | tostring) + " · " + ((.value.type // "object") | ascii_upcase) + "**" + (if (.value.ref // "") != "" then (" — `" + .value.ref + "`") else "" end) + "\n\n```\n" + (.value.excerpt // "") + "\n```") | join("\n\n")),
        gapsText: (($gaps | join("  •  ")) + (if ($assump | length) > 0 then ((if ($gaps | length) > 0 then "   —   " else "" end) + "Assumed: " + ($assump | join("  •  "))) else "" end)),
        traceItems: $traceItems,
        traceCurrent: (if ($traceItems | length) > 0 then (($traceItems | length) - 1) else 0 end),
        rootCauseStatement: ($rc.statement // ""),
        # UX-27 (#69 §0.9): drop the "category: " prefix so the magenta chip reads as a plain
        # classification tag, not a "category:" label that implies a (non-existent) filter action.
        rootCauseCategory: (if ($rc.category // "") != "" then $rc.category else "uncategorised" end),
        # HONEST GROUNDING (not model theater): the root-cause footer states the DETERMINISTIC
        # evidence basis — the real count of verbatim sources + analyzed resources the agent read —
        # NOT a model-declared "confidence NN%" (a fabricated number presented as if measured, which
        # erodes trust). The raw `confidence: $conf` field is still emitted for anyone who wants it,
        # but the verdict card shows what actually backs the claim.
        # UX-27 (#69 §0.9): keep the verdict's grounding trust-signal but DROP the source/resource
        # counts — they already headline the Evidence panel above, so repeating them here was pure
        # duplication. A short non-count phrase keeps "this is grounded" without the redundant numbers.
        rootCauseConfidence: (if (($sources | length) > 0) or (($analyzed | length) > 0) then "grounded in the cited evidence" else "grounded in the cited evidence" end),
        remSteps: $remSteps,
        remCurrentStep: $remCurrentStep,
        # Steps-widget items for the "How to fix" navigation rail — one item per plan step with
        # status finish/process/wait so the user sees at a glance what's done, what's active,
        # and what's locked. Only the first unapplied step ($remCurrentStep) is "process".
        remStepsForWidget: ($remSteps | map({
          eyebrow: ("step " + ((.i + 1) | tostring)),
          title: (.title // ("Step " + ((.i + 1) | tostring))),
          description: "",
          status: (if (.applied // false) then "finish" elif (.i == $remCurrentStep) then "process" else "wait" end)
        })),
        # Evidence sources as table rows for the "Sources" tab — each row is {type, ref, excerpt}.
        sourcesRows: ($sources | map({
          type: ((.type // "object") | ascii_upcase),
          ref: (.ref // ""),
          excerpt: (.excerpt // "")
        })),
        remediationDesc: ((($plan | length) | tostring) + " ordered steps · each is a gated action you review before anything changes" + (if ($plan | length) > 6 then " · showing the first 6" else "" end)),
        similar: $similar,
        # HONESTY (IA incidents-deepdive): a FAILED run must not be dressed up as analysis.
        # The old ladder showed $st.report BEFORE $st.error — but a failed run leaves the raw
        # provider error (e.g. "400 Bad Request … token count exceeds the maximum …") in
        # status.report AND a truthful status.error. So: if the run recorded an error, OR the
        # report body IS a provider-error dump, surface the honest failure — never the dump.
        proseMd: (
          ($st.report // "") as $rpt
          | ($st.error // "") as $err
          | (($rpt | test("Bad Request|token count|exceeds the maximum|no output|^ *[0-9][0-9][0-9] ")) or ($err != "")) as $failed
          | if $structured then ""
            elif $failed then ("**Analysis could not complete.** " + (if $err != "" then $err else "The investigation returned a provider error instead of a report; re-run the analysis from the Autopilot rail." end))
            elif ($rpt != "") then $rpt
            else "_Analysis in progress — the investigation will appear here when the Autopilot run completes._" end),
        sections: {
          # #72 §1: the Summary panel shows for any STRUCTURED report (has a verdict/steps/evidence);
          # a v1 prose-only report skips it and shows the prose card instead.
          summary: $structured,
          evidence: ((($analyzed | length) > 0) or (($sources | length) > 0)),
          analyzed: (($analyzed | length) > 0),
          sources: (($sources | length) > 0),
          gaps: ((($gaps | length) > 0) or (($assump | length) > 0)),
          trace: (($traceItems | length) > 0),
          rootcause: (($rc.statement // "") != ""),
          remediation: (($remSteps | length) > 0),
          remCount: ([ ($remSteps | length), 6 ] | min),
          similar: (($similar | length) > 0),
          prose: ($structured | not)
        }
      }
