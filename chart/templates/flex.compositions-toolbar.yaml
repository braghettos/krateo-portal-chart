# Compositions filter toolbar — status chips on the left (a data-driven Listy(chip), the
# old chips-only compositions-status-group Flex is gone) and the search box on the right.
# Decluttered to match the mockup: the time-range apparatus (compositions-range-chips +
# the comp-date-range RangePicker, formerly bundled in compositions-range-group) was
# removed so only search + status chips remain. Sits between the page header and the
# table in flex.page-compositions.
kind: Flex
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: compositions-toolbar
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [namespace]
  widgetData:
    allowedResources:
    - listies
    - inputs
    justify: space-between
    align: center
    gap: small
    wrap: true
    items:
    - resourceRefId: compositions-status-chips
    - resourceRefId: compositions-search
  resourcesRefs:
    items:
    - id: compositions-status-chips
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: compositions-status-chips
      namespace: {{ .Release.Namespace }}
      resource: listies
      verb: GET
    - id: compositions-search
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: compositions-search
      namespace: {{ .Release.Namespace }}
      resource: inputs
      verb: GET
