# Compositions filter toolbar — status chips on the left (a data-driven Listy(chip), the
# old chips-only compositions-status-group Flex is gone), time-range chips + custom
# from/to picker on the right (mirrors the dashboard's filter row, extended for a list
# page). Sits between the page header and the table in flex.page-compositions.
kind: Flex
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: compositions-toolbar
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [namespace]
  widgetData:
    allowedResources:
    - flexes
    - listies
    justify: space-between
    align: center
    gap: small
    wrap: true
    items:
    - resourceRefId: compositions-status-chips
    - resourceRefId: compositions-range-group
  resourcesRefs:
    items:
    - id: compositions-status-chips
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: compositions-status-chips
      namespace: {{ .Release.Namespace }}
      resource: listies
      verb: GET
    - id: compositions-range-group
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: compositions-range-group
      namespace: {{ .Release.Namespace }}
      resource: flexes
      verb: GET
