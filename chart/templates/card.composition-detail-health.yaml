# "Conditions" card → the composition's REAL status.conditions (all of them), each coloured by
# its own status (True=cyan / False=crimson) — replaces the derived "% converged / Healthy" ring,
# which invented a single label/number out of the raw conditions.
kind: Card
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: card-composition-detail-health
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [name, namespace]
  widgetData:
    title: Conditions
    titleVariant: eyebrow
    variant: outlined
    items:
      - resourceRefId: list-composition-detail-conditions
  resourcesRefs:
    items:
      - id: list-composition-detail-conditions
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: list-composition-detail-conditions
        namespace: {{ .Release.Namespace }}
        resource: listies
        verb: GET
