kind: Tag
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: delta-tag-healthy
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    label: 0%
    color: green
    style:
      fontSize: '15px'
      fontWeight: 600
      lineHeight: '20px'
  widgetDataTemplate:
  - forPath: label
    expression: '${ (if (.list|length)>0 then ((([.list[]|select((.conditions//[])|any(.type=="Ready" and .status=="True"))]|length)*100/(.list|length))|floor) else 0 end | tostring) + "%" }'
  apiRef:
    name: compositions-list
    namespace: {{ .Release.Namespace }}
  resourcesRefs:
    items: []
