kind: Tag
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: delta-tag-healthy
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [projects, q, status]
  widgetData:
    label: 0%
    color: cyan
    style:
      fontSize: '13px'
      fontWeight: 700
      lineHeight: '18px'
    # live-refresh: watch the composition kinds so the % updates with the count Statistic
    # (which already watches) — keeps count + % consistent without a reload. Computed, not hardcoded.
    watch: []
  widgetDataTemplate:
  - forPath: watch
    expression: '${ [ .list[] | { apiVersion: .av, kind: .kind } ] | unique }'
  - forPath: label
    expression: '${ (if (.list|length)>0 then ((([.list[]|select((.conditions//[])|any(.type=="Ready" and .status=="True"))]|length)*100/(.list|length))|floor) else 0 end | tostring) + "%" }'
  apiRef:
    name: compositions-list
    namespace: {{ .Release.Namespace }}
  resourcesRefs:
    items: []
