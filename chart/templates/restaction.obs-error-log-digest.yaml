# Error-log digest from ClickHouse (clickstack otel_logs). Component logs carry level+msg
# INSIDE the Body JSON (SeverityText is empty at ingest), so both are parsed with
# JSONExtractString(Body,'level'|'msg'). Only ERROR is surfaced — WARN is ~200x noisier
# (snowplow per-request warns) and drowns the signal. Step `digest` GROUPs the last 6h by
# service+msg → the DISTINCT problems with an occurrence count + last-seen (collapses the
# same error repeating every reconcile into one row, ordered most-frequent-first). Step
# `tot` is the headline totals. External-fetch endpointRef, ClickHouse FORMAT JSON.
apiVersion: templates.krateo.io/v1
kind: RESTAction
metadata:
  name: obs-error-log-digest
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  api:
    - name: digest
      endpointRef:
        name: clickhouse-endpoint
        namespace: {{ .Release.Namespace }}
      path: '${ (.range // "6h") as $r | (if $r=="1h" then "1%20HOUR" elif $r=="24h" then "24%20HOUR" elif $r=="7d" then "7%20DAY" else "6%20HOUR" end) as $iv | "/?query=SELECT%20ServiceName%20AS%20service%2C%20JSONExtractString%28Body%2C%27msg%27%29%20AS%20msg%2C%20count%28%29%20AS%20occurrences%2C%20formatDateTime%28max%28Timestamp%29%2C%20%27%25Y-%25m-%25dT%25H%3A%25i%3A%25SZ%27%29%20AS%20last_ts%20FROM%20otel_logs%20WHERE%20lower%28JSONExtractString%28Body%2C%27level%27%29%29%3D%27error%27%20AND%20Timestamp%20%3E%20now%28%29%20-%20INTERVAL%20" + $iv + "%20AND%20JSONExtractString%28Body%2C%27msg%27%29%21%3D%27%27%20GROUP%20BY%20service%2C%20msg%20ORDER%20BY%20occurrences%20DESC%20LIMIT%2040%20FORMAT%20JSON" }'
      verb: GET
      headers:
        - 'Accept: application/json'
      continueOnError: true
      errorKey: digestError
    - name: tot
      endpointRef:
        name: clickhouse-endpoint
        namespace: {{ .Release.Namespace }}
      path: '${ (.range // "6h") as $r | (if $r=="1h" then "1%20HOUR" elif $r=="24h" then "24%20HOUR" elif $r=="7d" then "7%20DAY" else "6%20HOUR" end) as $iv | "/?query=SELECT%20count%28%29%20AS%20total%2C%20uniqExact%28%28ServiceName%2C%20JSONExtractString%28Body%2C%27msg%27%29%29%29%20AS%20distinct_problems%20FROM%20otel_logs%20WHERE%20lower%28JSONExtractString%28Body%2C%27level%27%29%29%3D%27error%27%20AND%20Timestamp%20%3E%20now%28%29%20-%20INTERVAL%20" + $iv + "%20FORMAT%20JSON" }'
      verb: GET
      headers:
        - 'Accept: application/json'
      continueOnError: true
      errorKey: totError
  # digest => {data:[{service,msg,occurrences,last_ts}]}; tot => {data:[{total,distinct_problems}]}.
  filter: >
    { rows: ((.digest.data) // []),
      total: (((.tot.data) // [])[0].total // 0),
      distinct: (((.tot.data) // [])[0].distinct_problems // 0) }
