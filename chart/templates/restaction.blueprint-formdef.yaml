# GENERIC blueprint create-form schema source — ONE RESTAction for ALL blueprints
# (replaces per-blueprint formdef RAs). The blueprint identity arrives via ?extras
# (.namespace / .name = route params from /marketplace/{namespace}/{name}/new). It
# discovers the composition CRD purely from data — no hardcoded GVR:
#   1. GET the blueprint's CompositionDefinition (core.krateo.io).
#   2. Its status carries the generated CRD's GVR: apiVersion (group/version),
#      kind, resource (plural). CRD name = <resource>.<group>.
#   3. GET that CRD; its openAPIV3Schema.properties.spec IS the form's JSON schema.
# Returns { schemaSpec, apiVersion, kind, resource } — schema for the fields, GVR for
# the create POST target. Needs the core-provider CRDs + a CompositionDefinition whose
# status carries the generated GVR. VERIFIED on kind-krateo-dash after installing the
# core-provider CRDs and populating a CompositionDefinition status (the controller itself
# needs a newer k8s — MutatingAdmissionPolicy — than that demo cluster has).
apiVersion: templates.krateo.io/v1
kind: RESTAction
metadata:
  name: blueprint-formdef
  namespace: {{ .Release.Namespace }}
  annotations:
    krateo.io/verbose: "true"
spec:
  api:
    - name: compdef
      path: ${ "/apis/core.krateo.io/v1alpha1/namespaces/" + .namespace + "/compositiondefinitions/" + .name }
      verb: GET
      headers:
        - 'Accept: application/json'
    # Raw values.schema.json (authoring order intact) from the per-version jsonschema
    # ConfigMap the core-provider/cdc publishes: <resource>-<version>-jsonschema-configmap
    # (resource = the plural from the compdef status; version = the apiVersion's v-segment).
    # It is read as a STRING and string-spliced into `stringSchema` below — never parsed and
    # re-emitted server-side, so the field order survives (the CRD's openAPIV3Schema, by
    # contrast, is a Go map serialized alphabetically). continueOnError: a blueprint without
    # the CM simply yields no stringSchema and the Form falls back to the (alphabetical) schemaSpec.
    - name: jsonschema
      path: ${ "/api/v1/namespaces/{{ .Release.Namespace }}/configmaps/" + .compdef.status.resource + "-" + (.compdef.status.apiVersion | split("/")[1]) + "-jsonschema-configmap" }
      verb: GET
      headers:
        - 'Accept: application/json'
      dependsOn:
        name: compdef
      continueOnError: true
      errorKey: jsonschemaError
    - name: crd
      dependsOn:
        name: compdef
      path: ${ "/apis/apiextensions.k8s.io/v1/customresourcedefinitions/" + .compdef.status.resource + "." + (.compdef.status.apiVersion | split("/")[0]) }
      verb: GET
      headers:
        - 'Accept: application/json'
    # Namespaces fed into the form's Namespace field as a select (enum), RBAC-filtered
    # to the namespaces where the USER can `create` this composition. Uses snowplow's
    # native userAccessFilter (the SubjectAccessReview the user-bearer token is appended
    # to on non-UAF stages — api/resolve.go); cleaner than the reference's per-namespace
    # SSAR fan-out. group is the shared composition.krateo.io; resource is the blueprint's
    # (from the CompositionDefinition status); namespaceFrom is each namespace's own name.
    - name: namespaces
      path: /api/v1/namespaces
      verb: GET
      headers:
        - 'Accept: application/json'
      dependsOn:
        name: crd
      userAccessFilter:
        verb: create
        group: composition.krateo.io
        resourcesFrom: "[.compdef.status.resource]"
        namespaceFrom: .metadata.name
      filter: "[.namespaces.items[] | .metadata.name]"
  # The returned schemaSpec is the CRD's spec schema with two RESERVED-KEY identity fields
  # PREPENDED: `__composition_name__` (the user-entered instance name) + `__composition_namespace__`
  # (the BLUEPRINT namespace where the CompositionDefinition lives / the RDC controller watches —
  # i.e. metadata.namespace of the created composition record; NOT the workload target). The
  # underscore-fenced keys can never collide with a blueprint's own spec property (e.g. a workload
  # blueprint's OWN `namespace`, which is the payments/workload target and stays a real spec field).
  # The Form routes these two to metadata.* via payloadToOverride and del()s ONLY them from spec —
  # every real spec field (including the blueprint's own `namespace`) is preserved. The blueprint
  # namespace comes from `.namespace` (the /marketplace/{namespace}/{name}/new route param — the
  # same value that resolves the compdef GET above); it is pinned as the field's enum+default so
  # metadata.namespace (and therefore the POST-target namespace, which snowplow/updateNameNamespace
  # derives from body metadata.namespace) always equal the blueprint namespace — no user-picked
  # nonexistent namespace, no "namespaces X not found" 404. The old synthetic `namespace` field
  # (a user-picked enum from $namespaces) was the bug: it drove metadata.namespace to the workload
  # value and del()'d `namespace` from spec, breaking both. $namespaces is now unused for identity.
  filter: |
    (.compdef.status.apiVersion | split("/")[1]) as $ver
    | ((.namespace // "") | if . == "" then "{{ .Release.Namespace }}" else . end) as $blueprintNs
    | (.crd.spec.versions[]? | select(.name == $ver) | .schema.openAPIV3Schema.properties.spec) as $spec
    # Fields the blueprint marks hidden (title contains "(should be hidden)") are
    # omitted from the generated form — propertiesToHide derived from the schema, not hardcoded.
    | ([ ($spec.properties // {}) | to_entries[] | select((.value.title // "") | test("should be hidden"; "i")) | .key ]) as $hidden
    # Draft key (CLIENT-SIDE resume): per-user (extras.username) + per-blueprint
    # (extras.namespace/.name), sanitized to the localStorage-key charset. __owner is the key
    # itself — it rides in the form store (initialValues) so the Form knows which localStorage
    # entry to read/write, WITHOUT recomputing identity client-side. The draft VALUES live ONLY
    # in the browser (localStorage) — never on the backend — so nothing is read for them here.
    | (((.username // "anon") | gsub("[^a-zA-Z0-9_.-]"; "-"))
        + "__" + ((.namespace // "") | gsub("[^a-zA-Z0-9_.-]"; "-"))
        + "__" + ((.name // "") | gsub("[^a-zA-Z0-9_.-]"; "-"))) as $draftKey
    # stringSchema (authoring order): the blueprint's raw values.schema.json (from the jsonschema
    # CM) with __composition_name__/__composition_namespace__ identity STRING-spliced in as the
    # first properties and a top-level required injected. Kept as a STRING — never parsed/re-emitted
    # — so JSON key order survives to the client (which JSON.parses it). null when the CM is absent
    # or has no "properties": — the Form then falls back to schemaSpec. __composition_namespace__ is
    # pinned (enum+default) to $blueprintNs so the user cannot retarget the composition record to a
    # nonexistent namespace; it renders read-only-in-effect (single-option Select, pre-filled).
    | ((.jsonschema.data["values.schema.json"]) // null) as $raw
    | (if $raw == null then null
       else ("\"properties\": ") as $n
         | ($raw | index($n)) as $pi
         | (if $pi == null then null
            else ($raw[0:($pi + ($n | length))]) as $pfx
              | ($raw[($pi + ($n | length)):]) as $rst
              | ({ __composition_name__:      { type: "string", title: "Name",      description: "Name for the new composition instance" },
                   __composition_namespace__: { type: "string", title: "Namespace", description: "Blueprint namespace — where the composition record is created", enum: [$blueprintNs], default: $blueprintNs } } | tojson) as $id
              | ($pfx + $id[:-1] + "," + $rst[1:]) as $spliced
              # The two identity keys MUST be `required` so they render UP-FRONT, not under the
              # "Advanced" collapse (SchemaFields partitions on required). The old code PREPENDED a
              # "required":[...] key, but the blueprint's raw schema carries its OWN top-level
              # "required" later in the string; JSON.parse's duplicate-key-LAST-wins made the raw one
              # win, dropping the identity keys into Advanced. Fix: read the raw required (read-only
              # parse — the required ARRAY's order is irrelevant to rendering; only PROPERTY order must
              # survive, which the splice above preserves) and APPEND the merged required as the LAST
              # key so it wins. Identity keys first, then the blueprint's own required (minus any dup —
              # the blueprint's own `namespace`, if present, stays required as a real spec field).
              | (((try ($raw | fromjson | .required) catch null) // []) - ["__composition_name__","__composition_namespace__"]) as $rawReq
              | (["__composition_name__","__composition_namespace__"] + $rawReq) as $req
              | (($spliced | sub("\\s+$"; "")) | .[:-1]) as $body
              | ($body + ",\"required\":" + ($req | tojson) + "}")
            end)
       end) as $stringSchema
    | {
        stringSchema: $stringSchema,
        schemaSpec: ($spec
          | .properties = ({
              __composition_name__:      { type: "string", title: "Name",      description: "Name for the new composition instance" },
              __composition_namespace__: { type: "string", title: "Namespace", description: "Blueprint namespace — where the composition record is created", enum: [$blueprintNs], default: $blueprintNs }
            } + (.properties // {}))
          | .required = (["__composition_name__", "__composition_namespace__"] + (.required // []))),
        propertiesToHide: $hidden,
        initialValues: { __owner: $draftKey },
        apiVersion: .compdef.status.apiVersion,
        kind: .compdef.status.kind,
        resource: .compdef.status.resource
      }
