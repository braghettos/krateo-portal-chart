# Helper line under the impact target Select — explains what the preview does and that it
# is read-only (the actual update still goes through the Update version form). Static text.
kind: Paragraph
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: blueprint-impact-hint
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [name, namespace]
  widgetData:
    text: 'Read-only: renders both chart versions with default values and lists the added, removed and modified objects. Apply with the Update version form.'
    type: secondary
  resourcesRefs:
    items: []
