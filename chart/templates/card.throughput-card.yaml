kind: Card
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: throughput-card
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [range]
  widgetData:
    title: Compositions created
    titleVariant: eyebrow
    variant: outlined
    # No LIVE badge. The static `live` flag is an UNVERIFIED claim: the Card renders the pill on
    # `live: true` alone, decoupled from whether the SSE /notifications stream is actually
    # connected — so it showed "Live" even when the watch-driven refetch couldn't fire. That
    # reads as false, so it's dropped. (The chart's `watch` refetch still works when the stream
    # IS up; we just no longer assert a liveness the badge can't guarantee.)
    live: false
    # Timeframe + frequency shown inline (top-right of the header) rather than as a
    # body sub-line — removes the dead gap above the chart.
    extra: 'per day · last 14 days'
    items:
    - resourceRefId: throughput-chart
  widgetDataTemplate:
  - forPath: extra
    expression: '${ (.range // "24h") as $x | (if $x=="24h" then "per hour · last 24 hours" elif $x=="7d" then "per day · last 7 days" elif $x=="30d" then "per day · last 30 days" else "per day · all time" end) }'
  apiRef: { name: dashboard-data, namespace: {{ .Release.Namespace }} }
  resourcesRefs:
    items:
    - id: throughput-chart
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: throughput-chart
      namespace: {{ .Release.Namespace }}
      resource: linecharts
      verb: GET
