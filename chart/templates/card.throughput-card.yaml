kind: Card
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: throughput-card
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    title: Compositions created
    titleVariant: eyebrow
    variant: outlined
    # LIVE badge — honest: throughput-chart carries a `watch` (refetches when any
    # composition it counts changes), so the panel auto-updates. Mirrors the mockup's
    # throughput LIVE pill + the activity-card's live flag.
    live: true
    # Timeframe + frequency shown inline (top-right of the header) rather than as a
    # body sub-line — removes the dead gap above the chart.
    extra: 'per day · last 14 days'
    items:
    - resourceRefId: throughput-chart
  widgetDataTemplate:
  - forPath: extra
    expression: '${ (.range // "24h") as $x | (if $x=="24h" then "per hour · last 24 hours" elif $x=="7d" then "per day · last 7 days" elif $x=="30d" then "per day · last 30 days" else "per day · all time" end) }'
  apiRef: { name: dashboard-data, namespace: {{ .Release.Namespace }} }
  resourcesRefs:
    items:
    - id: throughput-chart
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: throughput-chart
      namespace: {{ .Release.Namespace }}
      resource: linecharts
      verb: GET
