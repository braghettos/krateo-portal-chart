# "Relations" card → the composition's related resources, as a List.
kind: Card
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: card-composition-detail-relations
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [name, namespace]
  widgetData:
    title: Relations
    items:
      - resourceRefId: list-composition-detail-relations
  resourcesRefs:
    items:
      - id: list-composition-detail-relations
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: list-composition-detail-relations
        namespace: {{ .Release.Namespace }}
        resource: listies
        verb: GET
