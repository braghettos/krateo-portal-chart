# State chip — the alert's live HyperDX-mirrored state as a filled Tag. Label + colour are
# computed server-side by alert-detail: ALERT→red "Alert" (failure), PENDING→gold "Pending"
# (transitional), OK→green "OK" (palette: green=health only, and a quiet-OK alert IS the
# healthy default — so OK reads green here, NOT cyan). "OK" kept verbatim: it is the literal
# HyperDX state word (same choice the /alerts table makes).
kind: Tag
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: alert-detail-state
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [name, namespace]
  apiRef:
    name: alert-detail
    namespace: {{ .Release.Namespace }}
  widgetData:
    label: Pending
    color: gold
  widgetDataTemplate:
    - forPath: label
      expression: '${ .stateLabel // "Pending" }'
    - forPath: color
      expression: '${ .stateColor // "gold" }'
  resourcesRefs:
    items: []
