# "Console" card → the HyperDX external deep-links (alert + source dashboard). Wraps
# alert-detail-console (a Flex of link Buttons). The page Flex includes this card ONLY when
# sections.console is true (a configured observabilityConsoleUrl AND at least one recorded id),
# so the card is absent on installs with no console — never an empty card (exception-only).
kind: Card
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: card-alert-detail-console
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [name, namespace]
  widgetData:
    title: Console
    titleVariant: eyebrow
    variant: outlined
    items:
      - resourceRefId: alert-detail-console
  resourcesRefs:
    items:
      - id: alert-detail-console
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: alert-detail-console
        namespace: {{ .Release.Namespace }}
        resource: flexes
        verb: GET
