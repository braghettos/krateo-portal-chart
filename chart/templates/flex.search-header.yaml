# Page header (eyebrow + H1 + dynamic subtitle) for /search — mirrors marketplace-header
# (UX-audit #11: the results page had no header family, never echoed the query, offered
# no count).
kind: Flex
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: search-header
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): /search carries ?q= as an extra; declared so the cache guard
  # accepts Puts for this container.
  keyExtras: [q]
  widgetData:
    allowedResources:
    - paragraphs
    vertical: true
    items:
    - resourceRefId: search-eyebrow
    - resourceRefId: search-title
    - resourceRefId: search-subtitle
  resourcesRefs:
    items:
    - id: search-eyebrow
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: search-eyebrow
      namespace: {{ .Release.Namespace }}
      resource: paragraphs
      verb: GET
    - id: search-title
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: search-title
      namespace: {{ .Release.Namespace }}
      resource: paragraphs
      verb: GET
    - id: search-subtitle
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: search-subtitle
      namespace: {{ .Release.Namespace }}
      resource: paragraphs
      verb: GET
