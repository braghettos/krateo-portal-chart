# "View logs in Observability" — the pod-logs FALLBACK. Inline log tailing is
# blocked: the apiserver log subresource returns text/plain and snowplow api-steps
# are JSON-only (handler.go jsonHandlerBytesApply; external_fetch.go toJSONBytes
# rejects non-structured bodies) — carrying it inline would need a snowplow change.
# Instead this navigates to the observability log stream scoped to this component
# via ?svc= (a dedicated extras key: ?q= on /observability already scopes the
# compositions-list-backed widgets, which a component name would zero out). The
# concrete path is baked server-side from ?extras .name (no-apiRef widgets get
# request extras merged into their template input), so the click is a plain
# literal navigate.
# CTA audit #89 F8: the per-POD complement to this component-level button now ships
# too — table.component-detail-pods and table.obs-resource-table rows deep-link to
# /observability?svc={pod name}. The pod-name↔OTel-ServiceName match (deferred pending
# live verification) was confirmed on krateo-installer-release: obs-log-stream's
# bidirectional case-insensitive contains resolves a raw pod name to its owning service
# (and, unlike this button's bare component name, does NOT over-match sibling
# *-controller/*-agent services), so rows carry the precise pod, not the deployment name.
kind: Button
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: component-detail-logs
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [name]
  widgetData:
    label: View logs in Observability
    icon: fa-file-lines
    type: default
    size: small
    clickActionId: view-logs
    actions:
      navigate:
        - id: view-logs
          type: navigate
          path: /observability
  widgetDataTemplate:
    - forPath: actions
      expression: '${ { navigate: [ { id: "view-logs", type: "navigate", path: ("/observability?svc=" + ((.name // "") | gsub("[^a-zA-Z0-9.-]"; ""))) } ] } }'
  resourcesRefs:
    items: []
