# Empty-state CTA strip — shown ONLY while zero RestDefinitions exist (the RA emits the
# hint item exclusively then; hideWhenEmpty removes the strip the moment the first
# mapping lands — exception-only UX, the calm default is just the table). Mirrors the
# incidents-awaiting precedent: the row navigates to a server-built /kog-builder?ask=
# deep-link that opens the Autopilot rail seeded with the paste-an-OpenAPI builder flow.
# (A Paragraph cannot carry a link — the Listy item is the house pattern for an
# actionable hint; its primary/secondary text IS the hint prose.)
kind: Listy
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: kog-builder-hint
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  apiRef:
    name: kog-restdefinitions
    namespace: {{ .Release.Namespace }}
  widgetData:
    dataSource: []
    itemLayout: horizontal
    split: false
    hideWhenEmpty: true
    header: No API mappings yet — start one in Autopilot →
    itemTemplate:
      navigateTo: '{askHref}'
      iconVariant: tile
      icon: fa-wand-magic-sparkles
      color:
        default: blue
      primaryText: '{title}'
      secondaryText: '{detail}'
  widgetDataTemplate:
  - forPath: dataSource
    expression: '${ .hint // [] }'
  resourcesRefs:
    items: []
