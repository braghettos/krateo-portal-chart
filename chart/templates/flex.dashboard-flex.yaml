kind: Flex
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: dashboard-flex
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    allowedResources:
    - flexes
    - rows
    - cards
    - statistics
    - tags
    - paragraphs
    - buttons
    - linecharts
    - piecharts
    - listies
    vertical: true
    # Petrol density (D5/O1): tighten the inter-section vertical rhythm (stats/charts/rail/lists)
    # from `middle` to `small` so the dashboard reads closer to the dense one-screen mockup.
    gap: small
    items:
    - resourceRefId: header-row
    # First-run onboarding — self-hides once the user owns a composition (hideWhenEmpty
    # gate on compositions-list). Sits under the greeting header, above the stats.
    - resourceRefId: onboarding-empty
    - resourceRefId: stats-row
    - resourceRefId: charts-row
    - resourceRefId: rail-row
    - resourceRefId: lists-row
    # #14: Platform inventory (installed blueprints · composition kinds · active projects) —
    # the three real obs-stat-* Statistics wrapped in a card, moved onto the dashboard (the
    # observability agent removes it from the obs page). Bottom of the flow, under the lists.
    - resourceRefId: dashboard-inventory
  resourcesRefs:
    items:
    - id: header-row
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: header-row
      namespace: {{ .Release.Namespace }}
      resource: rows
      verb: GET
    - id: onboarding-empty
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: onboarding-empty
      namespace: {{ .Release.Namespace }}
      resource: listies
      verb: GET
    - id: stats-row
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: stats-row
      namespace: {{ .Release.Namespace }}
      resource: rows
      verb: GET
    - id: charts-row
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: charts-row
      namespace: {{ .Release.Namespace }}
      resource: rows
      verb: GET
    - id: rail-row
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: rail-row
      namespace: {{ .Release.Namespace }}
      resource: rows
      verb: GET
    - id: lists-row
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: lists-row
      namespace: {{ .Release.Namespace }}
      resource: rows
      verb: GET
    - id: dashboard-inventory
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: dashboard-inventory
      namespace: {{ .Release.Namespace }}
      resource: cards
      verb: GET
