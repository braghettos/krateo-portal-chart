# Dynamic subtitle for /search (UX-audit #11): echoes the query and the result count —
# the two facts the page never stated. Binds the SAME global-search RA as the results
# List (keyExtras [q] partitions the cache per query); the RA echoes `q` back and the
# count is computed server-side style in this widget's jq from the RA's own items —
# the number can never disagree with the list below it.
kind: Paragraph
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: search-subtitle
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [q]
  apiRef:
    name: global-search
    namespace: {{ .Release.Namespace }}
  widgetData:
    text: ''
    type: secondary
  widgetDataTemplate:
    - forPath: text
      expression: '${ (.q // "") as $q | ((.items // []) | length) as $n | (if $q == "" then "All resources" else "Results for “" + $q + "”" end) + " · " + ($n | tostring) + (if $n == 1 then " result" else " results" end) }'
  resourcesRefs:
    items: []
