# Per-resource reconciliation rail data (detail page signature). Resolves the
# target composition's managed resources (from ?extras .name/.namespace) and
# FETCHES each to read its live ready state.
#
# Snowplow execution contract (verified against source): a step `filter` sees
# ONLY that step's response (NOT extras); the `iterator` expression is evaluated
# against the FULL dict (extras + prior stages) and must yield a JSON array; the
# `path` template is evaluated per yielded element. So:
#   crds      → list composition.krateo.io CRDs.
#   found     → per CRD, emit EVERY composition's managed entries (the step
#               filter can't see extras), each TAGGED with its parent name/ns
#               (_cn/_cns) + a reconstructed fetchable GET path (_getpath).
#               Krateo's .status.managed[].path omits the namespace for
#               namespaced kinds (→404), so inject /namespaces/<compNs>/;
#               cluster-scoped kinds keep .path.
#   resources → ITERATOR (full dict) filters _cn/_cns to the target (only the
#               target's ~N resources are fetched), GETs each at _getpath, and
#               its filter shapes the live object to {kind,name,ns,conditions}.
# Final filter derives per-resource state (Ready×Synced / Available / ready-by-
# presence) + aggregate, folding in the composition's own workload projection
# (workloadUnhealthy/workloadMessage from .status.workloadHealthy/.healthMessage,
# ridden through `found` as _wh/_whMsg) so `converged` can't claim full
# convergence over a crashlooping workload. Nothing hardcoded (the cluster-scoped
# kind list is static k8s API scoping, not derived data).
apiVersion: templates.krateo.io/v1
kind: RESTAction
metadata:
  name: composition-resources
  namespace: {{ .Release.Namespace }}
  annotations:
    krateo.io/verbose: "true"
spec:
  api:
    # #72: discover composition TYPES from CompositionDefinitions under a userAccessFilter — NOT a
    # cluster-wide customresourcedefinitions list. The CRD list runs as the CALLER (no UAF → caller
    # token, internal/dynamic/sa_client.go); a namespace-scoped tenant can't list CRDs cluster-wide
    # → 403 → empty → blank rail. Listing CompositionDefinitions cluster-wide under a UAF on
    # `compositiondefinitions` has snowplow list as its SA (cluster-wide grant) then refilter to the
    # CDs the CALLER can list — so every namespace the caller is granted is covered, no hardcoded ns.
    # {plural, version} shape unchanged (found iterates it).
    - name: crds
      path: /apis/core.krateo.io/v1alpha1/compositiondefinitions
      verb: GET
      headers:
        - 'Accept: application/json'
      userAccessFilter:
        verb: list
        group: core.krateo.io
        resource: compositiondefinitions
        namespaceFrom: .metadata.namespace
      filter: "[.crds.items[]? | select(.status.resource != null and .status.apiVersion != null) | {plural: .status.resource, version: (.status.apiVersion | split(\"/\")[1])}]"
      continueOnError: true
    - name: found
      dependsOn:
        name: crds
        iterator: .crds
      # #72: NAMESPACE-SCOPED to the target's ns (?extras .namespace) — was a cluster-wide list
      # (no /namespaces/ segment), which runs as the caller and 403s for a namespace-scoped tenant.
      # The composition is always in .namespace, and the `resources` iterator already selects the
      # target by _cn/_cns, so scoping here loses nothing and makes it tenant-authorizable.
      path: ${ "/apis/composition.krateo.io/" + (.version) + "/namespaces/" + (.namespace) + "/" + (.plural) }
      verb: GET
      headers:
        - 'Accept: application/json'
      continueOnError: true
      # Emit ALL managed entries (every composition of this kind), each tagged
      # with parent _cn/_cns + reconstructed _getpath. No extras here (the step
      # filter can't see them) — the resources iterator selects the target.
      filter: >
        (["clusterroles","clusterrolebindings","namespaces","customresourcedefinitions","clusterissuers","persistentvolumes","storageclasses","nodes","priorityclasses","validatingwebhookconfigurations","mutatingwebhookconfigurations","apiservices","certificatesigningrequests","podsecuritypolicies","ingressclasses","runtimeclasses","csidrivers","csinodes","volumeattachments"]) as $clusterKinds
        | [ .found.items[]?
            | . as $comp
            | ($comp.metadata.name) as $cn
            | ($comp.metadata.namespace) as $cns
            | ($comp.status.managed // [])[]
            | . as $m
            | ($m.path | split("/")) as $p
            | ($p[-2]) as $res | ($p[-1]) as $nm | ($p[0:-2] | join("/")) as $pre
            | ($clusterKinds | index($res)) as $cluster
            # The parent's workload projection rides on every row (_wh/_whMsg): the final
            # aggregate folds it in, and this step filter is the only place that sees $comp.
            | { _cn: $cn, _cns: $cns, _kind: $res, _name: $nm,
                _wh: $comp.status.workloadHealthy, _whMsg: ($comp.status.healthMessage // ""),
                # Real group/version for the resource-view route ($p[1] = "api" for the core group
                # → group "core", version $p[2]; "apis" → group $p[2], version $p[3]) + cluster-scope.
                _grp: (if ($p[1] // "") == "apis" then ($p[2] // "") else "core" end),
                _ver: (if ($p[1] // "") == "apis" then ($p[3] // "v1") else ($p[2] // "v1") end),
                _cluster: ($cluster != null),
                _getpath: (if $cluster != null then $m.path
                           else ($pre + "/namespaces/" + $cns + "/" + $res + "/" + $nm) end) } ]
    - name: resources
      dependsOn:
        name: found
        # full-dict context: bind extras then select this composition's entries.
        iterator: '.name as $n | .namespace as $ns | [ .found[] | select(._cn == $n and ._cns == $ns) ]'
      path: ${ ._getpath }
      verb: GET
      headers:
        - 'Accept: application/json'
      continueOnError: true
      errorKey: resErr
      # Shape each fetched live object to {rkind,rname,rns,conditions} (1-elem
      # array; 404s/Status drop to []). (.resources // .) tolerates either
      # dict-keyed or root-bound response shapes across dispatch paths.
      filter: >
        [ (.resources // .)
          | select(type == "object" and (.kind // "") != "Status" and (.metadata.name // "") != "")
          | { rkind: (.kind // ""), rname: .metadata.name, rns: (.metadata.namespace // ""), conditions: (.status.conditions // []) } ]
  # Authoritative row list = the composition's DECLARED managed resources (.found,
  # target-filtered) → total is always the true managed count, independent of
  # whether every per-resource GET round-tripped (the informer dispatch can drop
  # core kinds). Live state is JOINED from the fetched objects (.resources) by
  # name(+ns); kind prefers the fetched object's kind, falls back to the managed
  # plural. A managed resource with no fetched conditions = healthy-by-presence.
  # LITERAL block (|), not folded (>): folding joins same-indent lines with spaces,
  # so a base-indent jq `#` comment would swallow the code joined after it (the
  # composition-events filter shipped broken exactly this way).
  filter: |
    (.name) as $n | (.namespace) as $ns
    | ({"serviceaccounts":"ServiceAccount","configmaps":"ConfigMap","secrets":"Secret","services":"Service","endpoints":"Endpoints","persistentvolumeclaims":"PersistentVolumeClaim","deployments":"Deployment","replicasets":"ReplicaSet","statefulsets":"StatefulSet","daemonsets":"DaemonSet","pods":"Pod","jobs":"Job","cronjobs":"CronJob","clusterroles":"ClusterRole","clusterrolebindings":"ClusterRoleBinding","roles":"Role","rolebindings":"RoleBinding","ingresses":"Ingress","networkpolicies":"NetworkPolicy","namespaces":"Namespace"}) as $kindMap
    | ( [ .found[]? | select(._cn == $n and ._cns == $ns) ] ) as $managed
    | ( [ .resources ] | flatten | map(select(type == "object" and (.rname // "") != "")) ) as $fetched
    | ( $managed | map(
          . as $m
          | ( [ $fetched[] | select(.rname == $m._name and ((.rns == $m._cns) or (.rns == ""))) ][0] ) as $obj
          | (($obj.conditions) // []) as $c
          | ([ $c[]? | select(.type == "Ready" or .type == "Available") ][0]) as $rc
          | ($rc.status == "True") as $ready
          | ($rc.status == "False") as $notready
          | (any($c[]?; .type == "Synced" and .status == "False")) as $unsynced
          | (($c | length) == 0) as $noconds
          | {
              kind: ($kindMap[$m._kind] // (if (($obj.rkind) // "") != "" then $obj.rkind else (($m._kind | .[0:1] | ascii_upcase) + ($m._kind[1:] | sub("s$"; ""))) end)),
              name: $m._name,
              ns: $m._cns,
              state: (if $noconds then "healthy"
                      elif $ready and ($unsynced | not) then "healthy"
                      elif $ready and $unsynced then "drift"
                      elif $notready then "failed"
                      else "pending" end),
              healthPercent: (if $noconds or ($ready and ($unsynced|not)) then 100
                              elif $ready and $unsynced then 70
                              elif $notready then 20 else 50 end),
              # IA F5 + F5-full: composition.krateo.io children drill into the first-class
              # /compositions detail; EVERY other kind drills into the generic /resources view
              # (namespaced → its ns; cluster-scoped → the "cluster" filler; core group → "core").
              # The last-mile is now closed for every managed child, whatever its kind.
              navHref: (if ($m._grp == "composition.krateo.io")
                        then ("/compositions/" + $m._cns + "/" + $m._name)
                        else ("/resources/" + (if $m._cluster then "cluster" else $m._cns end) + "/" + $m._grp + "/" + $m._ver + "/" + $m._kind + "/" + $m._name) end)
            } )
      ) as $rows
    | ($rows | length) as $total
    | ($rows | map(select(.state == "healthy")) | length) as $healthy
    # Workload projection of the COMPOSITION itself (ridden in on _wh/_whMsg): resources can
    # all match declared-vs-actual while the pods behind them crashloop — `converged` must not
    # claim full convergence then, and the rail widget caps/annotates from these two keys.
    # ($managed[0] on an empty list is null → null._wh == false → false: safe when the comp
    # declares no managed resources.)
    | ($managed[0]._wh == false) as $whBad
    | (if $whBad then ($managed[0]._whMsg // "") else "" end) as $whMsg
    | {
        resources: $rows,
        total: $total,
        healthyCount: $healthy,
        driftCount: ($rows | map(select(.state == "drift")) | length),
        failedCount: ($rows | map(select(.state == "failed")) | length),
        pendingCount: ($rows | map(select(.state == "pending")) | length),
        convergencePercent: (if $total > 0 then (($healthy * 100 / $total) | floor) else 0 end),
        converged: ($total > 0 and $healthy == $total and ($whBad | not)),
        workloadUnhealthy: $whBad,
        workloadMessage: $whMsg
      }
