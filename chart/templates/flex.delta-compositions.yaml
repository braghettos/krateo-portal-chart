kind: Flex
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: delta-compositions
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    allowedResources:
    - tags
    - paragraphs
    align: baseline
    gap: small
    items:
    - resourceRefId: delta-tag-compositions
    - resourceRefId: delta-cap-compositions
  resourcesRefs:
    items:
    - id: delta-tag-compositions
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: delta-tag-compositions
      namespace: {{ .Release.Namespace }}
      resource: tags
      verb: GET
    - id: delta-cap-compositions
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: delta-cap-compositions
      namespace: {{ .Release.Namespace }}
      resource: paragraphs
      verb: GET
