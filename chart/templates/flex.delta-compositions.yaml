kind: Flex
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: delta-compositions
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    allowedResources:
    - tags
    - paragraphs
    align: baseline
    # #1: pin the range-pill + "past 7d" delta row flush-LEFT under the big Statistic value.
    # antd Flex is display:flex so this Flex already spans the stat-card body full width;
    # justify: flex-start makes the pill+caption unambiguously left-aligned (the default was
    # implicit and read mid-card). The Flex CR has no width field — full-card width comes
    # from the card body it fills, so flex-start is all that's needed to left-anchor it.
    justify: flex-start
    gap: 4
    items:
    - resourceRefId: delta-tag-compositions
    - resourceRefId: delta-cap-compositions
  resourcesRefs:
    items:
    - id: delta-tag-compositions
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: delta-tag-compositions
      namespace: {{ .Release.Namespace }}
      resource: tags
      verb: GET
    - id: delta-cap-compositions
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: delta-cap-compositions
      namespace: {{ .Release.Namespace }}
      resource: paragraphs
      verb: GET
