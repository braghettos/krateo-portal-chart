# Time-range chip group for the observability page (sits under the head row). The preset
# chips (1h/6h/24h/7d) drive every range-scoped obs panel via ?range= in the URL → extras →
# each RESTAction's ClickHouse INTERVAL. Mirrors the dashboard/compositions range groups.
# FILTER CHIPS ONLY (UX-audit #15): the "Incidents" / "View in console" NAVIGATION buttons
# used to sit in this band styled like the chips — one band, two semantics. They moved to
# obs-header-actions (right-aligned in obs-header-row), so everything here scopes THIS page.
kind: Flex
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: obs-range-group
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    allowedResources:
    - listies
    - paragraphs
    gap: small
    align: center
    wrap: true
    items:
    - resourceRefId: obs-range-label
    # The four obs-range-btn-* Buttons collapsed into ONE data-driven Listy(chip)
    # (widget-sprawl collapse) — same targets, default and active logic.
    - resourceRefId: obs-range-chips
  resourcesRefs:
    items:
    - id: obs-range-label
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-range-label
      namespace: {{ .Release.Namespace }}
      resource: paragraphs
      verb: GET
    - id: obs-range-chips
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-range-chips
      namespace: {{ .Release.Namespace }}
      resource: listies
      verb: GET
