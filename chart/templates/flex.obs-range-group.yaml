# Time-range chip group for the observability page (sits under the page header). The preset
# chips (1h/6h/24h/7d) drive every range-scoped obs panel via ?range= in the URL → extras →
# each RESTAction's ClickHouse INTERVAL. Mirrors the dashboard/compositions range groups.
kind: Flex
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: obs-range-group
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    allowedResources:
    - buttons
    - paragraphs
    gap: small
    align: center
    wrap: true
    items:
    - resourceRefId: obs-range-label
    - resourceRefId: obs-range-btn-1h
    - resourceRefId: obs-range-btn-6h
    - resourceRefId: obs-range-btn-24h
    - resourceRefId: obs-range-btn-7d
    {{- if .Values.observabilityConsoleUrl }}
    - resourceRefId: obs-console-link
    {{- end }}
  resourcesRefs:
    items:
    - id: obs-range-label
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-range-label
      namespace: {{ .Release.Namespace }}
      resource: paragraphs
      verb: GET
    {{- range (list "1h" "6h" "24h" "7d") }}
    - id: obs-range-btn-{{ . }}
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-range-btn-{{ . }}
      namespace: {{ $.Release.Namespace }}
      resource: buttons
      verb: GET
    {{- end }}
    {{- if .Values.observabilityConsoleUrl }}
    - id: obs-console-link
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-console-link
      namespace: {{ .Release.Namespace }}
      resource: buttons
      verb: GET
    {{- end }}
