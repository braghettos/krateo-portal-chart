# Time-range chip group for the observability page (sits under the page header). The preset
# chips (1h/6h/24h/7d) drive every range-scoped obs panel via ?range= in the URL → extras →
# each RESTAction's ClickHouse INTERVAL. Mirrors the dashboard/compositions range groups.
kind: Flex
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: obs-range-group
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    allowedResources:
    - buttons
    - listies
    - paragraphs
    gap: small
    align: center
    wrap: true
    items:
    - resourceRefId: obs-range-label
    # The four obs-range-btn-* Buttons collapsed into ONE data-driven Listy(chip)
    # (widget-sprawl collapse) — same targets, default and active logic.
    - resourceRefId: obs-range-chips
    # Hand-off to the SRE page (alerts + investigations moved there in the IA split).
    - resourceRefId: obs-incidents-link
    {{- if .Values.observabilityConsoleUrl }}
    - resourceRefId: obs-console-link
    {{- end }}
  resourcesRefs:
    items:
    - id: obs-range-label
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-range-label
      namespace: {{ .Release.Namespace }}
      resource: paragraphs
      verb: GET
    - id: obs-range-chips
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-range-chips
      namespace: {{ .Release.Namespace }}
      resource: listies
      verb: GET
    - id: obs-incidents-link
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-incidents-link
      namespace: {{ .Release.Namespace }}
      resource: buttons
      verb: GET
    {{- if .Values.observabilityConsoleUrl }}
    - id: obs-console-link
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-console-link
      namespace: {{ .Release.Namespace }}
      resource: buttons
      verb: GET
    {{- end }}
