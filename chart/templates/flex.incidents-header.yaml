# /incidents page head — eyebrow + H1 + subtitle stack (mirrors obs-header). Static copy;
# the page's data lives in the toolbar/table below.
kind: Flex
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: incidents-header
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    allowedResources:
    - paragraphs
    vertical: true
    items:
    - resourceRefId: incidents-eyebrow
    - resourceRefId: incidents-title
    - resourceRefId: incidents-subtitle
  resourcesRefs:
    items:
    {{- range (list "incidents-eyebrow" "incidents-title" "incidents-subtitle") }}
    - id: {{ . }}
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: {{ . }}
      namespace: {{ $.Release.Namespace }}
      resource: paragraphs
      verb: GET
    {{- end }}
