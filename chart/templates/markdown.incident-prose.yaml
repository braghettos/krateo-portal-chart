# v1 graceful-degradation path — the legacy prose analysis (status.report, markdown).
# incident-detail sets .proseMd ONLY when the report carries NO v2 structure (and to an
# honest "analysis in progress" / "analysis failed" note when there's no prose either);
# the page Flex includes this widget only on that path, so structured v2 reports never
# render their prose twice.
kind: Markdown
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: incident-prose
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [name, namespace]
  apiRef:
    name: incident-detail
    namespace: {{ .Release.Namespace }}
  widgetData:
    markdown: '_Analysis in progress…_'
  widgetDataTemplate:
  - forPath: markdown
    expression: '${ .proseMd // "_Analysis in progress…_" }'
  resourcesRefs:
    items: []
