# The Deployment's REAL status.conditions — type + status Tag + reason·message,
# all of them, mirroring the composition-detail conditions list. Severity is
# computed server-side because Deployment condition polarity is not uniform:
# ReplicaFailure=True is BAD while Available/Progressing=True is GOOD — colouring
# raw status truth would mislabel a failing component.
kind: Listy
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: list-component-detail-conditions
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [name]
  apiRef:
    name: component-detail
    namespace: {{ .Release.Namespace }}
  widgetData:
    itemTemplate:
      iconVariant: dot
      primaryText: '{type}'
      secondaryText: '{status}'
      secondaryTextAsTag: true
      subPrimaryText: '{desc}'
      color:
        value: '{sev}'
        map:
          ok: green
          bad: red
        default: gray
    dataSource: []
  widgetDataTemplate:
    - forPath: dataSource
      expression: '${ [ (.dep.conditions // [])[] | { type: .type, status: (.status | tostring), desc: ((.reason // "") + (if ((.message // "") | length) > 0 then (" · " + .message) else "" end)), sev: (if (.status | tostring) == "Unknown" then "unknown" elif .type == "ReplicaFailure" then (if (.status | tostring) == "True" then "bad" else "ok" end) else (if (.status | tostring) == "True" then "ok" else "bad" end) end) } ] }'
  resourcesRefs:
    items: []
