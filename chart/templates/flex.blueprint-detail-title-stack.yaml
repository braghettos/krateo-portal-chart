# Left side of the detail pagehead: back-link over the title line (name + status) over the
# subtitle. Mirrors composition-detail-title-stack.
kind: Flex
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: blueprint-detail-title-stack
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    vertical: true
    gap: small
    allowedResources:
      - buttons
      - flexes
      - paragraphs
    items:
      - resourceRefId: blueprint-detail-back
      - resourceRefId: blueprint-detail-title-line
      - resourceRefId: blueprint-detail-subtitle
  resourcesRefs:
    items:
      - id: blueprint-detail-back
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: blueprint-detail-back
        namespace: {{ .Release.Namespace }}
        resource: buttons
        verb: GET
      - id: blueprint-detail-title-line
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: blueprint-detail-title-line
        namespace: {{ .Release.Namespace }}
        resource: flexes
        verb: GET
      - id: blueprint-detail-subtitle
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: blueprint-detail-subtitle
        namespace: {{ .Release.Namespace }}
        resource: paragraphs
        verb: GET
