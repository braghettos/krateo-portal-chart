# Reconciliation convergence band (detail page signature gauge). Fed by the
# composition-resources RA — a SINGLE aggregate gauge: match% fill + amber
# target-tick at 100% + the "NN% match · M/N resources" readout (mirrors the
# mockup `.rail-panel`). The per-managed-resource breakdown lives in the
# Relations card (same RA). Nothing hardcoded: convergencePercent + state derive
# server-side from every managed resource's Ready×Synced / Available / ready-by-
# presence. Reuses the Petrol `bar.variant: rail` engine (cyan fill + amber tick).
# Workload projection outranks resource-match: when the RA says workloadUnhealthy
# (crashlooping pods behind matching resources) the gauge goes failed-red, the fill
# caps at 20 (the compositions-list wh-failed language — the two rails must agree),
# the label leads with "workload unhealthy" and the healthMessage rides the sub-line.
# "100% match" alone over a down workload is a false all-clear.
kind: Listy
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: list-composition-detail-rail
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [name, namespace]
  apiRef:
    name: composition-resources
    namespace: {{ .Release.Namespace }}
  widgetData:
    dataSource: []
    itemLayout: horizontal
    split: false
    itemTemplate:
      primaryText: '{name}'
      subPrimaryText: '{ns}'
      bar:
        percent: '{healthPercent}'
        color:
          value: '{railState}'
          map:
            healthy: green
            drift: violet
            pending: orange
            failed: red
        label: '{label}'
        variant: rail
  widgetDataTemplate:
    - forPath: dataSource
      expression: '${ [ (.workloadUnhealthy == true) as $whBad | { name: "", ns: (if $whBad then (.workloadMessage // "") else "" end), healthPercent: (if $whBad then ([.convergencePercent, 20] | min) else .convergencePercent end), railState: (if $whBad then "failed" elif .converged then "healthy" elif (.failedCount > 0) then "failed" elif (.driftCount > 0) then "drift" else "pending" end), label: ((if $whBad then "workload unhealthy · " else "" end) + (.convergencePercent | tostring) + "% match · " + (.healthyCount | tostring) + "/" + (.total | tostring) + " resources") } ] }'
  resourcesRefs:
    items: []
