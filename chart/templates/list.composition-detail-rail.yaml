# Reconciliation convergence band (detail page signature gauge). Fed by the
# composition-resources RA — a SINGLE aggregate gauge: match% fill + amber
# target-tick at 100% + the "NN% match · M/N resources" readout (mirrors the
# mockup `.rail-panel`). The per-managed-resource breakdown lives in the
# Relations card (same RA). Nothing hardcoded: convergencePercent + state derive
# server-side from every managed resource's Ready×Synced / Available / ready-by-
# presence. Reuses the Petrol `bar.variant: rail` engine (cyan fill + amber tick).
kind: Listy
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: list-composition-detail-rail
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  apiRef:
    name: composition-resources
    namespace: {{ .Release.Namespace }}
  widgetData:
    dataSource: []
    itemLayout: horizontal
    split: false
    itemTemplate:
      primaryText: '{name}'
      subPrimaryText: '{ns}'
      bar:
        percent: '{healthPercent}'
        color:
          value: '{railState}'
          map:
            healthy: green
            drift: violet
            pending: orange
            failed: red
        label: '{label}'
        variant: rail
  widgetDataTemplate:
    - forPath: dataSource
      expression: '${ [ { name: "", ns: "", healthPercent: .convergencePercent, railState: (if .converged then "healthy" elif (.failedCount > 0) then "failed" elif (.driftCount > 0) then "drift" else "pending" end), label: ((.convergencePercent | tostring) + "% match · " + (.healthyCount | tostring) + "/" + (.total | tostring) + " resources") } ] }'
  resourcesRefs:
    items: []
