# "Specification" card → the composition's spec, as a Descriptions list.
kind: Card
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: card-composition-detail-spec
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    title: Specification
    items:
      - resourceRefId: descriptions-composition-detail-spec
  resourcesRefs:
    items:
      - id: descriptions-composition-detail-spec
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: descriptions-composition-detail-spec
        namespace: {{ .Release.Namespace }}
        resource: descriptions
        verb: GET
