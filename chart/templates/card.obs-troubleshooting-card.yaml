# Autopilot continuation panel — the per-alert report feed (recent RCA runs), each row a
# /incidents?ask= deep-link that reopens THAT investigation in the Autopilot rail. Fires
# automatically: when a HyperDX alert triggers, krateo-alert-troubleshooter runs the
# Autopilot agent and writes a TroubleshootingReport. Lives on /incidents since the IA
# split; the full analyses render structured on the incident DETAIL pages (the former
# obs-troubleshooting-latest markdown was retired as redundant with them).
kind: Card
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: obs-troubleshooting-card
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    title: Continue in Autopilot
    titleVariant: eyebrow
    variant: outlined
    extra: 'Autopilot RCA on alert-fire'
    items:
    - resourceRefId: obs-troubleshooting-feed
  widgetDataTemplate:
  - forPath: extra
    expression: '${ ((.count // 0)|tostring) + " reports · Autopilot RCA" }'
  apiRef:
    name: obs-troubleshooting
    namespace: {{ .Release.Namespace }}
  resourcesRefs:
    items:
    - id: obs-troubleshooting-feed
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-troubleshooting-feed
      namespace: {{ .Release.Namespace }}
      resource: listies
      verb: GET
