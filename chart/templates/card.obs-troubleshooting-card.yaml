# Autopilot continuation panel — the per-alert report feed (recent RCA runs), each row a
# /incidents?ask= deep-link that reopens THAT investigation in the Autopilot rail. Fires
# automatically: when a HyperDX alert triggers, krateo-alert-troubleshooter runs the
# Autopilot agent and writes a TroubleshootingReport. Lives on /incidents since the IA
# split; the full analyses render structured on the incident DETAIL pages (the former
# obs-troubleshooting-latest markdown was retired as redundant with them).
kind: Card
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: obs-troubleshooting-card
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # #72 §0.7: the "Continue in Autopilot" (eyebrow "CONTINUE IN AUTOPILOT") title is removed — the
  # section is already labelled "Autopilot investigations" (incidents-investigations-label), and the
  # panel now carries an explicit "Investigate with Autopilot" CTA. Body = a right-aligned CTA row +
  # the investigations Table (was a Listy). The `extra` count badge stays (informative, not the
  # offending header copy).
  widgetData:
    variant: outlined
    extra: 'Autopilot RCA on alert-fire'
    items:
    - resourceRefId: obs-troubleshooting-cta
    - resourceRefId: obs-troubleshooting-table
  widgetDataTemplate:
  - forPath: extra
    expression: '${ ((.count // 0)|tostring) + " reports · Autopilot RCA" }'
  apiRef:
    name: obs-troubleshooting
    namespace: {{ .Release.Namespace }}
  resourcesRefs:
    items:
    - id: obs-troubleshooting-cta
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-troubleshooting-cta
      namespace: {{ .Release.Namespace }}
      resource: flexes
      verb: GET
    - id: obs-troubleshooting-table
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-troubleshooting-table
      namespace: {{ .Release.Namespace }}
      resource: tables
      verb: GET
