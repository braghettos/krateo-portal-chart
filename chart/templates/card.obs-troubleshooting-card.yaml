# Auto-troubleshooting panel — the report feed (recent RCA runs) + the latest Autopilot
# root-cause analysis rendered as markdown. Fires automatically: when a HyperDX alert triggers,
# krateo-alert-troubleshooter runs the Autopilot agent and writes a TroubleshootingReport.
kind: Card
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: obs-troubleshooting-card
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    title: Auto-troubleshooting
    titleVariant: eyebrow
    variant: outlined
    extra: 'Autopilot RCA on alert-fire'
    items:
    - resourceRefId: obs-troubleshooting-feed
    - resourceRefId: obs-troubleshooting-latest
  widgetDataTemplate:
  - forPath: extra
    expression: '${ ((.count // 0)|tostring) + " reports · Autopilot RCA" }'
  apiRef:
    name: obs-troubleshooting
    namespace: {{ .Release.Namespace }}
  resourcesRefs:
    items:
    - id: obs-troubleshooting-feed
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-troubleshooting-feed
      namespace: {{ .Release.Namespace }}
      resource: listies
      verb: GET
    - id: obs-troubleshooting-latest
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-troubleshooting-latest
      namespace: {{ .Release.Namespace }}
      resource: markdowns
      verb: GET
