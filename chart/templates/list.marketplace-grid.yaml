# Marketplace content — antd `List` in 3-col grid mode, ONE templated tile per
# blueprint (CompositionDefinition), iterated over `blueprints-cards`. Replaces the
# retired per-blueprint Card-CR fanout (resourcesRefsTemplate → one widget per
# blueprint): now a single itemTemplate renders every tile from the catalog's flat
# data — icon + name + version + a soft-tint category (tier) pill — and the whole
# tile navigates to the blueprint's create flow (Install → Create). `prefix`
# wires the marketplace category filter. Honest fields only (name/version/category
# off the CompositionDefinition); no invented ratings/install-counts.
apiVersion: widgets.templates.krateo.io/v1beta1
kind: List
metadata:
  name: marketplace-grid
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  apiRef:
    name: blueprints-cards
    namespace: {{ .Release.Namespace }}
  widgetData:
    prefix: marketplace-filters
    grid:
      gutter: 16
      column: 3
    dataSource: []
    itemTemplate:
      icon: fa-cube
      primaryText: '{name}'
      subPrimaryText: 'v{version}'
      secondaryText: '{category}'
      secondaryTextAsTag: true
      navigateTo: '/marketplace/{namespace}/{name}/new'
  widgetDataTemplate:
    - forPath: dataSource
      expression: '${ [ .cards[] | { name: .metadata.name, namespace: .metadata.namespace, version: .version, category: .category } ] }'
  resourcesRefs:
    items: []
