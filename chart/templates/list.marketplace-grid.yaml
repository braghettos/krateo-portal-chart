# Marketplace content — antd `List` in 3-col grid mode, ONE templated tile per
# INSTALLABLE blueprint, iterated over `blueprints-catalog` (the braghettos helm-repo
# index, ~311 charts). A single itemTemplate renders every tile from the catalog's flat
# data — name + version·maturity + a soft-tint category pill. The category facet rides
# in via ?category extras (marketplace-category-chips). Honest fields only (name/version/
# category/maturity off the helm index); no invented ratings/install-counts. Each tile's footer Install button
# (rowActions → `install`, a navigate action) opens the install form at
# /marketplace/{name}/install, which renders the CompositionDefinition CRD and deploys it.
apiVersion: widgets.templates.krateo.io/v1beta1
kind: Listy
metadata:
  name: marketplace-grid
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  # `spotlight` = a global-search catalog hit's hand-off (?spotlight=<name>): the
  # catalog RA sorts that card first + stamps its status glyph (gold star).
  keyExtras: [category, q, source, sort, spotlight]
  apiRef:
    name: blueprints-catalog
    namespace: {{ .Release.Namespace }}
  widgetData:
    grid:
      gutter: 16
      column: 3
    dataSource: []
    # `card` rowVariant: each grid cell is a full antd Card — icon-tile + name + version
    # badge (subPrimaryText) + category tag (secondaryText) + 2-line description + a footer
    # (maturity left, visible Install button right). Per-category icon (from the RA) + colour
    # map tint the tile + tag.
    itemTemplate:
      rowVariant: card
      iconVariant: tile
      # Whole-tile click → the blueprint's marketplace DETAIL page (same destination as the
      # footer Details button) — mirrors blueprints-grid's whole-card navigateTo; the footer
      # buttons (Details/Install) keep their own actions on top.
      navigateTo: '/marketplace/{name}'
      icon: '{icon}'
      primaryText: '{name}'
      # Footer-left = the helm chart version (subSecondaryText → card-foot left); the top keeps
      # just name + category tag. Maturity dropped (not in the mockup).
      subSecondaryText: 'v{version}'
      # Type badge: the source pill (Blueprint cyan / Operator magenta) — the at-a-glance
      # blueprint-vs-operator distinction; the icon (fa-layer-group / fa-gears) + tile tint
      # use the same typeColor, both stamped by the catalog RA per `source`.
      secondaryText: '{typeLabel}'
      secondaryTextAsTag: true
      description: '{description}'
      color:
        value: '{typeColor}'
        default: gray
      # "Already installed" check (top-right of the tile) — green when this blueprint is installed;
      # icon/colour are computed server-side in the catalog RA (empty -> no glyph when available).
      status:
        icon: '{installedIcon}'
        color: '{installedColor}'
        tooltip: '{installedTooltip}'
      # Per-tile Install — a VISIBLE footer button (card variant). It NAVIGATES to the install
      # form for THIS row (${name} interpolated from the card's customPayload), where the user
      # reviews the CompositionDefinition (CRD schema, chart pre-filled) and deploys it.
      rowActions:
        - actionId: details
          label: Details
          icon: fa-circle-info
        - actionId: install
          label: Install
          icon: fa-download
    actions:
      navigate:
        - id: details
          type: navigate
          path: /marketplace/${name}
        - id: install
          type: navigate
          path: /marketplace/${name}/install
  widgetDataTemplate:
    - forPath: dataSource
      expression: '${ [ .cards[] | { name, version, typeLabel, typeColor, source, tags, installed, installedIcon, installedColor, installedTooltip, repoUrl, icon, description } ] }'
  resourcesRefs:
    items: []
