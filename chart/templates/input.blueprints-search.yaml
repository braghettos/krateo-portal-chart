# #75 §0.2: the blueprints search as a CR Input widget (queryParam-bound), so it sits INLINE with
# the category chips (via flex.blueprints-filterbar) instead of the frontend-chrome PageSearch that
# rendered on its own line above the grid. queryParam:q writes ?q= → request extras .q → the
# blueprints grid filters SERVER-SIDE by name/description (the exact mechanism PageSearch used). The
# '/blueprints' entry is removed from the frontend WidgetPage.PAGE_SEARCH map so the search isn't
# rendered twice. Verified on the live cluster: the inputs CRD is deployed and the Flex
# allowedResources enum includes "inputs" — no CRD change needed.
kind: Input
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: blueprints-search
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    # `name` is REQUIRED by the Input CRD schema (widgetData.required). With queryParam set the
    # widget renders as a standalone Input.Search and `name` is unused for the URL binding (queryParam
    # drives ?q=), but the field must still be present or the CDC apply is rejected
    # ("spec.widgetData.name: Required value") and the whole portal composition wedges (ReconcileError).
    name: q
    queryParam: q
    placeholder: Search blueprints by name or description…
    allowClear: true
    size: middle
  resourcesRefs:
    items: []
