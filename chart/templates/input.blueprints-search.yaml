# Blueprints search box — STANDALONE URL-query-bound Input.Search (queryParam: q). Submitting
# writes ?q=<text> → extras → the blueprints-cards RA filters its tiles server-side by blueprint
# name / "provisions" ($q). Sits between the page header and the category chips in
# flex.page-blueprints.
kind: Input
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: blueprints-search
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    name: q
    queryParam: q
    placeholder: Search blueprints by name or description…
    allowClear: true
    size: middle
  resourcesRefs:
    items: []
