kind: Table
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: compositions-table
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    allowedResources: []
    bordered: false
    size: middle
    # Row click → the composition detail page ({ns}/{name} from the row's cells).
    rowNavigateTo: /compositions/{ns}/{name}
    columns:
    - valueKey: name
      title: Name
    - valueKey: kind
      title: Type
    - valueKey: ns
      title: Namespace
    - valueKey: status
      title: Status
    - valueKey: age
      title: Created
    dataSource: []
    # Live-refresh: watch the composition kinds this table lists. Computed from the
    # data (the distinct apiVersion/kind in .list) — NOT a hardcoded kind list — so it
    # refetches when any composition it shows changes, and generalizes to any blueprint.
    watch: []
  widgetDataTemplate:
  - forPath: dataSource
    expression: '${ [ .list[] | [ {valueKey:"name",kind:"jsonSchemaType",type:"string",stringValue:.name}, {valueKey:"kind",kind:"jsonSchemaType",type:"string",stringValue:.kind}, {valueKey:"ns",kind:"jsonSchemaType",type:"string",stringValue:.ns}, {valueKey:"status",kind:"jsonSchemaType",type:"string",stringValue:( (.conditions // []) | if any(.type=="Ready" and .status=="True") then "Healthy" elif any(.type=="Ready" and .status=="False") then "Failed" else "Pending" end )}, {valueKey:"age",kind:"jsonSchemaType",type:"string",stringValue:.ts} ] ] }'
  - forPath: watch
    expression: '${ [ .list[] | { apiVersion: .av, kind: .kind } ] | unique }'
  apiRef:
    name: compositions-list
    namespace: {{ .Release.Namespace }}
  resourcesRefs:
    items: []
