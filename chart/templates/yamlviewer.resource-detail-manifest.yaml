# The object's full manifest. resource-detail emits it as a JSON string (.manifestJson,
# managedFields + last-applied stripped); YamlViewer converts JSON → YAML for display.
kind: YamlViewer
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: resource-detail-manifest
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  keyExtras: [namespace, group, version, plural, name]
  apiRef:
    name: resource-detail
    namespace: {{ .Release.Namespace }}
  widgetData:
    json: "{}"
  widgetDataTemplate:
    - forPath: json
      expression: '${ .manifestJson // "{}" }'
  resourcesRefs:
    items: []
