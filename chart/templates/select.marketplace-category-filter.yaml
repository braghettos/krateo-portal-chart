# Category facet control. Options are DERIVED from the catalog cards' `tags` (via
# blueprints-catalog) — the `krateo.io/category` annotation of each indexed blueprint.
# No hardcoded taxonomy: the dropdown shows exactly the categories present in the
# helm-repo index. `name: tags` binds the filter to each card's `tags`; the Filters
# engine matches by case-insensitive substring.
apiVersion: widgets.templates.krateo.io/v1beta1
kind: Select
metadata:
  name: marketplace-category-filter
  namespace: {{ .Release.Namespace }}
spec:
  apiRef:
    name: blueprints-catalog
    namespace: {{ .Release.Namespace }}
  widgetData:
    name: tags
    label: Category
    placeholder: All categories
    allowClear: true
    options: []
  widgetDataTemplate:
    - forPath: options
      expression: '${ [ .cards[]? | .tags[]? ] | unique | sort | map({ value: . }) }'
  resourcesRefs:
    items: []
