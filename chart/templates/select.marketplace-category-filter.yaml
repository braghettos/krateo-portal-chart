# Category facet control. Options are DERIVED from the live blueprint Cards' `tags`
# (via blueprints-cards) — each blueprint repo's GitHub topics. No hardcoded taxonomy:
# the dropdown shows exactly the topics present among registered blueprints. `name:
# tags` binds the filter to each card's `tags`; the Filters engine matches by
# case-insensitive substring, so a card with multiple topics matches any of them.
apiVersion: widgets.templates.krateo.io/v1beta1
kind: Select
metadata:
  name: marketplace-category-filter
  namespace: {{ .Release.Namespace }}
spec:
  apiRef:
    name: blueprints-cards
    namespace: {{ .Release.Namespace }}
  widgetData:
    name: tags
    label: Category
    placeholder: All categories
    allowClear: true
    options: []
  widgetDataTemplate:
    - forPath: options
      expression: '${ [ .cards[]? | .tags[]? ] | unique | sort | map({ value: . }) }'
  resourcesRefs:
    items: []
