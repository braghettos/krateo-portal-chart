# Numbered evidence source cards (mockup .evcard) — "#n · TYPE — ref" + the verbatim mono
# excerpt as a fenced block. Built entirely server-side (incident-detail .evidenceMd) so
# the numbering matches the reasoning trace's "→ evidence #n" citations (1-based display
# of the CRD's 0-based evidenceRefs). Markdown keeps the excerpt verbatim + mono — never
# truncated, never paraphrased.
kind: Markdown
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: incident-evidence
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [name, namespace]
  apiRef:
    name: incident-detail
    namespace: {{ .Release.Namespace }}
  widgetData:
    markdown: ''
  widgetDataTemplate:
  - forPath: markdown
    expression: '${ .evidenceMd // "" }'
  resourcesRefs:
    items: []
