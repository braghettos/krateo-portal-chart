# Compositions SCOPE facet chips (My workloads / Platform / Everything) — the list DEFAULTS to
# the user's workload compositions; the installer-managed platform machinery (authn, snowplow,
# CDC controllers, agents, …) sits behind the Platform chip instead of drowning the rows a
# self-service user actually owns. Scope is URL state (?scope=…) exactly like ?status=: the
# route carries the page's other filter params (echoed by compositions-list) so the facets
# compose; the RA filters server-side on the installer-ownership labels (krateo.io/composition-name
# = installer, or the installer root's own CD name) — no client-side logic.
# ("My workloads", not "Workloads": the table's condition chips include a "Workload" chip,
# and two near-identical labels meaning different things on one screen read as one filter.)
kind: Listy
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: compositions-scope-chips
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  keyExtras: [from, projects, q, range, scope, status, to, namespace]
  apiRef:
    name: compositions-list
    namespace: {{ .Release.Namespace }}
  widgetData:
    itemTemplate:
      rowVariant: chip
      primaryText: '{label}'
      navigateTo: '{route}'
    dataSource: []
  widgetDataTemplate:
    - forPath: dataSource
      expression: '${ ((.scope // "workloads") | tostring) as $sel | (.scopeCounts // {}) as $counts | ((.status // "") | tostring) as $status | ((.range // "") | tostring) as $range | ((.q // "") | tostring) as $q | ((.from // "") | tostring) as $from | ((.to // "") | tostring) as $to | ((.projects // "") | tostring) as $projects | ((if $status != "" then ("&status=" + ($status | @uri)) else "" end) + (if $range != "" then ("&range=" + ($range | @uri)) else "" end) + (if $q != "" then ("&q=" + ($q | @uri)) else "" end) + (if $from != "" then ("&from=" + ($from | @uri)) else "" end) + (if $to != "" then ("&to=" + ($to | @uri)) else "" end) + (if $projects != "" then ("&projects=" + ($projects | @uri)) else "" end)) as $carry | [{key: "workloads", label: "My workloads"}, {key: "platform", label: "Platform"}, {key: "all", label: "Everything"}] | map({label: .label, count: ($counts[.key] // 0), active: (.key == $sel), route: ("/compositions?scope=" + .key + $carry)}) }'
  resourcesRefs:
    items: []
