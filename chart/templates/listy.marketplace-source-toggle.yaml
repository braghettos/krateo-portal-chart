# Marketplace type toggle — Blueprints | Operators | All. A 3-chip data-driven row from the
# catalog RA's `.sources`; each chip's `route` preserves the current category/q filter so type
# and category compose. The active source renders solid amber. Pairs with the per-tile type
# badge (Blueprint cyan / Operator magenta) so the blueprint-vs-operator split reads everywhere.
kind: Listy
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: marketplace-source-toggle
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [category, q, source]
  apiRef:
    name: blueprints-catalog
    namespace: {{ .Release.Namespace }}
  widgetData:
    itemTemplate:
      rowVariant: chip
      primaryText: '{label}'
      navigateTo: '{route}'
    dataSource: []
  widgetDataTemplate:
    - forPath: dataSource
      expression: '${ .sources }'
  resourcesRefs:
    items: []
