# Observability time-range chips — ONE data-driven Listy(chip) replacing the four Helm-looped
# obs-range-btn-* Buttons (widget-sprawl collapse). The range is URL state (?range=1h|6h|24h|7d):
# each chip navigates to /observability?range=<k>, which the frontend forwards into the request
# `extras` — so every range-scoped obs RESTAction interpolates the window into its ClickHouse
# query (INTERVAL) and the chips' own active flag reads `.range` from extras SYNCHRONOUSLY, per
# request. Default 6h when no ?range in the URL. Chip navigateTo bypasses the client-side
# same-path query merge the old Buttons used, so the routes are merged SERVER-SIDE: ?projects
# (the shell scope selector, rides every route) is re-emitted onto each chip's route from
# extras (@uri-encoded).
kind: Listy
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: obs-range-chips
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell — `range` drives
  # the active flag, `projects` is carried into the routes.
  keyExtras: [projects, range]
  widgetData:
    itemTemplate:
      rowVariant: chip
      primaryText: '{label}'
      navigateTo: '{route}'
    dataSource: []
  # No apiRef — snowplow merges request extras into a no-apiRef widget's
  # widgetDataTemplate data source (same mechanism the old range Buttons used).
  widgetDataTemplate:
    - forPath: dataSource
      expression: '${ ((.range // "6h") | tostring) as $sel | ((.projects // "") | tostring) as $projects | (if $projects != "" then ("&projects=" + ($projects | @uri)) else "" end) as $carry | [{key: "1h", label: "1h"}, {key: "6h", label: "6h"}, {key: "24h", label: "24h"}, {key: "7d", label: "7d"}] | map({label: .label, active: (.key == $sel), route: ("/observability?range=" + .key + $carry)}) }'
  resourcesRefs:
    items: []
