# Convention page root for /portal-builder (CHART-P1) — the Autopilot builders' home: a
# how-it-works header, the always-visible "Ask Autopilot →" CTA (the page's own entry into
# the build flow), and the in-flight builder pull-requests table.
kind: Flex
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: page-portal-builder
  namespace: {{ include "portal.tierNamespace" (dict "ctx" . "tier" "admin") }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    allowedResources:
    - flexes
    - listies
    - buttons
    vertical: true
    gap: middle
    items:
    - resourceRefId: portal-builder-header
    - resourceRefId: portal-builder-ask
    - resourceRefId: builder-prs
  resourcesRefs:
    items:
    - id: portal-builder-header
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: portal-builder-header
      namespace: {{ .Release.Namespace }}
      resource: flexes
      verb: GET
    - id: portal-builder-ask
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: portal-builder-ask
      namespace: {{ .Release.Namespace }}
      resource: buttons
      verb: GET
    - id: builder-prs
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: builder-prs
      namespace: {{ .Release.Namespace }}
      resource: listies
      verb: GET
