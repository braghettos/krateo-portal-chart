# In-flight builder pull requests — one row per pullrequests.github.krateo.io CR (title, repo,
# branch, state tag). State colours: open=green, closed=magenta, else gold. Rows are inert (the
# GitHub PR link lives on the CR's status.html_url; a per-row external-link cell is a follow-up).
kind: Table
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: builder-prs
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    allowedResources: []
    bordered: false
    size: small
    columns:
    - valueKey: title
      title: Pull request
    - valueKey: repo
      title: Repository
    - valueKey: head
      title: Branch
    - valueKey: state
      title: State
    dataSource: []
  widgetDataTemplate:
  - forPath: dataSource
    expression: '${ [ ((.rows) // [])[] | [ {valueKey:"title",kind:"jsonSchemaType",type:"string",stringValue:(.title // "")}, {valueKey:"repo",kind:"jsonSchemaType",type:"string",stringValue:(.repo // ""),color:"#8c8c8c"}, {valueKey:"head",kind:"jsonSchemaType",type:"string",stringValue:(.head // "")}, {valueKey:"state",kind:"tag",stringValue:(.state // "pending"),color:(if .state=="open" then "green" elif .state=="closed" then "magenta" else "gold" end)} ] ] }'
  apiRef:
    name: builder-prs
    namespace: {{ .Release.Namespace }}
  resourcesRefs:
    items: []
