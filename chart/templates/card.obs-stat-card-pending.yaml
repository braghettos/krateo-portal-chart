kind: Card
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: obs-stat-card-pending
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    variant: outlined
    clickActionId: view-pending
    widgetActions:
      navigate:
        - id: view-pending
          type: navigate
          path: /compositions?status=pending
    items:
    - resourceRefId: obs-stat-pending
  resourcesRefs:
    items:
    - id: obs-stat-pending
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-stat-pending
      namespace: {{ .Release.Namespace }}
      resource: statistics
      verb: GET
