# Alert detail H1 — the alert's display name (spec.displayName, honest fallback to the CR
# name), resolved server-side by alert-detail from the route's ?extras. H1 (level 1) here
# because /alerts is a rule-catalog leaf, matching the alerts-title H1 on the list page.
kind: Paragraph
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: alert-detail-title
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [name, namespace]
  apiRef:
    name: alert-detail
    namespace: {{ .Release.Namespace }}
  widgetData:
    text: Alert
    level: 1
  widgetDataTemplate:
    - forPath: text
      expression: '${ .displayName // "alert" }'
  resourcesRefs:
    items: []
