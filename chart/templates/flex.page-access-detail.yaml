# Page wrapper for /settings/access/{username} (W3-2 persona drill-down). A
# vertical Flex stacking: title (persona + the checked-as honesty line) →
# namespace scope Select (?ns= → extras) → capability preview (SAR table) →
# grant Form (Role + RoleBinding, ONE gated ops[] submit) → existing grants +
# the conditional Revoke row (inert when no managed grant in scope). Route-only
# (hidden from the sidebar) — reached from the Settings → Access personas table.
kind: Flex
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: page-access-detail
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [username]
  widgetData:
    allowedResources:
    - flexes
    - paragraphs
    - tables
    - forms
    vertical: true
    gap: middle
    items:
    - resourceRefId: access-detail-title-stack
    - resourceRefId: access-scope-row
    - resourceRefId: access-preview-label
    - resourceRefId: access-preview-desc
    - resourceRefId: access-preview
    - resourceRefId: access-grant-label
    - resourceRefId: access-grant-desc
    - resourceRefId: access-grant
    - resourceRefId: access-grants-label
    - resourceRefId: access-grants-desc
    - resourceRefId: access-grants
    - resourceRefId: access-grants-actions
  resourcesRefs:
    items:
    - id: access-detail-title-stack
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: access-detail-title-stack
      namespace: {{ .Release.Namespace }}
      resource: flexes
      verb: GET
    - id: access-scope-row
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: access-scope-row
      namespace: {{ .Release.Namespace }}
      resource: flexes
      verb: GET
    - id: access-preview-label
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: access-preview-label
      namespace: {{ .Release.Namespace }}
      resource: paragraphs
      verb: GET
    - id: access-preview-desc
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: access-preview-desc
      namespace: {{ .Release.Namespace }}
      resource: paragraphs
      verb: GET
    - id: access-preview
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: access-preview
      namespace: {{ .Release.Namespace }}
      resource: tables
      verb: GET
    - id: access-grant-label
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: access-grant-label
      namespace: {{ .Release.Namespace }}
      resource: paragraphs
      verb: GET
    - id: access-grant-desc
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: access-grant-desc
      namespace: {{ .Release.Namespace }}
      resource: paragraphs
      verb: GET
    - id: access-grant
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: access-grant
      namespace: {{ .Release.Namespace }}
      resource: forms
      verb: GET
    - id: access-grants-label
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: access-grants-label
      namespace: {{ .Release.Namespace }}
      resource: paragraphs
      verb: GET
    - id: access-grants-desc
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: access-grants-desc
      namespace: {{ .Release.Namespace }}
      resource: paragraphs
      verb: GET
    - id: access-grants
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: access-grants
      namespace: {{ .Release.Namespace }}
      resource: tables
      verb: GET
    - id: access-grants-actions
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: access-grants-actions
      namespace: {{ .Release.Namespace }}
      resource: flexes
      verb: GET
