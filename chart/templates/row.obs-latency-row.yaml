# Full-width strip hosting the per-composition reconcile-latency card (ClickHouse
# otel_traces). Sits below the throughput strip — the "which compositions are slow"
# detail beneath the "how much reconcile traffic overall" trend.
kind: Row
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: obs-latency-row
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    allowedResources:
    - cards
    items:
    - resourceRefId: obs-latency-card
      size: 24
  resourcesRefs:
    items:
    - id: obs-latency-card
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-latency-card
      namespace: {{ .Release.Namespace }}
      resource: cards
      verb: GET
