# Single full-width (size 24) Row wrapping the Conditions card — mirrors composition-detail-rail-row
# and composition-detail-grid so the Conditions card lands on the EXACT same left/right edges as the
# rail above and the Spec/Relations cards below (all inset by the same Row gutter). Without this the
# bare card rendered ~8px wider on each side than the grid.
kind: Row
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: composition-detail-health-row
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [name, namespace]
  widgetData:
    allowedResources:
      - cards
    alignment: top
    items:
      - resourceRefId: card-composition-detail-health
        size: 24
  resourcesRefs:
    items:
      - id: card-composition-detail-health
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: card-composition-detail-health
        namespace: {{ .Release.Namespace }}
        resource: cards
        verb: GET
