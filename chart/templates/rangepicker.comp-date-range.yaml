# Custom date-range filter for the compositions list. Writes the picked [start, end]
# window to ?from=&to= (epoch seconds) + range=custom; compositions-list reads them from
# extras and time-windows server-side (from/to applies when no preset ?range chip is
# active). Sits in the toolbar's range group, next to the preset chips.
kind: RangePicker
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: comp-date-range
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    size: small
    allowClear: true
    placeholder:
    - Custom from
    - to
  resourcesRefs:
    items: []
