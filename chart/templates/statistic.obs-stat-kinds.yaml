# Composition kinds — distinct .kind across all compositions (off compositions-list).
kind: Statistic
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: obs-stat-kinds
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [projects, q, status]
  widgetData:
    title: Composition kinds
    value: 0
    watch: []
  widgetDataTemplate:
  - forPath: watch
    expression: '${ [ .list[] | { apiVersion: .av, kind: .kind } ] | unique }'
  - forPath: value
    expression: '${ [ (.list // [])[].kind ] | unique | length }'
  apiRef:
    name: compositions-list
    namespace: {{ .Release.Namespace }}
  resourcesRefs:
    items: []
