# The object's status.conditions — a state-coloured dot + type + status/reason. Off
# resource-detail. hideWhenEmpty: kinds with no conditions (ConfigMap, Service, most core
# objects) render NOTHING here — the card wrapper hides too (honest graceful degradation).
kind: Listy
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: resource-detail-conditions
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  keyExtras: [namespace, group, version, plural, name]
  apiRef:
    name: resource-detail
    namespace: {{ .Release.Namespace }}
  widgetData:
    dataSource: []
    itemLayout: horizontal
    split: false
    hideWhenEmpty: true
    header: Conditions
    itemTemplate:
      iconVariant: dot
      color:
        value: '{state}'
        map:
          healthy: green
          failed: red
        default: gray
      primaryText: '{type}'
      subPrimaryText: '{reason}'
      secondaryText: '{status}'
      secondaryTextAsTag: true
  widgetDataTemplate:
    - forPath: dataSource
      expression: '${ .conditions // [] }'
  resourcesRefs:
    items: []
