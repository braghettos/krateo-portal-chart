apiVersion: widgets.templates.krateo.io/v1beta1
kind: PieChart
metadata:
  name: braghettos-repo-explorer-language-pie
  namespace: krateo-system
spec:
  apiRef:
    name: braghettos-repo-explorer
    namespace: krateo-system
  widgetData:
    angleField: count
    colorField: language
    data: []
  resourcesRefs:
    items: []
  widgetDataTemplate:
    - forPath: data
      expression: '${ [ .items[] | .language ] | group_by(.) | map({ language: .[0], count: length }) }'
