# Status pill next to the blueprint title. Same conditions→label/color rollup as the
# composition detail status (Healthy / Drift / Degraded / Pending), read from the
# CompositionDefinition's .status.conditions (Ready + Synced). Representation lives here,
# not in the RA (which supplies the raw object).
kind: Tag
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: blueprint-detail-status
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [name, namespace, status]
  apiRef:
    name: blueprint-detail
    namespace: {{ .Release.Namespace }}
  widgetData:
    label: Unknown
    color: default
  widgetDataTemplate:
    - forPath: label
      expression: '${ (.detail.status.conditions // []) as $c | (($c | map(select(.type == "Ready" and .status == "True")) | length) > 0) as $ready | (($c | map(select(.type == "Synced" and .status == "False")) | length) > 0) as $unsynced | if ($c | length) == 0 then "Unknown" elif $ready and $unsynced then "Drift" elif $ready then "Healthy" elif ($c | map(select(.status == "False")) | length) > 0 then "Degraded" else "Pending" end }'
    - forPath: color
      expression: '${ (.detail.status.conditions // []) as $c | (($c | map(select(.type == "Ready" and .status == "True")) | length) > 0) as $ready | (($c | map(select(.type == "Synced" and .status == "False")) | length) > 0) as $unsynced | if ($c | length) == 0 then "default" elif $ready and $unsynced then "violet" elif $ready then "green" elif ($c | map(select(.status == "False")) | length) > 0 then "red" else "gold" end }'
  resourcesRefs:
    items: []
