kind: Card
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: status-card
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    title: Status breakdown
    variant: outlined
    items:
    - resourceRefId: status-donut
  resourcesRefs:
    items:
    - id: status-donut
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: status-donut
      namespace: {{ .Release.Namespace }}
      resource: piecharts
      verb: GET
