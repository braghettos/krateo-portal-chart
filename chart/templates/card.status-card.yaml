kind: Card
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: status-card
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    title: Compositions status breakdown
    titleVariant: eyebrow
    variant: outlined
    # mockup `.badge mono` "N total" readout, top-right of the panel head (Card.extra).
    extra: ''
    items:
    - resourceRefId: status-donut
  widgetDataTemplate:
  - forPath: extra
    expression: '${ ((.list // []) | length | tostring) + " total" }'
  apiRef: { name: compositions-list, namespace: {{ .Release.Namespace }} }
  resourcesRefs:
    items:
    - id: status-donut
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: status-donut
      namespace: {{ .Release.Namespace }}
      resource: piecharts
      verb: GET
