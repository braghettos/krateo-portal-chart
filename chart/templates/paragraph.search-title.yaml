kind: Paragraph
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: search-title
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): /search carries ?q= as an extra; declared so the cache guard
  # accepts Puts (content is q-invariant, key partitioning is not).
  keyExtras: [q]
  widgetData:
    text: Search results
    level: 1
  resourcesRefs:
    items: []
