# Marketplace facet bar — the type toggle (Blueprints | Operators | All) stacked over the
# DATA-DRIVEN category chip row. Both are Listy(chip) widgets bound to the blueprints-catalog
# RA (.sources and .categories). Replaces the old hardcoded krateo.io/category Button chips —
# the facet now mirrors whatever the live catalog actually carries.
apiVersion: widgets.templates.krateo.io/v1beta1
kind: Flex
metadata:
  name: marketplace-category-group
  namespace: {{ .Release.Namespace }}
spec:
  widgetData:
    vertical: true
    gap: small
    allowedResources:
      - listies
    items:
      - resourceRefId: marketplace-source-toggle
      - resourceRefId: marketplace-category-chips
  resourcesRefs:
    items:
      - id: marketplace-source-toggle
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: marketplace-source-toggle
        namespace: {{ .Release.Namespace }}
        resource: listies
        verb: GET
      - id: marketplace-category-chips
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: marketplace-category-chips
        namespace: {{ .Release.Namespace }}
        resource: listies
        verb: GET
