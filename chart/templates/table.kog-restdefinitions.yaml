# The RestDefinition registry — ONE row per RestDefinition, off kog-restdefinitions.
# Columns mirror the CRD's own printer columns (READY / generated kind+apiVersion /
# OAS PATH / AGE) plus namespace (cluster-wide list): the post-publish verification
# surface Autopilot lands on after a gated publish ("is it ready?" answers straight
# from these cells via page context). Rows are INERT — no rowNavigateTo: CHART-K1
# ships no RestDefinition detail page (the create Form + any drill-down are the
# deferred CHART-K2). readyReason + auth ride as hidden cells (bound to no column):
# invisible in the grid, but present in page context so the agent can ground
# "why Failed?" and the day-2 "configure credentials for <Kind>" hint.
kind: Table
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: kog-restdefinitions
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    allowedResources: []
    bordered: false
    size: small
    pagination:
      defaultPageSize: 15
    columns:
    - valueKey: name
      title: Name
    - valueKey: namespace
      title: Namespace
    - valueKey: ready
      title: Ready
    - valueKey: gvk
      title: Generated kind
    - valueKey: oasPath
      title: OAS source
    - valueKey: age
      title: Age
    dataSource: []
  widgetDataTemplate:
  - forPath: dataSource
    expression: '${ [ (.rows // [])[] | [ {valueKey:"name",kind:"jsonSchemaType",type:"string",stringValue:(.name // "")}, {valueKey:"namespace",kind:"jsonSchemaType",type:"string",stringValue:(.namespace // ""),color:"#8c8c8c"}, {valueKey:"ready",kind:"tag",stringValue:(.ready // "Pending"),color:(.readyColor // "gold")}, {valueKey:"gvk",kind:"jsonSchemaType",type:"string",stringValue:(.gvk // "—")}, {valueKey:"oasPath",kind:"jsonSchemaType",type:"string",stringValue:(.oasPath // "—"),color:"#8c8c8c"}, {valueKey:"age",kind:"jsonSchemaType",type:"string",stringValue:(.age // ""),format:"relative"}, {valueKey:"readyReason",kind:"jsonSchemaType",type:"string",stringValue:(.readyReason // "—")}, {valueKey:"auth",kind:"jsonSchemaType",type:"string",stringValue:(if .auth then "securitySchemes" else "" end)} ] ] }'
  apiRef:
    name: kog-restdefinitions
    namespace: {{ .Release.Namespace }}
  resourcesRefs:
    items: []
