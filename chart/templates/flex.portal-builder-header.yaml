# Portal builder page header — eyebrow + title + subtitle, the SAME header flex the
# blueprint and KOG builders use (one visual family across the three builder homes).
kind: Flex
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: portal-builder-header
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    allowedResources:
    - paragraphs
    vertical: true
    items:
    - resourceRefId: portal-builder-eyebrow
    - resourceRefId: portal-builder-title
    - resourceRefId: portal-builder-subtitle
  resourcesRefs:
    items:
    {{- range (list "portal-builder-eyebrow" "portal-builder-title" "portal-builder-subtitle") }}
    - id: {{ . }}
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: {{ . }}
      namespace: {{ $.Release.Namespace }}
      resource: paragraphs
      verb: GET
    {{- end }}
