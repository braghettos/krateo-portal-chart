# Settings → Krateo tab — platform status. The admin-page blueprint reads the
# Krateo Installation CR (krateo.io/v1 installations/krateoctl) for its chart
# steps; that CR only exists on a full krateoctl install. This portal targets the
# real, always-present equivalent: the Krateo control-plane workloads running in
# the Krateo namespace. Thin/generic RA (raw GET + userAccessFilter for RBAC); the
# Table shapes the columns in its widgetDataTemplate.
apiVersion: templates.krateo.io/v1
kind: RESTAction
metadata:
  name: settings-krateo-status
  namespace: {{ .Release.Namespace }}
  annotations:
    krateo.io/verbose: "true"
spec:
  api:
    - name: deployments
      path: /apis/apps/v1/namespaces/{{ .Release.Namespace }}/deployments
      verb: GET
      headers:
        - 'Accept: application/json'
      continueOnError: true
      userAccessFilter:
        verb: list
        group: apps
        resource: deployments
        namespaceFrom: .metadata.namespace
  filter: >
    {
      list: [ .deployments.items[]? | del(.metadata.managedFields) ]
    }
