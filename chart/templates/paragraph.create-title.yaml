kind: Paragraph
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: create-title
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [name, namespace]
  widgetData:
    # "Create composition" (UX-audit #10): matches the entry CTA and the form submit — the
    # whole flow carries ONE verb (Create), never New.
    text: Create composition
    level: 1
  resourcesRefs:
    items: []
