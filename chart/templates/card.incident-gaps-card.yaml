# MISSING CONTEXT section (UX-24) — the first-class-uncertainty callout, now under the SAME
# unified card header as every other section (titleVariant: eyebrow + variant: outlined): the
# heading names what this block IS ("What the agent couldn't verify") and the headerLeft one-liner
# says what's inside (context it lacked + assumptions it made). The amber Alert (incident-gaps)
# rides inside as the card body — Card children are NOT constrained by the container
# allowedResources enum (the Alert plural isn't in the Flex enum yet — see frontend Flex.schema.json),
# so the callout keeps its warning styling while gaining the shared section chrome.
kind: Card
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: incident-gaps-card
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [name, namespace]
  widgetData:
    title: What the agent couldn't verify
    titleVariant: eyebrow
    variant: outlined
    icon:
      name: fa-triangle-exclamation
      color: gold
    headerLeft: context it lacked + assumptions it made
    items:
    - resourceRefId: incident-gaps
  resourcesRefs:
    items:
    - id: incident-gaps
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: incident-gaps
      namespace: {{ .Release.Namespace }}
      resource: alerts
      verb: GET
