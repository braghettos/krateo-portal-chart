# Trigger badge — who started this investigation (alert / composition-condition /
# user-ask, from spec.trigger; v1 reports default to "alert", the only entry point then).
# UX-18: a muted "Trigger:" prefix labels the value so "Alert" isn't a bare context-free token;
# the trigger is non-health (neutral outlined chip, never a status colour).
kind: Tag
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: incident-trigger
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [name, namespace]
  apiRef:
    name: incident-detail
    namespace: {{ .Release.Namespace }}
  widgetData:
    label: 'Trigger: Alert'
    variant: outlined
  widgetDataTemplate:
    - forPath: label
      expression: '${ "Trigger: " + ((.trigger // "alert") | (.[0:1] | ascii_upcase) + .[1:]) }'
  resourcesRefs:
    items: []
