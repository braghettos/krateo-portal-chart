# "← Back to clusters" link above the cluster-detail title (pagehead pattern).
# A link-style Button that navigates (SPA) back to the cluster registry.
kind: Button
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: cluster-detail-back
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [name]
  widgetData:
    label: Back to clusters
    type: link
    size: small
    icon: fa-arrow-left
    clickActionId: back-nav
    actions:
      navigate:
        - id: back-nav
          path: /clusters
          type: navigate
  resourcesRefs:
    items: []
