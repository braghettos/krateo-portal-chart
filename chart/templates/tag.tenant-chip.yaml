# Tenant (= cluster) identity chip for the shell sider. Per the platform model the
# TENANT is the Kubernetes cluster; its name is deployer config (the apiserver has
# no honest self-name), so it comes from the Helm value `.Values.tenant` (set per
# install). Rendered as the multitenancy-mockup's LOCKED tenant label (`.tenant-label`):
# a quiet, NON-INTERACTIVE chip — mono, graphite, transparent fill, hairline border —
# with a ⬡ cluster glyph. The "single fixed tenant, nothing to switch to" reading comes
# from the chip being chevron-less and inert (vs the project selector right below it,
# which DOES carry a chevron) plus the quiet styling — NOT a padlock glyph: the only
# Unicode padlock (U+1F512) force-renders as a loud yellow emoji in Chrome (VS15 and
# font-variant-emoji:text both ignored), and the Tag schema forbids an antd icon node,
# so a graphite lock can't be reproduced — and a yellow one would break the mockup's
# explicit rule ("the tenant stays quiet graphite; boldness is not spent there"). Sits
# above the project (= namespace) selector so the sider reads "which cluster (locked) /
# which project (the only control)" — the flight-deck context strip.
kind: Tag
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: tenant-chip
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6: the shell scope selector writes ?projects= which rides EVERY route's extras;
  # declare it so this chrome widget stays cacheable instead of guard-declining on
  # each navigation (the west4 dashboard first-nav 98.4%->89.6% regression).
  keyExtras: [projects]
  widgetData:
    label: '⬡ {{ .Values.tenant | default "krateo-enterprise" }}'
    style:
      fontFamily: var(--font-mono)
      fontSize: 11px
      color: var(--gray-color)
      background: transparent
      borderColor: var(--border-color)
  resourcesRefs:
    items: []
