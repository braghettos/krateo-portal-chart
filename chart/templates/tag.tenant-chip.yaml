# Tenant (= cluster) identity chip for the shell sider. Per the platform model the
# TENANT is the Kubernetes cluster; its name is deployer config (the apiserver has
# no honest self-name), so it comes from the Helm value `.Values.tenant` (set per
# install). Muted chip with a ⬡ glyph; sits above the project selector so the sider
# reads "which cluster / which project" — the flight-deck context strip.
kind: Tag
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: tenant-chip
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    label: '⬡ {{ .Values.tenant | default "krateo-enterprise" }}'
    color: default
  resourcesRefs:
    items: []
