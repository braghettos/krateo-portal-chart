# Status filter chip group (left side of the compositions toolbar).
kind: Flex
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: compositions-status-group
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    allowedResources:
    - buttons
    gap: small
    align: center
    wrap: true
    items:
    - resourceRefId: comp-status-btn-all
    - resourceRefId: comp-status-btn-healthy
    - resourceRefId: comp-status-btn-pending
    - resourceRefId: comp-status-btn-failed
  resourcesRefs:
    items:
    {{- range (list "all" "healthy" "pending" "failed") }}
    - id: comp-status-btn-{{ . }}
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: comp-status-btn-{{ . }}
      namespace: {{ $.Release.Namespace }}
      resource: buttons
      verb: GET
    {{- end }}
