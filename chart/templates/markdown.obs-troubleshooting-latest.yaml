# The latest auto-troubleshooting analysis — the newest TroubleshootingReport's Autopilot
# root-cause report (markdown), from restaction.obs-troubleshooting. Empty-state explains the
# flow so the panel is self-describing before any alert has fired.
kind: Markdown
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: obs-troubleshooting-latest
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    markdown: '_No troubleshooting reports yet._'
  widgetDataTemplate:
  - forPath: markdown
    expression: '${ if (.count // 0) > 0 then ("**Latest analysis — " + (.latestAlert // "") + "**  ·  " + (.latestPhase // "") + "\n\n" + (if (.latestReport // "") == "" then "_Analyzing…_" else .latestReport end)) else "_No alerts have fired yet. When a HyperDX alert triggers, krateo-alert-troubleshooter runs an Autopilot root-cause analysis automatically and it appears here._" end }'
  apiRef:
    name: obs-troubleshooting
    namespace: {{ .Release.Namespace }}
  resourcesRefs:
    items: []
