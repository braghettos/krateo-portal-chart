# Estate page head — title + subtitle stack (mirrors the compositions/blueprints headers).
kind: Flex
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: estate-header
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    allowedResources:
    - paragraphs
    vertical: true
    gap: small
    items:
    - resourceRefId: estate-title
    - resourceRefId: estate-subtitle
  resourcesRefs:
    items:
    - id: estate-title
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: estate-title
      namespace: {{ .Release.Namespace }}
      resource: paragraphs
      verb: GET
    - id: estate-subtitle
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: estate-subtitle
      namespace: {{ .Release.Namespace }}
      resource: paragraphs
      verb: GET
