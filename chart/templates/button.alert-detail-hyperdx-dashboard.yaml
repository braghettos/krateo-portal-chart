# "Open dashboard in HyperDX" external deep-link — the alert's source dashboard in the
# HyperDX/clickstack console (status.hyperdxDashboardId under .Values.observabilityConsoleUrl).
# Same absolute-navigate/new-tab mechanism and honest-absence gating as
# button.alert-detail-hyperdx-alert (URL baked server-side as .dashboardLink; page Flex
# includes it only when the console section exists).
kind: Button
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: alert-detail-hyperdx-dashboard
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [name, namespace]
  apiRef:
    name: alert-detail
    namespace: {{ .Release.Namespace }}
  widgetData:
    label: Open dashboard in HyperDX
    type: default
    size: small
    variant: outlined
    icon: fa-arrow-up-right-from-square
    clickActionId: open-hyperdx-dashboard
    actions:
      navigate:
        - id: open-hyperdx-dashboard
          type: navigate
          path: '#'
  widgetDataTemplate:
    - forPath: actions
      expression: '${ { navigate: [ { id: "open-hyperdx-dashboard", type: "navigate", path: (.dashboardLink // "#") } ] } }'
  resourcesRefs:
    items: []
