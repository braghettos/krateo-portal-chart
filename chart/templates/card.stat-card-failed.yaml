kind: Card
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: stat-card-failed
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    variant: outlined
    # Petrol density (D5/O1): compact stat cards to align to the dense one-screen mockup.
    # antd `size: small` trims the card's header + body padding; combined with the frontend
    # .statCard vertical-padding trim it brings the card toward the mockup's ~70px stat tile.
    # (A hard ~70px height is NOT expressible in the Card CR — it needs a frontend CSS cap.)
    size: small
    # Whole-card CTA: clicking the Failed stat jumps to the compositions list already
    # filtered to the failed ones (?status=failed read by compositions-list from extras).
    clickActionId: view-failed
    widgetActions:
      navigate:
        - id: view-failed
          type: navigate
          path: /compositions?status=failed
    items:
    - resourceRefId: stat-failed
    - resourceRefId: delta-failed
  resourcesRefs:
    items:
    - id: stat-failed
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: stat-failed
      namespace: {{ .Release.Namespace }}
      resource: statistics
      verb: GET
    - id: delta-failed
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: delta-failed
      namespace: {{ .Release.Namespace }}
      resource: flexes
      verb: GET
