kind: Card
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: stat-card-failed
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    variant: outlined
    icon:
      name: fa-triangle-exclamation
      color: red
    # Whole-card CTA: clicking the Failed stat jumps to the compositions list already
    # filtered to the failed ones (?status=failed read by compositions-list from extras).
    clickActionId: view-failed
    widgetActions:
      navigate:
        - id: view-failed
          type: navigate
          path: /compositions?status=failed
    items:
    - resourceRefId: stat-failed
    - resourceRefId: delta-failed
  resourcesRefs:
    items:
    - id: stat-failed
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: stat-failed
      namespace: {{ .Release.Namespace }}
      resource: statistics
      verb: GET
    - id: delta-failed
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: delta-failed
      namespace: {{ .Release.Namespace }}
      resource: flexes
      verb: GET
