# Reconciliation rail panel — per-composition desired-vs-actual bars (the dashboard
# signature element, reused here). Mono eyebrow title + actual/drift/target legend key.
kind: Card
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: obs-rail-card
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    title: Reconciliation rail · per composition · desired vs actual
    titleVariant: eyebrow
    variant: outlined
    live: false
    # cyan=actual fill + the three non-converged remainder states: violet=drift / orange=pending
    # / red=failed. healthy (green==cyan) and target (amber==orange, both #F2A33C) are omitted as
    # palette duplicates; the amber 100% goalpost tick stays in the rail, just unlegended.
    legend:
    - {color: cyan, label: actual}
    - {color: violet, label: drift}
    - {color: orange, label: pending}
    - {color: red, label: failed}
    items:
    - resourceRefId: obs-rail-list
  resourcesRefs:
    items:
    - id: obs-rail-list
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-rail-list
      namespace: {{ .Release.Namespace }}
      resource: listies
      verb: GET
