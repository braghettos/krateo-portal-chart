# Component-detail page header — the Deployment name as an H2 Paragraph. Text is
# the component's real name, resolved server-side by the component-detail RA from
# the route's ?extras.
kind: Paragraph
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: component-detail-header
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [name]
  apiRef:
    name: component-detail
    namespace: {{ .Release.Namespace }}
  widgetData:
    text: Component
    level: 2
  widgetDataTemplate:
    - forPath: text
      expression: '${ .name // "component" }'
  resourcesRefs:
    items: []
