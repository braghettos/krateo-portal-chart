# Troubleshooting-report feed — one row per ALERT as an antd List: a phase-coloured dot + the
# alert name + phase tag + run count and relative last-run time. Off restaction.obs-troubleshooting.
# Each row is CLICKABLE: navigateTo carries the server-built ?ask= deep-link (askHref) that opens
# the Autopilot rail seeded to continue THAT alert's investigation (one alert ⇒ one thread).
kind: Listy
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: obs-troubleshooting-feed
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  apiRef:
    name: obs-troubleshooting
    namespace: {{ .Release.Namespace }}
  widgetData:
    dataSource: []
    itemLayout: horizontal
    split: false
    header: Select an alert to continue the investigation in Autopilot →
    itemTemplate:
      # Whole-row click → the per-alert Autopilot deep-link built server-side in the RA (@uri-encoded).
      navigateTo: '{askHref}'
      iconVariant: dot
      color:
        value: '{phase}'
        map:
          Ready: green
          Analyzing: gold
          Pending: gray
          Failed: red
      primaryText: '{alert}'
      secondaryText: '{phase}'
      secondaryTextAsTag: true
      # Split so the relative formatter gets a BARE timestamp: run count in the description slot,
      # last-run time (formatted "24m") in the secondary slot.
      subPrimaryText: '×{runCount} runs'
      subSecondaryText: '{lastRunAt}'
      formats:
        subSecondaryText: relative
  widgetDataTemplate:
  - forPath: dataSource
    expression: '${ (.rows // []) | .[0:8] }'
  resourcesRefs:
    items: []
