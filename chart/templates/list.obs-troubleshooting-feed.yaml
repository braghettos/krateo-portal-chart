# Troubleshooting-report feed — one row per ALERT as an antd List: a phase-coloured dot + the
# alert name + phase tag + run count and relative last-run time. Off restaction.obs-troubleshooting.
# Each row is CLICKABLE: navigateTo carries the server-built ?ask= deep-link (askHref) that opens
# the Autopilot rail seeded to continue THAT alert's investigation (one alert ⇒ one thread).
# Lives on /incidents since the IA split; askHref targets /incidents?ask= accordingly.
kind: Listy
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: obs-troubleshooting-feed
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  apiRef:
    name: obs-troubleshooting
    namespace: {{ .Release.Namespace }}
  widgetData:
    dataSource: []
    itemLayout: horizontal
    split: false
    # UX-27 (#72 §0.6): suppress the "No data" box when there are zero TroubleshootingReports —
    # otherwise the 'Continue in Autopilot' card renders an empty-state block below a populated page.
    hideWhenEmpty: true
    header: Investigation history — select an alert to continue in Autopilot →
    itemTemplate:
      # Whole-row click → the per-alert Autopilot deep-link built server-side in the RA (@uri-encoded).
      navigateTo: '{askHref}'
      iconVariant: dot
      # Phase vocabulary is the RA's presentation map (UX-20: the CR's "Ready" arrives as
      # "Analyzed" — "Ready" stays reserved for K8s resource readiness). Analyzed is blue,
      # not green: a finished RCA is a non-health completion — the incident may still be open.
      color:
        value: '{phase}'
        map:
          Analyzed: blue
          Analyzing: gold
          Pending: gray
          Failed: red
      primaryText: '{alert}'
      secondaryText: '{phase}'
      secondaryTextAsTag: true
      # Split so the relative formatter gets a BARE timestamp: run count in the description slot,
      # last-run time (formatted "24m") in the secondary slot.
      subPrimaryText: '×{runCount} runs'
      subSecondaryText: '{lastRunAt}'
      formats:
        subSecondaryText: relative
  widgetDataTemplate:
  - forPath: dataSource
    expression: '${ (.rows // []) | .[0:8] }'
  resourcesRefs:
    items: []
