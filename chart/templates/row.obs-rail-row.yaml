# Reconciliation rail wrapper — full-width (span 24) Row column so it goes through the
# same antd Row+Col gutter path as the rows above (matches dashboard rail-row).
kind: Row
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: obs-rail-row
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    allowedResources:
    - cards
    items:
    - resourceRefId: obs-rail-card
      size: 24
  resourcesRefs:
    items:
    - id: obs-rail-card
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-rail-card
      namespace: {{ .Release.Namespace }}
      resource: cards
      verb: GET
