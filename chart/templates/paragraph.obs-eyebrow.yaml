# Mono uppercase context caption above the H1 (mockup .eyebrow). Tenant = the cluster,
# named by deployer config (.Values.tenant, same source as the sider tenant-chip) — honest.
kind: Paragraph
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: obs-eyebrow
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    text: 'Platform · tenant {{ .Values.tenant | default "krateo-enterprise" }}'
    variant: eyebrow
  resourcesRefs:
    items: []
