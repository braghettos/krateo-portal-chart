kind: Statistic
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: obs-stat-total
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    title: Total compositions
    value: 0
    watch: []
  widgetDataTemplate:
  - forPath: watch
    expression: '${ [ .list[] | { apiVersion: .av, kind: .kind } ] | unique }'
  - forPath: value
    expression: ${ .list | length }
  apiRef:
    name: compositions-list
    namespace: {{ .Release.Namespace }}
  resourcesRefs:
    items: []
