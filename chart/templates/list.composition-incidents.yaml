# #6 — "Incidents" strip on the composition-detail page. One row per TroubleshootingReport
# whose analysis touched THIS composition (composition-incidents RA, filtered by the route's
# .name/.namespace extras). EXCEPTION-ONLY: hideWhenEmpty removes the whole strip when the
# composition has no incidents (the calm, healthy default — no empty "No data" placeholder).
# Each row navigates to the incident detail page (/incidents/<ns>/<name>).
# Mirrors list.incidents-awaiting exactly (horizontal, split false, dot indicator + colour,
# primary text = the rootCause one-liner, lifecycle as a K8s-token tag).
kind: Listy
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: composition-incidents
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell — the composition
  # identity (route params) scopes which report set this list resolves.
  keyExtras: [name, namespace]
  apiRef:
    name: composition-incidents
    namespace: {{ .Release.Namespace }}
  widgetData:
    dataSource: []
    itemLayout: horizontal
    split: false
    hideWhenEmpty: true
    header: Incidents — troubleshooting reports that analyzed this composition; select one to open it →
    itemTemplate:
      navigateTo: '{route}'
      iconVariant: dot
      color:
        value: '{lifecycleColor}'
      primaryText: '{title}'
      # Raw K8s-native lifecycle token, rendered as a filled tag (open / mitigated / resolved).
      secondaryText: '{lifecycle}'
      secondaryTextAsTag: true
  widgetDataTemplate:
  - forPath: dataSource
    expression: '${ .rows // [] }'
  resourcesRefs:
    items: []
