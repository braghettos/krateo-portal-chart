# Inline row: rootcause category tag + confidence paragraph SIDE BY SIDE — matching the render
# where both appear on the same baseline line directly under the verdict statement. The Why card
# references this flex instead of the two widgets separately, avoiding a stacked vertical layout.
kind: Flex
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: incident-rootcause-meta
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  keyExtras: [name, namespace]
  widgetData:
    allowedResources:
    - tags
    - paragraphs
    gap: small
    align: center
    wrap: true
    items:
    - resourceRefId: incident-rootcause-category
    - resourceRefId: incident-rootcause-confidence
  resourcesRefs:
    items:
    - id: incident-rootcause-category
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: incident-rootcause-category
      namespace: {{ .Release.Namespace }}
      resource: tags
      verb: GET
    - id: incident-rootcause-confidence
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: incident-rootcause-confidence
      namespace: {{ .Release.Namespace }}
      resource: paragraphs
      verb: GET
