# #72 §0.7: right-aligned holder for the "Investigate with Autopilot" CTA, sitting above the
# investigations table inside the Autopilot panel card (Card `extra` is text/badge-only, so the
# button rides in a flush-right Flex row rather than the header slot).
kind: Flex
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: obs-troubleshooting-cta
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    allowedResources:
    - buttons
    justify: flex-end
    items:
    - resourceRefId: obs-troubleshooting-investigate
  resourcesRefs:
    items:
    - id: obs-troubleshooting-investigate
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-troubleshooting-investigate
      namespace: {{ .Release.Namespace }}
      resource: buttons
      verb: GET
