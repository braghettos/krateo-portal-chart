# Resources band — the resource-usage TREND line chart (left, R2 #15) beside the live
# top-pods snapshot table (right), both off otel_metrics_gauge. R2: the platform-inventory
# card was REMOVED from this page (it re-homes to the dashboard — the dashboard agent owns
# that ADD); the obs page is platform HEALTH + live telemetry, inventory is a landing-page
# summary. Equal-width split so the trend and the snapshot read as a pair.
kind: Row
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: obs-resource-row
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    allowedResources:
    - cards
    alignment: top
    items:
    - resourceRefId: obs-resource-trend-card
      size: 12
    - resourceRefId: obs-resource-card
      size: 12
  resourcesRefs:
    items:
    - id: obs-resource-trend-card
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-resource-trend-card
      namespace: {{ .Release.Namespace }}
      resource: cards
      verb: GET
    - id: obs-resource-card
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-resource-card
      namespace: {{ .Release.Namespace }}
      resource: cards
      verb: GET
