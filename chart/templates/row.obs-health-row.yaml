# Health overview — condition-coverage gauges (left, wide) + the overall reconciliation
# health summary (right). Both off compositions-list. Mirrors the dashboard charts-row
# split (wide panel + narrow panel), cards enum already used there.
# The coverage panel is the DASHBOARD's status-card, reused verbatim: the obs copy
# (card.obs-conditions-card → list.obs-conditions-list) was byte-identical; keyExtras
# ([projects, q, status]) exclude `range`, so both pages share the same cache cells.
kind: Row
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: obs-health-row
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    allowedResources:
    - cards
    alignment: stretch
    items:
    - resourceRefId: status-card
      size: 16
    - resourceRefId: obs-reconcile-card
      size: 8
  resourcesRefs:
    items:
    - id: status-card
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: status-card
      namespace: {{ .Release.Namespace }}
      resource: cards
      verb: GET
    - id: obs-reconcile-card
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-reconcile-card
      namespace: {{ .Release.Namespace }}
      resource: cards
      verb: GET
