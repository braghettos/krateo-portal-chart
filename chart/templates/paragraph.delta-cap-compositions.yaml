kind: Paragraph
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: delta-cap-compositions
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [range]
  widgetData:
    text: past 7d
    type: secondary
  widgetDataTemplate:
  # Short one-line window descriptor (mockup stat-card delta is a single compact line —
  # label / value / "[pill] short-caption" — NOT a wrapping sentence). Pairs with the
  # range-aware pill (delta-tag-compositions): e.g. "7 new · past 24h", "29 total · all time".
  - forPath: text
    expression: >-
      ${ {"24h":"past 24h","7d":"past 7d","30d":"past 30d","all":"all time"}[.range // "all"] }
  apiRef:
    name: dashboard-data
    namespace: {{ .Release.Namespace }}
  resourcesRefs:
    items: []
