# Left column (wider): Pods, Events.
kind: Flex
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: component-detail-col-left
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    vertical: true
    gap: small
    allowedResources:
      - cards
    items:
      - resourceRefId: card-component-detail-pods
      - resourceRefId: card-component-detail-events
  resourcesRefs:
    items:
      - id: card-component-detail-pods
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: card-component-detail-pods
        namespace: {{ .Release.Namespace }}
        resource: cards
        verb: GET
      - id: card-component-detail-events
        apiVersion: widgets.templates.krateo.io/v1beta1
        name: card-component-detail-events
        namespace: {{ .Release.Namespace }}
        resource: cards
        verb: GET
