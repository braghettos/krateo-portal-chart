# Titled panel around the live log tail. UNGROUPED, CHRONOLOGICAL — every recent ERROR/WARN
# line newest-first, svc-filterable (the grouped/counted complement is the "Top recurring
# errors" card above). R2 #13: the title says "Live error & warning stream" so
# chronological-vs-grouped reads at a glance. The extra explains the scope (excludes the
# snowplow request-noise WARN) so the numbers/omission are honest and self-describing; when a
# ?svc= scope is active (Settings component drill-down hand-off) the extra names it, so the
# narrowed tail is never mistaken for the full stream (a legible dismissible filter indicator
# also sits ABOVE this card — obs-svc-filter-note, R2 #11).
kind: Card
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: obs-log-stream-card
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [svc]
  widgetData:
    title: Live error & warning stream
    titleVariant: eyebrow
    variant: outlined
    extra: 'chronological · newest first · excl. snowplow request noise'
    items:
    - resourceRefId: obs-log-stream
  # No apiRef — request extras are merged into the template input (the range-chips pattern).
  widgetDataTemplate:
  - forPath: extra
    expression: '${ ((.svc // "") | gsub("[^a-zA-Z0-9.-]"; "")) as $s | if $s == "" then "chronological · newest first · excl. snowplow request noise" else ("chronological · service ~ " + $s + " · newest first · excl. snowplow request noise") end }'
  resourcesRefs:
    items:
    - id: obs-log-stream
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-log-stream
      namespace: {{ .Release.Namespace }}
      resource: tables
      verb: GET
