# Tenant brand theme (Brand v2, issue #49 §7). A SIDE-EFFECT widget mounted once on the
# app-shell (layout.app-shell `effects` slot): it applies tenant brand overrides app-wide by
# setting CSS custom properties on :root, and renders no UI.
#
# The DEFAULT ships only `token.fontFamily` — the current Krateo UI font — a visual no-op matching
# the frontend defaults. It deliberately does NOT set `custom.sidebar`: the nav rail is left to
# #52's default per-mode derivation from the active `colorPrimary` (light: Sovereign #05629A → deep
# navy; dark: interaction cyan #2FBFE6 → teal). `custom.sidebar` remains available as the
# issue-#52-sanctioned override for a tenant that wants a rail colour independent of colorPrimary.
# `colorPrimary` is deliberately NOT set here (it is mode-aware in the frontend; a mode-fixed CR
# value would regress that). Only Tier-1 tokens are overridable; Tier-2 (status colours, agent
# Signal Yellow, focus ring, chart palette) is locked by omission from the schema.
kind: Theme
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: app-theme
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    token:
      fontFamily: 'Inter, Roboto, "Helvetica Neue", Arial, "Noto Sans", system-ui, sans-serif'
