# Reconcile-latency percentile strip — p50 / p95 / p99 side by side (exact, trace-derived).
# Opens the reconcile-performance section, above the per-phase breakdown card.
kind: Row
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: obs-perf-stat-row
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    allowedResources:
    - statistics
    items:
    - resourceRefId: obs-perf-p50
      size: 8
    - resourceRefId: obs-perf-p95
      size: 8
    - resourceRefId: obs-perf-p99
      size: 8
  resourcesRefs:
    items:
    - id: obs-perf-p50
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-perf-p50
      namespace: {{ .Release.Namespace }}
      resource: statistics
      verb: GET
    - id: obs-perf-p95
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-perf-p95
      namespace: {{ .Release.Namespace }}
      resource: statistics
      verb: GET
    - id: obs-perf-p99
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-perf-p99
      namespace: {{ .Release.Namespace }}
      resource: statistics
      verb: GET
