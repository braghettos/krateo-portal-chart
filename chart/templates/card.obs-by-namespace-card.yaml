# Compositions by namespace/project — honest group-by-count over compositions-list.
# Card head shows the distinct-namespace count. Mirrors the dashboard status-card.
kind: Card
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: obs-by-namespace-card
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [project, q, status]
  widgetData:
    title: Compositions by project
    titleVariant: eyebrow
    variant: outlined
    extra: ''
    items:
    - resourceRefId: obs-by-namespace-list
  widgetDataTemplate:
  - forPath: extra
    expression: '${ (([ (.list // [])[].ns ] | unique | length) | tostring) + " projects" }'
  apiRef: { name: compositions-list, namespace: {{ .Release.Namespace }} }
  resourcesRefs:
    items:
    - id: obs-by-namespace-list
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-by-namespace-list
      namespace: {{ .Release.Namespace }}
      resource: listies
      verb: GET
