# /kog-builder data source — one row per RestDefinition CR (ogen.krateo.io, the KOG
# mapping objects oasgen-provider compiles into a generated CRD + controller). All
# derivation is server-side:
#   rows   : name/namespace, the Ready condition rolled to a verdict chip (True →
#            Ready/green, False → Failed/red, absent/Unknown → Pending/gold — a fresh
#            publish has NO status until the first reconcile), the GENERATED kind +
#            apiVersion from status.resource (the post-publish verification signal:
#            populated ⇒ the CRD + controller exist; "—" until then), the OAS source
#            (status.oasPath, spec fallback pre-reconcile), age, plus agent-facing
#            fields the table carries as hidden cells (readyReason for grounding a
#            "why is it Failed?", auth = status.hasSecuritySchemes for the day-2
#            "configure credentials for <Kind>" hint).
#   counts : total/ready/failed/pending over the full set (header/summary use).
#   hint   : the empty-state CTA — ONLY when zero RestDefinitions exist (exception-only
#            UX), one item carrying askHref: a /kog-builder?ask= Autopilot deep-link
#            (@uri, server-built) seeding the paste-an-OpenAPI builder flow.
apiVersion: templates.krateo.io/v1
kind: RESTAction
metadata:
  name: kog-restdefinitions
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  api:
    # RestDefinition is namespaced (ogen.krateo.io/v1alpha1); the cluster-scope LIST
    # endpoint returns every namespace the caller may see. UAF gates each item by the
    # user's list grant on restdefinitions in ITS namespace — a narrow-RBAC user simply
    # sees fewer/no rows. continueOnError so the page degrades (empty rows) rather than
    # failing the whole widget (e.g. oasgen-provider CRD not installed).
    - name: restdefs
      path: /apis/ogen.krateo.io/v1alpha1/restdefinitions
      verb: GET
      headers:
        - 'Accept: application/json'
      continueOnError: true
      errorKey: restdefsError
      userAccessFilter:
        verb: list
        group: ogen.krateo.io
        resource: restdefinitions
        namespaceFrom: .metadata.namespace
      # Project the LIST body's .items to the fields the rows need. status is written by
      # oasgen-provider only after its first reconcile — read EVERY status field
      # defensively (a just-published RestDefinition carries none of them). The step key
      # then holds THIS array (a step WITH a filter yields the filter output).
      filter: >
        [ .restdefs.items[]?
          | { name: (.metadata.name // ""),
              namespace: (.metadata.namespace // ""),
              created: (.metadata.creationTimestamp // ""),
              readyCond: ([ (.status.conditions // [])[] | select((.type // "") == "Ready") ] | first // {}),
              genKind: (.status.resource.kind // ""),
              genApiVersion: (.status.resource.apiVersion // ""),
              oasPath: (.status.oasPath // .spec.oasPath // ""),
              hasAuth: (.status.hasSecuritySchemes // false) } ]
  # Build the registry rows (newest first) + counts + the empty-state hint. The Ready
  # verdict and its chip colour are computed HERE (server-side), never client-side.
  filter: >
    ([ (.restdefs // [])[]
        | (.readyCond.status // "") as $rs
        | { name: .name,
            namespace: .namespace,
            ready: (if $rs == "True" then "Ready" elif $rs == "False" then "Failed" else "Pending" end),
            readyColor: (if $rs == "True" then "green" elif $rs == "False" then "red" else "gold" end),
            readyReason: (.readyCond.reason // "—"),
            gvk: (if (.genKind // "") != "" then (.genKind + " · " + (.genApiVersion // "")) else "—" end),
            oasPath: (if (.oasPath // "") != "" then .oasPath else "—" end),
            auth: (.hasAuth // false),
            age: (.created // "") }
      ] | sort_by(.age // "") | reverse) as $rows
    | {
        rows: $rows,
        counts: {
          total: ($rows | length),
          ready: ([ $rows[] | select(.ready == "Ready") ] | length),
          failed: ([ $rows[] | select(.ready == "Failed") ] | length),
          pending: ([ $rows[] | select(.ready == "Pending") ] | length)
        },
        hint: (if ($rows | length) == 0
               then [ { title: "Create your first API mapping with Autopilot",
                        detail: "Paste an OpenAPI document (or give its URL) in the rail — the agent proposes the RestDefinition mapping, you preview it, one gated confirm publishes it.",
                        askHref: ("/kog-builder?ask=" + (("I want to onboard a new API with the KOG builder. I will paste an OpenAPI document (or give you its URL): propose the RestDefinition mapping (kind, resourceGroup, verbs, identifiers), preview it with previewRestDef, and publish it only after I confirm.") | @uri)) } ]
               else [] end)
      }
