# Active projects — distinct namespaces that hold at least one composition (off
# compositions-list .ns). "Project" = namespace in the platform model.
kind: Statistic
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: obs-stat-projects
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [projects, q, status]
  widgetData:
    title: Active projects
    value: 0
    watch: []
  widgetDataTemplate:
  - forPath: watch
    expression: '${ [ .list[] | { apiVersion: .av, kind: .kind } ] | unique }'
  - forPath: value
    expression: '${ [ (.list // [])[].ns ] | unique | length }'
  apiRef:
    name: compositions-list
    namespace: {{ .Release.Namespace }}
  resourcesRefs:
    items: []
