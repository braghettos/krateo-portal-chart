# Component events feed — this component's recent k8s Events as an antd List
# (same row shape as the composition-detail events feed): a status dot (by event
# type) + message + involvedObject ref pill + reason · relative-time. The RA
# already narrowed the involvedObject set to this Deployment + its ReplicaSets +
# its live pods and capped at 20.
kind: Listy
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: list-component-detail-events
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [name]
  apiRef:
    name: component-detail
    namespace: {{ .Release.Namespace }}
  widgetData:
    dataSource: []
    itemLayout: horizontal
    split: false
    itemTemplate:
      iconVariant: dot
      color:
        value: '{type}'
        map:
          Normal: green
          Warning: red
      primaryText: '{message}'
      subPrimaryText: '{ref}'
      subPrimaryTextMono: true
      secondaryText: '{reason}'
      subSecondaryText: '{ts}'
      formats:
        subSecondaryText: relative
  widgetDataTemplate:
    - forPath: dataSource
      expression: '${ (.events // []) | map({ message: (.message // ""), reason: (.reason // ""), type: (if (.type // "") == "Warning" then "Warning" else "Normal" end), ref: ((.kind // "") + "/" + (.obj // "")), ts: (.ts // "") }) }'
  resourcesRefs:
    items: []
