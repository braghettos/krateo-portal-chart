# Sub-line under the title: "<kind> · <namespace> · created <ts>". The string is
# assembled HERE (widget representation) from the raw object the RA supplies.
kind: Paragraph
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: composition-detail-subtitle
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [name, namespace]
  apiRef:
    name: composition-detail
    namespace: {{ .Release.Namespace }}
  widgetData:
    text: ""
    type: secondary
  widgetDataTemplate:
    # "created <ts>" rendered as a relative age ("14d ago") — computed server-side; the
    # output is a string so the numbers never reach snowplow's jq encoder (no json.Number).
    - forPath: text
      expression: '${ (.detail.kind // "Composition") + " · " + (.detail.metadata.namespace // "?") + " · created " + ((.detail.metadata.creationTimestamp // "") as $ts | if ($ts | length) == 0 then "?" else ((now - ($ts | fromdateiso8601)) as $sec | if $sec < 60 then "just now" elif $sec < 3600 then ((($sec/60)|floor)|tostring) + "m ago" elif $sec < 86400 then ((($sec/3600)|floor)|tostring) + "h ago" else ((($sec/86400)|floor)|tostring) + "d ago" end) end) }'
  resourcesRefs:
    items: []
