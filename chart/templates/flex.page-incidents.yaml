# Convention page root for /incidents — the SRE page (mockup §B): pagehead, lifecycle
# filter chips (live counts, server-side), the incident table (one row per
# TroubleshootingReport, row click → detail), the exception-only "awaiting investigation"
# strip (firing alerts without a report; hidden when none), and the secondary band with
# the panels the IA split moved off /observability (Autopilot feed + alert rules).
kind: Flex
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: page-incidents
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    allowedResources:
    - flexes
    - paragraphs
    - tables
    - listies
    - rows
    vertical: true
    gap: middle
    items:
    - resourceRefId: incidents-header
    # The lifecycle chips are ONE data-driven Listy(chip) — the old chips-only
    # incidents-toolbar Flex and its four looped Buttons are gone (widget-sprawl collapse).
    - resourceRefId: incidents-status-chips
    # PRIMARY: the incident table.
    - resourceRefId: incidents-table
    - resourceRefId: incidents-awaiting
    # UX-16: SECONDARY band, clearly labelled — the per-alert Autopilot investigation feed sits
    # below a "Autopilot investigations" section label so it never reads as mixed into the table.
    - resourceRefId: incidents-investigations-label
    - resourceRefId: incidents-secondary-row
  resourcesRefs:
    items:
    - id: incidents-header
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: incidents-header
      namespace: {{ .Release.Namespace }}
      resource: flexes
      verb: GET
    - id: incidents-status-chips
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: incidents-status-chips
      namespace: {{ .Release.Namespace }}
      resource: listies
      verb: GET
    - id: incidents-table
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: incidents-table
      namespace: {{ .Release.Namespace }}
      resource: tables
      verb: GET
    - id: incidents-awaiting
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: incidents-awaiting
      namespace: {{ .Release.Namespace }}
      resource: listies
      verb: GET
    - id: incidents-investigations-label
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: incidents-investigations-label
      namespace: {{ .Release.Namespace }}
      resource: paragraphs
      verb: GET
    - id: incidents-secondary-row
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: incidents-secondary-row
      namespace: {{ .Release.Namespace }}
      resource: rows
      verb: GET
