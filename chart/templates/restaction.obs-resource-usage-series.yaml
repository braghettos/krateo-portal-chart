# Cluster resource-usage TIME SERIES from ClickHouse (clickstack otel_metrics_gauge — the
# k8s cluster/kubelet receiver). The companion obs-resource-usage RA is a LIVE 5-min snapshot
# (top pods, one point); this one is the trend over the selected ?range window, bucketed, for
# the LineChart (R2 #15). Two cluster totals per bucket: CPU cores and Memory GiB.
#
# Shape mirrors obs-reconcile-metrics: the query is bucketed SERVER-SIDE (toStartOfInterval),
# so the chart just maps series -> {t,series,v}. Because a gauge is a POINT SAMPLE, summing all
# raw rows in a bucket would over-count pods sampled more than once — so the inner query first
# averages each pod's value within the bucket (avg(Value) per t,pod,metric), then the outer sums
# across pods → one honest cluster total per bucket. CPU in cores and Memory in GiB (not
# millicores/MiB) so BOTH series sit in the same low-magnitude range and read legibly on a
# single shared y-axis (the LineChart has no dual-axis). `ts` is UNIX epoch seconds.
#
# Bucket width scales with the window (~24-60 points): 1h→2m, 6h→15m, 24h→1h, 7d→6h. Default
# 24h (R2 #10 — matches the range chips / dashboard). External-fetch endpointRef, FORMAT JSON.
apiVersion: templates.krateo.io/v1
kind: RESTAction
metadata:
  name: obs-resource-usage-series
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  api:
    - name: usage
      endpointRef:
        name: clickhouse-endpoint
        namespace: {{ .Release.Namespace }}
      path: '${ (.range // "24h") as $r | (if $r=="1h" then {iv:"1%20HOUR",bk:"2%20MINUTE"} elif $r=="6h" then {iv:"6%20HOUR",bk:"15%20MINUTE"} elif $r=="7d" then {iv:"7%20DAY",bk:"6%20HOUR"} else {iv:"24%20HOUR",bk:"1%20HOUR"} end) as $w | "/?query=SELECT%20toUnixTimestamp%28t%29%20AS%20ts%2C%20round%28sumIf%28v%2C%20m%3D%27cpu%27%29%2C%202%29%20AS%20cpu_cores%2C%20round%28sumIf%28v%2C%20m%3D%27mem%27%29%2F1073741824%2C%202%29%20AS%20mem_gib%20FROM%20%28%20SELECT%20toStartOfInterval%28TimeUnix%2C%20INTERVAL%20" + $w.bk + "%29%20AS%20t%2C%20ResourceAttributes%5B%27k8s.pod.name%27%5D%20AS%20pod%2C%20multiIf%28MetricName%3D%27k8s.pod.cpu.usage%27%2C%27cpu%27%2C%27mem%27%29%20AS%20m%2C%20avg%28Value%29%20AS%20v%20FROM%20otel_metrics_gauge%20WHERE%20MetricName%20IN%20%28%27k8s.pod.cpu.usage%27%2C%27k8s.pod.memory.working_set%27%29%20AND%20TimeUnix%20%3E%20now%28%29%20-%20INTERVAL%20" + $w.iv + "%20GROUP%20BY%20t%2C%20pod%2C%20m%20%29%20GROUP%20BY%20ts%20ORDER%20BY%20ts%20FORMAT%20JSON" }'
      verb: GET
      headers:
        - 'Accept: application/json'
      continueOnError: true
      errorKey: usageError
  # usage => {data:[{ts,cpu_cores,mem_gib}]}. The LineChart fans each bucket into two series rows.
  filter: >
    { series: ((.usage.data) // []) }
