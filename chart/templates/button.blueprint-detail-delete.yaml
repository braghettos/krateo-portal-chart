# "Delete" — uninstall the blueprint by DELETEing its CompositionDefinition. Destructive, so
# requireConfirmation gates it behind the engine's confirm modal; RBAC via the user token. On
# success the engine redirects to /blueprints. Target GVR resolved server-side (.gvr) — no
# hardcode. A DELETE removes the object directly (no controller needed), effective on any cluster.
kind: Button
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: blueprint-detail-delete
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  apiRef:
    name: blueprint-detail
    namespace: {{ .Release.Namespace }}
  widgetData:
    label: Delete
    icon: fa-trash
    type: default
    danger: true
    size: small
    clickActionId: delete
    actions:
      rest:
        - id: delete
          type: rest
          resourceRefId: delete-compdef
          headers:
            - 'Accept: application/json'
          requireConfirmation: true
          successMessage: Blueprint uninstalled
          onSuccessNavigateTo: /blueprints
          loading:
            display: true
  resourcesRefs:
    items: []
  resourcesRefsTemplate:
    - template:
        id: delete-compdef
        apiVersion: ${ .gvr.apiVersion }
        resource: ${ .gvr.resource }
        name: ${ .gvr.name }
        namespace: ${ .gvr.namespace }
        verb: DELETE
