# "Uninstall" — remove the blueprint by DELETEing its CompositionDefinition. The label pairs
# with the Marketplace "Install" verb (UX-audit #10: one verb per operation — Install/Uninstall
# for blueprints, Create/Delete reserved for composition and resource instances) and matches
# the success toast. Destructive, so requireConfirmation gates it behind the engine's confirm
# modal; RBAC via the user token. On success the engine redirects to /blueprints. Target GVR
# resolved server-side (.gvr) — no hardcode. A DELETE removes the object directly (no
# controller needed), effective on any cluster.
kind: Button
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: blueprint-detail-delete
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [name, namespace]
  apiRef:
    name: blueprint-detail
    namespace: {{ .Release.Namespace }}
  widgetData:
    label: Uninstall
    icon: fa-trash
    type: default
    danger: true
    size: small
    clickActionId: delete
    actions:
      rest:
        - id: delete
          type: rest
          resourceRefId: delete-compdef
          headers:
            - 'Accept: application/json'
          requireConfirmation: true
          successMessage: Blueprint uninstalled
          onSuccessNavigateTo: /blueprints
          loading:
            display: true
  resourcesRefs:
    items: []
  resourcesRefsTemplate:
    - template:
        id: delete-compdef
        apiVersion: ${ .gvr.apiVersion }
        resource: ${ .gvr.resource }
        name: ${ .gvr.name }
        namespace: ${ .gvr.namespace }
        verb: DELETE
