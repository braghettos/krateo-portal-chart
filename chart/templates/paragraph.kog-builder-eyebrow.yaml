# Mono uppercase context caption above the /kog-builder H1 (mockup .eyebrow). Tenant
# from deployer config (.Values.tenant) — same source as the sider tenant-chip; honest.
kind: Paragraph
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: kog-builder-eyebrow
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    text: 'Platform · tenant {{ .Values.tenant | default "krateo-enterprise" }}'
    variant: eyebrow
  resourcesRefs:
    items: []
