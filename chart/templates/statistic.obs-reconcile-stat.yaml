# Overall converged % — share of compositions that are fully reconciled (railState
# == "healthy", i.e. Ready AND Synced). Floored integer + "%" suffix. railState is
# server-derived in compositions-list; guards an empty cluster (0 total → 0%).
kind: Statistic
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: obs-reconcile-stat
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): extras keys that partition this widget's cache cell.
  keyExtras: [project, q, status]
  widgetData:
    title: Converged
    value: 0
    suffix: '%'
    valueStyle:
      color: var(--cyan-color)
    watch: []
  widgetDataTemplate:
  - forPath: watch
    expression: '${ [ .list[] | { apiVersion: .av, kind: .kind } ] | unique }'
  - forPath: value
    expression: '${ (.list // []) as $l | ($l | length) as $n | if $n > 0 then ([ $l[] | select(.railState == "healthy") ] | length) * 100 / $n | floor else 0 end }'
  apiRef:
    name: compositions-list
    namespace: {{ .Release.Namespace }}
  resourcesRefs:
    items: []
