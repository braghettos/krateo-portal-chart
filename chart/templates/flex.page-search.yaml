# /search page composition (UX-audit #11): header family above the results List — the
# route previously rendered the bare List with no page identity. The nav route points
# here instead of directly at search-results.
kind: Flex
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: page-search
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # F6 (snowplow#130): /search carries ?q= as an extra; declared so the cache guard
  # accepts Puts for this container.
  keyExtras: [q]
  widgetData:
    allowedResources:
    - flexes
    - listies
    vertical: true
    items:
    - resourceRefId: search-header
    - resourceRefId: search-results
  resourcesRefs:
    items:
    - id: search-header
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: search-header
      namespace: {{ .Release.Namespace }}
      resource: flexes
      verb: GET
    - id: search-results
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: search-results
      namespace: {{ .Release.Namespace }}
      resource: listies
      verb: GET
