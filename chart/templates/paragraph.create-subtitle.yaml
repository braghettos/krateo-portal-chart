kind: Paragraph
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: create-subtitle
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  # Subtitle names the blueprint being provisioned — the name arrives via ?extras
  # (.name, the route param) and resolves in the widgetDataTemplate (no apiRef needed),
  # the same channel the dashboard greeting uses for .displayName. Falls back to the
  # static text if extras-to-widgets is unavailable.
  widgetData:
    text: Configure and provision a new resource from the selected blueprint
    type: secondary
  widgetDataTemplate:
    - forPath: text
      expression: '${ "Configure and provision a new resource from the " + (.name // "selected") + " blueprint" }'
  resourcesRefs:
    items: []
