# Mockup dashboard `.greet .eyebrow` — the mono uppercase context caption above the
# greeting H1. "Flight deck" = the dashboard (Petrol brand); tenant = the cluster, named
# by deployer config (.Values.tenant, same source as the sider tenant-chip). Honest.
# NOTE: the mockup tints the tenant name amber; this renders monochrome graphite (the
# amber-segment accent needs an `eyebrow-accent` Paragraph variant — flagged follow-on).
kind: Paragraph
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: greeting-eyebrow
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    text: 'Flight deck · tenant {{ .Values.tenant | default "krateo-enterprise" }}'
    variant: eyebrow
  resourcesRefs:
    items: []
