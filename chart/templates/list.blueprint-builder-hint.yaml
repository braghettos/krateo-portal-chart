# Empty-state CTA strip — shown ONLY while zero blueprints have been authored (the RA
# emits the hint item exclusively then; hideWhenEmpty removes the strip the moment the
# first deliverable lands — exception-only UX, the calm default is just the table). The
# row navigates to a server-built /blueprint-builder?ask= deep-link that opens the
# Autopilot rail seeded with the blueprint-authoring flow. (A Paragraph cannot carry a
# link — the Listy item is the house pattern for an actionable hint.)
kind: Listy
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: blueprint-builder-hint
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  apiRef:
    name: blueprint-builder-deliverables
    namespace: {{ .Release.Namespace }}
  widgetData:
    dataSource: []
    itemLayout: horizontal
    split: false
    hideWhenEmpty: true
    header: No blueprints authored yet — start one in Autopilot →
    itemTemplate:
      navigateTo: '{askHref}'
      iconVariant: tile
      icon: fa-wand-magic-sparkles
      color:
        default: blue
      primaryText: '{title}'
      secondaryText: '{detail}'
  widgetDataTemplate:
  - forPath: dataSource
    expression: '${ .hint // [] }'
  resourcesRefs:
    items: []
