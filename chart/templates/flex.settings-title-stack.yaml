# Title + subtitle stack for the /settings page head (mirrors compositions-title-stack).
# Settings mockup .pg-head has no eyebrow — just H1 + subtitle.
kind: Flex
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: settings-title-stack
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    allowedResources:
    - paragraphs
    vertical: true
    items:
    - resourceRefId: settings-title
    - resourceRefId: settings-subtitle
  resourcesRefs:
    items:
    - id: settings-title
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: settings-title
      namespace: {{ .Release.Namespace }}
      resource: paragraphs
      verb: GET
    - id: settings-subtitle
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: settings-subtitle
      namespace: {{ .Release.Namespace }}
      resource: paragraphs
      verb: GET
