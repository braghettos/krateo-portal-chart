# /incidents secondary band — the two alert-signal panels that moved here in the IA split
# (page-observability keeps only platform health): the per-alert Autopilot continuation
# feed (left) and the HyperDX alert-rules table (right).
kind: Row
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: incidents-secondary-row
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    allowedResources:
    - cards
    alignment: top
    items:
    - resourceRefId: obs-troubleshooting-card
      size: 12
    - resourceRefId: obs-alerts-card
      size: 12
  resourcesRefs:
    items:
    - id: obs-troubleshooting-card
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-troubleshooting-card
      namespace: {{ .Release.Namespace }}
      resource: cards
      verb: GET
    - id: obs-alerts-card
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-alerts-card
      namespace: {{ .Release.Namespace }}
      resource: cards
      verb: GET
