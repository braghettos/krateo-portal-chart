# /incidents secondary band — the per-alert Autopilot investigation feed (full width).
# The alert-RULES table (config: thresholds/intervals, incl. quiet OK rules) moved OFF this
# triage surface to the dedicated /alerts page (IA incidents-deepdive D/4) — a rule is config,
# not an incident. /incidents keeps only the firing signal (awaiting strip, above) + this
# investigation-history feed.
kind: Row
apiVersion: widgets.templates.krateo.io/v1beta1
metadata:
  name: incidents-secondary-row
  namespace: {{ .Release.Namespace }}
  annotations:
    "krateo.io/verbose": "true"
spec:
  widgetData:
    allowedResources:
    - cards
    alignment: top
    items:
    - resourceRefId: obs-troubleshooting-card
      size: 24
  resourcesRefs:
    items:
    - id: obs-troubleshooting-card
      apiVersion: widgets.templates.krateo.io/v1beta1
      name: obs-troubleshooting-card
      namespace: {{ .Release.Namespace }}
      resource: cards
      verb: GET
