# Default values for composable-portal-starter.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# @schema
# description: Enable admin user (basic authentication) with cluster-admin permissions
# type: boolean
# default: true
# @schema
enableAdminUser: true

# @schema
# description: Enable cyberjoker user (basic authentication) with namespace-scoped permissions
# type: boolean
# default: true
# @schema
enableCyberjokerUser: true

# @schema
# description: enabling the demo creates the demo-system namespace, deploys two Route resources within it, and grants permissions to the cyberjoker user if that user is enabled
# type: boolean
# default: true
# @schema
enableDemoSystemNamespace: true

# @schema
# description: Display name of the platform tenant — shown in the sider tenant chip and the page eyebrows (dashboard greeting, compositions, observability). A deployer-set label, not derived data; defaults to krateo-enterprise.
# type: string
# default: krateo-enterprise
# @schema
tenant: krateo-enterprise

# @schema
# description: Optional URL of the external observability console (e.g. the clickstack/HyperDX UI). When set, a "View in console" link appears on the /observability page and opens it in a new tab; empty hides the link. No default target is invented — a deployer must point this at their own console.
# type: string
# default: ""
# @schema
observabilityConsoleUrl: ""

# @schema
# description: W3-3 spoke read-back binding — the ONE registered spoke cluster whose /clusters/{name} detail page shows LIVE compositions read directly from the spoke apiserver (restaction cluster-compositions). snowplow endpointRef references are static (not jq-templated), so the read-back is bound per-install; generating a per-spoke RESTAction + endpoint Secret pair at registration time is the follow-up that removes this value.
# type: string
# default: "krateo-spoke-demo"
# @schema
spokeReadbackCluster: krateo-spoke-demo

# @schema
# description: Name of the DERIVED endpoint Secret for the spoke read-back — snowplow endpoint shape {server-url, token, insecure, certificate-authority-data}, derived from the registered spoke's kubeconfig Secret (NOT the kubeconfig Secret itself, which snowplow cannot consume). The server-url deliberately carries the /apis suffix; see restaction.cluster-compositions.yaml for why.
# type: string
# default: "krateo-spoke-demo-endpoint"
# @schema
spokeReadbackEndpointSecret: krateo-spoke-demo-endpoint

# @schema
# description: Namespace of the derived spoke endpoint Secret (must be readable by snowplow's ServiceAccount; the authn namespace krateo-system is the canonical home, same place the registration flow keeps the kubeconfig Secret).
# type: string
# default: "krateo-system"
# @schema
spokeReadbackEndpointNamespace: krateo-system